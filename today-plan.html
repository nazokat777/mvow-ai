<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{brand} — Bugungi reja</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="brend">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --void:      #04060B;
    --void-soft: #0C0F16;
    --text:      #F5F2EC;
    --text-mid:  #8A8D94;
    --text-dim:  #4A4D54;
    /* Yagona urg'u — teal/cyan (butun ilovada bir xil) */
    --accent:      #00E5D4;
    --accent-soft: #00B5A8;
  }

  body {
    background: var(--void);
    font-family: 'Inter', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }

  .phone {
    width: 380px;
    min-height: 800px;
    background: var(--void);
    border-radius: 40px;
    position: relative;
    box-shadow:
      0 0 0 8px #1a1d24,
      0 30px 80px rgba(0,0,0,.7);
    overflow: hidden;
  }

  /* Yagona yumshoq gradient — yulduz, nuqta, halqa yo'q */
  .backdrop {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 70% 40% at 50% 0%, rgba(0,229,212,.06), transparent 60%);
    pointer-events: none;
  }

  .container {
    position: relative;
    padding: 56px 32px 120px;
    z-index: 2;
  }

  /* Yuqori sana — mayda kulrang */
  .stamp {
    text-align: center;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--text-dim);
    font-weight: 500;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  /* Bitta katta sarlavha (serif) */
  .title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 36px;
    text-align: center;
    color: var(--text);
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }

  /* Bitta qator subtitle */
  .subtitle {
    text-align: center;
    font-size: 13px;
    color: var(--text-mid);
    margin-bottom: 56px;
    font-weight: 400;
  }
  .subtitle .em { color: var(--accent); }

  /* Toza ro'yxat — kartochka emas */
  .tasks { margin-bottom: 40px; }

  .task {
    display: grid;
    grid-template-columns: 64px 1fr auto;
    gap: 16px;
    align-items: baseline;
    padding: 18px 0;
    border-bottom: 1px solid rgba(255,255,255,.04);
  }
  .task:last-child { border-bottom: none; }

  .task .time {
    font-size: 14px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.5px;
  }
  .task .name {
    font-size: 15px;
    font-weight: 400;
    color: var(--text);
  }
  .task .dur {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 400;
  }

  /* "+ qo'sh" — kichik, kulrang */
  .add-link {
    display: block;
    text-align: center;
    margin: 24px auto 0;
    background: none;
    border: none;
    color: var(--text-mid);
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    padding: 8px;
    font-family: 'Inter', sans-serif;
    transition: color .2s;
  }
  .add-link:hover, .add-link:focus { color: var(--accent); }

  .add-form {
    display: none;
    margin-top: 16px;
    grid-template-columns: 56px 1fr 56px 40px;
    gap: 8px;
  }
  .add-form.open { display: grid; }
  .add-form input {
    background: var(--void-soft);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 4px;
    padding: 10px 8px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    outline: none;
    min-width: 0;
  }
  .add-form input:focus { border-color: var(--accent); }
  .add-form input::placeholder { color: var(--text-dim); }
  .add-form button {
    background: var(--accent);
    border: none;
    border-radius: 4px;
    color: var(--void);
    font-size: 18px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
  }
  .add-form button:disabled { opacity: .3; }

  /* Bitta CTA — pastda */
  .bottom-bar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 380px;
    padding: 24px 32px env(safe-area-inset-bottom, 24px);
    background: linear-gradient(180deg, transparent, var(--void) 30%);
    z-index: 50;
  }
  .cta {
    display: block;
    width: 100%;
    padding: 16px;
    background: linear-gradient(180deg, var(--accent-soft), var(--accent));
    color: var(--void);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    transition: opacity .2s;
  }
  .cta:hover { opacity: .9; }

  @media (max-width: 480px) {
    body { padding: 0; }
    .phone {
      width: 100vw;
      min-height: 100vh;
      border-radius: 0;
      box-shadow: none;
    }
    .container { padding: 60px 28px 130px; }
    .bottom-bar { max-width: 100vw; }
  }
</style>
</head>
<body>

<div class="phone">
  <div class="backdrop"></div>

  <div class="container">

    <div class="stamp">
      <span data-mvow="today.date">10-MAY</span> · <span data-mvow="today.weekday">DUSHANBA</span>
    </div>

    <h1 class="title">Bugungi reja</h1>

    <p class="subtitle">
      <span class="em" data-mvow="totals.focusLabel">7 soat 15 daq</span>
      fokus  ·  <span class="em" data-mvow="totals.sessions">5</span> ish
    </p>

    <div class="tasks" id="tasks"></div>

    <button class="add-link" id="addToggle" type="button">+ qo'sh</button>

    <div class="add-form" id="addForm" role="group" aria-label="Yangi ish qo'shish">
      <input id="t-time" type="text" placeholder="07:00" maxlength="5">
      <input id="t-name" type="text" placeholder="ish nomi">
      <input id="t-dur"  type="text" placeholder="45 daq">
      <button id="t-add" type="button" disabled>+</button>
    </div>

  </div>

  <div class="bottom-bar">
    <a class="cta" href="day-flow.html">boshlayman</a>
  </div>
</div>

<script src="data.js" defer></script>
<script src="nav-overlay.js" defer></script>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    const list = document.getElementById('tasks');
    if (window.MVOW_DATA && Array.isArray(MVOW_DATA.sessions)) {
      list.innerHTML = MVOW_DATA.sessions.map(s => `
        <div class="task">
          <span class="time">${s.time}</span>
          <span class="name">${s.name}</span>
          <span class="dur">${s.dur}</span>
        </div>
      `).join('');
    }

    const toggle = document.getElementById('addToggle');
    const form = document.getElementById('addForm');
    toggle.addEventListener('click', () => {
      const open = form.classList.toggle('open');
      toggle.textContent = open ? '− yopish' : '+ qo\'sh';
      if (open) document.getElementById('t-time').focus();
    });

    const t = ['t-time','t-name','t-dur'].map(id => document.getElementById(id));
    const btn = document.getElementById('t-add');
    const check = () => btn.disabled = !t.every(i => i.value.trim());
    t.forEach(i => i.addEventListener('input', check));
    btn.addEventListener('click', () => {
      const [time, name, dur] = t.map(i => i.value.trim());
      const row = document.createElement('div');
      row.className = 'task';
      row.innerHTML = `<span class="time">${time}</span><span class="name">${name}</span><span class="dur">${dur}</span>`;
      list.appendChild(row);
      t.forEach(i => i.value = '');
      check();
    });
  });
</script>

</body>
</html>
