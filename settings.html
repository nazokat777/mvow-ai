<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{brand} — Sozlamalar</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --void:#04060B; --text:#F5F2EC; --text-mid:#8A8D94; --text-dim:#4A4D54; --accent:#00E5D4; --accent-soft:#00B5A8; }
  body { background: var(--void); font-family:'Inter',sans-serif; color: var(--text); min-height: 100vh; display:flex; justify-content:center; align-items:flex-start; padding: 24px; -webkit-font-smoothing: antialiased; }
  .phone { width: 380px; min-height: 800px; background: var(--void); border-radius: 40px; overflow: hidden; position: relative; box-shadow: 0 0 0 8px #1a1d24, 0 30px 80px rgba(0,0,0,.7); }
  .container { padding: 80px 32px 100px; }
  .me { text-align:center; margin-bottom: 48px; }
  .me .name { font-family:'Cormorant Garamond',serif; font-size: 28px; font-weight: 500; }
  .me .sub { font-size: 11px; letter-spacing: 3px; color: var(--text-mid); text-transform: uppercase; margin-top: 6px; }
  .me .sub .em { color: var(--accent); }
  .row {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 16px;
    padding: 18px 0;
    border-bottom: 1px solid rgba(255,255,255,.04);
  }
  .row .lbl { font-size: 14px; color: var(--text); }
  .row .val { font-size: 13px; color: var(--accent); }
  .toggle { width: 44px; height: 26px; background: rgba(255,255,255,.08); border-radius: 13px; cursor: pointer; position: relative; }
  .toggle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; border-radius: 50%; background: var(--text); transition: transform .2s; }
  .toggle.on { background: var(--accent); }
  .toggle.on::after { transform: translateX(18px); background: var(--void); }
  .footer { margin-top: 56px; text-align: center; font-size: 11px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; }
  .footer .em { color: var(--text-mid); }
  @media (max-width: 480px) { body { padding: 0; } .phone { width: 100vw; min-height: 100vh; border-radius: 0; box-shadow: none; } }
</style>
</head>
<body>

<div class="phone">
  <div class="container">

    <div class="me">
      <div class="name" id="userName">Aziz</div>
      <div class="sub"><span class="em" data-mvow="streak">12</span> kun yo'l</div>
    </div>

    <div class="row">
      <div class="lbl">Mentor ohangi</div>
      <div class="val">O'rta</div>
    </div>
    <div class="row">
      <div class="lbl">Aralashish</div>
      <div class="val">Kamtar</div>
    </div>
    <div class="row">
      <div class="lbl">Sessiya davomiyligi</div>
      <div class="val">45 daq</div>
    </div>
    <div class="row">
      <div class="lbl">Auto-davom</div>
      <div class="toggle on"></div>
    </div>
    <div class="row">
      <div class="lbl">Ovozli eslatma</div>
      <div class="toggle on"></div>
    </div>

    <div class="footer">v <span class="em" data-brand="name">brend</span></div>

  </div>
</div>

<script src="data.js" defer></script>
<script src="nav-overlay.js" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const userName = (localStorage.getItem('mvow.userName') || 'Aziz').trim();
    document.getElementById('userName').textContent = userName;
  });
  document.querySelectorAll('.toggle').forEach(t => t.addEventListener('click', () => t.classList.toggle('on')));
</script>

</body>
</html>
