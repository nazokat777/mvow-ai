<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{brand} — Ruxsatlar</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --void:#04060B; --text:#F5F2EC; --text-mid:#8A8D94; --text-dim:#6E7178; --accent:#00E5D4; --accent-soft:#00B5A8; }
  body { background: var(--void); font-family:'Inter',sans-serif; color: var(--text); min-height: 100vh; display:flex; justify-content:center; align-items:flex-start; padding: 24px; -webkit-font-smoothing: antialiased; }
  .phone { width: 380px; min-height: 800px; background: var(--void); border-radius: 40px; overflow: hidden; position: relative; box-shadow: 0 0 0 8px #1a1d24, 0 30px 80px rgba(0,0,0,.7); display:flex; flex-direction: column; }
  .container { flex:1; padding: 100px 32px 120px; display:flex; flex-direction: column; gap: 40px; }
  .h { text-align:center; }
  .h .title { font-family:'Cormorant Garamond',serif; font-weight:500; font-size: 30px; }
  .h .sub { font-size: 12px; color: var(--text-mid); letter-spacing: 3px; text-transform: uppercase; margin-top: 8px; }
  .h .sub .em { color: var(--accent); }
  .list { display:flex; flex-direction: column; gap: 16px; margin-top: 20px; }
  .perm {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 16px;
    padding: 18px 0;
    border-bottom: 1px solid rgba(255,255,255,.04);
  }
  .perm .info { display: flex; flex-direction: column; gap: 4px; }
  .perm .name { font-size: 16px; color: var(--text); }
  .perm .why { font-size: 12px; color: var(--text-mid); line-height: 1.4; font-family: 'Cormorant Garamond', serif; font-style: italic; }
  .toggle {
    width: 48px; height: 28px;
    background: rgba(255,255,255,.08);
    border-radius: 14px;
    cursor: pointer;
    position: relative;
    transition: background .2s;
  }
  .toggle::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--text);
    transition: transform .2s;
  }
  .toggle.on { background: var(--accent); }
  .toggle.on::after { transform: translateX(20px); background: var(--void); }
  .bottom-bar { padding: 24px 32px env(safe-area-inset-bottom, 24px); background: linear-gradient(180deg, transparent, var(--void) 30%); }
  .cta { display:block; width:100%; padding:16px; background: linear-gradient(180deg, var(--accent), var(--accent-soft)); color: var(--void); font-size:13px; font-weight:600; letter-spacing:2px; text-transform: uppercase; border:none; border-radius:6px; text-align:center; text-decoration:none; }
  .cta.disabled { opacity: .3; pointer-events: none; }
  @media (max-width: 480px) { body { padding: 0; } .phone { width: 100vw; min-height: 100vh; border-radius: 0; box-shadow: none; } }
</style>
</head>
<body>

<div class="phone">
  <div class="container">
    <div class="h">
      <h1 class="title">Ruxsatlar</h1>
      <p class="sub"><span class="em" id="grantedN">0</span> / <span data-mvow="permissions.required">2</span></p>
    </div>

    <div class="list">
      <div class="perm">
        <div class="info">
          <div class="name">Ekran vaqti</div>
          <div class="why">Fokus paytida chalg'ituvchi ilovalarni qulflash uchun.</div>
        </div>
        <div class="toggle" data-perm="screenTime" role="switch" tabindex="0" aria-label="Ekran vaqti ruxsati" aria-checked="false"></div>
      </div>
      <div class="perm">
        <div class="info">
          <div class="name">Bildirishnomalar</div>
          <div class="why">Sessiya boshlanishi va eslatma uchun. Spam yo'q.</div>
        </div>
        <div class="toggle" data-perm="notification" role="switch" tabindex="0" aria-label="Bildirishnomalar ruxsati" aria-checked="false"></div>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <a class="cta disabled" id="cta" href="settings.html">Davom</a>
  </div>
</div>

<script src="data.js" defer></script>
<script src="nav-overlay.js" defer></script>
<script>
  const cta = document.getElementById('cta');
  const counter = document.getElementById('grantedN');
  const tgls = document.querySelectorAll('[data-perm]');

  function refreshCount() {
    const n = document.querySelectorAll('[data-perm].on').length;
    counter.textContent = n;
    cta.classList.toggle('disabled', n === 0);
  }

  // Saqlangan holatdan tiklash
  const SK = 'mvow.perm';
  let saved = {};
  try { saved = JSON.parse(localStorage.getItem(SK) || '{}'); } catch {}

  tgls.forEach(t => {
    const key = t.dataset.perm;
    if (saved[key]) {
      t.classList.add('on');
      t.setAttribute('aria-checked', 'true');
    }
    const flip = async () => {
      if (window.MVOW_DATA) MVOW_DATA.fxTap();
      // "Bildirishnomalar" — haqiqiy brauzer ruxsatini so'rash
      if (key === 'notification' && !t.classList.contains('on')) {
        if ('Notification' in window) {
          try {
            const res = await Notification.requestPermission();
            if (res !== 'granted') return; // rad bo'lsa, toggle yoqilmaydi
          } catch {}
        }
      }
      const on = !t.classList.contains('on');
      t.classList.toggle('on', on);
      t.setAttribute('aria-checked', on ? 'true' : 'false');
      saved[key] = on;
      localStorage.setItem(SK, JSON.stringify(saved));
      refreshCount();
    };
    t.addEventListener('click', flip);
    t.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); flip(); }
    });
  });
  refreshCount();
</script>

</body>
</html>
