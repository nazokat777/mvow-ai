<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{brand} — Rejalashtir</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --void:#04060B; --void-soft:#0C0F16; --text:#F5F2EC; --text-mid:#8A8D94; --text-dim:#6E7178; --accent:#00E5D4; --accent-soft:#00B5A8; --alert:#FF4757; }
  body { background: var(--void); font-family:'Inter',sans-serif; color: var(--text); min-height: 100vh; display:flex; justify-content:center; align-items:flex-start; padding: 24px; -webkit-font-smoothing: antialiased; }
  .phone { width: 380px; min-height: 800px; background: var(--void); border-radius: 40px; overflow: hidden; position: relative; box-shadow: 0 0 0 8px #1a1d24, 0 30px 80px rgba(0,0,0,.7); display:flex; flex-direction: column; }
  .container { flex:1; padding: 70px 32px 120px; display:flex; flex-direction:column; gap: 24px; }

  .h { text-align: center; }
  .h .title { font-family:'Cormorant Garamond',serif; font-weight: 500; font-size: 28px; line-height: 1.3; }
  .h .sub {
    font-family:'Cormorant Garamond',serif; font-style: italic;
    font-size: 15px; color: var(--text-mid);
    margin-top: 12px;
    line-height: 1.5;
  }
  .h .sub .em { color: var(--accent); font-style: normal; }

  .input-block {
    position: relative;
  }
  .input-block textarea {
    width: 100%;
    min-height: 180px;
    background: var(--void-soft);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 8px;
    color: var(--text);
    padding: 16px 56px 16px 16px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 16px;
    line-height: 1.6;
    outline: none;
    resize: none;
    transition: border-color .2s;
  }
  .input-block textarea:focus { border-color: var(--accent); }
  .input-block textarea::placeholder { color: var(--text-dim); font-style: italic; }

  /* Ovoz tugmasi — textarea ichida o'ng yuqorida */
  .mic {
    position: absolute;
    top: 12px; right: 12px;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(180deg, var(--accent), var(--accent-soft));
    border: none;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    transition: transform .15s, box-shadow .25s;
    box-shadow: 0 0 12px rgba(0,229,212,.3);
  }
  .mic:active { transform: scale(.92); }
  .mic svg { width: 16px; height: 16px; fill: var(--void); }
  .mic.recording {
    animation: pulse 1.4s ease-in-out infinite;
    background: var(--alert);
    box-shadow: 0 0 16px rgba(255,71,87,.5);
  }
  .mic.disabled { opacity: .35; pointer-events: none; }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 16px rgba(255,71,87,.5); }
    50%      { box-shadow: 0 0 26px rgba(255,71,87,.9); }
  }

  .voice-status {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    text-align: center;
    min-height: 14px;
    opacity: 0;
    transition: opacity .2s;
  }
  .voice-status.show { opacity: 1; }
  .voice-status.bad { color: var(--alert); }

  .bottom-bar { padding: 24px 32px env(safe-area-inset-bottom, 24px); background: linear-gradient(180deg, transparent, var(--void) 30%); }
  .cta { display:block; width:100%; padding:16px; background: linear-gradient(180deg, var(--accent), var(--accent-soft)); color: var(--void); font-size:13px; font-weight:600; letter-spacing:2px; text-transform: uppercase; border:none; border-radius:6px; text-align:center; text-decoration:none; }
  .cta.disabled { opacity:.3; pointer-events:none; }

  @media (max-width: 480px) { body { padding: 0; } .phone { width: 100vw; min-height: 100vh; border-radius: 0; box-shadow: none; } }
</style>
</head>
<body>

<div class="phone">
  <div class="container">

    <div class="h">
      <h1 class="title">Rejalaringni ayt</h1>
      <p class="sub">Yoz yoki <span class="em">ovozda</span> ayt — shunga ko'ra kun tartibini tuzaman.</p>
    </div>

    <div class="input-block">
      <textarea id="plans" placeholder="masalan: ertalab mashq, til o'rganish, kunduzi loyiha, kechqurun kitob..." maxlength="800"></textarea>
      <button class="mic" id="micBtn" type="button" aria-label="Ovozda ayt" title="Ovozda ayt">
        <svg viewBox="0 0 24 24">
          <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3zM19 11a7 7 0 0 1-14 0M12 18v3"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <p class="voice-status" id="status"></p>

  </div>

  <div class="bottom-bar">
    <a class="cta disabled" id="cta" href="today-plan.html">Kun tartibini tuz</a>
  </div>
</div>

<script src="data.js" defer></script>
<script src="nav-overlay.js" defer></script>
<script>
  const t = document.getElementById('plans');
  const btn = document.getElementById('cta');
  const mic = document.getElementById('micBtn');
  const status = document.getElementById('status');

  // Saqlangan matn
  const saved = localStorage.getItem('mvow.plansRaw');
  if (saved) t.value = saved;
  check();

  function check() {
    btn.classList.toggle('disabled', !t.value.trim());
  }
  t.addEventListener('input', check);

  // ── Matnni sessiyalarga parse qilish ──
  function parsePlansToSessions(raw) {
    const lines = raw.split(/[\n,;•\-–—]+/).map(s => s.trim()).filter(Boolean);
    const out = [];
    let hour = 6; // default boshlanish 06:00
    for (const line of lines) {
      let time = '', name = line, mins = 60, dur = '1 soat';
      const m = line.match(/^(\d{1,2}):(\d{2})\s+(.+?)(?:\s+\((\d+)\s*(daq|soat|s|d)?\))?$/i);
      if (m) {
        time = `${m[1].padStart(2,'0')}:${m[2]}`;
        name = m[3].trim();
        if (m[4]) {
          const n = parseInt(m[4], 10);
          const unit = (m[5] || '').toLowerCase();
          if (unit.startsWith('s')) { mins = n * 60; dur = n + ' soat'; }
          else                       { mins = n;     dur = n + ' daq';  }
        }
      } else {
        time = `${String(hour).padStart(2,'0')}:00`;
        hour++;
      }
      out.push({ time, name, dur });
    }
    return out;
  }

  btn.addEventListener('click', () => {
    const raw = t.value.trim();
    localStorage.setItem('mvow.plansRaw', raw);
    const sessions = parsePlansToSessions(raw);
    if (sessions.length) localStorage.setItem('mvow.todayPlan', JSON.stringify(sessions));
  });

  // ── Ovozli kiritish (Web Speech API) ──
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recog = null;
  let recording = false;

  function showStatus(text, bad) {
    status.textContent = text;
    status.className = 'voice-status show' + (bad ? ' bad' : '');
    if (!text) status.classList.remove('show');
  }

  if (!SR) {
    // Brauzer qo'llamasa — mikrofonni o'chirib qo'yamiz, status tushuntirish
    mic.classList.add('disabled');
    mic.title = "Bu brauzer ovozli kiritishni qo'llamaydi — yozib qo'y";
    showStatus("brauzer ovozli kiritishni qo'llamaydi", true);
    setTimeout(() => showStatus(''), 4000);
  } else {
    recog = new SR();
    recog.lang = 'uz-UZ';   // O'zbek tili (mavjud bo'lsa)
    recog.continuous = true;
    recog.interimResults = true;

    let finalSoFar = '';

    recog.onstart = () => {
      recording = true;
      mic.classList.add('recording');
      finalSoFar = t.value ? t.value + ' ' : '';
      showStatus('Tinglayapman...');
    };
    recog.onresult = (ev) => {
      let interim = '';
      let final = '';
      for (let i = ev.resultIndex; i < ev.results.length; i++) {
        const r = ev.results[i];
        if (r.isFinal) final += r[0].transcript + ' ';
        else interim += r[0].transcript;
      }
      if (final) finalSoFar += final;
      t.value = (finalSoFar + interim).trim();
      check();
    };
    recog.onerror = (ev) => {
      recording = false;
      mic.classList.remove('recording');
      if (ev.error === 'no-speech') {
        showStatus('hech narsa eshitilmadi', true);
      } else if (ev.error === 'not-allowed' || ev.error === 'service-not-allowed') {
        showStatus('mikrofonga ruxsat kerak', true);
      } else if (ev.error === 'language-not-supported') {
        // O'zbek tili yo'q bo'lsa, ruschaga o'tamiz va qayta urinamiz
        try { recog.lang = 'ru-RU'; recog.start(); showStatus('o\'zbek tili yo\'q · rus tilida...'); return; } catch {}
        showStatus('til qo\'llanmaydi', true);
      } else {
        showStatus("xato: " + ev.error, true);
      }
      setTimeout(() => showStatus(''), 3500);
    };
    recog.onend = () => {
      if (recording) {
        recording = false;
        mic.classList.remove('recording');
        showStatus('yozildi');
        setTimeout(() => showStatus(''), 1500);
      }
    };

    mic.addEventListener('click', () => {
      if (recording) {
        recog.stop();
      } else {
        try { recog.start(); } catch (e) { showStatus("ulanish xatosi", true); }
      }
    });
  }
</script>

</body>
</html>
