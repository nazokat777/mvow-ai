<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{brand} — Tanishuv</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="brend">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --void:      #04060B;
    --void-soft: #0C0F16;
    --text:      #F5F2EC;
    --text-mid:  #8A8D94;
    --text-dim:  #4A4D54;
    --accent:      #00E5D4;
    --accent-soft: #00B5A8;
  }
  body {
    background: var(--void);
    font-family: 'Inter', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }
  .phone {
    width: 380px;
    min-height: 800px;
    background: var(--void);
    border-radius: 40px;
    position: relative;
    box-shadow: 0 0 0 8px #1a1d24, 0 30px 80px rgba(0,0,0,.7);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .container {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 40px 100px;
    gap: 40px;
    position: relative;
  }
  .logo {
    width: 120px;
    height: 120px;
    background: url(assets/mnsm-logo.png) center/contain no-repeat;
    filter: hue-rotate(160deg) saturate(1.4) drop-shadow(0 0 24px rgba(0,229,212,.4));
  }
  .name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 32px;
    color: var(--text);
    letter-spacing: 4px;
    text-align: center;
  }
  .tag {
    font-size: 13px;
    color: var(--text-mid);
    text-align: center;
    margin-top: -28px;
  }
  .field {
    width: 100%;
    margin-top: 16px;
  }
  .field input {
    width: 100%;
    background: var(--void-soft);
    border: none;
    border-bottom: 1px solid rgba(255,255,255,.1);
    color: var(--text);
    padding: 16px 0;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 18px;
    text-align: center;
    outline: none;
    transition: border-color .2s;
  }
  .field input:focus { border-bottom-color: var(--accent); }
  .field input::placeholder { color: var(--text-dim); font-style: italic; }
  .bottom-bar {
    padding: 24px 40px env(safe-area-inset-bottom, 24px);
    background: linear-gradient(180deg, transparent, var(--void) 30%);
  }
  .cta {
    display: block;
    width: 100%;
    padding: 16px;
    background: linear-gradient(180deg, var(--accent), var(--accent-soft));
    color: var(--void);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
  }
  .cta:disabled, .cta.disabled { opacity: .3; pointer-events: none; }
  @media (max-width: 480px) {
    body { padding: 0; }
    .phone { width: 100vw; min-height: 100vh; border-radius: 0; box-shadow: none; }
  }
</style>
</head>
<body>

<div class="phone">
  <div class="container">
    <div class="logo"></div>
    <h1 class="name" data-brand="name">brend</h1>
    <p class="tag" data-brand="tagline">sening intizom do'sting</p>
    <div class="field">
      <input id="nameInput" type="text" placeholder="ismingni yoz" autocomplete="given-name" maxlength="24">
    </div>
  </div>
  <div class="bottom-bar">
    <a class="cta disabled" id="startBtn" href="voice-commitment.html">Boshlaymiz</a>
  </div>
</div>

<script src="data.js" defer></script>
<script src="nav-overlay.js" defer></script>
<script>
  const inp = document.getElementById('nameInput');
  const btn = document.getElementById('startBtn');
  inp.addEventListener('input', () => {
    btn.classList.toggle('disabled', !inp.value.trim());
  });
  btn.addEventListener('click', e => {
    if (btn.classList.contains('disabled')) { e.preventDefault(); return; }
    localStorage.setItem('mvow.userName', inp.value.trim());
  });
</script>

</body>
</html>
