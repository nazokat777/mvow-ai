<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{brand} — Tanishuv</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="brend">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --void:#04060B; --void-soft:#0C0F16;
    --text:#F5F2EC; --text-mid:#8A8D94; --text-dim:#4A4D54;
    --accent:#00E5D4; --accent-soft:#00B5A8;
  }
  body {
    background: var(--void);
    font-family: 'Inter', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex; justify-content: center; align-items: flex-start;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }
  .phone {
    width: 380px; min-height: 800px;
    background: var(--void);
    border-radius: 40px;
    position: relative;
    box-shadow: 0 0 0 8px #1a1d24, 0 30px 80px rgba(0,0,0,.7);
    overflow: hidden;
    display: flex; flex-direction: column;
  }

  /* Halo behind logo — yumshoq teal radial */
  .halo {
    position: absolute;
    top: 60px; left: 50%;
    transform: translateX(-50%);
    width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(0,229,212,.18), transparent 60%);
    border-radius: 50%;
    opacity: 0;
    animation: halo-in 1.4s ease 0.3s forwards, halo-pulse 5s ease-in-out 2s infinite;
  }
  @keyframes halo-in { to { opacity: 1; } }
  @keyframes halo-pulse {
    0%, 100% { transform: translateX(-50%) scale(1); opacity: .8; }
    50%      { transform: translateX(-50%) scale(1.1); opacity: 1; }
  }

  .container {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center;
    padding: 80px 32px 100px;
    gap: 28px;
    position: relative;
    z-index: 2;
  }

  .logo {
    width: 96px; height: 96px;
    background: url(assets/mnsm-logo.png) center/contain no-repeat;
    filter: hue-rotate(160deg) saturate(1.4) drop-shadow(0 0 20px rgba(0,229,212,.4));
    opacity: 0;
    transform: scale(0.7);
    animation: logo-in 1.4s cubic-bezier(.16,.84,.32,1) 0.2s forwards;
  }
  @keyframes logo-in {
    to { opacity: 1; transform: scale(1); }
  }

  .name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 30px;
    color: var(--text);
    letter-spacing: 4px;
    text-align: center;
    margin-top: -8px;
    display: flex;
    gap: 2px;
    justify-content: center;
  }
  .name .ch {
    display: inline-block;
    opacity: 0;
    transform: translateY(6px);
    filter: blur(4px);
    animation: char-in 0.6s cubic-bezier(.16,.84,.32,1) forwards;
  }
  @keyframes char-in {
    to { opacity: 1; transform: translateY(0); filter: blur(0); }
  }

  .tag {
    font-size: 12px;
    color: var(--text-mid);
    text-align: center;
    margin-top: -16px;
    opacity: 0;
    transform: translateY(6px);
    animation: fade-up 0.8s ease 1.8s forwards;
  }
  @keyframes fade-up { to { opacity: 1; transform: translateY(0); } }

  .fields {
    width: 100%;
    display: flex; flex-direction: column;
    gap: 16px;
    margin-top: 8px;
    opacity: 0;
    transform: translateY(12px);
    animation: fade-up 0.9s ease 2.4s forwards;
  }
  .field input,
  .field textarea {
    width: 100%;
    background: var(--void-soft);
    border: none;
    border-bottom: 1px solid rgba(255,255,255,.1);
    color: var(--text);
    padding: 14px 0;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 16px;
    text-align: center;
    outline: none;
    transition: border-color .2s;
    resize: none;
    line-height: 1.4;
  }
  .field input:focus,
  .field textarea:focus { border-bottom-color: var(--accent); }
  .field input::placeholder,
  .field textarea::placeholder { color: var(--text-dim); font-style: italic; }

  .bottom-bar {
    padding: 20px 32px env(safe-area-inset-bottom, 20px);
    background: linear-gradient(180deg, transparent, var(--void) 30%);
    opacity: 0;
    animation: fade-up 0.9s ease 3.0s forwards;
  }
  .cta {
    display: block;
    width: 100%;
    padding: 16px;
    background: linear-gradient(180deg, var(--accent), var(--accent-soft));
    color: var(--void);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    transition: opacity .2s;
  }
  .cta.disabled { opacity: .3; pointer-events: none; }

  @media (max-width: 480px) {
    body { padding: 0; }
    .phone { width: 100vw; min-height: 100vh; border-radius: 0; box-shadow: none; }
  }
</style>
</head>
<body>

<div class="phone">
  <div class="halo"></div>

  <div class="container">
    <div class="logo"></div>
    <h1 class="name" id="brandName" data-brand="name">brend</h1>
    <p class="tag" data-brand="tagline">sening intizom do'sting</p>

    <div class="fields">
      <div class="field">
        <input id="nameInput" type="text" placeholder="ismingni yoz" autocomplete="given-name" maxlength="24">
      </div>
      <div class="field">
        <textarea id="bioInput" placeholder="o'zing haqingda bir-ikki jumla" maxlength="160" rows="3"></textarea>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <a class="cta disabled" id="startBtn" href="voice-commitment.html">Boshlaymiz</a>
  </div>
</div>

<script src="data.js" defer></script>
<script src="nav-overlay.js" defer></script>
<script>
  // Brand nomini harfma-harf chiqarish (data-brand keyin to'ldiradi)
  function animateName() {
    const el = document.getElementById('brandName');
    if (!el) return;
    const txt = el.textContent;
    el.innerHTML = '';
    [...txt].forEach((ch, i) => {
      const span = document.createElement('span');
      span.className = 'ch';
      span.textContent = ch === ' ' ? ' ' : ch;
      span.style.animationDelay = (1.0 + i * 0.08) + 's';
      el.appendChild(span);
    });
  }
  // data.js DOMContentLoaded ichida brand'ni yangilashidan keyin animatsiya boshlanadi
  setTimeout(animateName, 100);

  const nameInp = document.getElementById('nameInput');
  const bioInp = document.getElementById('bioInput');
  const btn = document.getElementById('startBtn');

  function check() {
    btn.classList.toggle('disabled', !nameInp.value.trim());
  }
  nameInp.addEventListener('input', check);
  bioInp.addEventListener('input', check);

  btn.addEventListener('click', e => {
    if (btn.classList.contains('disabled')) { e.preventDefault(); return; }
    localStorage.setItem('mvow.userName', nameInp.value.trim());
    if (bioInp.value.trim()) localStorage.setItem('mvow.userBio', bioInp.value.trim());
  });

  const savedName = localStorage.getItem('mvow.userName');
  const savedBio = localStorage.getItem('mvow.userBio');
  if (savedName) { nameInp.value = savedName; check(); }
  if (savedBio) { bioInp.value = savedBio; }
</script>

</body>
</html>
