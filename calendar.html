<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{brand} — Kalendar</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --void:#04060B; --void-soft:#0C0F16; --text:#F5F2EC; --text-mid:#8A8D94; --text-dim:#4A4D54; --accent:#00E5D4; --accent-soft:#00B5A8; --emerald:#4A8A5C; }
  body { background: var(--void); font-family:'Inter',sans-serif; color: var(--text); min-height: 100vh; display:flex; justify-content:center; align-items:flex-start; padding: 24px; -webkit-font-smoothing: antialiased; }
  .phone { width: 380px; min-height: 800px; background: var(--void); border-radius: 40px; overflow: hidden; position: relative; box-shadow: 0 0 0 8px #1a1d24, 0 30px 80px rgba(0,0,0,.7); }
  .container { padding: 60px 24px 60px; }
  .header { text-align: center; margin-bottom: 32px; }
  .header .month { font-family:'Cormorant Garamond',serif; font-size: 24px; font-weight: 500; }
  .tabs { display: flex; gap: 4px; padding: 4px; background: var(--void-soft); border-radius: 8px; margin-bottom: 32px; }
  .tab { flex: 1; padding: 10px; text-align:center; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-mid); cursor: pointer; border-radius: 6px; transition: all .15s; }
  .tab.on { background: var(--accent); color: var(--void); font-weight: 600; }
  .week-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 24px; }
  .day {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 12px 4px;
    border-radius: 8px;
    cursor: pointer;
  }
  .day .d { font-size: 9px; letter-spacing: 1px; color: var(--text-dim); text-transform: uppercase; }
  .day .n { font-size: 14px; color: var(--text); }
  .day.today { background: var(--accent); }
  .day.today .d, .day.today .n { color: var(--void); font-weight: 600; }
  .sessions { display:flex; flex-direction: column; gap: 0; }
  .session-row {
    display: grid;
    grid-template-columns: 56px 1fr auto;
    align-items: baseline;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid rgba(255,255,255,.04);
  }
  .session-row .t { font-size: 13px; color: var(--accent); }
  .session-row .name { font-size: 14px; }
  .session-row .dur { font-size: 11px; color: var(--text-dim); }
  .session-row.done .name { color: var(--emerald); }
  .session-row.done .t { color: var(--emerald); }
  .session-row.missed .name { color: var(--text-dim); text-decoration: line-through; }
  @media (max-width: 480px) { body { padding: 0; } .phone { width: 100vw; min-height: 100vh; border-radius: 0; box-shadow: none; } }
</style>
</head>
<body>

<div class="phone">
  <div class="container">

    <div class="header">
      <div class="month">May 2026</div>
    </div>

    <div class="tabs">
      <div class="tab">Kun</div>
      <div class="tab on">Hafta</div>
      <div class="tab">Oy</div>
    </div>

    <div class="week-row" id="weekRow"></div>

    <div class="sessions" id="sessions"></div>

  </div>
</div>

<script src="data.js" defer></script>
<script src="nav-overlay.js" defer></script>
<script>
  // Hafta kunlari
  const days = ['DU','SE','CH','PA','JU','SH','YA'];
  const dates = [4,5,6,7,8,9,10];
  const today = 6;
  const wr = document.getElementById('weekRow');
  dates.forEach((n, i) => {
    const c = document.createElement('div');
    c.className = 'day' + (i === today ? ' today' : '');
    c.innerHTML = `<span class="d">${days[i]}</span><span class="n">${n}</span>`;
    wr.appendChild(c);
  });

  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
    t.classList.add('on');
  }));

  // Sessiyalar
  document.addEventListener('DOMContentLoaded', () => {
    if (!window.MVOW_DATA) return;
    const list = document.getElementById('sessions');
    list.innerHTML = MVOW_DATA.sessions.map(s => `
      <div class="session-row ${s.status === 'done' ? 'done' : ''}">
        <span class="t">${s.time}</span>
        <span class="name">${s.name}</span>
        <span class="dur">${s.dur}</span>
      </div>
    `).join('');
  });
</script>

</body>
</html>
