<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{brand} — Bugungi yo'l</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --void:#04060B;
    --text:#F5F2EC; --text-mid:#B8BBC2; --text-dim:#9CA0A8;
    --accent:#00E5D4; --accent-soft:#00B5A8;
  }
  body { background: var(--void); font-family:'Inter',sans-serif; color: var(--text); min-height: 100vh; display:flex; justify-content:center; align-items:flex-start; padding: 24px; -webkit-font-smoothing: antialiased; }
  .phone { width: 380px; min-height: 800px; background: var(--void); border-radius: 40px; overflow: hidden; position: relative; box-shadow: 0 0 0 8px #1a1d24, 0 30px 80px rgba(0,0,0,.7); display:flex; flex-direction: column; }
  .container { flex:1; display:flex; flex-direction: column; align-items:center; justify-content:center; padding: 80px 32px 120px; gap: 32px; }

  .task { text-align: center; }
  .task .name { font-family:'Cormorant Garamond',serif; font-weight:500; font-size: 26px; color: var(--text); letter-spacing: 0.5px; }
  .task .time { font-size: 11px; letter-spacing: 3px; color: var(--text-mid); text-transform: uppercase; margin-top: 8px; }

  .ring-wrap { position: relative; width: 240px; height: 240px; }
  .ring-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring-track { fill: none; stroke: rgba(255,255,255,.06); stroke-width: 3; }
  .ring-prog { fill: none; stroke: var(--accent); stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
  .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
  .ring-center .digits { font-size: 44px; font-weight: 300; color: var(--accent); letter-spacing: 1px; font-feature-settings: "tnum"; }
  .ring-center .sub { font-size: 9px; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase; }

  .bottom-bar { padding: 20px 32px env(safe-area-inset-bottom, 20px); background: linear-gradient(180deg, transparent, var(--void) 30%); display: flex; flex-direction: column; gap: 10px; }
  .cta { display:block; width:100%; padding:16px; background: linear-gradient(180deg, var(--accent), var(--accent-soft)); color: var(--void); font-size:13px; font-weight:600; letter-spacing:2px; text-transform: uppercase; border:none; border-radius:6px; text-align:center; text-decoration:none; cursor: pointer; }
  .ghost { display:block; width:100%; padding:12px; background: transparent; color: var(--text-mid); font-size:11px; letter-spacing:2px; text-transform: uppercase; border:1px solid rgba(255,255,255,.08); border-radius:6px; text-align:center; text-decoration:none; cursor: pointer; }

  @media (max-width: 480px) { body { padding: 0; } .phone { width: 100vw; min-height: 100vh; border-radius: 0; box-shadow: none; } }
</style>
</head>
<body>

<div class="phone">
  <div class="container">

    <div class="task">
      <div class="name" id="taskName">Til o'rganish</div>
      <div class="time" id="taskTime">06:20 — 07:20</div>
    </div>

    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 240 240">
        <circle class="ring-track" cx="120" cy="120" r="116"/>
        <circle id="ring" class="ring-prog" cx="120" cy="120" r="116"
                stroke-dasharray="729" stroke-dashoffset="0"/>
      </svg>
      <div class="ring-center">
        <div class="digits" id="digits">25:00</div>
        <div class="sub" id="sub">tayyor</div>
      </div>
    </div>

  </div>

  <div class="bottom-bar">
    <button class="cta" id="startBtn" type="button" style="border:none;cursor:pointer;width:100%;">Boshlayman</button>
    <a class="ghost" href="today-plan.html">Rejaga qaytish</a>
  </div>
</div>

<!-- Pomodoro savol modali -->
<div id="pomoModal" style="display:none;position:fixed;inset:0;z-index:9999;background:rgba(4,6,11,.85);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:24px;">
  <div style="max-width:360px;width:100%;background:#11151E;border:1px solid rgba(0,229,212,.2);border-radius:16px;padding:28px 22px;text-align:center;animation:pomoIn .4s cubic-bezier(.16,.84,.32,1);">
    <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;font-size:26px;line-height:1.3;color:#F5F2EC;margin-bottom:8px;">Pomodoro usuli<br>bo'lsinmi?</div>
    <div style="font-size:13px;color:#9CA0A8;margin-bottom:24px;line-height:1.5;">25 daq ish + 5 daq dam sikllariga<br>to'g'irlanadi</div>

    <div id="pomoPreview" style="display:none;background:rgba(0,229,212,.06);border:1px solid rgba(0,229,212,.2);border-radius:8px;padding:12px;margin-bottom:18px;font-family:'Inter',sans-serif;font-size:13px;color:#7AF5EC;letter-spacing:1px;"></div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <button id="pomoNo" type="button" style="padding:14px;background:transparent;color:#B8BBC2;border:1px solid rgba(255,255,255,.1);border-radius:999px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;min-height:48px;">Yo'q</button>
      <button id="pomoYes" type="button" style="padding:14px;background:linear-gradient(180deg,#00E5D4,#00B5A8);color:#04060B;border:none;border-radius:999px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;min-height:48px;">Ha</button>
    </div>
  </div>
</div>

<style>
@keyframes pomoIn {
  from { opacity: 0; transform: translateY(20px) scale(.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
#pomoModal.show { display: flex !important; }
</style>

<script src="i18n.js" defer></script>
<script src="data.js" defer></script>
<script src="nav-overlay.js" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    let prefs = {};
    try { prefs = JSON.parse(localStorage.getItem('mvow.prefs') || '{}'); } catch {}
    const mode = prefs.mode || 'simple';
    const breakMin = parseInt(prefs.breakMins || 5, 10);
    const cycles = parseInt(prefs.pomoCycles || 3, 10);

    // AVVAL — foydalanuvchining saqlangan rejasidan
    let cur = null;
    if (window.MVOW_DATA) {
      cur = MVOW_DATA.currentTaskFromPlan();
    }
    // Aks holda — data.js namunadan
    if (!cur && window.MVOW_DATA) {
      cur = MVOW_DATA.currentSession() || MVOW_DATA.sessions[0];
    }
    if (!cur) cur = { name: 'Sessiya', time: '07:00', dur: '25 daq' };

    // Vaqt — har doim task'ning haqiqiy davomiyligidan
    const taskMins = window.MVOW_DATA ? MVOW_DATA.parseDurMins(cur.dur) : 25;
    const workMin = taskMins;

    document.getElementById('taskName').textContent = cur.name;
    const start = cur.time || '07:00';
    if (start && start.includes(':')) {
      const sm = (+start.split(':')[0]) * 60 + (+start.split(':')[1]);
      const totalMin = (mode === 'pomodoro')
        ? (workMin * cycles + breakMin * (cycles - 1))
        : taskMins;
      const em = sm + totalMin;
      const end = String(Math.floor(em/60)).padStart(2,'0') + ':' + String(em%60).padStart(2,'0');
      document.getElementById('taskTime').textContent = `${start} — ${end}` + (mode === 'pomodoro' ? `  ·  ${cycles} sikl` : '');
    }
    document.getElementById('digits').textContent = String(workMin).padStart(2,'0') + ':00';

    // ── Pomodoro confirm modal ──
    const modal = document.getElementById('pomoModal');
    const startBtn = document.getElementById('startBtn');
    const yesBtn = document.getElementById('pomoYes');
    const noBtn  = document.getElementById('pomoNo');
    const preview = document.getElementById('pomoPreview');

    // Pomodoro siklik hisob — task vaqtini standart 25+5 ga to'g'irlash
    const POMO_WORK = 25;
    const POMO_BREAK = 5;
    function pomodoroCycles(durMin) {
      // Necha sikl kerak — 25 daq ish bo'laklariga
      return Math.max(1, Math.round(durMin / POMO_WORK));
    }
    const cyclesNeeded = pomodoroCycles(taskMins);
    const pomoTotal = cyclesNeeded * POMO_WORK + (cyclesNeeded - 1) * POMO_BREAK;
    preview.textContent = `${cyclesNeeded} sikl · ${pomoTotal} daq jami (${POMO_WORK}+${POMO_BREAK})`;

    startBtn.addEventListener('click', () => {
      localStorage.removeItem('mvow.timer');
      preview.style.display = 'block';
      modal.style.display = 'flex';
      modal.classList.add('show');
    });

    yesBtn.addEventListener('click', () => {
      // Pomodoro tanlandi → settings'ga yozish
      let p = {};
      try { p = JSON.parse(localStorage.getItem('mvow.prefs') || '{}'); } catch {}
      p.mode = 'pomodoro';
      p.sessionMins = String(POMO_WORK);
      p.breakMins = String(POMO_BREAK);
      p.pomoCycles = String(cyclesNeeded);
      localStorage.setItem('mvow.prefs', JSON.stringify(p));
      if (window.MVOW_DATA && MVOW_DATA.fxSuccess) MVOW_DATA.fxSuccess();
      window.location.href = 'hard-lock.html';
    });

    noBtn.addEventListener('click', () => {
      // Oddiy rejim
      let p = {};
      try { p = JSON.parse(localStorage.getItem('mvow.prefs') || '{}'); } catch {}
      p.mode = 'simple';
      localStorage.setItem('mvow.prefs', JSON.stringify(p));
      if (window.MVOW_DATA && MVOW_DATA.fxTap) MVOW_DATA.fxTap();
      window.location.href = 'hard-lock.html';
    });
  });
</script>

</body>
</html>
