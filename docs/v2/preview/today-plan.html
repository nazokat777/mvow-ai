<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{brand} — Bugungi reja</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="brend">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --void:#04060B; --void-soft:#0C0F16;
    --text:#F5F2EC; --text-mid:#B8BBC2; --text-dim:#9CA0A8;
    --accent:#00E5D4; --accent-soft:#00B5A8;
    --alert:#FF4757;
  }
  body { background: var(--void); font-family:'Inter',sans-serif; color: var(--text); min-height: 100vh; display:flex; justify-content:center; align-items:flex-start; padding: 24px; -webkit-font-smoothing: antialiased; }
  .phone { width: 380px; min-height: 800px; background: var(--void); border-radius: 40px; position: relative; box-shadow: 0 0 0 8px #1a1d24, 0 30px 80px rgba(0,0,0,.7); overflow: hidden; }
  .backdrop { position: absolute; inset: 0; background: radial-gradient(ellipse 70% 40% at 50% 0%, rgba(0,229,212,.06), transparent 60%); pointer-events: none; }
  .container { position: relative; padding: 56px 28px 120px; z-index: 2; }

  .stamp { text-align: center; font-size: 10px; letter-spacing: 4px; color: var(--text-dim); font-weight: 500; text-transform: uppercase; margin-bottom: 28px; }

  .title { font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: 36px; text-align: center; color: var(--text); letter-spacing: 0.5px; margin-bottom: 8px; }

  .subtitle { text-align: center; font-size: 13px; color: var(--text-mid); margin-bottom: 36px; font-weight: 400; }
  .subtitle .em { color: var(--accent); }

  .tasks { margin-bottom: 16px; }

  .task {
    display: grid;
    grid-template-columns: 60px 1fr auto;
    gap: 12px;
    align-items: baseline;
    padding: 16px 0;
    border-bottom: 1px solid rgba(255,255,255,.04);
    transition: opacity .25s, transform .25s;
    position: relative;
  }
  .task.done .name { color: var(--text-mid); text-decoration: line-through; text-decoration-color: rgba(0,229,212,.4); }
  .task.done .time { color: var(--text-dim); }
  .task.missed .name { color: var(--text-mid); text-decoration: line-through; text-decoration-color: rgba(255,71,87,.4); }
  .task.missed .time { color: var(--alert); opacity: .8; }
  .task.missed .dur { opacity: .5; }
  .task .check-badge, .task .miss-badge {
    position: absolute; left: -18px; top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px; border-radius: 50%;
    display: none;
    align-items: center; justify-content: center;
  }
  .task .check-badge { background: var(--accent); }
  .task .miss-badge { background: var(--alert); }
  .task.done .check-badge { display: flex; }
  .task.missed .miss-badge { display: flex; }
  .task .check-badge svg { width: 9px; height: 9px; stroke: var(--void); }
  .task .miss-badge svg { width: 8px; height: 8px; stroke: var(--void); }
  .task.deleting { opacity: 0; transform: translateX(60px); }
  .task .time {
    font-size: 14px; font-weight: 500;
    color: var(--accent); letter-spacing: 0.5px;
    cursor: pointer;
  }
  .task .name {
    font-size: 15px; font-weight: 400; color: var(--text);
    cursor: pointer; line-height: 1.3;
  }
  .task .dur {
    font-size: 12px; color: var(--text-dim); font-weight: 400;
    cursor: pointer;
  }
  .task .x {
    grid-column: 3;
    color: var(--text-dim);
    font-size: 20px;
    line-height: 1;
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: color .15s;
    border-radius: 50%;
  }
  .task .x:hover, .task .x:active { color: var(--alert); background: rgba(255,71,87,.06); }

  /* Edit mode — inputlar */
  .task.edit { grid-template-columns: 1fr; gap: 8px; padding: 14px 0; }
  .task.edit .row {
    display: grid;
    grid-template-columns: 64px 1fr 64px;
    gap: 8px;
  }
  .task.edit .row input {
    background: var(--void-soft);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 4px;
    padding: 10px 8px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    outline: none;
    min-width: 0;
    transition: border-color .15s;
  }
  .task.edit .row input:focus { border-color: var(--accent); }
  .task.edit .row input.name {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 15px;
  }
  .task.edit .actions { display: flex; gap: 8px; justify-content: flex-end; padding-top: 4px; }
  .task.edit .actions button {
    padding: 8px 14px;
    border: none;
    border-radius: 4px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
  }
  .task.edit .actions .save { background: var(--accent); color: var(--void); font-weight: 600; }
  .task.edit .actions .cancel { background: transparent; color: var(--text-mid); border: 1px solid rgba(255,255,255,.1); }

  /* Qo'shish */
  .add-btn {
    display: block;
    width: 100%;
    margin-top: 12px;
    padding: 14px;
    background: transparent;
    border: 1px dashed rgba(255,255,255,.1);
    border-radius: 8px;
    color: var(--text-mid);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all .15s;
  }
  .add-btn:hover, .add-btn:active {
    color: var(--accent);
    border-color: var(--accent);
    background: rgba(0,229,212,.04);
  }

  /* CTA */
  .bottom-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 380px; padding: 24px 32px env(safe-area-inset-bottom, 24px); background: linear-gradient(180deg, transparent, var(--void) 30%); z-index: 50; }
  .cta { display: block; width: 100%; padding: 16px; background: linear-gradient(180deg, var(--accent), var(--accent-soft)); color: var(--void); font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; border: none; border-radius: 6px; text-align: center; text-decoration: none; }

  @media (max-width: 480px) {
    body { padding: 0; }
    .phone { width: 100vw; min-height: 100vh; border-radius: 0; box-shadow: none; }
    .bottom-bar { max-width: 100vw; }
  }
</style>
</head>
<body>

<div class="phone">
  <div class="backdrop"></div>

  <div class="container">
    <div class="stamp">
      <span data-mvow="today.date">10-MAY</span> · <span data-mvow="today.weekday">DUSHANBA</span>
    </div>

    <h1 class="title" data-i18n="today.title">Bugungi reja</h1>

    <p class="subtitle">
      <span class="em" id="focusLbl">7 soat 15 daq</span>
      fokus  ·  <span class="em" id="countLbl">5</span> reja
    </p>

    <!-- Maqsadlardan tuzilgan eslatma -->
    <div id="goalHint" style="display:none;text-align:center;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px;color:var(--text-dim);margin-bottom:18px;padding:0 8px;">
      Maqsadlaringizdan tuzildi
    </div>

    <!-- Bugungi kun uchun moslashtirish so'rovi (kunda bir marta) -->
    <div id="adjustPrompt" style="display:none;background:rgba(0,229,212,.05);border:1px solid rgba(0,229,212,.2);border-radius:12px;padding:14px 16px;margin-bottom:16px;text-align:center;">
      <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:var(--text);line-height:1.5;margin-bottom:12px;">Bugungi kuningizga moslab<br>kun tartibingizni o'zgartirasizmi?</div>
      <div style="font-size:11px;color:var(--text-dim);margin-bottom:14px;letter-spacing:0.3px;">Vaqt yoki davomiylikni har vazifani bosib tahrirlang</div>
      <div style="display:flex;gap:8px;justify-content:center;">
        <button id="adjustYesBtn" type="button" style="padding:10px 18px;background:linear-gradient(180deg,var(--accent),var(--accent-soft));color:var(--void);border:none;border-radius:999px;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;">Ha, tahrirlayman</button>
        <button id="adjustNoBtn" type="button" style="padding:10px 18px;background:transparent;border:1px solid rgba(255,255,255,.15);color:var(--text-mid);border-radius:999px;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;">Hozircha yo'q</button>
      </div>
    </div>

    <div class="tasks" id="tasks"></div>

    <button class="add-btn" id="addBtn" type="button" data-i18n="today.add">+ reja qo'shish</button>
  </div>

  <div class="bottom-bar">
    <a class="cta" href="hard-lock.html" id="primaryCta" data-i18n="today.cta">Boshlayman</a>
  </div>
</div>

<script src="i18n.js" defer></script>
<script src="data.js" defer></script>
<script src="nav-overlay.js" defer></script>

<script>
  // ── Storage — calendar bilan birga (weekPlan[todayKey]) ──
  // Namuna ko'rsatilmaydi — faqat foydalanuvchining haqiqiy rejasi
  function loadTasks() {
    return (window.MVOW_DATA ? MVOW_DATA.getTodayPlan() : []);
  }
  function saveTasks() {
    if (window.MVOW_DATA) MVOW_DATA.setTodayPlan(tasks);
  }

  let tasks = loadTasks();

  // ── Render ──
  const list = document.getElementById('tasks');
  const focusLbl = document.getElementById('focusLbl');
  const countLbl = document.getElementById('countLbl');

  function parseMins(durStr) {
    if (!durStr) return 0;
    const s = durStr.toLowerCase().replace(',', '.').trim();
    const h = s.match(/(\d+(?:\.\d+)?)\s*s(oat)?/);
    const m = s.match(/(\d+)\s*daq/);
    let total = 0;
    if (h) total += Math.round(parseFloat(h[1]) * 60);
    if (m) total += parseInt(m[1], 10);
    if (!h && !m) {
      const n = parseInt(s, 10);
      if (!isNaN(n)) total = n;
    }
    return total;
  }

  function fmtMins(mins) {
    if (mins <= 0) return '0 daq';
    const h = Math.floor(mins / 60);
    const m = mins % 60;
    if (h && m) return h + ' soat ' + m + ' daq';
    if (h)      return h + ' soat';
    return m + ' daq';
  }

  function updateTotals() {
    const totalMins = tasks.reduce((s, t) => s + parseMins(t.dur), 0);
    focusLbl.textContent = fmtMins(totalMins);
    countLbl.textContent = tasks.length;
  }

  function timeKey(t) {
    const m = /^(\d{1,2}):?(\d{2})?$/.exec((t || '').trim());
    if (!m) return 99999;
    return (+m[1]) * 60 + (+(m[2] || 0));
  }

  function sortTasks() {
    tasks.sort((a, b) => timeKey(a.time) - timeKey(b.time));
  }

  function hasGoals() {
    try {
      const g = JSON.parse(localStorage.getItem('mvow.goals') || '[]');
      return Array.isArray(g) && g.length > 0;
    } catch { return false; }
  }

  function render() {
    sortTasks();
    list.innerHTML = '';
    const hint = document.getElementById('goalHint');
    const primaryCta = document.getElementById('primaryCta');
    const addBtn = document.getElementById('addBtn');
    if (!tasks.length) {
      if (hasGoals()) {
        // Maqsad bor, lekin bugunga reja chiqmadi — maqsad muddati tugagan yoki tahrirlash kerak
        list.innerHTML = `
          <div style="text-align:center;padding:34px 18px;background:var(--void-soft);border-radius:14px;margin:8px 0 12px;">
            <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;color:var(--text);margin-bottom:6px;line-height:1.3;">Maqsadlardan<br>bugunga reja chiqmadi.</div>
            <div style="font-size:12px;color:var(--text-dim);line-height:1.5;margin-bottom:20px;">Maqsad muddati tugagan bo'lishi mumkin.<br>Maqsadlarni ko'ring yoki qisqa reja qo'shing.</div>
            <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;">
              <a href="maqsadlar.html" style="padding:11px 18px;background:transparent;border:1px solid rgba(0,229,212,.35);border-radius:999px;color:var(--accent);font-size:12px;font-weight:500;letter-spacing:1px;text-decoration:none;">Maqsadlarni ko'rish</a>
              <button id="inlineAddBtn" type="button" style="padding:11px 18px;background:linear-gradient(180deg,var(--accent),var(--accent-soft));color:var(--void);border:none;border-radius:999px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;">+ Qisqa reja</button>
            </div>
          </div>
        `;
        if (addBtn) addBtn.style.display = 'none';
        setTimeout(() => {
          const inlineBtn = document.getElementById('inlineAddBtn');
          if (inlineBtn) inlineBtn.addEventListener('click', addNew);
        }, 0);
      } else {
        // Maqsad ham yo'q — reja maqsaddan tug'iladi
        list.innerHTML = `
          <div style="text-align:center;padding:40px 22px;background:var(--void-soft);border:1px dashed rgba(0,229,212,.25);border-radius:14px;margin:8px 0;">
            <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:20px;color:var(--text);margin-bottom:8px;line-height:1.3;">Reja maqsaddan<br>tug'iladi.</div>
            <div style="font-size:13px;color:var(--text-dim);line-height:1.5;margin-bottom:22px;">Avval maqsad qo'ying —<br>kun tartibi avtomatik tuziladi.</div>
            <a href="maqsadlar.html" style="display:inline-block;padding:14px 28px;background:linear-gradient(180deg,var(--accent),var(--accent-soft));color:var(--void);border-radius:999px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;text-decoration:none;">Maqsad qo'shish</a>
          </div>
        `;
        if (addBtn) addBtn.style.display = 'none';
      }
      if (hint) hint.style.display = 'none';
      if (primaryCta) primaryCta.style.display = 'none';
      updateTotals();
      return;
    }
    // Reja bor — eslatma va boshlash tugmasi ko'rinadi
    if (hint && hasGoals()) hint.style.display = 'block';
    if (primaryCta) primaryCta.style.display = '';
    if (addBtn) addBtn.style.display = '';
    const completedKeys = (window.MVOW_DATA ? MVOW_DATA.getCompletedKeysToday() : new Set());
    tasks.forEach((t, idx) => {
      const row = document.createElement('div');
      const key = window.MVOW_DATA ? MVOW_DATA.taskKey(MVOW_DATA.today.iso, t.time, t.name) : '';
      const state = window.MVOW_DATA ? MVOW_DATA.getTaskState(key) : { status: 'pending' };
      const isDone = completedKeys.has(key) || state.status === 'done';
      const isMiss = !isDone && state.status === 'missed';
      row.className = 'task' + (isDone ? ' done' : (isMiss ? ' missed' : ''));
      row.dataset.idx = idx;
      row.innerHTML = `
        <span class="check-badge"><svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 12 10 17 19 8"/></svg></span>
        <span class="miss-badge"><svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="6" y1="18" x2="18" y2="6"/></svg></span>
        <span class="time">${escapeHtml(t.time || '—')}</span>
        <span class="name">${escapeHtml(t.name || 'ish')}</span>
        <span class="dur">${escapeHtml(t.dur || '')}</span>
        <span class="x" role="button" tabindex="0" aria-label="Ishni o'chirish" title="O'chirish">×</span>
      `;
      // Tap to edit (except × button)
      row.querySelectorAll('.time, .name, .dur').forEach(el => {
        el.addEventListener('click', () => enterEditMode(row, idx));
      });
      // Delete
      row.querySelector('.x').addEventListener('click', (e) => {
        e.stopPropagation();
        deleteTask(row, idx);
      });
      list.appendChild(row);
    });
    updateTotals();
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
  }

  function deleteTask(row, idx) {
    row.classList.add('deleting');
    setTimeout(() => {
      tasks.splice(idx, 1);
      saveTasks();
      render();
    }, 250);
  }

  function enterEditMode(row, idx) {
    if (row.classList.contains('edit')) return;
    const t = tasks[idx];
    row.classList.add('edit');
    row.innerHTML = `
      <div class="row">
        <input class="t time" type="text" placeholder="07:00" value="${escapeHtml(t.time || '')}" maxlength="5">
        <input class="t name" type="text" placeholder="ish nomi" value="${escapeHtml(t.name || '')}" maxlength="48">
        <input class="t dur"  type="text" placeholder="45 daq" value="${escapeHtml(t.dur || '')}" maxlength="20">
      </div>
      <div class="actions">
        <button class="cancel" type="button">Bekor</button>
        <button class="save" type="button">Saqla</button>
      </div>
    `;
    const [timeIn, nameIn, durIn] = row.querySelectorAll('input');
    setTimeout(() => timeIn.focus(), 50);

    row.querySelector('.save').addEventListener('click', () => {
      tasks[idx] = {
        time: timeIn.value.trim(),
        name: nameIn.value.trim() || 'ish',
        dur: durIn.value.trim()
      };
      saveTasks();
      render();
    });
    row.querySelector('.cancel').addEventListener('click', () => render());

    // Enter saves, Esc cancels
    row.querySelectorAll('input').forEach(inp => {
      inp.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); row.querySelector('.save').click(); }
        if (e.key === 'Escape') { e.preventDefault(); row.querySelector('.cancel').click(); }
      });
    });
  }

  // Yangi ish — draft holatda (count'ga kirmaydi). Saqlangandan keyingina ro'yxatga qo'shiladi.
  function addNew() {
    const draft = { time: '', name: '', dur: '', _draft: true };
    const list2 = list;
    const row = document.createElement('div');
    row.className = 'task edit';
    row.dataset.draft = '1';
    row.innerHTML = `
      <div class="row">
        <input class="t time" type="text" placeholder="07:00" value="" maxlength="5">
        <input class="t name" type="text" placeholder="ish nomi" value="" maxlength="48">
        <input class="t dur"  type="text" placeholder="45 daq" value="" maxlength="20">
      </div>
      <div class="actions">
        <button class="cancel" type="button">Bekor</button>
        <button class="save" type="button">Saqla</button>
      </div>
    `;
    list2.appendChild(row);
    const [timeIn, nameIn, durIn] = row.querySelectorAll('input');
    setTimeout(() => timeIn.focus(), 50);

    row.querySelector('.save').addEventListener('click', () => {
      tasks.push({
        time: timeIn.value.trim(),
        name: nameIn.value.trim() || 'ish',
        dur:  durIn.value.trim()
      });
      saveTasks();
      render();
    });
    row.querySelector('.cancel').addEventListener('click', () => row.remove());
    row.querySelectorAll('input').forEach(inp => {
      inp.addEventListener('keydown', (e) => {
        if (e.key === 'Enter')  { e.preventDefault(); row.querySelector('.save').click(); }
        if (e.key === 'Escape') { e.preventDefault(); row.remove(); }
      });
    });
  }

  document.getElementById('addBtn').addEventListener('click', addNew);

  // ── Bugungi kun uchun moslash so'rovi — kunda bir marta ──
  function maybeShowAdjustPrompt() {
    if (!tasks.length) return;
    const todayIso = (window.MVOW_DATA ? MVOW_DATA.today.iso : new Date().toISOString().slice(0,10));
    let answered = {};
    try { answered = JSON.parse(localStorage.getItem('mvow.adjustPrompt') || '{}'); } catch {}
    if (answered[todayIso]) return; // bugun javob berilgan
    const promptEl = document.getElementById('adjustPrompt');
    if (!promptEl) return;
    promptEl.style.display = 'block';
    function dismiss() {
      answered[todayIso] = Date.now();
      localStorage.setItem('mvow.adjustPrompt', JSON.stringify(answered));
      promptEl.style.display = 'none';
    }
    document.getElementById('adjustYesBtn').addEventListener('click', () => {
      dismiss();
      // Birinchi vazifani highlight + edit modaliga olib o'tish
      const firstTask = document.querySelector('.task');
      if (firstTask) {
        firstTask.scrollIntoView({ behavior: 'smooth', block: 'center' });
        firstTask.style.transition = 'box-shadow .4s';
        firstTask.style.boxShadow = '0 0 0 2px rgba(0,229,212,.4)';
        setTimeout(() => { firstTask.style.boxShadow = ''; }, 1800);
      }
    });
    document.getElementById('adjustNoBtn').addEventListener('click', dismiss);
  }

  // Boshlash
  document.addEventListener('DOMContentLoaded', () => { render(); maybeShowAdjustPrompt(); });
  if (document.readyState !== 'loading') { render(); maybeShowAdjustPrompt(); }
</script>

</body>
</html>
