<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{brand} — Kun yakuni</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --void:#04060B; --void-soft:#0C0F16;
    --text:#F5F2EC; --text-mid:#B8BBC2; --text-dim:#9CA0A8;
    --accent:#00E5D4; --accent-soft:#00B5A8;
    --card:#11151E;
  }
  html, body {
    background: var(--void); color: var(--text);
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 600px;
    margin: 0 auto;
    padding: 60px 28px 140px;
  }
  .top-stamp {
    text-align: center;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 32px;
    line-height: 1.2;
    text-align: center;
    margin-bottom: 28px;
  }

  /* Sections */
  .section {
    margin-bottom: 32px;
  }
  .section-head {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 14px;
  }

  /* Win cards */
  .wins { display:flex; flex-direction: column; gap: 8px; }
  .win {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: var(--card);
    border: 1px solid rgba(0,229,212,.15);
    border-radius: 10px;
  }
  .win .check {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .win .check svg { width: 12px; height: 12px; stroke: var(--void); }
  .win .name { font-size: 15px; color: var(--text); }
  .win .dur { font-size: 12px; color: var(--text-dim); }

  .no-wins {
    text-align: center;
    padding: 24px 16px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--text-mid);
    line-height: 1.5;
  }

  /* Tomorrow plan */
  .tom-input {
    width: 100%;
    background: var(--card);
    border: 1.5px solid rgba(255,255,255,.08);
    border-radius: 10px;
    color: var(--text);
    padding: 14px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;
    resize: none;
    min-height: 90px;
    line-height: 1.5;
    transition: border-color .15s;
  }
  .tom-input:focus { border-color: var(--accent); }
  .tom-input::placeholder { color: var(--text-dim); }

  .quick-chips {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-top: 10px;
  }
  .quick-chip {
    padding: 8px 12px;
    background: transparent;
    border: 1px solid rgba(0,229,212,.25);
    border-radius: 999px;
    color: var(--accent);
    font-size: 12px;
    cursor: pointer;
    transition: all .15s;
  }
  .quick-chip:hover, .quick-chip:active {
    background: rgba(0,229,212,.06);
  }

  /* Wake time */
  .wake-row {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--card);
    border: 1.5px solid rgba(255,255,255,.08);
    border-radius: 10px;
  }
  .wake-row label {
    font-size: 14px;
    color: var(--text);
  }
  .wake-row input[type="time"] {
    background: transparent;
    border: none;
    color: var(--accent);
    font-family: 'Inter', sans-serif;
    font-size: 17px;
    font-weight: 500;
    text-align: right;
    outline: none;
    width: 110px;
  }
  .alarm-toggle {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--card);
    border: 1.5px solid rgba(255,255,255,.08);
    border-radius: 10px;
    margin-top: 8px;
  }
  .alarm-toggle .lbl { font-size: 14px; color: var(--text); }
  .alarm-toggle .why { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
  .toggle {
    width: 44px; height: 26px;
    background: rgba(255,255,255,.08);
    border-radius: 13px;
    cursor: pointer;
    position: relative;
    transition: background .2s;
    flex-shrink: 0;
  }
  .toggle::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--text);
    transition: transform .2s;
  }
  .toggle.on { background: var(--accent); }
  .toggle.on::after { transform: translateX(18px); background: var(--void); }

  /* Stats row */
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 28px;
  }
  .stat {
    background: var(--card);
    border-radius: 10px;
    padding: 14px 8px;
    text-align: center;
  }
  .stat .v {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 22px;
    color: var(--accent);
  }
  .stat .l {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* Bottom nav */
  .bottom {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 20px 28px env(safe-area-inset-bottom, 24px);
    background: linear-gradient(180deg, transparent, var(--void) 40%);
    z-index: 10;
  }
  .cta {
    display: block;
    width: 100%;
    max-width: 540px;
    margin: 0 auto;
    padding: 16px;
    background: linear-gradient(180deg, var(--accent), var(--accent-soft));
    color: var(--void);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: none;
    border-radius: 999px;
    text-align: center;
    text-decoration: none;
    cursor: pointer;
    min-height: 52px;
  }
</style>
</head>
<body>

<div class="wrap">

  <div class="top-stamp" id="dateStamp">11-iyun · payshanba</div>
  <h1 class="title">Kun yakuni</h1>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="v" id="doneN">0</div>
      <div class="l">Bajardim</div>
    </div>
    <div class="stat">
      <div class="v" id="focusH">0</div>
      <div class="l">Soat fokus</div>
    </div>
    <div class="stat">
      <div class="v" id="streakN">0</div>
      <div class="l">Streak</div>
    </div>
  </div>

  <!-- Today's wins -->
  <div class="section">
    <div class="section-head">Bugungi muvaffaqiyatlar</div>
    <div class="wins" id="winsList">
      <div class="no-wins">—</div>
    </div>
  </div>

  <!-- Tomorrow's plan -->
  <div class="section">
    <div class="section-head" id="tomHead">Ertangi reja</div>

    <!-- Auto-generated tasks list (from maqsadlar) -->
    <div id="tomList" style="display:flex;flex-direction:column;gap:8px;"></div>

    <!-- Empty state -->
    <div id="tomEmpty" style="display:none;text-align:center;padding:24px 16px;background:var(--card);border:1px dashed rgba(0,229,212,.25);border-radius:12px;">
      <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;color:var(--text-mid);margin-bottom:14px;">Ertangi reja yo'q</div>
      <a href="routine.html" style="display:inline-block;padding:12px 20px;background:rgba(0,229,212,.08);border:1px solid rgba(0,229,212,.35);border-radius:999px;color:var(--accent);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;letter-spacing:1px;text-decoration:none;">+ Kun tartibini tuz</a>
    </div>

    <!-- Add new task -->
    <button id="tomAddBtn" type="button" style="display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:10px;padding:14px;background:transparent;border:1px dashed rgba(0,229,212,.25);border-radius:10px;color:var(--accent);font-family:'Inter',sans-serif;font-size:13px;cursor:pointer;">
      <span style="font-size:18px;">+</span>
      <span>Yana reja qo'shish</span>
    </button>
  </div>

  <!-- Wake time + alarm -->
  <div class="section">
    <div class="section-head">Uyg'onish</div>
    <div class="wake-row">
      <label for="wakeTime">Uyg'onish vaqti</label>
      <input id="wakeTime" type="time" value="07:00">
    </div>
    <div class="alarm-toggle">
      <div>
        <div class="lbl">Budilnik yoq</div>
        <div class="why">Vaqt kelganda 3 misol bilan uyg'otamiz</div>
      </div>
      <div class="toggle on" id="alarmToggle" role="switch" tabindex="0" aria-checked="true"></div>
    </div>
  </div>

</div>

<div class="bottom">
  <a class="cta" id="saveBtn" href="home.html">Xayrli tun</a>
</div>

<script src="i18n.js" defer></script>
<script src="data.js" defer></script>
<script src="nav-overlay.js" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    // ── Sana ──
    const d = new Date();
    const months = ['YAN','FEV','MAR','APR','MAY','IYUN','IYUL','AVG','SEN','OKT','NOY','DEK'];
    const days = ['YAKSHANBA','DUSHANBA','SESHANBA','CHORSHANBA','PAYSHANBA','JUMA','SHANBA'];
    document.getElementById('dateStamp').textContent =
      `${String(d.getDate()).padStart(2,'0')}-${months[d.getMonth()]} · ${days[d.getDay()]}`;

    // ── Stats ──
    const todayKey = 'mvow.done.' + (window.MVOW_DATA ? MVOW_DATA.localDateIso(d) : d.toISOString().slice(0,10));
    const done = parseInt(localStorage.getItem(todayKey) || '0', 10);
    document.getElementById('doneN').textContent = done;

    // Fokus soati (har sessiya ~ 45 daq taxmin)
    const focusH = Math.round(done * 0.75 * 10) / 10;
    document.getElementById('focusH').textContent = focusH;

    const streak = parseInt(localStorage.getItem('mvow.streak') || '0', 10);
    document.getElementById('streakN').textContent = streak;

    // Greeting matni olib tashlandi — sokin interfeys

    // ── Bugungi muvaffaqiyatlar ──
    let plan = [];
    if (window.MVOW_DATA) plan = MVOW_DATA.getTodayPlan();
    const winsEl = document.getElementById('winsList');
    if (done > 0 && plan.length) {
      // Birinchi N ta sessiya bajarilgan deb hisoblaymiz
      const wins = plan.slice(0, done);
      winsEl.innerHTML = wins.map(w => `
        <div class="win">
          <div class="check"><svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 12 10 17 19 8"/></svg></div>
          <div class="name">${escapeHtml(w.name || 'Ish')}</div>
          <div class="dur">${escapeHtml(w.dur || '')}</div>
        </div>
      `).join('');
    }

    // ── Ertangi reja — weekPlan'dan o'qiydi (auto-generated from maqsadlar) ──
    const tomList = document.getElementById('tomList');
    const tomEmpty = document.getElementById('tomEmpty');
    const tomHead = document.getElementById('tomHead');
    const tomAddBtn = document.getElementById('tomAddBtn');

    function tomorrowKey() {
      const tom = new Date(Date.now() + 86400000);
      return 'd' + (window.MVOW_DATA ? MVOW_DATA.localDateIso(tom) : tom.toISOString().slice(0, 10));
    }

    function loadTomPlan() {
      if (!window.MVOW_DATA) return [];
      const w = MVOW_DATA.getWeekPlan();
      const k = tomorrowKey();
      return Array.isArray(w[k]) ? w[k] : [];
    }

    function saveTomPlan(arr) {
      if (!window.MVOW_DATA) return;
      const w = MVOW_DATA.getWeekPlan();
      w[tomorrowKey()] = arr;
      MVOW_DATA.setWeekPlan(w);
    }

    function escapeHtml(s) {
      return String(s).replace(/[<>"&]/g, c => ({'<':'&lt;','>':'&gt;','"':'&quot;','&':'&amp;'}[c]));
    }

    function timeKey(t) {
      const m = /^(\d{1,2}):?(\d{2})?$/.exec((t || '').trim());
      if (!m) return 99999;
      return (+m[1]) * 60 + (+(m[2] || 0));
    }

    function renderTomPlan() {
      const tasks = loadTomPlan().sort((a,b) => timeKey(a.time) - timeKey(b.time));
      tomList.innerHTML = '';
      if (!tasks.length) {
        tomEmpty.style.display = 'block';
        tomAddBtn.style.display = 'none';
        tomHead.textContent = 'Ertangi reja';
        return;
      }
      tomEmpty.style.display = 'none';
      tomAddBtn.style.display = 'flex';
      tomHead.textContent = 'Ertangi reja · ' + tasks.length + ' qadam';

      tasks.forEach((t, idx) => {
        const row = document.createElement('div');
        row.style.cssText = 'display:grid;grid-template-columns:60px 1fr auto;align-items:center;gap:12px;padding:12px 14px;background:var(--card);border:1px solid rgba(255,255,255,.05);border-radius:10px;';
        row.innerHTML = `
          <span class="tap-edit time" style="color:var(--accent);font-size:14px;font-weight:500;cursor:pointer;">${escapeHtml(t.time || '—')}</span>
          <div class="tap-edit name-block" style="cursor:pointer;">
            <div style="font-size:15px;color:var(--text);line-height:1.3;">${escapeHtml(t.name || 'ish')}</div>
            <div style="font-size:11px;color:var(--text-dim);margin-top:2px;letter-spacing:.5px;">${escapeHtml(t.dur || '')}</div>
          </div>
          <button class="tom-del" type="button" style="background:transparent;border:none;color:var(--text-dim);font-size:20px;width:32px;height:32px;cursor:pointer;border-radius:50%;">×</button>
        `;
        tomList.appendChild(row);

        const delBtn = row.querySelector('.tom-del');
        delBtn.addEventListener('click', () => {
          const arr = loadTomPlan();
          arr.splice(arr.indexOf(t), 1);
          // index by name+time to be safe
          const filtered = arr.filter(x => !(x.time === t.time && x.name === t.name));
          saveTomPlan(filtered);
          renderTomPlan();
          if (window.MVOW_DATA) MVOW_DATA.fxTap();
        });

        // Tap to edit
        row.querySelectorAll('.tap-edit').forEach(el => {
          el.addEventListener('click', () => enterEdit(row, t));
        });
      });
    }

    function enterEdit(row, task) {
      const arr = loadTomPlan();
      const idx = arr.findIndex(x => x.time === task.time && x.name === task.name);
      if (idx < 0) return;
      row.innerHTML = `
        <div style="display:grid;grid-template-columns:60px 1fr 60px;gap:8px;grid-column:1/-1;">
          <input class="ed-time" type="text" value="${escapeHtml(task.time)}" maxlength="5" style="background:var(--void-soft);border:1px solid var(--accent);border-radius:6px;padding:8px;color:var(--text);font-size:13px;outline:none;">
          <input class="ed-name" type="text" value="${escapeHtml(task.name)}" maxlength="48" style="background:var(--void-soft);border:1px solid var(--accent);border-radius:6px;padding:8px;color:var(--text);font-size:13px;outline:none;">
          <input class="ed-dur" type="text" value="${escapeHtml(task.dur)}" maxlength="20" style="background:var(--void-soft);border:1px solid var(--accent);border-radius:6px;padding:8px;color:var(--text);font-size:13px;outline:none;">
        </div>
        <div style="grid-column:1/-1;display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
          <button class="ed-cancel" type="button" style="padding:8px 14px;background:transparent;color:var(--text-mid);border:1px solid rgba(255,255,255,.1);border-radius:6px;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;">Bekor</button>
          <button class="ed-save" type="button" style="padding:8px 14px;background:var(--accent);color:var(--void);border:none;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;">Saqla</button>
        </div>
      `;
      const timeIn = row.querySelector('.ed-time');
      const nameIn = row.querySelector('.ed-name');
      const durIn  = row.querySelector('.ed-dur');
      row.querySelector('.ed-save').addEventListener('click', () => {
        const arr2 = loadTomPlan();
        arr2[idx] = {
          time: timeIn.value.trim(),
          name: nameIn.value.trim() || 'ish',
          dur:  durIn.value.trim() || '1 soat'
        };
        saveTomPlan(arr2);
        renderTomPlan();
      });
      row.querySelector('.ed-cancel').addEventListener('click', renderTomPlan);
      setTimeout(() => timeIn.focus(), 50);
    }

    tomAddBtn.addEventListener('click', () => {
      const row = document.createElement('div');
      row.style.cssText = 'background:var(--card);border:1px solid rgba(0,229,212,.3);border-radius:10px;padding:12px 14px;';
      row.innerHTML = `
        <div style="display:grid;grid-template-columns:60px 1fr 60px;gap:8px;">
          <input class="new-time" type="text" placeholder="07:00" maxlength="5" style="background:var(--void-soft);border:1px solid var(--accent);border-radius:6px;padding:8px;color:var(--text);font-size:13px;outline:none;">
          <input class="new-name" type="text" placeholder="ish nomi" maxlength="48" style="background:var(--void-soft);border:1px solid var(--accent);border-radius:6px;padding:8px;color:var(--text);font-size:13px;outline:none;">
          <input class="new-dur" type="text" placeholder="1 soat" maxlength="20" style="background:var(--void-soft);border:1px solid var(--accent);border-radius:6px;padding:8px;color:var(--text);font-size:13px;outline:none;">
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px;">
          <button class="new-cancel" type="button" style="padding:8px 14px;background:transparent;color:var(--text-mid);border:1px solid rgba(255,255,255,.1);border-radius:6px;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;">Bekor</button>
          <button class="new-save" type="button" style="padding:8px 14px;background:var(--accent);color:var(--void);border:none;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;">Qo'sh</button>
        </div>
      `;
      tomList.appendChild(row);
      const t = row.querySelector('.new-time');
      const n = row.querySelector('.new-name');
      const dr = row.querySelector('.new-dur');
      setTimeout(() => t.focus(), 50);
      row.querySelector('.new-save').addEventListener('click', () => {
        const arr = loadTomPlan();
        arr.push({ time: t.value.trim() || '07:00', name: n.value.trim() || 'ish', dur: dr.value.trim() || '1 soat' });
        saveTomPlan(arr);
        renderTomPlan();
      });
      row.querySelector('.new-cancel').addEventListener('click', () => row.remove());
    });

    renderTomPlan();

    // ── Uyg'onish ──
    const wakeInput = document.getElementById('wakeTime');
    const savedWake = localStorage.getItem('mvow.wakeTime') || '07:00';
    wakeInput.value = savedWake;
    wakeInput.addEventListener('change', () => {
      localStorage.setItem('mvow.wakeTime', wakeInput.value);
      if (window.MVOW_DATA) MVOW_DATA.scheduleAlarm();
    });

    const alarmToggle = document.getElementById('alarmToggle');
    const alarmOn = localStorage.getItem('mvow.alarmOn') !== '0';
    alarmToggle.classList.toggle('on', alarmOn);
    alarmToggle.setAttribute('aria-checked', alarmOn ? 'true' : 'false');
    async function flipAlarm() {
      const willTurnOn = !alarmToggle.classList.contains('on');
      // Yoqilayotganda ruxsat so'ramiz
      if (willTurnOn && window.MVOW_DATA) {
        const perm = await MVOW_DATA.requestNotifPermission();
        if (perm !== 'granted') {
          alert("Bildirishnoma ruxsati berilmadi. Telefon Sozlamalaridan brauzerga bildirishnoma ruxsatini bering.");
          return;
        }
      }
      alarmToggle.classList.toggle('on', willTurnOn);
      alarmToggle.setAttribute('aria-checked', willTurnOn ? 'true' : 'false');
      localStorage.setItem('mvow.alarmOn', willTurnOn ? '1' : '0');
      // Yangi uyg'onish vaqtini saqlab darrov rejalashtir
      localStorage.setItem('mvow.wakeTime', wakeInput.value);
      if (window.MVOW_DATA) MVOW_DATA.scheduleAlarm();
    }
    alarmToggle.addEventListener('click', flipAlarm);
    alarmToggle.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); flipAlarm(); }
    });

    // ── Saqlash + uyga ──
    document.getElementById('saveBtn').addEventListener('click', (e) => {
      e.preventDefault();
      localStorage.setItem('mvow.wakeTime', wakeInput.value);
      const tomCount = loadTomPlan().length;
      if (window.MVOW_DATA) MVOW_DATA.fxSuccess();

      // Tasdiq toast
      const toast = document.createElement('div');
      toast.style.cssText = 'position:fixed;left:50%;top:30%;transform:translate(-50%,-50%);background:#11151E;border:1px solid rgba(0,229,212,.4);border-radius:14px;padding:24px 28px;color:#7AF5EC;font-family:Inter,sans-serif;font-size:16px;text-align:center;z-index:9999;box-shadow:0 20px 60px rgba(0,0,0,.6);';
      toast.innerHTML = '✓ Xayrli tun<br><span style="font-size:12px;color:#9CA0A8;letter-spacing:1px;text-transform:uppercase;margin-top:8px;display:block;">' + (tomCount ? 'ertaga ' + tomCount + ' reja · ' : '') + 'budilnik ' + wakeInput.value + '</span>';
      document.body.appendChild(toast);

      setTimeout(() => { window.location.href = 'home.html'; }, 1500);
    });
  });
</script>

</body>
</html>
