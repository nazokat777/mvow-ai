<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title data-i18n="kechqurun.page_title">{brand} — Kun yakuni</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png?v=2">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png?v=2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --void:#04060B; --void-soft:#0C0F16;
    --text:#F5F2EC; --text-mid:#B8BBC2; --text-dim:#9CA0A8;
    
    --card:#11151E;
  }
  html, body {
    background: var(--void); color: var(--text);
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 600px;
    margin: 0 auto;
    padding: 60px 28px 140px;
  }
  .top-stamp {
    text-align: center;
    font-size: 15px;
    letter-spacing: 4px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .title {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 41px;
    line-height: 1.2;
    text-align: center;
    margin-bottom: 28px;
  }

  /* Sections */
  .section {
    margin-bottom: 32px;
  }
  .section-head {
    font-size: 15px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 14px;
  }

  /* Win cards */
  .wins { display:flex; flex-direction: column; gap: 8px; }
  .win {
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 14px;
    padding: 15px 18px;
    background: var(--card);
    border: 1px solid rgba(244, 132, 95,.18);
    border-radius: 16px;
  }
  .win .check {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .win .check svg { width: 13px; height: 13px; stroke: #fff; }
  .win .name { font-size: 19px; color: var(--text); }
  .win .dur { font-size: 16px; color: var(--text-dim); }

  .no-wins {
    text-align: center;
    padding: 24px 16px;
    font-family: 'Inter', sans-serif;
    font-style: normal;
    font-size: 18px;
    color: var(--text-mid);
    line-height: 1.5;
  }

  /* Tomorrow plan */
  .tom-input {
    width: 100%;
    background: var(--card);
    border: 1.5px solid rgba(255,255,255,.08);
    border-radius: 10px;
    color: var(--text);
    padding: 14px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    outline: none;
    resize: none;
    min-height: 90px;
    line-height: 1.5;
    transition: border-color .15s;
  }
  .tom-input:focus { border-color: var(--accent); }
  .tom-input::placeholder { color: var(--text-dim); }

  .quick-chips {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-top: 10px;
  }
  .quick-chip {
    padding: 8px 12px;
    background: transparent;
    border: 1px solid rgba(244, 132, 95,.25);
    border-radius: 999px;
    color: var(--accent);
    font-size: 16px;
    cursor: pointer;
    transition: all .15s;
  }
  .quick-chip:hover, .quick-chip:active {
    background: rgba(244, 132, 95,.06);
  }

  /* Wake time */
  .wake-row {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--card);
    border: 1.5px solid rgba(255,255,255,.08);
    border-radius: 10px;
  }
  .wake-row label {
    font-size: 18px;
    color: var(--text);
  }
  .wake-row input[type="time"] {
    background: transparent;
    border: none;
    color: var(--accent);
    font-family: 'Inter', sans-serif;
    font-size: 21px;
    font-weight: 500;
    text-align: right;
    outline: none;
    width: 110px;
  }
  .alarm-toggle {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--card);
    border: 1.5px solid rgba(255,255,255,.08);
    border-radius: 10px;
    margin-top: 8px;
  }
  .alarm-toggle .lbl { font-size: 18px; color: var(--text); }
  .alarm-toggle .why { font-size: 16px; color: var(--text-dim); margin-top: 2px; }
  .toggle {
    width: 44px; height: 26px;
    background: rgba(255,255,255,.08);
    border-radius: 13px;
    cursor: pointer;
    position: relative;
    transition: background .2s;
    flex-shrink: 0;
  }
  .toggle::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--text);
    transition: transform .2s;
  }
  .toggle.on { background: var(--accent); }
  .toggle.on::after { transform: translateX(18px); background: var(--void); }

  /* Stats row */
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 28px;
  }
  .stat {
    background: var(--card);
    border-radius: 16px;
    padding: 18px 10px;
    text-align: center;
    border: 1px solid var(--border-default, rgba(255,255,255,.06));
  }
  .stat .v {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 28px;
    color: var(--accent);
  }
  .stat .l {
    font-size: 14px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* Bottom nav */
  .bottom {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 20px 28px env(safe-area-inset-bottom, 24px);
    background: linear-gradient(180deg, transparent, var(--void) 40%);
    z-index: 10;
  }
  .cta {
    display: block;
    width: 100%;
    max-width: 540px;
    margin: 0 auto;
    padding: 16px;
    background: linear-gradient(180deg, var(--accent), var(--accent-soft));
    color: var(--void);
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: none;
    border-radius: 999px;
    text-align: center;
    text-decoration: none;
    cursor: pointer;
    min-height: 52px;
  }
</style>
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="motion.css">
<script src="motion.js" defer></script>
</head>
<body>

<div class="wrap">

  <div class="top-stamp" id="dateStamp" data-i18n="kechqurun.date_stamp_fallback">11-iyun · payshanba</div>
  <h1 class="title" data-i18n="kechqurun.title">Kun yakuni</h1>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="v" id="doneN">0</div>
      <div class="l" data-i18n="kechqurun.stat_done">Bajardim</div>
    </div>
    <div class="stat">
      <div class="v" id="focusH">0</div>
      <div class="l" data-i18n="kechqurun.stat_focus">Soat fokus</div>
    </div>
    <div class="stat">
      <div class="v" id="streakN">0</div>
      <div class="l" data-i18n="kechqurun.stat_streak">Streak</div>
    </div>
  </div>

  <!-- Bugungi hisobot — to'liq -->
  <div class="section">
    <div class="section-head" data-i18n="kechqurun.report_head">Bugungi hisobot</div>

    <!-- Completion progress -->
    <div id="reportProgress" style="background:var(--card);border-radius:12px;padding:16px 18px;margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;">
        <span style="font-family:'Inter',sans-serif;font-style:normal;font-size:19px;color:var(--text-mid);" data-i18n="kechqurun.report_completion">Bajarish foizi</span>
        <span style="font-family:'Inter',sans-serif;font-size:31px;font-weight:500;" id="reportPct">0%</span>
      </div>
      <div style="height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;">
        <div id="reportBar" style="height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-soft));border-radius:3px;width:0;transition:width .8s ease;"></div>
      </div>
      <div id="reportSummary" style="font-size:15px;color:var(--text-dim);margin-top:8px;letter-spacing:0.5px;"></div>
    </div>

    <!-- Bajarilgan ishlar (wins) -->
    <div id="winsBlock">
      <div style="font-size:14px;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:8px;padding-left:4px;" data-i18n="kechqurun.wins_head">Bugungi muvaffaqiyatlar</div>
      <div class="wins" id="winsList">
        <div class="no-wins">—</div>
      </div>
    </div>

    <!-- Bajarilmagan ishlar (missed) — agar bo'lsa -->
    <div id="missedBlock" style="display:none;margin-top:16px;">
      <div style="font-size:14px;letter-spacing:2px;color:#FF8E97;text-transform:uppercase;margin-bottom:8px;padding-left:4px;" data-i18n="kechqurun.missed_head">Bajarilmagan</div>
      <div id="missedList" style="display:flex;flex-direction:column;gap:6px;"></div>
    </div>

    <!-- Sermahsul vaqt -->
    <div id="insightBlock" style="display:none;margin-top:14px;padding:12px 14px;background:var(--card);border-radius:10px;font-size:16px;color:var(--text-mid);text-align:center;">
      <span data-i18n="kechqurun.insight_lead">Sermahsul vaqt:</span>
      <span id="insightTime" style="color:var(--accent);font-weight:500;letter-spacing:0.5px;">—</span>
    </div>
  </div>

  <!-- Wake time + alarm -->
  <div class="section">
    <div class="section-head" data-i18n="kechqurun.wake_head">Uyg'onish</div>
    <div class="wake-row">
      <label for="wakeTime" data-i18n="kechqurun.wake_time_lbl">Uyg'onish vaqti</label>
      <input id="wakeTime" type="time" value="07:00">
    </div>
    <div class="alarm-toggle">
      <div>
        <div class="lbl" data-i18n="kechqurun.alarm_on_lbl">Budilnik yoq</div>
        <div class="why" data-i18n="kechqurun.alarm_on_why">Vaqt kelganda 3 misol bilan uyg'otamiz</div>
      </div>
      <div class="toggle on" id="alarmToggle" role="switch" tabindex="0" aria-checked="true"></div>
    </div>
  </div>

</div>

<div class="bottom">
  <a class="cta" id="saveBtn" href="home.html" data-i18n="kechqurun.cta_save">Xayrli tun</a>
</div>

<script src="i18n.js?v=28.4.0"></script>
<script src="lang-switcher.js?v=28.4.0" defer></script>
<script src="data.js?v=28.4.0" defer></script>
<script src="nav-overlay.js?v=28.4.0" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    // ── Motion: day-close transition (wraps page entrance) ──
    try {
      if (window.MVOW_MOTION && typeof MVOW_MOTION.dayClose === 'function') {
        MVOW_MOTION.dayClose({ target: document.querySelector('.wrap') || document.body });
      }
    } catch (_e) { /* motion is decorative — never block page logic */ }

    // ── Sana ──
    const d = new Date();
    const monthsFallback = ['YAN','FEV','MAR','APR','MAY','IYUN','IYUL','AVG','SEN','OKT','NOY','DEK'];
    const daysFallback = ['YAKSHANBA','DUSHANBA','SESHANBA','CHORSHANBA','PAYSHANBA','JUMA','SHANBA'];
    const monthsI18n = window.I18N ? I18N.t('common.months_short', null) : null;
    const daysI18n = window.I18N ? I18N.t('common.weekdays_long', null) : null;
    const months = Array.isArray(monthsI18n) ? monthsI18n : monthsFallback;
    const days = Array.isArray(daysI18n) ? daysI18n : daysFallback;
    document.getElementById('dateStamp').textContent =
      `${String(d.getDate()).padStart(2,'0')}-${months[d.getMonth()]} · ${days[d.getDay()]}`;

    // ── Stats ──
    const todayKey = 'mvow.done.' + (window.MVOW_DATA ? MVOW_DATA.localDateIso(d) : d.toISOString().slice(0,10));
    const done = parseInt(localStorage.getItem(todayKey) || '0', 10);
    document.getElementById('doneN').textContent = done;

    // Fokus soati (har sessiya ~ 45 daq taxmin)
    const focusH = Math.round(done * 0.75 * 10) / 10;
    document.getElementById('focusH').textContent = focusH;

    const streak = parseInt(localStorage.getItem('mvow.streak') || '0', 10);
    document.getElementById('streakN').textContent = streak;

    // Greeting matni olib tashlandi — sokin interfeys

    // ── Bugungi to'liq hisobot ──
    let plan = [];
    if (window.MVOW_DATA) plan = MVOW_DATA.getTodayPlan();

    function escapeHtml(s) {
      return String(s).replace(/[<>"&]/g, c => ({'<':'&lt;','>':'&gt;','"':'&quot;','&':'&amp;'}[c]));
    }
    const Tk = (k, def) => (window.I18N ? I18N.t(k, def) : def);

    // History (bugungi) — bajarilgan ishlar uchun
    const history = window.MVOW_DATA
      ? MVOW_DATA.getHistory().filter(h => h.dateIso === MVOW_DATA.today.iso)
      : [];
    const completedKeys = window.MVOW_DATA ? MVOW_DATA.getCompletedKeysToday() : new Set();

    // Bajarish foizi
    const totalPlanned = plan.length;
    const totalDone = history.length;
    const pct = totalPlanned > 0 ? Math.round((totalDone / totalPlanned) * 100) : 0;
    const pctEl = document.getElementById('reportPct');
    const barEl = document.getElementById('reportBar');
    const sumEl = document.getElementById('reportSummary');
    if (pctEl) {
      pctEl.textContent = pct + '%';
      const color = pct >= 80 ? 'var(--accent)' : (pct >= 50 ? '#F5C26B' : '#FF8E97');
      pctEl.style.color = color;
    }
    if (barEl) setTimeout(() => { barEl.style.width = pct + '%'; }, 100);
    if (sumEl) {
      const totalMins = history.reduce((s, h) => s + (h.actualMins || 0), 0);
      const totalH = Math.round(totalMins / 60 * 10) / 10;
      sumEl.textContent = totalDone + ' / ' + totalPlanned + ' · ' + totalH + ' ' + Tk('kechqurun.stat_focus', 'soat fokus').toLowerCase();
    }

    // Bajarilgan ishlar (wins) — history asosida
    const winsEl = document.getElementById('winsList');
    if (winsEl) {
      if (history.length) {
        winsEl.innerHTML = history.map(h => `
          <div class="win">
            <div class="check"><svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 12 10 17 19 8"/></svg></div>
            <div class="name">${escapeHtml(h.name || Tk('kechqurun.fallback_task_cap', 'Ish'))}</div>
            <div class="dur">${escapeHtml((h.actualMins ? (h.actualMins + ' ' + Tk('today.fmt_units_m', 'daq').split(' ')[1]) : ''))}</div>
          </div>
        `).join('');
      }
    }

    // Bajarilmagan ishlar (missed) — plan'da bor, lekin history'da yo'q
    const missedBlock = document.getElementById('missedBlock');
    const missedList = document.getElementById('missedList');
    if (missedBlock && missedList && plan.length) {
      const missed = plan.filter(t => {
        if (!window.MVOW_DATA) return false;
        const key = MVOW_DATA.taskKey(MVOW_DATA.today.iso, t.time, t.name);
        return !completedKeys.has(key);
      });
      if (missed.length) {
        missedList.innerHTML = missed.map(t => `
          <div style="display:grid;grid-template-columns:60px 1fr auto;gap:10px;align-items:center;padding:8px 12px;background:rgba(255,71,87,0.05);border:1px solid rgba(255,71,87,0.18);border-radius:8px;font-size:16px;">
            <span style="color:#FF8E97;font-weight:500;">${escapeHtml(t.time || '—')}</span>
            <span style="color:var(--text-mid);">${escapeHtml(t.name || '—')}</span>
            <span style="color:var(--text-dim);font-size:15px;">${escapeHtml(t.dur || '')}</span>
          </div>
        `).join('');
        missedBlock.style.display = 'block';
      }
    }

    // Sermahsul vaqt (peak hour) — history'dagi eng ko'p bajarilgan soatdan
    const insightBlock = document.getElementById('insightBlock');
    const insightTime = document.getElementById('insightTime');
    if (insightBlock && insightTime && history.length) {
      const byHour = {};
      history.forEach(h => {
        const t = (h.plannedTime || '').match(/^(\d{1,2}):/);
        if (t) {
          const hr = +t[1];
          byHour[hr] = (byHour[hr] || 0) + 1;
        }
      });
      const hours = Object.keys(byHour);
      if (hours.length) {
        const peak = hours.reduce((a, b) => byHour[a] > byHour[b] ? a : b);
        insightTime.textContent = String(peak).padStart(2, '0') + ':00 – ' + String((+peak + 2) % 24).padStart(2, '0') + ':00';
        insightBlock.style.display = 'block';
      }
    }

    // ── Uyg'onish ──
    const wakeInput = document.getElementById('wakeTime');
    const savedWake = localStorage.getItem('mvow.wakeTime') || '07:00';
    wakeInput.value = savedWake;
    wakeInput.addEventListener('change', () => {
      localStorage.setItem('mvow.wakeTime', wakeInput.value);
      if (window.MVOW_DATA) MVOW_DATA.scheduleAlarm();
    });

    const alarmToggle = document.getElementById('alarmToggle');
    const alarmOn = localStorage.getItem('mvow.alarmOn') !== '0';
    alarmToggle.classList.toggle('on', alarmOn);
    alarmToggle.setAttribute('aria-checked', alarmOn ? 'true' : 'false');
    async function flipAlarm() {
      const willTurnOn = !alarmToggle.classList.contains('on');
      // Yoqilayotganda ruxsat so'ramiz
      if (willTurnOn && window.MVOW_DATA) {
        const perm = await MVOW_DATA.requestNotifPermission();
        if (perm !== 'granted') {
          alert(window.I18N ? I18N.t('kechqurun.notif_denied', "Bildirishnoma ruxsati berilmadi. Telefon Sozlamalaridan brauzerga bildirishnoma ruxsatini bering.") : "Bildirishnoma ruxsati berilmadi. Telefon Sozlamalaridan brauzerga bildirishnoma ruxsatini bering.");
          return;
        }
      }
      alarmToggle.classList.toggle('on', willTurnOn);
      alarmToggle.setAttribute('aria-checked', willTurnOn ? 'true' : 'false');
      localStorage.setItem('mvow.alarmOn', willTurnOn ? '1' : '0');
      // Yangi uyg'onish vaqtini saqlab darrov rejalashtir
      localStorage.setItem('mvow.wakeTime', wakeInput.value);
      if (window.MVOW_DATA) MVOW_DATA.scheduleAlarm();
    }
    alarmToggle.addEventListener('click', flipAlarm);
    alarmToggle.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); flipAlarm(); }
    });

    // ── Saqlash + uyga ──
    document.getElementById('saveBtn').addEventListener('click', (e) => {
      e.preventDefault();
      localStorage.setItem('mvow.wakeTime', wakeInput.value);
      if (window.MVOW_DATA) MVOW_DATA.fxSuccess();

      // Tasdiq toast
      const toast = document.createElement('div');
      toast.style.cssText = 'position:fixed;left:50%;top:30%;transform:translate(-50%,-50%);background:#11151E;border:1px solid rgba(244, 132, 95,.4);border-radius:14px;padding:24px 28px;color:var(--accent-bright);font-family:Inter,sans-serif;font-size:20px;text-align:center;z-index:9999;box-shadow:0 20px 60px rgba(0,0,0,.6);';
      const toastMain = window.I18N ? I18N.t('kechqurun.toast_main', 'Xayrli tun') : 'Xayrli tun';
      const toastAlarm = window.I18N ? I18N.tWith('kechqurun.toast_alarm', { time: wakeInput.value }) : ('budilnik ' + wakeInput.value);
      toast.innerHTML = '✓ ' + toastMain + '<br><span style="font-size:16px;color:#9CA0A8;letter-spacing:1px;text-transform:uppercase;margin-top:8px;display:block;">' + toastAlarm + '</span>';
      document.body.appendChild(toast);

      setTimeout(() => { window.location.href = 'home.html'; }, 1500);
    });
  });
</script>

<script src="back-btn.js?v=28.4.0"></script>
</body>
</html>
