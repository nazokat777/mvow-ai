<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FOCUS AI — Fokus izi</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0a0610">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png?v=3">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png?v=3">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--void); color: var(--text); min-height: 100vh; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 520px; margin: 0 auto; padding: 64px 20px 110px; text-align: center; }
  .title { font-family: 'Anton', sans-serif; font-size: 36px; text-transform: uppercase; }
  .sub { color: var(--text-dim); font-size: 14px; margin-bottom: 22px; }
  .canvas-box { position: relative; width: 100%; max-width: 360px; margin: 0 auto; border-radius: 24px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,.35); }
  #trace { display: block; width: 100%; height: auto; }
  .count { font-family: 'Anton', sans-serif; font-size: 56px; line-height: 1; margin-top: 22px; color: rgb(244,132,95); }
  .count small { font-family: 'Inter'; font-size: 18px; font-weight: 700; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }
  .note { color: var(--text-dim); font-size: 14px; line-height: 1.6; margin-top: 10px; padding: 0 10px; }
  .share-btn { margin-top: 20px; background: linear-gradient(135deg, rgb(244,132,95), #d9663c); color: #fff; border: none; border-radius: 14px; padding: 14px 30px; font-weight: 800; font-size: 16px; cursor: pointer; font-family: 'Inter'; box-shadow: 0 10px 26px rgba(244,132,95,.4); }
  .share-btn:active { transform: scale(.97); }
  .hm-wrap { max-width: 360px; margin: 24px auto 0; }
  .hm-lbl { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; text-align: left; }
  .heatmap { display: grid; grid-template-rows: repeat(7, 13px); grid-auto-flow: column; grid-auto-columns: 13px; gap: 3px; justify-content: center; }
  .hm-cell { width: 13px; height: 13px; border-radius: 3px; }
  .toast { position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%); background: var(--card); color: var(--text); border: 1px solid rgba(244,132,95,.4); padding: 12px 20px; border-radius: 999px; font-size: 14px; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,.3); opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 999; max-width: 90%; }
  .toast.show { opacity: 1; }
</style>
<link rel="stylesheet" href="theme.css">
</head>
<body>

<div class="wrap">
  <h1 class="title" data-i18n="fokusizi.title">Fokus izi</h1>
  <p class="sub" data-i18n="fokusizi.sub">Har fokus sessiyasi — bitta nur</p>

  <div class="canvas-box"><canvas id="trace"></canvas></div>

  <div class="count" id="count">0 <small>nur</small></div>
  <p class="note" id="note" data-i18n="fokusizi.note">Har bajargan fokus sessiyangiz bu osmonga bitta nur qo'shadi. Intizoming nuri o'syapti — to'xtamang.</p>
  <div class="hm-wrap"><div class="hm-lbl" data-i18n="fokusizi.heatmap">Faollik</div><div class="heatmap" id="heatmap"></div></div>
  <button class="share-btn" id="shareBtn" data-i18n="fokusizi.share">↗ Natijani ulashish</button>
</div>

<div class="toast" id="toast"></div>

<script src="i18n.js?v=28.66.0"></script>
<script src="lang-switcher.js?v=28.66.0" defer></script>
<script src="focus-indicator.js?v=28.4.0" defer></script>
<script src="data.js?v=28.66.0" defer></script>
<script src="nav-overlay.js?v=28.66.0" defer></script>
<script>
  (function () {
    var COLORS = [[244,132,95],[107,191,122],[232,130,180],[110,181,255]];
    function T(k, fb){ return (window.I18N && I18N.t) ? I18N.t(k, fb) : fb; }
    function tw(k, vars, fb){ var s = T(k, fb); for (var p in vars) s = s.split('{'+p+'}').join(vars[p]); return s; }
    function isoOf(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
    function stats(){
      var hist = [];
      try { if (window.MVOW_DATA && MVOW_DATA.getHistory) hist = MVOW_DATA.getHistory(); } catch (e) {}
      var mins = hist.reduce(function (s, h) { return s + (h.actualMins || 0); }, 0);
      var days = {}; hist.forEach(function (h) { if (h.dateIso) days[h.dateIso] = 1; });
      var d = new Date(); if (!days[isoOf(d)]) d.setDate(d.getDate() - 1);
      var st = 0; while (days[isoOf(d)]) { st++; d.setDate(d.getDate() - 1); }
      return { N: hist.length, focusH: Math.round(mins / 60 * 10) / 10, streak: st };
    }
    function drawGalaxy(ctx, cx, cy, R, N, dotBase){
      var bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, R);
      bg.addColorStop(0, '#161029'); bg.addColorStop(0.6, '#0c0816'); bg.addColorStop(1, '#070410');
      ctx.fillStyle = bg; ctx.fillRect(cx - R, cy - R, R * 2, R * 2);
      var glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, R * 0.5);
      glow.addColorStop(0, 'rgba(244,132,95,0.22)'); glow.addColorStop(1, 'rgba(244,132,95,0)');
      ctx.fillStyle = glow; ctx.fillRect(cx - R, cy - R, R * 2, R * 2);
      if (N <= 0) return;
      var GA = Math.PI * (3 - Math.sqrt(5));
      var C = Math.min(dotBase * 6, (R * 0.86) / Math.sqrt(Math.max(N, 1)));
      for (var i = 0; i < N; i++) {
        var ang = i * GA, r = C * Math.sqrt(i + 0.5);
        var x = cx + Math.cos(ang) * r, y = cy + Math.sin(ang) * r;
        var col = COLORS[i % COLORS.length], rad = dotBase + (i / N) * dotBase;
        ctx.shadowColor = 'rgba(' + col + ',0.95)'; ctx.shadowBlur = dotBase * 4.5;
        ctx.fillStyle = 'rgba(' + col + ',0.92)';
        ctx.beginPath(); ctx.arc(x, y, rad, 0, Math.PI * 2); ctx.fill();
      }
      ctx.shadowBlur = 0; ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(cx, cy, dotBase * 1.4, 0, Math.PI * 2); ctx.fill();
    }
    function drawPage(N){
      var cv = document.getElementById('trace');
      var size = Math.min(window.innerWidth - 40, 360), dpr = window.devicePixelRatio || 1;
      cv.width = size * dpr; cv.height = size * dpr; cv.style.width = size + 'px'; cv.style.height = size + 'px';
      var ctx = cv.getContext('2d'); ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      drawGalaxy(ctx, size / 2, size / 2, size / 2, N, 2.2);
    }
    function toast(m){ var t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); }, 2400); }
    function shareCard(s){
      var SZ = 1080, c = document.createElement('canvas'); c.width = SZ; c.height = SZ;
      var ctx = c.getContext('2d');
      ctx.fillStyle = '#070410'; ctx.fillRect(0, 0, SZ, SZ);
      drawGalaxy(ctx, SZ / 2, SZ * 0.45, SZ * 0.33, s.N, 4.5);
      ctx.textAlign = 'center';
      ctx.fillStyle = '#F4845F'; ctx.font = '700 66px Anton, sans-serif'; ctx.fillText('DAYWARDEN', SZ / 2, 112);
      ctx.fillStyle = 'rgba(255,255,255,.75)'; ctx.font = '600 30px Inter, sans-serif'; ctx.fillText(T('fokusizi.card_sub', 'Mening intizom izim'), SZ / 2, 156);
      ctx.fillStyle = '#fff'; ctx.font = '800 96px Anton, sans-serif'; ctx.fillText(s.N + ' ' + T('fokusizi.nur', 'nur'), SZ / 2, SZ * 0.85);
      ctx.fillStyle = 'rgba(255,255,255,.88)'; ctx.font = '600 38px Inter, sans-serif';
      ctx.fillText(s.focusH + ' ' + T('fokusizi.soat', 'soat') + '   ·   ' + s.streak + ' ' + T('fokusizi.streak_unit', 'kun ketma-ket'), SZ / 2, SZ * 0.85 + 60);
      ctx.fillStyle = 'rgba(255,255,255,.5)'; ctx.font = '500 30px Inter, sans-serif'; ctx.fillText('daywarden.vercel.app', SZ / 2, SZ - 48);
      return c;
    }
    function doShare(){
      var s = stats(), c = shareCard(s);
      var txt = tw('fokusizi.share_text', { n: s.N, h: s.focusH }, "FOCUS AI'da intizom izim: " + s.N + " nur, " + s.focusH + " soat fokus! Sen ham qo'shil 👉 daywarden.vercel.app");
      if (c.toBlob) {
        c.toBlob(function (blob) {
          var file = new File([blob], 'daywarden-fokus.png', { type: 'image/png' });
          if (navigator.canShare && navigator.canShare({ files: [file] })) {
            navigator.share({ files: [file], text: txt, title: 'FOCUS AI' }).catch(function(){});
          } else if (navigator.share) {
            navigator.share({ text: txt, title: 'FOCUS AI' }).catch(function(){});
          } else {
            var a = document.createElement('a'); a.href = c.toDataURL('image/png'); a.download = 'daywarden-fokus.png'; a.click();
            try { navigator.clipboard.writeText(txt); } catch(e){}
            toast("Rasm yuklandi — Telegram/Instagram'ga joylang");
          }
        }, 'image/png');
      } else { try { navigator.clipboard.writeText(txt); } catch(e){} toast('Matn nusxalandi'); }
    }
    function hmColor(mins) {
      if (mins <= 0) return 'rgba(244,132,95,.08)';
      if (mins < 30) return 'rgba(244,132,95,.35)';
      if (mins < 60) return 'rgba(244,132,95,.6)';
      if (mins < 120) return 'rgba(244,132,95,.82)';
      return 'rgb(244,132,95)';
    }
    function renderHeatmap() {
      var hist = []; try { if (window.MVOW_DATA && MVOW_DATA.getHistory) hist = MVOW_DATA.getHistory(); } catch (e) {}
      var byDay = {}; hist.forEach(function (h) { if (h.dateIso) byDay[h.dateIso] = (byDay[h.dateIso] || 0) + (h.actualMins || 0); });
      var el = document.getElementById('heatmap'); if (!el) return;
      var d = new Date(); d.setHours(0, 0, 0, 0); d.setDate(d.getDate() - 90);
      var html = '';
      for (var i = 0; i < 91; i++) {
        var iso = isoOf(d);
        html += '<div class="hm-cell" style="background:' + hmColor(byDay[iso] || 0) + '" title="' + iso + '"></div>';
        d.setDate(d.getDate() + 1);
      }
      el.innerHTML = html;
    }
    function init(){
      var s = stats(); drawPage(s.N); renderHeatmap();
      try { document.title = T('fokusizi.page_title', 'FOCUS AI — Fokus izi'); } catch(e){}
      document.getElementById('count').innerHTML = s.N + ' <small>' + T('fokusizi.nur', 'nur') + '</small>';
      if (s.N <= 0) document.getElementById('note').textContent = T('fokusizi.note_empty', "Hali nur yo'q. Birinchi fokus sessiyangizni boshlang — har biri bu osmonga bitta nur qo'shadi.");
      document.getElementById('shareBtn').onclick = doShare;
      window.addEventListener('resize', function () { drawPage(stats().N); });
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
  })();
</script>
<script src="back-btn.js?v=28.66.0"></script>
</body>
</html>
