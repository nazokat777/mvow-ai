<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FOCUS AI — Seriya</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png?v=3">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png?v=3">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--void); color: var(--text); min-height: 100vh; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 520px; margin: 0 auto; padding: 64px 20px 110px; text-align: center; }
  .title { font-family: 'Anton', sans-serif; font-size: 34px; text-transform: uppercase; }
  .sub { color: var(--text-dim); font-size: 14px; margin-bottom: 20px; }
  .flame { font-size: 88px; line-height: 1; filter: drop-shadow(0 8px 26px rgba(244,132,95,.5)); }
  .flame.dim { filter: grayscale(1) opacity(.5); }
  .streak-num { font-family: 'Anton', sans-serif; font-size: 76px; line-height: 1; color: rgb(244,132,95); margin-top: 4px; }
  .streak-lbl { font-size: 15px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); font-weight: 700; }
  .week { display: flex; justify-content: center; gap: 8px; margin: 24px auto 4px; max-width: 340px; }
  .wd { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .wd .dot { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 17px; background: var(--card, rgba(255,255,255,.05)); border: 1px solid var(--border-default, rgba(255,255,255,.10)); }
  .wd .dot.on { background: linear-gradient(135deg, rgb(244,132,95), #d9663c); border: none; }
  .wd .dot.today { border: 2px solid rgb(244,132,95); }
  .wd .dot.frozen { background: rgba(110,181,255,.18); border: 1px solid rgba(110,181,255,.42); }
  .wd .lt { font-size: 12px; color: var(--text-dim); font-weight: 700; }
  .card { background: var(--card); border: 1px solid var(--border-default, rgba(255,255,255,.08)); border-radius: 18px; padding: 16px 18px; margin: 22px auto 0; max-width: 360px; text-align: left; }
  .level .lv-top { display: flex; align-items: center; gap: 12px; }
  .level .lv-ic { font-size: 34px; line-height: 1; }
  .level .lv-nm { font-family: 'Anton', sans-serif; font-size: 22px; }
  .level .lv-sub { color: var(--text-dim); font-size: 12px; }
  .level .lv-bar { height: 8px; background: rgba(255,255,255,.08); border-radius: 999px; overflow: hidden; margin-top: 12px; }
  .level .lv-fill { height: 100%; background: linear-gradient(90deg, rgb(244,132,95), #d9663c); border-radius: 999px; }
  .level .lv-next { font-size: 12px; color: var(--text-dim); margin-top: 6px; }
  .statsrow { display: flex; justify-content: center; gap: 28px; margin: 20px auto 0; }
  .st .v { font-family: 'Anton', sans-serif; font-size: 30px; color: var(--text); }
  .st .k { font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); }
  .motiv { color: var(--text); opacity: .9; font-size: 15px; line-height: 1.5; margin: 20px auto 0; max-width: 340px; }
  .share-btn { margin-top: 22px; background: linear-gradient(135deg, rgb(244,132,95), #d9663c); color: #fff; border: none; border-radius: 14px; padding: 14px 30px; font-weight: 800; font-size: 16px; cursor: pointer; font-family: 'Inter'; box-shadow: 0 10px 26px rgba(244,132,95,.4); }
  .share-btn:active { transform: scale(.97); }
  .toast { position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%); background: var(--card); color: var(--text); border: 1px solid rgba(244,132,95,.4); padding: 12px 20px; border-radius: 999px; font-size: 14px; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,.3); opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 999; max-width: 90%; }
  .toast.show { opacity: 1; }
</style>
<link rel="stylesheet" href="theme.css">
</head>
<body>

<div class="wrap">
  <h1 class="title" data-i18n="fokusizi.title">Seriya</h1>
  <p class="sub" data-i18n="fokusizi.sub">Har kun bir qadam — seriyangni uzma</p>

  <div class="flame" id="flame">🔥</div>
  <div class="streak-num" id="streakNum">0</div>
  <div class="streak-lbl" id="streakLbl" data-i18n="fokusizi.streak_unit">kun ketma-ket</div>

  <div class="week" id="week"></div>
  <div id="frozenCard"></div>

  <div class="card level" id="levelCard"></div>

  <div class="statsrow" id="statsRow"></div>
  <div class="motiv" id="motiv"></div>
  <button class="share-btn" id="shareBtn" data-i18n="fokusizi.share">↗ Natijani ulashish</button>
</div>

<div class="toast" id="toast"></div>

<script src="i18n.js?v=29.0.28"></script>
<script src="lang-switcher.js?v=29.0.28" defer></script>
<script src="focus-indicator.js?v=29.0.28" defer></script>
<script src="data.js?v=29.0.28" defer></script>
<script src="nav-overlay.js?v=29.0.28" defer></script>
<script>
  (function () {
    function T(k, fb) { return (window.I18N && I18N.t) ? I18N.t(k, fb) : fb; }
    function tw(k, vars, fb) { var s = T(k, fb); for (var p in vars) s = s.split('{' + p + '}').join(vars[p]); return s; }
    function lang() { return (window.I18N && I18N.lang) ? I18N.lang : 'uz'; }
    function isoOf(d) { return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }
    var LEVELS = [
      { min: 0, ic: '🥉', uz: 'Bronza', ru: 'Бронза', en: 'Bronze' },
      { min: 10, ic: '🥈', uz: 'Kumush', ru: 'Серебро', en: 'Silver' },
      { min: 30, ic: '🥇', uz: 'Oltin', ru: 'Золото', en: 'Gold' },
      { min: 70, ic: '💠', uz: 'Platina', ru: 'Платина', en: 'Platinum' },
      { min: 150, ic: '👑', uz: 'Olmos', ru: 'Алмаз', en: 'Diamond' }
    ];
    var WD = {
      uz: ['D', 'S', 'C', 'P', 'J', 'S', 'Y'],
      ru: ['П', 'В', 'С', 'Ч', 'П', 'С', 'В'],
      en: ['M', 'T', 'W', 'T', 'F', 'S', 'S']
    };
    // ── Muz (❄️) — o'tkazilgan kun; bugun 2 marta bajarib eritiladi (thawed) ──
    function loadThawed() { try { var t = JSON.parse(localStorage.getItem('mvow.thawedDays') || '[]'); return Array.isArray(t) ? t : []; } catch (e) { return []; } }
    function saveThawed(t) { try { localStorage.setItem('mvow.thawedDays', JSON.stringify(t)); } catch (e) {} }
    function loadSpent() { try { var s = JSON.parse(localStorage.getItem('mvow.makeupSpent') || 'null'); return (s && s.d) ? s : { d: '', n: 0 }; } catch (e) { return { d: '', n: 0 }; } }
    function saveSpent(s) { try { localStorage.setItem('mvow.makeupSpent', JSON.stringify(s)); } catch (e) {} }
    function computeFrozen(byCount, thawed) {
      var dates = Object.keys(byCount); if (!dates.length) return [];
      dates.sort();
      var firstTime = new Date(dates[0] + 'T00:00:00').getTime();
      var today = new Date(); today.setHours(0, 0, 0, 0);
      var startTime = Math.max(firstTime, today.getTime() - 7 * 86400000);   // faqat oxirgi 7 kun
      var frozen = [], d = new Date(startTime); d.setHours(0, 0, 0, 0);
      while (d.getTime() < today.getTime()) {                                 // bugundan tashqari
        var iso = isoOf(d);
        if (!(byCount[iso] > 0) && thawed.indexOf(iso) < 0) frozen.push(iso);
        d.setDate(d.getDate() + 1);
      }
      return frozen;
    }
    function stats() {
      var hist = [];
      try { if (window.MVOW_DATA && MVOW_DATA.getHistory) hist = MVOW_DATA.getHistory() || []; } catch (e) {}
      var mins = hist.reduce(function (s, h) { return s + (h.actualMins || 0); }, 0);
      var byDay = {}, byCount = {};
      hist.forEach(function (h) { if (h.dateIso) { byDay[h.dateIso] = (byDay[h.dateIso] || 0) + (h.actualMins || 0); byCount[h.dateIso] = (byCount[h.dateIso] || 0) + 1; } });
      var thawed = loadThawed();
      function active(iso) { return (byCount[iso] || 0) > 0 || thawed.indexOf(iso) >= 0; }   // bajarilish SONI (daqiqa emas — taymersiz ham sanaladi)
      var d = new Date(); if (!active(isoOf(d))) d.setDate(d.getDate() - 1);
      var st = 0; while (active(isoOf(d))) { st++; d.setDate(d.getDate() - 1); }
      return { N: hist.length, focusH: Math.round(mins / 60 * 10) / 10, streak: st, byDay: byDay, byCount: byCount, thawed: thawed, frozen: computeFrozen(byCount, thawed) };
    }
    function renderWeek(s) {
      var el = document.getElementById('week'); if (!el) return;
      var today = new Date(); today.setHours(0, 0, 0, 0);
      var dow = (today.getDay() + 6) % 7;             // Dushanba = 0
      var mon = new Date(today); mon.setDate(today.getDate() - dow);
      var letters = WD[lang()] || WD.uz, todayIso = isoOf(new Date()), html = '';
      for (var i = 0; i < 7; i++) {
        var d = new Date(mon); d.setDate(mon.getDate() + i);
        var iso = isoOf(d), isToday = iso === todayIso;
        var on = (s.byCount[iso] || 0) > 0 || s.thawed.indexOf(iso) >= 0;
        var frozen = s.frozen.indexOf(iso) >= 0;
        var mark = on ? '🔥' : (frozen ? '❄️' : '');
        html += '<div class="wd"><div class="dot' + (on ? ' on' : '') + (frozen ? ' frozen' : '') + (isToday ? ' today' : '') + '">' + mark + '</div>'
          + '<div class="lt">' + letters[i] + '</div></div>';
      }
      el.innerHTML = html;
    }
    function renderFrozen(s) {
      var el = document.getElementById('frozenCard'); if (!el) return;
      if (!s.frozen.length) { el.innerHTML = ''; return; }
      var todayIso = isoOf(new Date());
      var spent = loadSpent(), spentN = (spent.d === todayIso) ? spent.n : 0;
      var todayDone = s.byCount[todayIso] || 0;
      var avail = Math.max(0, todayDone - spentN), canThaw = avail >= 2;
      el.innerHTML = '<div style="background:linear-gradient(135deg,rgba(110,181,255,.14),rgba(200,230,255,.05));border:1px solid rgba(110,181,255,.32);border-radius:18px;padding:16px;margin:20px auto 0;max-width:360px;text-align:left;">'
        + '<div style="font-size:16px;font-weight:800;color:#fff;">❄️ ' + s.frozen.length + ' ' + T('fokusizi.frozen_days', 'muzlagan kun') + '</div>'
        + '<div style="font-size:14px;color:var(--text-dim);margin-top:6px;line-height:1.5;">' + T('fokusizi.frozen_hint', "Bugun 2 vazifa bajarsangiz, bitta muzni eritasiz — yuragingiz tinch bo'ladi.") + '</div>'
        + '<div style="font-size:13px;color:var(--text-dim);margin-top:8px;">' + T('fokusizi.today_done', 'Bugun bajarilgan') + ': <b style="color:#F5C26B;">' + todayDone + '</b> · ' + T('fokusizi.for_thaw', 'eritishga') + ': ' + Math.min(avail, 2) + '/2</div>'
        + '<button id="thawBtn"' + (canThaw ? '' : ' disabled') + ' style="width:100%;margin-top:12px;padding:12px;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:' + (canThaw ? 'pointer' : 'default') + ';' + (canThaw ? 'background:#6EB5FF;color:#04060B;' : 'background:transparent;color:var(--text-dim);border:1px solid var(--border-default,rgba(255,255,255,.14));') + '">❄️ ' + T('fokusizi.thaw_btn', 'Muzni eritish') + '</button></div>';
      var btn = document.getElementById('thawBtn');
      if (btn && canThaw) btn.addEventListener('click', function () { doThaw(s); });
    }
    function doThaw(s) {
      if (!s.frozen.length) return;
      var todayIso = isoOf(new Date());
      var thawed = loadThawed();
      thawed.push(s.frozen[s.frozen.length - 1]);   // eng yaqin (oxirgi) muz eriydi
      saveThawed(thawed);
      var spent = loadSpent(), spentN = (spent.d === todayIso) ? spent.n : 0;
      saveSpent({ d: todayIso, n: spentN + 2 });
      if (window.MVOW_DATA && MVOW_DATA.fxSuccess) MVOW_DATA.fxSuccess();
      toast(T('fokusizi.thawed_toast', 'Muz eridi! 🔥 Seriya tiklandi.'));
      init();
    }
    function renderLevel(focusH) {
      var idx = 0; for (var i = 0; i < LEVELS.length; i++) if (focusH >= LEVELS[i].min) idx = i;
      var lv = LEVELS[idx], next = LEVELS[idx + 1], soat = T('fokusizi.soat', 'soat'), pct, nextTxt, L = lang();
      if (next) {
        pct = Math.max(0, Math.min(100, Math.round((focusH - lv.min) / (next.min - lv.min) * 100)));
        nextTxt = T('fokusizi.next_lbl', 'Keyingi darajagacha') + ': ' + (Math.round((next.min - focusH) * 10) / 10) + ' ' + soat;
      } else { pct = 100; nextTxt = T('fokusizi.max_level', 'Eng yuqori daraja! 👑'); }
      document.getElementById('levelCard').innerHTML =
        '<div class="lv-top"><div class="lv-ic">' + lv.ic + '</div><div><div class="lv-nm">' + (lv[L] || lv.uz) + '</div>'
        + '<div class="lv-sub">' + T('fokusizi.level_lbl', 'Daraja') + ' · ' + (Math.round(focusH * 10) / 10) + ' ' + soat + '</div></div></div>'
        + '<div class="lv-bar"><div class="lv-fill" style="width:' + pct + '%"></div></div>'
        + '<div class="lv-next">' + nextTxt + '</div>';
    }
    function toast(m) { var t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(function () { t.classList.remove('show'); }, 2400); }
    function shareCard(s) {
      var SZ = 1080, c = document.createElement('canvas'); c.width = SZ; c.height = SZ;
      var ctx = c.getContext('2d');
      var g = ctx.createLinearGradient(0, 0, 0, SZ); g.addColorStop(0, '#120a08'); g.addColorStop(1, '#04060B');
      ctx.fillStyle = g; ctx.fillRect(0, 0, SZ, SZ);
      ctx.textAlign = 'center';
      ctx.fillStyle = '#F4845F'; ctx.font = '700 60px Anton, sans-serif'; ctx.fillText('FOCUS AI', SZ / 2, 120);
      ctx.font = '160px sans-serif'; ctx.fillText('🔥', SZ / 2, SZ * 0.42);
      ctx.fillStyle = '#F4845F'; ctx.font = '800 200px Anton, sans-serif'; ctx.fillText(String(s.streak), SZ / 2, SZ * 0.66);
      ctx.fillStyle = 'rgba(255,255,255,.9)'; ctx.font = '600 40px Inter, sans-serif';
      ctx.fillText(T('fokusizi.streak_unit', 'kun ketma-ket'), SZ / 2, SZ * 0.72);
      ctx.fillStyle = 'rgba(255,255,255,.7)'; ctx.font = '500 34px Inter, sans-serif';
      ctx.fillText(s.N + ' ' + T('fokusizi.sessions_unit', 'sessiya') + '   ·   ' + s.focusH + ' ' + T('fokusizi.soat', 'soat'), SZ / 2, SZ * 0.80);
      ctx.fillStyle = 'rgba(255,255,255,.5)'; ctx.font = '500 30px Inter, sans-serif'; ctx.fillText('daywarden.vercel.app', SZ / 2, SZ - 56);
      return c;
    }
    function doShare() {
      var s = stats(), c = shareCard(s);
      var txt = tw('fokusizi.share_text', { n: s.streak, h: s.focusH }, "FOCUS AI'da seriyam: " + s.streak + " kun ketma-ket, " + s.focusH + " soat!");
      if (c.toBlob) {
        c.toBlob(function (blob) {
          var file = new File([blob], 'focusai-seriya.png', { type: 'image/png' });
          if (navigator.canShare && navigator.canShare({ files: [file] })) navigator.share({ files: [file], text: txt, title: 'FOCUS AI' }).catch(function () {});
          else if (navigator.share) navigator.share({ text: txt, title: 'FOCUS AI' }).catch(function () {});
          else { var a = document.createElement('a'); a.href = c.toDataURL('image/png'); a.download = 'focusai-seriya.png'; a.click(); try { navigator.clipboard.writeText(txt); } catch (e) {} toast(T('fokusizi.dl_done', 'Rasm yuklandi')); }
        }, 'image/png');
      } else { try { navigator.clipboard.writeText(txt); } catch (e) {} toast(T('fokusizi.copied', 'Matn nusxalandi')); }
    }
    function init() {
      try { document.title = T('fokusizi.page_title', 'FOCUS AI — Seriya'); } catch (e) {}
      var s = stats();
      document.getElementById('streakNum').textContent = s.streak;
      document.getElementById('flame').className = 'flame' + (s.streak > 0 ? '' : ' dim');
      renderWeek(s); renderFrozen(s); renderLevel(s.focusH);
      document.getElementById('statsRow').innerHTML =
        '<div class="st"><div class="v">' + s.N + '</div><div class="k">' + T('fokusizi.sessions_unit', 'sessiya') + '</div></div>'
        + '<div class="st"><div class="v">' + s.focusH + '</div><div class="k">' + T('fokusizi.soat', 'soat') + '</div></div>';
      document.getElementById('motiv').textContent = s.streak >= 3 ? T('fokusizi.motiv_high', 'Ajoyib seriya! To\'xtama 🔥')
        : (s.streak >= 1 ? T('fokusizi.motiv_low', 'Zo\'r boshlanish! Ertaga ham davom et 🔥') : T('fokusizi.motiv_0', 'Bugun boshla 💪'));
      document.getElementById('shareBtn').onclick = doShare;
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
  })();
</script>
<script src="back-btn.js?v=29.0.133"></script>
</body>
</html>
