<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{brand} — Tanishuv</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="brend">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --void:#04060B; --void-soft:#0C0F16;
    --text:#F5F2EC; --text-mid:#B8BBC2; --text-dim:#9CA0A8;
    --accent:#00E5D4; --accent-soft:#00B5A8;
  }
  body {
    background: var(--void);
    font-family: 'Inter', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex; justify-content: center; align-items: flex-start;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }
  .phone {
    width: 380px; min-height: 800px;
    background: var(--void);
    border-radius: 40px;
    position: relative;
    box-shadow: 0 0 0 8px #1a1d24, 0 30px 80px rgba(0,0,0,.7);
    overflow: hidden;
    display: flex; flex-direction: column;
  }

  /* Halo behind logo */
  .halo {
    position: absolute;
    top: 40px; left: 50%;
    transform: translateX(-50%);
    width: 280px; height: 280px;
    background: radial-gradient(circle, rgba(0,229,212,.18), transparent 60%);
    border-radius: 50%;
    opacity: 0;
    animation: halo-in 1.4s ease 0.3s forwards, halo-pulse 5s ease-in-out 2s infinite;
    pointer-events: none;
  }
  @keyframes halo-in { to { opacity: 1; } }
  @keyframes halo-pulse {
    0%, 100% { transform: translateX(-50%) scale(1); opacity: .8; }
    50%      { transform: translateX(-50%) scale(1.1); opacity: 1; }
  }

  .container {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center;
    padding: 60px 32px 100px;
    gap: 20px;
    position: relative;
    z-index: 2;
    overflow-y: auto;
  }

  .logo {
    width: 84px; height: 84px;
    background: url(assets/mnsm-logo.png) center/contain no-repeat;
    filter: hue-rotate(160deg) saturate(1.4) drop-shadow(0 0 20px rgba(0,229,212,.4));
    opacity: 0;
    transform: scale(0.7);
    animation: logo-in 1.4s cubic-bezier(.16,.84,.32,1) 0.2s forwards;
  }
  @keyframes logo-in { to { opacity: 1; transform: scale(1); } }

  .name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 28px;
    color: var(--text);
    letter-spacing: 4px;
    text-align: center;
    margin-top: -4px;
    display: flex;
    gap: 2px;
    justify-content: center;
  }
  .name .ch {
    display: inline-block;
    opacity: 0;
    transform: translateY(6px);
    filter: blur(4px);
    animation: char-in 0.6s cubic-bezier(.16,.84,.32,1) forwards;
  }
  @keyframes char-in { to { opacity: 1; transform: translateY(0); filter: blur(0); } }

  .tag {
    font-size: 12px;
    color: var(--text-mid);
    text-align: center;
    margin-top: -12px;
    opacity: 0;
    transform: translateY(6px);
    animation: fade-up 0.5s ease 0.8s forwards;
  }
  @keyframes fade-up { to { opacity: 1; transform: translateY(0); } }

  .fields {
    width: 100%;
    display: flex; flex-direction: column;
    gap: 14px;
    opacity: 0;
    transform: translateY(12px);
    animation: fade-up 0.6s ease 1.1s forwards;
  }
  .field input,
  .field textarea {
    width: 100%;
    background: var(--void-soft);
    border: none;
    border-bottom: 1px solid rgba(255,255,255,.1);
    color: var(--text);
    padding: 12px 0;
    font-family: 'Inter', sans-serif;
    font-style: normal;
    font-size: 16px;
    text-align: center;
    outline: none;
    transition: border-color .2s;
    resize: none;
    line-height: 1.4;
  }
  .field input:focus,
  .field textarea:focus { border-bottom-color: var(--accent); }
  .field input::placeholder,
  .field textarea::placeholder { color: var(--text-dim); }

  /* Va'da bloki — ism kiritilganda paydo bo'ladi */
  .vow-block {
    width: 100%;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    margin-top: 8px;
    padding-top: 24px;
    border-top: 1px solid rgba(255,255,255,.04);
    animation: fade-up 0.6s ease forwards;
  }
  .vow-block.show { display: flex; }

  .vow {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 17px;
    color: var(--text);
    line-height: 1.5;
    text-align: center;
    padding: 0 8px;
  }
  .vow .em { color: var(--accent); font-style: normal; font-weight: 600; }

  .mic {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: linear-gradient(180deg, var(--accent), var(--accent-soft));
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    transition: transform .2s;
    box-shadow: 0 0 28px rgba(0,229,212,.3);
  }
  .mic:active { transform: scale(.95); }
  .mic svg { width: 28px; height: 28px; }
  .mic.recording { animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 28px rgba(0,229,212,.3); }
    50%     { box-shadow: 0 0 48px rgba(0,229,212,.6); }
  }

  .status {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    min-height: 12px;
  }

  .bottom-bar {
    padding: 16px 32px env(safe-area-inset-bottom, 16px);
    background: linear-gradient(180deg, transparent, var(--void) 30%);
    opacity: 0;
    animation: fade-up 0.6s ease 1.4s forwards;
  }
  .cta {
    display: block;
    width: 100%;
    padding: 16px;
    background: linear-gradient(180deg, var(--accent), var(--accent-soft));
    color: var(--void);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    transition: opacity .2s;
  }
  .cta.disabled { opacity: .3; pointer-events: none; }

  @media (max-width: 480px) {
    body { padding: 0; }
    .phone { width: 100vw; min-height: 100vh; border-radius: 0; box-shadow: none; }
  }
</style>
</head>
<body>

<div class="phone">
  <div class="halo"></div>

  <div class="container">
    <div class="logo"></div>
    <h1 class="name" id="brandName" data-brand="name">brend</h1>
    <p class="tag" data-brand="tagline">sening intizom do'sting</p>

    <div class="fields">
      <div class="field">
        <input id="nameInput" type="text" placeholder="ismingni yoz" autocomplete="given-name" maxlength="24" required minlength="2" aria-required="true" aria-describedby="nameErr">
        <div id="nameErr" class="err" role="alert" style="display:none;font-size:11px;color:#FF8E97;margin-top:6px;letter-spacing:1px;">Ismingni kirit (kamida 2 harf)</div>
      </div>
      <div class="field">
        <textarea id="bioInput" placeholder="o'zing haqingda bir-ikki jumla (ixtiyoriy)" maxlength="160" rows="2"></textarea>
      </div>
    </div>

    <!-- Va'da bloki — ism kiritilgandagina ko'rinadi -->
    <div class="vow-block" id="vowBlock">
      <p class="vow">
        Men <span class="em" id="userName">Aziz</span>,<br>
        <span class="em">intizomli</span> bo'laman.<br>
        Rejaga sodiq qolaman.
      </p>

      <div class="mic" id="micBtn" role="button" aria-label="Yozish">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z M19 11a7 7 0 0 1-14 0 M12 18v3"
                stroke="#04060B" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>

      <p class="status" id="status">Bos · ushlab tur · ayt</p>
    </div>
  </div>

  <div class="bottom-bar">
    <a class="cta disabled" id="startBtn" href="goal.html">Davom</a>
  </div>
</div>

<script src="data.js" defer></script>
<script src="nav-overlay.js" defer></script>
<script>
  // Brand harflari ketma-ket
  function animateName() {
    const el = document.getElementById('brandName');
    if (!el) return;
    const txt = el.textContent;
    el.innerHTML = '';
    [...txt].forEach((ch, i) => {
      const span = document.createElement('span');
      span.className = 'ch';
      span.textContent = ch === ' ' ? ' ' : ch;
      span.style.animationDelay = (0.4 + i * 0.05) + 's';
      el.appendChild(span);
    });
  }
  setTimeout(animateName, 100);

  const nameInp = document.getElementById('nameInput');
  const bioInp = document.getElementById('bioInput');
  const btn = document.getElementById('startBtn');
  const vowBlock = document.getElementById('vowBlock');
  const userNameSpan = document.getElementById('userName');
  const mic = document.getElementById('micBtn');
  const status = document.getElementById('status');

  let recorded = false;

  const nameErr = document.getElementById('nameErr');
  function check() {
    const v = nameInp.value.trim();
    const valid = v.length >= 2;
    vowBlock.classList.toggle('show', valid);
    if (valid) userNameSpan.textContent = v;
    btn.classList.toggle('disabled', !valid);
    // Xato matni — faqat foydalanuvchi yozishni boshlasa va noto'g'ri bo'lsa
    nameErr.style.display = (v.length > 0 && !valid) ? 'block' : 'none';
  }
  nameInp.addEventListener('input', check);
  bioInp.addEventListener('input', check);

  let recording = false;
  mic.addEventListener('click', () => {
    recording = !recording;
    mic.classList.toggle('recording', recording);
    if (!recording) {
      recorded = true;
      status.textContent = "Va'da berildi";
    } else {
      status.textContent = 'Tinglayapman…';
    }
    check();
  });

  btn.addEventListener('click', e => {
    if (btn.classList.contains('disabled')) { e.preventDefault(); return; }
    localStorage.setItem('mvow.userName', nameInp.value.trim());
    if (bioInp.value.trim()) localStorage.setItem('mvow.userBio', bioInp.value.trim());
  });

  const savedName = localStorage.getItem('mvow.userName');
  const savedBio = localStorage.getItem('mvow.userBio');
  if (savedName) { nameInp.value = savedName; }
  if (savedBio) { bioInp.value = savedBio; }
  check();

  // Onboarding ishora — birinchi marta ko'rinadi, 4 sek
  if (!localStorage.getItem('mvow.navHintSeen')) {
    setTimeout(() => {
      const hint = document.createElement('div');
      hint.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(0,229,212,.1);border:1px solid rgba(0,229,212,.35);border-radius:999px;padding:10px 18px;font-family:Inter,sans-serif;font-size:12px;color:#7AF5EC;letter-spacing:1px;z-index:99997;animation:fadeInOut 4s ease forwards;';
      hint.textContent = "‹ strelka bilan ham harakatlanasan ›";
      const css = document.createElement('style');
      css.textContent = '@keyframes fadeInOut { 0% { opacity: 0; } 15%, 85% { opacity: 1; } 100% { opacity: 0; transform: translateX(-50%) translateY(10px); } }';
      document.head.appendChild(css);
      document.body.appendChild(hint);
      localStorage.setItem('mvow.navHintSeen', '1');
      setTimeout(() => hint.remove(), 4200);
    }, 2500);
  }
</script>

</body>
</html>
