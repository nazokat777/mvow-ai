<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title data-i18n="maqsadlar.title">{brand} — Maqsadlar</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --void:#04060B; --void-soft:#0C0F16;
    --text:#F5F2EC; --text-mid:#B8BBC2; --text-dim:#9CA0A8;
    --accent:#00E5D4; --accent-soft:#00B5A8;
    --card:#11151E;
    --alert:#FF4757;
    --c-week:  #7AF5EC;
    --c-month: #00E5D4;
    --c-3mo:   #B8BBC2;
    --c-6mo:   #F5C26B;
    --c-year:  #FF8E97;
  }
  html, body {
    background: var(--void); color: var(--text);
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 540px;
    margin: 0 auto;
    padding: 60px 24px 140px;
  }
  .header { text-align: center; margin-bottom: 28px; }
  .title {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 32px;
    line-height: 1.2;
  }
  .sub {
    font-size: 13px;
    color: var(--text-mid);
    margin-top: 4px;
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px 24px;
    background: var(--card);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 14px;
    margin-bottom: 20px;
  }
  .empty .ic {
    width: 60px; height: 60px;
    margin: 0 auto 16px;
    border-radius: 50%;
    background: rgba(0,229,212,.08);
    border: 1px solid rgba(0,229,212,.25);
    display: flex; align-items: center; justify-content: center;
    color: var(--accent);
    font-size: 28px;
    font-family: 'Cormorant Garamond', serif;
  }
  .empty .head {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 20px;
    color: var(--text);
    margin-bottom: 6px;
  }
  .empty .desc {
    font-size: 13px;
    color: var(--text-mid);
    line-height: 1.5;
  }

  /* Goal card */
  .goals { display: flex; flex-direction: column; gap: 12px; }
  .goal {
    background: var(--card);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 14px;
    padding: 16px 18px;
    position: relative;
    transition: all .15s;
  }
  .goal:active { transform: scale(.99); border-color: rgba(0,229,212,.3); }
  .goal-row {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: start;
    gap: 12px;
    margin-bottom: 10px;
  }
  .goal-name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 19px;
    color: var(--text);
    line-height: 1.3;
  }
  .goal-badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    padding: 4px 10px;
    border-radius: 6px;
    color: var(--void);
    text-transform: uppercase;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .badge-week  { background: var(--c-week); }
  .badge-month { background: var(--c-month); }
  .badge-3mo   { background: var(--c-3mo); }
  .badge-6mo   { background: var(--c-6mo); }
  .badge-year  { background: var(--c-year); }

  .goal-meta {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-bottom: 12px;
  }
  .goal-meta .em { color: var(--accent); }

  .progress-bar {
    height: 4px;
    background: rgba(255,255,255,.06);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width .4s ease;
  }
  .progress-text {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }
  .progress-text .left  { color: var(--text-mid); }
  .progress-text .right { color: var(--text-mid); }

  /* Delete button */
  .goal-del {
    position: absolute;
    top: 12px; right: 12px;
    width: 28px; height: 28px;
    border-radius: 50%;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
  }
  .goal:hover .goal-del,
  .goal.editing .goal-del { display: flex; }
  .goal-del:hover { color: var(--alert); }

  /* Add button */
  .add-goal {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 18px;
    background: transparent;
    border: 1.5px dashed rgba(0,229,212,.25);
    border-radius: 12px;
    color: var(--accent);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 1px;
    cursor: pointer;
    margin-top: 14px;
    transition: all .15s;
    min-height: 56px;
  }
  .add-goal:hover {
    background: rgba(0,229,212,.04);
    border-color: var(--accent);
  }

  .bottom {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 18px 24px env(safe-area-inset-bottom, 22px);
    background: linear-gradient(180deg, transparent, var(--void) 40%);
  }
  .cta {
    display: block;
    width: 100%;
    max-width: 500px;
    margin: 0 auto;
    padding: 16px;
    background: linear-gradient(180deg, var(--accent), var(--accent-soft));
    color: var(--void);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: none;
    border-radius: 999px;
    text-align: center;
    text-decoration: none;
    cursor: pointer;
    min-height: 52px;
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <h1 class="title" data-i18n="maqsadlar.title">Maqsadlar</h1>
    <p class="tagline" style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:15px;line-height:1.5;color:var(--text-mid);text-align:center;margin:10px 18px 6px;max-width:340px;margin-left:auto;margin-right:auto;">
      <span data-i18n="maqsadlar.tagline_a">Maqsadlaringizni yozing —</span><br>
      <span style="color:var(--accent);" data-i18n="maqsadlar.tagline_em">bo'laklarga bo'lib</span><span data-i18n="maqsadlar.tagline_b">, reja va muntazamlik bilan unga yetasiz.</span>
    </p>
    <p class="sub" id="countSub" data-i18n="maqsadlar.count_zero_fallback">0 ta maqsad</p>
  </div>

  <div id="emptyState" class="empty">
    <div class="ic">+</div>
    <div class="head" data-i18n="maqsadlar.empty_head">Birinchi maqsadni qo'shing</div>
    <div class="desc"><span data-i18n="maqsadlar.empty_desc_a">Ilov uni kalendaringizga</span><br><span data-i18n="maqsadlar.empty_desc_b">har kunga tarqatadi</span></div>
  </div>

  <div class="goals" id="goalsList"></div>

  <button class="add-goal" id="addBtn" type="button">
    <span style="font-size:18px;">+</span>
    <span data-i18n="maqsadlar.add_btn">Yangi maqsad</span>
  </button>
</div>

<div class="bottom">
  <a class="cta" href="settings.html" data-i18n="common.continue">Davom</a>
</div>

<script src="i18n.js" defer></script>
<script src="data.js" defer></script>
<script src="nav-overlay.js" defer></script>
<script>
  function _t(key, fb) { return (window.I18N ? I18N.t(key, fb) : fb); }
  const DURATION_INFO = {
    'week':  { get label(){ return _t('maqsadlar.dur_week_lbl', '1 HAFTA'); }, cls: 'badge-week',  days: 7,   get short(){ return _t('maqsadlar.dur_week_short', 'hafta'); } },
    'month': { get label(){ return _t('maqsadlar.dur_month_lbl', '1 OY'); },    cls: 'badge-month', days: 30,  get short(){ return _t('maqsadlar.dur_month_short', 'oy'); } },
    '3mo':   { get label(){ return _t('maqsadlar.dur_3mo_lbl', '3 OY'); },     cls: 'badge-3mo',   days: 90,  get short(){ return _t('maqsadlar.dur_3mo_short', '3 oy'); } },
    '6mo':   { get label(){ return _t('maqsadlar.dur_6mo_lbl', '6 OY'); },     cls: 'badge-6mo',   days: 180, get short(){ return _t('maqsadlar.dur_6mo_short', '6 oy'); } },
    'year':  { get label(){ return _t('maqsadlar.dur_year_lbl', '1 YIL'); },   cls: 'badge-year',  days: 365, get short(){ return _t('maqsadlar.dur_year_short', 'yil'); } }
  };

  function loadGoals() {
    try {
      const g = JSON.parse(localStorage.getItem('mvow.goals') || '[]');
      return Array.isArray(g) ? g : [];
    } catch { return []; }
  }
  function saveGoals(arr) {
    localStorage.setItem('mvow.goals', JSON.stringify(arr));
  }

  function escapeHtml(s) {
    return String(s).replace(/[<>"&]/g, c => ({'<':'&lt;','>':'&gt;','"':'&quot;','&':'&amp;'}[c]));
  }

  function daysSince(isoStart) {
    const start = new Date(isoStart);
    const now = new Date();
    return Math.max(0, Math.floor((now - start) / 86400000));
  }

  function render() {
    const goals = loadGoals();
    const list = document.getElementById('goalsList');
    const empty = document.getElementById('emptyState');
    const sub = document.getElementById('countSub');

    if (!goals.length) {
      list.style.display = 'none';
      empty.style.display = 'block';
      sub.textContent = (window.I18N ? I18N.tWith('maqsadlar.count', { n: 0 }) : '0 ta maqsad');
      return;
    }
    empty.style.display = 'none';
    list.style.display = 'flex';
    sub.textContent = (window.I18N ? I18N.tWith('maqsadlar.count', { n: goals.length }) : goals.length + ' ta maqsad');

    // History — har maqsad uchun bajarilgan kunlar sonini hisoblash uchun
    const history = (window.MVOW_DATA ? MVOW_DATA.getHistory() : []);

    list.innerHTML = goals.map(g => {
      const info = DURATION_INFO[g.duration] || DURATION_INFO.month;
      const passed = daysSince(g.startDate);
      const remaining = Math.max(0, info.days - passed);
      // Vaqt bo'yicha o'tgan % (yo'lda qancha)
      const timePct = Math.min(100, Math.round((passed / info.days) * 100));
      // Bajarilganlik % (history bo'yicha — shu maqsad nomi)
      const expectedSoFar = Math.min(passed + 1, info.days);
      const completedDays = history.filter(h =>
        h.name === g.text && h.dateIso >= g.startDate
      ).length;
      const donePct = expectedSoFar > 0
        ? Math.min(100, Math.round((completedDays / expectedSoFar) * 100))
        : 0;
      // Yaxshi / o'rta / yomon rang
      const grade = donePct >= 80 ? 'good' : (donePct >= 50 ? 'mid' : 'low');
      const gradeColor = donePct >= 80 ? '#00E5D4' : (donePct >= 50 ? '#F5C26B' : '#FF8E97');
      const lblEveryDay = _t('maqsadlar.every_day', 'Har kuni');
      const lblDelAria = _t('common.delete', "O'chir");
      const lblDays = _t('maqsadlar.days_unit', 'kun');
      const lblDaysLeft = _t('maqsadlar.days_left', 'kun qoldi');
      const lblDone = _t('maqsadlar.done_lbl', 'Bajarildi');
      return `
        <div class="goal" data-id="${g.id}">
          <button class="goal-del" data-del="${g.id}" type="button" aria-label="${escapeHtml(lblDelAria)}">×</button>
          <div class="goal-row">
            <div class="goal-name">${escapeHtml(g.text)}</div>
            <div class="goal-badge ${info.cls}">${info.label}</div>
          </div>
          <div class="goal-meta">
            ${escapeHtml(lblEveryDay)} <span class="em">${escapeHtml(g.time)}</span> · ${escapeHtml(g.dur)}
          </div>
          <div class="progress-bar"><div class="progress-fill" style="width:${timePct}%"></div></div>
          <div class="progress-text">
            <span class="left">${passed} / ${info.days} ${escapeHtml(lblDays)}</span>
            <span class="right">${remaining} ${escapeHtml(lblDaysLeft)}</span>
          </div>
          <div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.04);display:flex;justify-content:space-between;align-items:center;font-size:11px;letter-spacing:0.5px;">
            <span style="color:var(--text-dim);">${escapeHtml(lblDone)}</span>
            <span style="color:${gradeColor};font-weight:600;font-size:14px;">${donePct}%</span>
          </div>
        </div>
      `;
    }).join('');

    // Delete handler
    list.querySelectorAll('[data-del]').forEach(b => {
      b.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = parseInt(b.dataset.del, 10);
        if (!confirm(_t('maqsadlar.del_confirm', "Bu maqsadni o'chirasizmi? Kalendaringizdan ham olib tashlanadi."))) return;
        removeGoal(id);
      });
    });
  }

  function removeGoal(id) {
    const goals = loadGoals();
    const goal = goals.find(g => g.id === id);
    if (!goal) return;

    // Kalendardan ham o'chirish
    if (window.MVOW_DATA) {
      const w = MVOW_DATA.getWeekPlan();
      const info = DURATION_INFO[goal.duration] || DURATION_INFO.month;
      const start = new Date(goal.startDate);
      for (let i = 0; i < info.days; i++) {
        const d = new Date(start);
        d.setDate(start.getDate() + i);
        const key = 'd' + (window.MVOW_DATA ? MVOW_DATA.localDateIso(d) : d.toISOString().slice(0, 10));
        if (Array.isArray(w[key])) {
          w[key] = w[key].filter(s => !(s.name === goal.text && s.time === goal.time));
        }
      }
      MVOW_DATA.setWeekPlan(w);
      if (MVOW_DATA.fxTap) MVOW_DATA.fxTap();
    }

    // Maqsadlar ro'yhatidan o'chirish
    saveGoals(goals.filter(g => g.id !== id));
    render();
  }

  document.getElementById('addBtn').addEventListener('click', () => {
    window.location.href = 'maqsad.html';
  });

  render();
</script>

</body>
</html>
