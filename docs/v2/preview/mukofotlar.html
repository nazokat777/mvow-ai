<head>
<meta charset="utf-8">

<meta name="theme-color" content="#04060B">

<link rel="icon" type="image/png" href="assets/mnsm-logo.png?v=2">

<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Inter', sans-serif; background: var(--void, #04060B); color: var(--text, #F5F2EC); }
  .phone { max-width: 480px; margin: 0 auto; min-height: 100vh; background: var(--void, #04060B); padding: 26px 18px 60px; }
  h1 { font-size: 30px; margin: 6px 0 2px; }
  .sub { color: var(--text-dim, #9CA0A8); font-size: 14px; line-height: 1.5; margin-bottom: 16px; }
  .bal { display: flex; gap: 10px; margin-bottom: 18px; }
  .bal .b { flex: 1; background: var(--card, #0C0F16); border: 1px solid var(--border-default, rgba(255,255,255,.12)); border-radius: 14px; padding: 14px; text-align: center; }
  .bal .b .v { font-size: 26px; font-weight: 800; }
  .bal .b.coin .v { color: #F5C26B; } .bal .b.dm .v { color: #6EB5FF; }
  .bal .b .k { font-size: 12px; color: var(--text-dim, #9CA0A8); margin-top: 2px; }
  .sec-hd { display: flex; align-items: center; justify-content: space-between; margin: 22px 2px 8px; }
  .sec-hd .t { font-size: 14px; letter-spacing: 1px; text-transform: uppercase; font-weight: 800; color: var(--text-mid, #B8BBC2); }
  .addb { border: none; border-radius: 999px; padding: 7px 14px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; background: var(--accent, #F4845F); color: #fff; }
  .rw { background: var(--card, #0C0F16); border: 1px solid var(--border-default, rgba(255,255,255,.12)); border-radius: 16px; padding: 14px 16px; margin-top: 10px; }
  .rw .top { display: flex; align-items: center; gap: 12px; }
  .rw .em { font-size: 30px; line-height: 1; flex-shrink: 0; }
  .rw .nm { flex: 1; min-width: 0; }
  .rw .nm .n1 { font-size: 16px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rw .nm .n2 { font-size: 13px; color: var(--text-dim, #9CA0A8); margin-top: 1px; }
  .rw .x { background: none; border: none; color: var(--text-dim, #9CA0A8); font-size: 20px; cursor: pointer; flex-shrink: 0; }
  .bar { height: 8px; background: rgba(255,255,255,.08); border-radius: 999px; overflow: hidden; margin-top: 10px; }
  .bar .fill { height: 100%; border-radius: 999px; transition: width .3s; }
  .rw.coin .bar .fill { background: linear-gradient(90deg, #F5C26B, #d99a3c); }
  .rw.dm .bar .fill { background: linear-gradient(90deg, #6EB5FF, #3f7fd0); }
  .rw .buy { width: 100%; margin-top: 12px; padding: 12px; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; }
  .rw .buy.ready { background: #6BBF7A; color: #04060B; }
  .rw .buy.wait { background: transparent; border: 1px solid var(--border-default, rgba(255,255,255,.14)); color: var(--text-dim, #9CA0A8); cursor: default; }
  .empty { color: var(--text-dim, #9CA0A8); font-size: 14px; padding: 10px 4px; }
  .hist { display: flex; align-items: center; gap: 10px; background: var(--card, #0C0F16); border: 1px solid var(--border-default, rgba(255,255,255,.10)); border-radius: 12px; padding: 11px 14px; margin-top: 8px; opacity: .85; }
  .hist .em { font-size: 22px; } .hist .nm { flex: 1; font-size: 15px; } .hist .dt { font-size: 12px; color: var(--text-dim, #9CA0A8); }

  .ov { display: none; position: fixed; inset: 0; z-index: 9998; background: rgba(0,0,0,.6); align-items: flex-end; justify-content: center; }
  .ov.show { display: flex; }
  .sheet { width: 100%; max-width: 480px; background: var(--card, #11151E); border-radius: 20px 20px 0 0; padding: 22px 18px calc(22px + env(safe-area-inset-bottom, 0px)); border-top: 1px solid var(--border-default, rgba(255,255,255,.12)); }
  .sheet h2 { font-size: 20px; margin-bottom: 14px; }
  .lbl { font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim, #9CA0A8); font-weight: 700; margin: 12px 2px 6px; display: block; }
  .fld { width: 100%; padding: 13px; background: var(--void, #0C0F16); border: 1px solid var(--border-default, rgba(255,255,255,.12)); border-radius: 12px; color: var(--text, #F5F2EC); font-size: 16px; font-family: inherit; }
  .row2 { display: flex; gap: 10px; }
  .seg { display: flex; gap: 6px; }
  .seg button { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border-default, rgba(255,255,255,.14)); background: transparent; color: var(--text-mid, #B8BBC2); font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .seg button.on { background: var(--accent, #F4845F); border-color: var(--accent, #F4845F); color: #fff; }
  .hint { font-size: 12px; color: var(--text-dim, #9CA0A8); margin-top: 6px; }
  .actions { display: flex; gap: 10px; margin-top: 18px; }
  .btn { flex: 1; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; border: none; }
  .btn.cancel { background: transparent; border: 1px solid var(--border-default, rgba(255,255,255,.15)); color: var(--text-mid, #B8BBC2); }
  .btn.save { background: var(--accent, #F4845F); color: #fff; }
</style>

<body>
<div class="phone">
  <h1 data-i18n="mukofot.title">Mukofotlar</h1>
  <div class="sub" data-i18n="mukofot.sub">Tanga va olmoslaringizni o'zingiz belgilagan mukofotlarga sarflang.</div>

  <div class="bal">
    <div class="b coin"><div class="v">🪙 <span id="coinBal">0</span></div><div class="k" data-i18n="mukofot.coins">Tanga</div></div>
    <div class="b dm"><div class="v">💎 <span id="dmBal">0</span></div><div class="k" data-i18n="mukofot.diamonds">Olmos</div></div>

  <style>
    .ai-reward-card{display:flex;align-items:center;gap:12px;width:100%;text-align:left;margin:2px 0 18px;padding:14px 16px;border:none;border-radius:16px;cursor:pointer;background:linear-gradient(135deg,#6C5CE7,#8E7BF0);color:#fff;box-shadow:0 10px 26px rgba(108,92,231,.35);font-family:inherit;}
    .ai-reward-card:active{transform:scale(.98);}
    .ai-reward-card .ai-ic{font-size:26px;flex:none;}
    .ai-reward-card .ai-t{font-size:16px;font-weight:800;}
    .ai-reward-card .ai-s{font-size:12.5px;opacity:.92;margin-top:2px;line-height:1.3;}
    .ai-reward-card .ai-arrow{margin-left:auto;font-size:20px;opacity:.85;}
    #aiOv .sheet{max-height:90vh;overflow-y:auto;}
    .ai-chips{display:flex;flex-wrap:wrap;gap:8px;margin:2px 0 6px;}
    .ai-chip{padding:9px 13px;border-radius:999px;border:1.5px solid var(--border-default,rgba(255,255,255,.16));background:transparent;color:var(--text,#f5f2ec);font-size:14px;cursor:pointer;font-family:inherit;}
    .ai-chip.on{border-color:#6C5CE7;background:rgba(108,92,231,.16);color:#8E7BF0;}
    .ai-res{margin-top:14px;display:flex;flex-direction:column;gap:10px;}
    .ai-item{background:var(--card,rgba(255,255,255,.05));border:1px solid var(--border-default,rgba(255,255,255,.1));border-radius:12px;padding:12px 14px;}
    .ai-item .it-title{font-size:15px;font-weight:700;color:var(--text,#f5f2ec);}
    .ai-item .it-why{font-size:13px;color:var(--text-dim,#9CA0A8);margin:4px 0 9px;line-height:1.4;}
    .ai-links{display:flex;flex-wrap:wrap;gap:6px;}
    .ai-links a{font-size:12.5px;font-weight:600;text-decoration:none;padding:6px 10px;border-radius:8px;background:rgba(108,92,231,.14);color:#8E7BF0;border:1px solid rgba(108,92,231,.3);}
    .ai-loading{text-align:center;color:var(--text-dim,#9CA0A8);font-size:14px;padding:18px;}
  </style>
  <button class="ai-reward-card" id="aiRewardBtn" type="button">
    <div class="ai-ic">🎬</div>
    <div class="ai-txt"><div class="ai-t" data-i18n="mukofot.ai_title">AI tavsiyasi</div><div class="ai-s" data-i18n="mukofot.ai_sub">Qiziqishingizga mos jahon top kino/kitoblari + ko'rish havolasi</div></div>
    <div class="ai-arrow">→</div>
  </button>

  <div class="sec-hd"><span class="t" data-i18n="mukofot.my">Mukofotlarim</span><button class="addb" id="addBtn" data-i18n="mukofot.add">+ Mukofot</button></div>
  <div id="list"></div>

  <div class="sec-hd"><span class="t" data-i18n="mukofot.history">Olingan mukofotlar</span></div>
  <div id="history"></div>
</div>

<div class="ov" id="ov">
  <div class="sheet">
    <h2 id="ovTitle" data-i18n="mukofot.add">+ Mukofot</h2>
    <label class="lbl" data-i18n="mukofot.name_lbl">Nomi</label>
    <div class="row2">
      <input id="fEmoji" class="fld" maxlength="2" style="flex:0 0 60px;text-align:center;font-size:22px;" value="🎁">
      <input id="fName" class="fld" maxlength="50" style="flex:1;" placeholder="">
    </div>
    <label class="lbl" data-i18n="mukofot.cur_lbl">Nima bilan</label>
    <div class="seg">
      <button type="button" id="curCoin" class="on" data-i18n="mukofot.cur_coin">🪙 Tanga</button>
      <button type="button" id="curDm" data-i18n="mukofot.cur_diamond">💎 Olmos</button>
    </div>
    <label class="lbl" data-i18n="mukofot.price_lbl">Narxi</label>
    <input id="fPrice" class="fld" type="number" inputmode="numeric" min="1" step="1" placeholder="150">
    <div class="hint" id="priceHint"></div>
    <div class="actions">
      <button class="btn cancel" id="ovCancel" data-i18n="mukofot.cancel">Bekor</button>
      <button class="btn save" id="ovSave" data-i18n="mukofot.save">Saqlash</button>
    </div>
  </div>
</div>

<div class="ov" id="aiOv">
  <div class="sheet">
    <h2 data-i18n="mukofot.ai_title">AI tavsiyasi</h2>
    <div class="hint" data-i18n="mukofot.ai_hint">Intizom mukofoti — qiziqishingizni tanlang, AI jahon top asarlaridan tavsiya qiladi.</div>
    <div class="seg" style="margin-top:10px;">
      <button type="button" id="aiFilm" class="on" data-i18n="mukofot.ai_movie">🎬 Film</button>
      <button type="button" id="aiBook" data-i18n="mukofot.ai_book">📚 Kitob</button>
    </div>
    <label class="lbl" data-i18n="mukofot.ai_interest">Qiziqishingiz</label>
    <div class="ai-chips" id="aiChips"></div>
    <input id="aiCustom" class="fld" maxlength="40" data-i18n-placeholder="mukofot.ai_custom_ph" placeholder="Yoki o'zingiz yozing…">
    <div class="actions">
      <button class="btn cancel" id="aiCancel" data-i18n="mukofot.cancel">Bekor</button>
      <button class="btn save" id="aiGo" data-i18n="mukofot.ai_go">Tavsiya ber</button>
    </div>
    <div class="ai-res" id="aiRes"></div>
  </div>
</div>

<script>
  (function () {
    function T(k, fb) { return (window.I18N && I18N.t) ? I18N.t(k, fb) : fb; }
    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]); }); }
    function num(x) { var n = parseInt(x, 10); return isFinite(n) ? n : 0; }
    function get(k) { return num(localStorage.getItem(k)); }
    function setN(k, v) { try { localStorage.setItem(k, String(v)); } catch (e) {} }
    function todayIso() { try { if (window.MVOW_DATA && MVOW_DATA.today) return MVOW_DATA.today.iso; } catch (e) {} var d = new Date(); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }
    function fmtDate(iso) { var m = String(iso || '').match(/^(\d{4})-(\d{2})-(\d{2})$/); return m ? (m[3] + '.' + m[2] + '.' + m[1]) : ''; }

    function loadR() {
      var d = null; try { d = JSON.parse(localStorage.getItem('mvow.rewards') || 'null'); } catch (e) {}
      if (!Array.isArray(d)) {   // birinchi kirish — namuna mukofotlar
        d = [
          { id: 's1', name: T('mukofot.seed1', 'Kino kechasi'), emoji: '🎬', price: 150, cur: 'coin' },
          { id: 's2', name: T('mukofot.seed2', 'Yangi kitob'), emoji: '📚', price: 300, cur: 'coin' }
        ];
        saveR(d);
      }
      return d;
    }
    function saveR(d) { try { localStorage.setItem('mvow.rewards', JSON.stringify(d)); } catch (e) {} }
    function loadH() { try { var h = JSON.parse(localStorage.getItem('mvow.rewardsHistory') || '[]'); return Array.isArray(h) ? h : []; } catch (e) { return []; } }
    function saveH(h) { try { localStorage.setItem('mvow.rewardsHistory', JSON.stringify(h)); } catch (e) {} }

    function icon(cur) { return cur === 'diamond' ? '💎' : '🪙'; }
    function balOf(cur) { return cur === 'diamond' ? get('mvow.diamonds') : get('mvow.coins'); }

    function render() {
      document.getElementById('coinBal').textContent = get('mvow.coins');
      document.getElementById('dmBal').textContent = get('mvow.diamonds');

      var rewards = loadR();
      document.getElementById('list').innerHTML = rewards.length ? rewards.map(function (r) {
        var bal = balOf(r.cur), price = num(r.price) || 1, ready = bal >= price;
        var pct = Math.max(0, Math.min(100, Math.round(bal / price * 100)));
        return '<div class="rw ' + (r.cur === 'diamond' ? 'dm' : 'coin') + '">'
          + '<div class="top"><div class="em">' + esc(r.emoji || '🎁') + '</div>'
          + '<div class="nm"><div class="n1">' + esc(r.name) + '</div>'
          + '<div class="n2">' + Math.min(bal, price) + ' / ' + price + ' ' + icon(r.cur) + '</div></div>'
          + '<button class="x" data-del="' + r.id + '" aria-label="o\'chirish">×</button></div>'
          + '<div class="bar"><div class="fill" style="width:' + pct + '%"></div></div>'
          + (ready
              ? '<button class="buy ready" data-buy="' + r.id + '">' + T('mukofot.buy', 'Sotib olish') + ' (' + price + ' ' + icon(r.cur) + ')</button>'
              : '<button class="buy wait" disabled>' + (price - bal) + ' ' + icon(r.cur) + ' ' + T('mukofot.left', 'qoldi') + '</button>')
          + '</div>';
      }).join('') : '<div class="empty">' + T('mukofot.empty', "Hali mukofot yo'q. O'zingizga bittasini belgilang.") + '</div>';

      var hist = loadH().slice().reverse();
      document.getElementById('history').innerHTML = hist.length ? hist.map(function (h) {
        return '<div class="hist"><span class="em">' + esc(h.emoji || '🎁') + '</span><span class="nm">' + esc(h.name) + '</span>'
          + '<span class="dt">' + fmtDate(h.date) + ' · ' + num(h.price) + ' ' + icon(h.cur) + '</span></div>';
      }).join('') : '<div class="empty">' + T('mukofot.hist_empty', 'Hali mukofot olinmagan') + '</div>';

      document.querySelectorAll('[data-del]').forEach(function (b) {
        b.addEventListener('click', function () {
          var id = b.getAttribute('data-del'), all = loadR();
          var item = all.filter(function (x) { return String(x.id) === id; })[0];
          saveR(all.filter(function (x) { return String(x.id) !== id; })); render();
          if (window.MvowUndo && item) MvowUndo.show(T('common.deleted', "O'chirildi"), function () { var a = loadR(); a.push(item); saveR(a); render(); });
        });
      });
      document.querySelectorAll('[data-buy]').forEach(function (b) {
        b.addEventListener('click', function () { buy(b.getAttribute('data-buy')); });
      });
    }

    function buy(id) {
      var rewards = loadR(), r = null;
      for (var i = 0; i < rewards.length; i++) { if (String(rewards[i].id) === id) { r = rewards[i]; break; } }
      if (!r) return;
      var price = num(r.price) || 1, key = r.cur === 'diamond' ? 'mvow.diamonds' : 'mvow.coins';
      if (get(key) < price) return;
      if (!confirm('"' + r.name + '" — ' + price + ' ' + icon(r.cur) + ' ' + T('mukofot.buy_q', 'sarflansinmi?'))) return;
      setN(key, get(key) - price);   // olmos sarflansa ham diamondsLifetime (prestij) kamaymaydi
      var h = loadH(); h.push({ name: r.name, emoji: r.emoji, price: price, cur: r.cur, date: todayIso() }); saveH(h);
      if (window.MVOW_DATA && MVOW_DATA.fxSuccess) MVOW_DATA.fxSuccess();
      render();
      if (window.MvowUndo) MvowUndo.show(T('mukofot.bought', 'Olindi'), function () {
        setN(key, get(key) + price); var hh = loadH(); hh.pop(); saveH(hh); render();
      });
    }

    // ── Qo'shish oynasi ──
    var ov = document.getElementById('ov'), curCur = 'coin';
    var fName = document.getElementById('fName'), fEmoji = document.getElementById('fEmoji'), fPrice = document.getElementById('fPrice');
    function setCur(c) { curCur = c; document.getElementById('curCoin').classList.toggle('on', c === 'coin'); document.getElementById('curDm').classList.toggle('on', c === 'diamond'); hint(); }
    function hint() { document.getElementById('priceHint').textContent = curCur === 'diamond' ? T('mukofot.hint_dm', 'Olmos: har mukammal kun = 1 💎 (kamyob — katta mukofotlarga)') : T('mukofot.hint_coin', 'Tanga: har vazifa = 1 🪙'); }
    function openSheet() {
      fName.value = ''; fEmoji.value = '🎁'; fPrice.value = ''; setCur('coin');
      fName.placeholder = T('mukofot.name_ph', 'mas. kino kechasi');
      ov.classList.add('show'); setTimeout(function () { fName.focus(); }, 80);
    }
    function closeSheet() { ov.classList.remove('show'); }
    function saveSheet() {
      var name = fName.value.trim(), price = num(fPrice.value);
      if (!name || price < 1) { fName.focus(); return; }
      var d = loadR(); d.push({ id: String(Date.now()) + Math.floor(Math.random() * 999), name: name, emoji: (fEmoji.value.trim() || '🎁'), price: price, cur: curCur });
      saveR(d);
      if (window.MVOW_DATA && MVOW_DATA.fxSuccess) MVOW_DATA.fxSuccess();
      closeSheet(); render();
    }
    document.getElementById('addBtn').addEventListener('click', openSheet);
    document.getElementById('curCoin').addEventListener('click', function () { setCur('coin'); });
    document.getElementById('curDm').addEventListener('click', function () { setCur('diamond'); });
    document.getElementById('ovCancel').addEventListener('click', closeSheet);
    document.getElementById('ovSave').addEventListener('click', saveSheet);
    ov.addEventListener('click', function (e) { if (e.target === ov) closeSheet(); });

    try { document.title = T('mukofot.page_title', 'FOCUS AI — Mukofotlar'); } catch (e) {}
    render();
  })();
</script>
<script>
  // ── AI mukofot: kino/kitob tavsiyasi (qiziqish + til) + ishonchli qidiruv havolalari ──
  (function () {
    function T(k, fb) { return (window.I18N && I18N.t) ? I18N.t(k, fb) : fb; }
    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]); }); }
    function lang() { return (window.I18N && I18N.lang) || 'uz'; }
    var curKind = 'movie', curChip = '';
    var CHIPS = {
      movie: {
        uz: ['Jangari', 'Komediya', 'Drama', 'Fantastika', 'Triller', 'Tarixiy', 'Sarguzasht', 'Multfilm'],
        ru: ['Боевик', 'Комедия', 'Драма', 'Фантастика', 'Триллер', 'Исторический', 'Приключения', 'Мультфильм'],
        en: ['Action', 'Comedy', 'Drama', 'Sci-Fi', 'Thriller', 'Historical', 'Adventure', 'Animation']
      },
      book: {
        uz: ['Motivatsiya', 'Biznes', 'Psixologiya', 'Badiiy', 'Tarix', 'Fantastika', 'Biografiya', 'Rivojlanish'],
        ru: ['Мотивация', 'Бизнес', 'Психология', 'Художественная', 'История', 'Фантастика', 'Биография', 'Развитие'],
        en: ['Motivation', 'Business', 'Psychology', 'Fiction', 'History', 'Sci-Fi', 'Biography', 'Growth']
      }
    };
    var FALLBACK = {
      movie: ['The Shawshank Redemption', 'Inception', 'Forrest Gump', 'Parasite'],
      book: ['Atomic Habits', 'Sapiens', 'The Alchemist', 'Deep Work']
    };
    function chipList() { var m = CHIPS[curKind]; return (m && (m[lang()] || m.uz)) || []; }
    function renderChips() {
      var box = document.getElementById('aiChips'); if (!box) return;
      box.innerHTML = chipList().map(function (g) {
        return '<button type="button" class="ai-chip' + (g === curChip ? ' on' : '') + '" data-g="' + esc(g) + '">' + esc(g) + '</button>';
      }).join('');
      box.querySelectorAll('.ai-chip').forEach(function (b) {
        b.onclick = function () { curChip = b.getAttribute('data-g'); var c = document.getElementById('aiCustom'); if (c) c.value = ''; renderChips(); };
      });
    }
    function links(kind, title) {
      var q = encodeURIComponent, L = lang();
      if (kind === 'book') {
        var read = ({ uz: " kitobini onlayn o'qish bepul", ru: ' читать онлайн бесплатно', en: ' read online free' })[L] || ' read online free';
        return [
          { t: '📖 ' + T('mukofot.ai_read', "O'qish"), u: 'https://www.google.com/search?q=' + q(title + read) },
          { t: '📚 Google Books', u: 'https://www.google.com/search?tbm=bks&q=' + q(title) }
        ];
      }
      var yt = ({ uz: " to'liq kino", ru: ' фильм полностью', en: ' full movie' })[L] || ' full movie';
      var free = ({ uz: " to'liq kino onlayn ko'rish bepul", ru: ' смотреть онлайн бесплатно', en: ' watch full movie free online' })[L] || ' watch free online';
      return [
        { t: '▶ YouTube', u: 'https://www.youtube.com/results?search_query=' + q(title + yt) },
        { t: '🔎 ' + T('mukofot.ai_free', 'Bepul qidirish'), u: 'https://www.google.com/search?q=' + q(title + free) },
        { t: '📼 Archive', u: 'https://archive.org/search?query=' + q(title) }
      ];
    }
    function renderRes(items) {
      var el = document.getElementById('aiRes'); if (!el) return;
      if (!items || !items.length) items = FALLBACK[curKind].map(function (t) { return { title: t, year: '', why: '' }; });
      el.innerHTML = items.map(function (it) {
        var ls = links(curKind, it.title).map(function (l) { return '<a href="' + l.u + '" target="_blank" rel="noopener">' + l.t + '</a>'; }).join('');
        return '<div class="ai-item"><div class="it-title">' + esc(it.title) + (it.year ? ' (' + esc(it.year) + ')' : '') + '</div>'
          + (it.why ? '<div class="it-why">' + esc(it.why) + '</div>' : '') + '<div class="ai-links">' + ls + '</div></div>';
      }).join('');
    }
    function go() {
      var interest = (curChip || (document.getElementById('aiCustom') || {}).value || '').trim();
      var res = document.getElementById('aiRes');
      res.innerHTML = '<div class="ai-loading">' + T('mukofot.ai_loading', "AI o'ylayapti…") + '</div>';
      fetch('/api/coach', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ mode: 'reward', kind: curKind, interest: interest, lang: lang() }) })
        .then(function (r) { return r.json(); })
        .then(function (d) { renderRes(d && d.items); })
        .catch(function () { renderRes(null); });   // xatoda ham fallback ro'yxat
    }
    function openOv() { renderChips(); document.getElementById('aiRes').innerHTML = ''; document.getElementById('aiOv').classList.add('show'); }
    function closeOv() { document.getElementById('aiOv').classList.remove('show'); }
    function wire() {
      var btn = document.getElementById('aiRewardBtn'); if (btn) btn.onclick = openOv;
      var cancel = document.getElementById('aiCancel'); if (cancel) cancel.onclick = closeOv;
      var go1 = document.getElementById('aiGo'); if (go1) go1.onclick = go;
      var film = document.getElementById('aiFilm'), book = document.getElementById('aiBook');
      if (film) film.onclick = function () { curKind = 'movie'; curChip = ''; film.classList.add('on'); if (book) book.classList.remove('on'); renderChips(); document.getElementById('aiRes').innerHTML = ''; };
      if (book) book.onclick = function () { curKind = 'book'; curChip = ''; book.classList.add('on'); if (film) film.classList.remove('on'); renderChips(); document.getElementById('aiRes').innerHTML = ''; };
      var ov = document.getElementById('aiOv'); if (ov) ov.addEventListener('click', function (e) { if (e.target === ov) closeOv(); });
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', wire); else wire();
  })();
</script>
