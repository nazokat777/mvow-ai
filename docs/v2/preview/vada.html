<!DOCTYPE html>
<html lang="uz">
<head>
<script>(function(){var F='mvow.purgedV283';if(localStorage.getItem(F))return;if(!('serviceWorker' in navigator)){localStorage.setItem(F,'1');return;}navigator.serviceWorker.getRegistrations().then(function(rs){return Promise.all(rs.map(function(r){return r.unregister();}));}).then(function(){if('caches' in window){return caches.keys().then(function(ks){return Promise.all(ks.map(function(k){return caches.delete(k);}));});}}).then(function(){localStorage.setItem(F,'1');location.reload();});})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title data-i18n="vada.page_title">{brand} — Va'da</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --void:#04060B; --void-soft:#0C0F16;
    --text:#F5F2EC; --text-mid:#B8BBC2; --text-dim:#9CA0A8;
    
    --stamp:#FF4757;
  }
  html, body {
    background: var(--void); color: var(--text);
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 540px;
    margin: 0 auto;
    padding: 80px 28px 140px;
    min-height: 100vh;
    display: flex; flex-direction: column;
    justify-content: center;
  }

  .ask { transition: opacity .4s, transform .4s; }
  .ask.gone { opacity: 0; transform: translateY(-20px); pointer-events: none; }
  .question {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 30px;
    line-height: 1.4;
    text-align: center;
    color: var(--text);
    margin-bottom: 50px;
    padding: 0 8px;
  }
  .question .em {
    color: var(--accent);
    font-style: normal;
    font-weight: 600;
  }
  .yes-btn {
    display: block;
    width: 100%;
    max-width: 380px;
    margin: 0 auto;
    padding: 18px;
    background: linear-gradient(180deg, var(--accent), var(--accent-soft));
    color: var(--void);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    transition: transform .15s, box-shadow .25s;
    box-shadow: 0 0 32px rgba(212,175,55,.2);
    min-height: 60px;
  }
  .yes-btn:hover { box-shadow: 0 0 44px rgba(212,175,55,.35); }
  .yes-btn:active { transform: scale(0.97); }

  .confirmed { display: none; text-align: center; }
  .confirmed.show {
    display: block;
    animation: revealIn 0.6s cubic-bezier(.16,.84,.32,1);
  }
  @keyframes revealIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .stamp-wrap {
    display: flex; justify-content: center;
    margin-bottom: 36px;
    perspective: 600px;
  }
  .stamp {
    border: 4px solid var(--stamp);
    border-radius: 14px;
    padding: 16px 32px;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 30px;
    color: var(--stamp);
    letter-spacing: 6px;
    text-transform: uppercase;
    transform: rotate(-12deg) scale(0);
    opacity: 0;
    box-shadow: inset 0 0 0 2px rgba(255,71,87,.4);
    text-shadow: 0 0 8px rgba(255,71,87,.25);
    animation: stampDown 0.6s cubic-bezier(.34,1.56,.64,1) 0.2s forwards;
    white-space: nowrap;
  }
  @keyframes stampDown {
    0%   { transform: rotate(-12deg) scale(2.5); opacity: 0; }
    60%  { transform: rotate(-12deg) scale(0.85); opacity: 1; }
    100% { transform: rotate(-12deg) scale(1); opacity: 1; }
  }

  .quote {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 22px;
    color: var(--text);
    line-height: 1.6;
    text-align: center;
    padding: 24px 12px;
    border-top: 1px solid rgba(212,175,55,.15);
    border-bottom: 1px solid rgba(212,175,55,.15);
    margin: 0 auto 36px;
    max-width: 460px;
    opacity: 0;
    animation: revealIn 0.5s ease 0.7s forwards;
  }
  .quote .em { color: var(--accent); font-style: normal; font-weight: 600; }

  .bottom {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 18px 28px env(safe-area-inset-bottom, 22px);
    background: linear-gradient(180deg, transparent, var(--void) 40%);
    z-index: 5;
    opacity: 0;
    pointer-events: none;
    transition: opacity .4s;
  }
  .bottom.show { opacity: 1; pointer-events: auto; }
  .cta {
    display: block;
    width: 100%;
    max-width: 440px;
    margin: 0 auto;
    padding: 16px;
    background: linear-gradient(180deg, var(--accent), var(--accent-soft));
    color: var(--void);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: none;
    border-radius: 999px;
    text-align: center;
    text-decoration: none;
    cursor: pointer;
    min-height: 52px;
  }
</style>
<link rel="stylesheet" href="theme.css">
</head>
<body>

<div class="wrap">

  <div class="ask" id="askBlock">
    <h1 class="question">
      <span class="em" data-i18n="vada.question_em1">Intizomli</span> <span data-i18n="vada.question_mid">bo'lishga,</span><br>
      <span class="em" data-i18n="vada.question_em2">rejangizga sodiq</span> <span data-i18n="vada.question_end">qolishga</span><br>
      <span data-i18n="vada.question_q">va'da berasizmi?</span>
    </h1>
    <button class="yes-btn" id="yesBtn" type="button" data-i18n="vada.btn_vow">Va'da beraman</button>
  </div>

  <div class="confirmed" id="confirmedBlock">
    <div class="stamp-wrap">
      <div class="stamp" data-i18n="vada.stamp">Tasdiqlandi</div>
    </div>
    <p class="quote">
      <span data-i18n="vada.quote_a">Tartibga amal qilish —</span><br>
      <span class="em" data-i18n="vada.quote_em">o'zini hurmat qilish</span><span data-i18n="vada.quote_b">likdir.</span>
    </p>
  </div>

</div>

<div class="bottom" id="bottomBar">
  <a class="cta" href="maqsadlar.html" data-i18n="vada.cta">Davom</a>
</div>

<script src="i18n.js?v=28.2.6"></script>
<script src="lang-switcher.js?v=28.2.6" defer></script>
<script src="data.js?v=28.2.6" defer></script>
<script src="nav-overlay.js?v=28.2.6" defer></script>
<script>
  const yesBtn = document.getElementById('yesBtn');
  const askBlock = document.getElementById('askBlock');
  const confirmedBlock = document.getElementById('confirmedBlock');
  const bottomBar = document.getElementById('bottomBar');

  yesBtn.addEventListener('click', () => {
    localStorage.setItem('mvow.vowGiven', '1');
    localStorage.setItem('mvow.vowAt', new Date().toISOString());
    if (window.MVOW_DATA && MVOW_DATA.fxSuccess) MVOW_DATA.fxSuccess();

    askBlock.classList.add('gone');
    setTimeout(() => {
      confirmedBlock.classList.add('show');
      setTimeout(() => { bottomBar.classList.add('show'); }, 1100);
    }, 300);
  });

  // Oldin va'da berilgan bo'lsa, darrov tasdiq ko'rsatish
  if (localStorage.getItem('mvow.vowGiven') === '1') {
    askBlock.classList.add('gone');
    confirmedBlock.classList.add('show');
    bottomBar.classList.add('show');
  }
</script>

</body>
</html>
