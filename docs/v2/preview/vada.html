<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{brand} — Va'da</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --void:#04060B; --void-soft:#0C0F16;
    --text:#F5F2EC; --text-mid:#B8BBC2; --text-dim:#9CA0A8;
    --accent:#00E5D4; --accent-soft:#00B5A8;
  }
  body { background: var(--void); font-family:'Inter',sans-serif; color: var(--text); min-height: 100vh; display:flex; justify-content:center; align-items:flex-start; padding: 24px; -webkit-font-smoothing: antialiased; }
  .phone { width: 380px; min-height: 800px; background: var(--void); border-radius: 40px; overflow: hidden; position: relative; box-shadow: 0 0 0 8px #1a1d24, 0 30px 80px rgba(0,0,0,.7); display:flex; flex-direction: column; }
  .container { flex:1; padding: 80px 32px 100px; display:flex; flex-direction: column; gap: 26px; overflow-y: auto; }

  .title {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 42px;
    text-align: center;
    line-height: 1.2;
    margin-bottom: 16px;
  }

  /* Vow lines */
  .vow {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    color: var(--text);
    line-height: 1.7;
    text-align: center;
    padding: 28px 8px;
  }

  /* Mic */
  .mic-wrap { display:flex; flex-direction: column; align-items: center; gap: 12px; }
  .mic {
    width: 84px; height: 84px;
    border-radius: 50%;
    background: linear-gradient(180deg, var(--accent), var(--accent-soft));
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    transition: transform .2s;
    box-shadow: 0 0 30px rgba(0,229,212,.3);
  }
  .mic:active { transform: scale(.95); }
  .mic svg { width: 30px; height: 30px; }
  .mic.recording { animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 30px rgba(0,229,212,.3); }
    50%     { box-shadow: 0 0 54px rgba(0,229,212,.6); }
  }
  .status { font-size: 11px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; min-height: 14px; }
  .status.done { color: var(--accent); }
  .hint { font-size: 12px; color: var(--text-mid); text-align: center; }

  .bottom-bar { padding: 18px 32px env(safe-area-inset-bottom, 18px); background: linear-gradient(180deg, transparent, var(--void) 30%); }
  .cta { display:block; width:100%; padding:16px; background: linear-gradient(180deg, var(--accent), var(--accent-soft)); color: var(--void); font-size:13px; font-weight:600; letter-spacing:2px; text-transform: uppercase; border:none; border-radius:6px; text-align:center; text-decoration:none; }
  .cta.disabled { opacity:.3; pointer-events:none; }
  .skip { display:block; text-align: center; margin-top: 12px; font-size: 11px; letter-spacing: 2px; color: var(--text-mid); text-transform: uppercase; text-decoration: none; }

  @media (max-width: 480px) { body { padding: 0; } .phone { width: 100vw; min-height: 100vh; border-radius: 0; box-shadow: none; } }
</style>
</head>
<body>

<div class="phone">
  <div class="container">

    <h1 class="title" data-i18n="vada.title">Va'da ber</h1>

    <p class="vow" id="vowText">
      <span data-i18n="vada.line1">intizomli bo'lishga</span><br>
      <span data-i18n="vada.line2">rejamga sodiq bo'lishga</span>
    </p>

    <div class="mic-wrap">
      <div class="mic" id="micBtn" role="button" tabindex="0" aria-label="Yozish">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z M19 11a7 7 0 0 1-14 0 M12 18v3"
                stroke="#04060B" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <p class="status" id="status" data-i18n="vada.record">Ovozda ayt</p>
    </div>

  </div>

  <div class="bottom-bar">
    <a class="cta" id="cta" href="permissions.html" data-i18n="vada.cta">Davom</a>
  </div>
</div>

<script src="i18n.js" defer></script>
<script src="data.js" defer></script>
<script src="nav-overlay.js" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const name = (localStorage.getItem('mvow.userName') || '').trim();
    if (name) document.getElementById('userNameSpan').textContent = name;

    let recording = false;
    let recorded = false;
    const mic = document.getElementById('micBtn');
    const status = document.getElementById('status');
    let mediaStream = null;
    let audioCtx = null;
    let analyser = null;
    let monitorRAF = null;
    let detectedSpeech = false;
    let speechTimer = null;

    function setStatus(text, cls) {
      status.textContent = text;
      status.className = 'status' + (cls ? ' ' + cls : '');
    }

    async function startRecording() {
      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (err) {
        if (err.name === 'NotAllowedError') {
          setStatus("Mikrofonga ruxsat kerak", 'done');
        } else if (err.name === 'NotFoundError') {
          setStatus("Mikrofon topilmadi", 'done');
        } else {
          setStatus("Ulanish xatosi", 'done');
        }
        return false;
      }
      recording = true;
      detectedSpeech = false;
      mic.classList.add('recording');
      setStatus(window.I18N ? I18N.t('vada.recording', "Tinglayapman…") : "Tinglayapman…");
      if (window.MVOW_DATA) MVOW_DATA.fxTap();

      // Ovoz darajasini kuzatish — odam gapirayotganini aniqlash
      try {
        const AC = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AC();
        const src = audioCtx.createMediaStreamSource(mediaStream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 512;
        src.connect(analyser);
        const buf = new Uint8Array(analyser.frequencyBinCount);

        function tick() {
          analyser.getByteFrequencyData(buf);
          let sum = 0;
          for (let i = 0; i < buf.length; i++) sum += buf[i];
          const avg = sum / buf.length;
          if (avg > 14) detectedSpeech = true;  // gap eshitildi
          monitorRAF = requestAnimationFrame(tick);
        }
        tick();
      } catch {}

      // Maksimal 20 sek — keyin avtomatik to'xtaydi
      speechTimer = setTimeout(stopRecording, 20000);
      return true;
    }

    function stopRecording() {
      if (!recording) return;
      recording = false;
      if (monitorRAF) cancelAnimationFrame(monitorRAF);
      if (speechTimer) clearTimeout(speechTimer);
      if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
      if (audioCtx && audioCtx.state !== 'closed') {
        try { audioCtx.close(); } catch {}
      }
      mic.classList.remove('recording');

      if (detectedSpeech) {
        recorded = true;
        setStatus(window.I18N ? I18N.t('vada.done', "Va'da berildi") : "Va'da berildi", 'done');
        localStorage.setItem('mvow.vowGiven', '1');
        localStorage.setItem('mvow.vowAt', new Date().toISOString());
        if (window.MVOW_DATA) MVOW_DATA.fxSuccess();
      } else {
        setStatus("Eshitilmadi — yana urinib ko'r", 'done');
      }
    }

    async function toggle() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setStatus("Brauzer mikrofonni qo'llamaydi", 'done');
        return;
      }
      if (recording) stopRecording();
      else await startRecording();
    }

    mic.addEventListener('click', toggle);
    mic.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); }
    });
  });
</script>

</body>
</html>
