<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title data-i18n="vada.page_title">{brand} — Va'da</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png?v=2">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png?v=2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" media="print" onload="this.media='all'"><noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"></noscript>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --void:#04060B; --void-soft:#0C0F16;
    --text:#F5F2EC; --text-mid:#B8BBC2; --text-dim:#9CA0A8;
    
    --stamp:#FF4757;
  }
  html, body {
    background: var(--void); color: var(--text);
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 540px;
    margin: 0 auto;
    padding: 80px 28px 140px;
    min-height: 100vh;
    display: flex; flex-direction: column;
    justify-content: center;
    position: relative; z-index: 1;
  }

  /* ===== VA'DA MAROSIMI — sahna (ambient nur + uchqunlar) ===== */
  .fx-stage {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none; overflow: hidden;
  }
  .aura {
    position: absolute; left: 50%; top: 42%;
    width: 130vmin; height: 130vmin;
    transform: translate(-50%,-50%);
    background: radial-gradient(circle,
      rgba(244,132,95,.13) 0%,
      rgba(108,92,231,.07) 38%,
      transparent 65%);
    opacity: .75;
  }
  #emberCanvas { position: absolute; inset: 0; width: 100%; height: 100%; }

  /* Muhrlash oni — yorug'lik chaqnashi va to'lqin halqalari */
  .flash {
    position: fixed; inset: 0; z-index: 8; pointer-events: none; opacity: 0;
    background: radial-gradient(circle at 50% 45%,
      rgba(247,155,127,.55), rgba(108,92,231,.18) 45%, transparent 70%);
  }
  .pulse-ring {
    position: fixed; left: 50%; top: 45%; z-index: 7;
    width: 120px; height: 120px; margin: -60px 0 0 -60px;
    border: 2px solid rgba(247,155,127,.8);
    border-radius: 50%; opacity: 0; pointer-events: none;
  }
  .pulse-ring.p2 { border-color: rgba(108,92,231,.6); }

  /* Muhr nuri (stamp orqasida) va imzo chizig'i */
  .seal-glow {
    position: absolute; left: 50%; top: 50%;
    width: 260px; height: 260px;
    transform: translate(-50%,-50%) scale(1);
    background: radial-gradient(circle,
      rgba(244,132,95,.32), rgba(108,92,231,.12) 45%, transparent 70%);
    border-radius: 50%; opacity: .6; pointer-events: none;
  }
  .sig-line {
    width: 120px; height: 2px; margin: -22px auto 30px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    transform: scaleX(1);
  }

  @media (prefers-reduced-motion: no-preference) {
    .aura { animation: auraBreathe 7s ease-in-out infinite; }
    @keyframes auraBreathe {
      0%,100% { transform: translate(-50%,-50%) scale(1);    opacity: .6;  }
      50%     { transform: translate(-50%,-50%) scale(1.12); opacity: .95; }
    }
    /* Tantanali kirish — so'z, keyin tugma ko'tariladi */
    .ask .question  { animation: riseIn .9s cubic-bezier(.16,.84,.32,1) .05s both; }
    .ask .yes-btn   { animation: riseIn .8s cubic-bezier(.16,.84,.32,1) .35s both; }
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(26px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    body.sealed .flash { animation: flashOut .9s ease-out forwards; }
    @keyframes flashOut { 0% { opacity: 0; } 12% { opacity: 1; } 100% { opacity: 0; } }
    .pulse-ring.go { animation: ringOut 1s cubic-bezier(.16,.84,.32,1) forwards; }
    .pulse-ring.p2.go { animation-duration: 1.35s; animation-delay: .12s; }
    @keyframes ringOut {
      0%   { transform: scale(.3);  opacity: .9; }
      100% { transform: scale(3.4); opacity: 0; }
    }
    .seal-glow { opacity: 0; transform: translate(-50%,-50%) scale(.4); }
    .confirmed.show .seal-glow { animation: glowIn 1.4s ease .25s forwards; }
    @keyframes glowIn {
      0%   { opacity: 0;   transform: translate(-50%,-50%) scale(.4); }
      45%  { opacity: 1; }
      100% { opacity: .75; transform: translate(-50%,-50%) scale(1); }
    }
    .sig-line { transform: scaleX(0); }
    .confirmed.show .sig-line { animation: sigDraw .8s cubic-bezier(.16,.84,.32,1) 1.25s forwards; }
    @keyframes sigDraw { to { transform: scaleX(1); } }
  }
  @media (prefers-reduced-motion: reduce) {
    .question { animation: none; }
    .stamp { animation: none; transform: rotate(-12deg) scale(1); opacity: 1; }
    .quote { animation: none; opacity: 1; }
    .confirmed.show { animation: none; }
  }

  .ask { transition: opacity .4s, transform .4s; }
  .ask.gone { opacity: 0; transform: translateY(-20px); pointer-events: none; }
  .question {
    font-family: 'Inter', sans-serif;
    font-style: normal;
    font-weight: 600;
    font-size: clamp(40px, 11vw, 56px);
    line-height: 1.22;
    text-align: center;
    margin-bottom: 50px;
    padding: 0 8px;
    background: linear-gradient(120deg, var(--accent-bright), var(--accent), var(--accent-deep));
    background-size: 220% auto;
    animation: dwShimmer 7s ease-in-out infinite;
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
  }
  .question .em {
    color: var(--accent);
    font-style: normal;
    font-weight: 600;
  }
  .yes-btn {
    display: block;
    width: 100%;
    max-width: 380px;
    margin: 0 auto;
    padding: 18px;
    background: linear-gradient(135deg, #F4845F, #C2410C);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 19px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    border: none;
    border-radius: 999px;
    cursor: pointer;
    transition: transform .15s, box-shadow .25s;
    box-shadow: 0 10px 30px var(--accent-strong);
    min-height: 62px;
  }
  .yes-btn:hover { box-shadow: 0 14px 40px var(--accent-strong); }
  .yes-btn:active { transform: scale(0.97); }

  .confirmed { display: none; text-align: center; }
  .confirmed.show {
    display: block;
    animation: revealIn 0.6s cubic-bezier(.16,.84,.32,1);
  }
  @keyframes revealIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .stamp-wrap {
    position: relative;
    display: flex; justify-content: center;
    margin-bottom: 36px;
    perspective: 600px;
  }
  .stamp {
    border: 4px solid var(--stamp);
    border-radius: 14px;
    padding: 16px 32px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 38px;
    color: var(--stamp);
    letter-spacing: 6px;
    text-transform: uppercase;
    transform: rotate(-12deg) scale(0);
    opacity: 0;
    box-shadow: inset 0 0 0 2px rgba(255,71,87,.4);
    text-shadow: 0 0 8px rgba(255,71,87,.25);
    animation: stampDown 0.6s cubic-bezier(.34,1.56,.64,1) 0.2s forwards;
    white-space: nowrap;
  }
  @keyframes stampDown {
    0%   { transform: rotate(-12deg) scale(2.5); opacity: 0; }
    60%  { transform: rotate(-12deg) scale(0.85); opacity: 1; }
    100% { transform: rotate(-12deg) scale(1); opacity: 1; }
  }

  .quote {
    font-family: 'Inter', sans-serif;
    font-style: normal;
    font-weight: 700;
    font-size: 28px;
    color: var(--text);
    line-height: 1.6;
    text-align: center;
    padding: 24px 12px;
    border-top: 1px solid rgba(244, 132, 95,.15);
    border-bottom: 1px solid rgba(244, 132, 95,.15);
    margin: 0 auto 36px;
    max-width: 460px;
    opacity: 0;
    animation: revealIn 0.5s ease 0.7s forwards;
  }
  .quote .em { color: var(--accent); font-style: normal; font-weight: 800; }

  .bottom {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 18px 28px env(safe-area-inset-bottom, 22px);
    background: linear-gradient(180deg, transparent, var(--void) 40%);
    z-index: 5;
    opacity: 0;
    pointer-events: none;
    transition: opacity .4s;
  }
  .bottom.show { opacity: 1; pointer-events: auto; }
  .cta {
    display: block;
    width: 100%;
    max-width: 440px;
    margin: 0 auto;
    padding: 16px;
    background: linear-gradient(180deg, var(--accent), var(--accent-soft));
    color: var(--void);
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: none;
    border-radius: 999px;
    text-align: center;
    text-decoration: none;
    cursor: pointer;
    min-height: 52px;
  }
</style>
<link rel="stylesheet" href="theme.css">
  <script>(function(){try{var t=localStorage.getItem('mvow.theme');document.documentElement.setAttribute('data-theme',t==='dark'?'dark':'light');}catch(e){}})();</script>
</head>
<body>

<div class="fx-stage" aria-hidden="true">
  <div class="aura"></div>
  <canvas id="emberCanvas"></canvas>
</div>
<div class="flash" id="sealFlash" aria-hidden="true"></div>

<div class="wrap">

  <div class="ask" id="askBlock">
    <h1 class="question">
      <span class="em" data-i18n="vada.question_em1">Intizomli</span> <span data-i18n="vada.question_mid">bo'lishga,</span><br>
      <span class="em" data-i18n="vada.question_em2">rejangizga sodiq</span> <span data-i18n="vada.question_end">qolishga</span><br>
      <span data-i18n="vada.question_q">va'da berasizmi?</span>
    </h1>
    <button class="yes-btn" id="yesBtn" type="button" data-i18n="vada.btn_vow">Va'da beraman</button>
  </div>

  <div class="confirmed" id="confirmedBlock">
    <div class="stamp-wrap">
      <div class="seal-glow" aria-hidden="true"></div>
      <div class="stamp" data-i18n="vada.stamp">Tasdiqlandi</div>
    </div>
    <p class="quote">
      <span data-i18n="vada.quote_a">Tartibga amal qilish —</span><br>
      <span class="em" data-i18n="vada.quote_em">o'zini hurmat qilish</span><span data-i18n="vada.quote_b">likdir.</span>
    </p>
    <div class="sig-line" aria-hidden="true"></div>
    <a href="#" id="rereadVow" style="display:inline-block;margin-top:14px;color:var(--text-dim,#9CA0A8);font-size:14px;text-decoration:underline;" data-i18n="vada.reread">Va'dani qayta o'qish</a>
  </div>

</div>

<div class="bottom" id="bottomBar">
  <a class="cta" href="maqsadlar.html" data-i18n="vada.cta">Davom</a>
</div>

<script src="i18n.js?v=28.4.0"></script>
<script src="lang-switcher.js?v=28.4.0" defer></script>
<script src="focus-indicator.js?v=28.4.0" defer></script>
<script src="data.js?v=28.4.0" defer></script>
<script src="nav-overlay.js?v=28.4.0" defer></script>
<script>
  const yesBtn = document.getElementById('yesBtn');
  const askBlock = document.getElementById('askBlock');
  document.addEventListener('click', function (e) {
    if (e.target && e.target.id === 'rereadVow') {
      e.preventDefault();
      askBlock.classList.remove('gone');
      var yb = document.getElementById('yesBtn'); if (yb) yb.style.display = 'none';   // allaqachon berilgan
      e.target.style.display = 'none';
    }
  });
  const confirmedBlock = document.getElementById('confirmedBlock');
  const bottomBar = document.getElementById('bottomBar');

  yesBtn.addEventListener('click', () => {
    localStorage.setItem('mvow.vowGiven', '1');
    localStorage.setItem('mvow.vowAt', new Date().toISOString());
    if (window.MVOW_DATA && MVOW_DATA.fxSuccess) MVOW_DATA.fxSuccess();

    askBlock.classList.add('gone');
    setTimeout(() => {
      confirmedBlock.classList.add('show');
      setTimeout(() => { bottomBar.classList.add('show'); }, 1100);
    }, 300);
  });

  // Onboarding oqimida (anketadan kelganda) va'da MAROSIMI har doim ko'rsatiladi.
  // Faqat keyin (menyudan qayta kirilganda) allaqachon berilgan bo'lsa darrov tasdiq.
  var _fromAnketa = /anketa\.html/.test(document.referrer || '');
  if (!_fromAnketa && localStorage.getItem('mvow.vowGiven') === '1') {
    askBlock.classList.add('gone');
    confirmedBlock.classList.add('show');
    bottomBar.classList.add('show');
  }
</script>

<script>
  /* ===== VA'DA MAROSIMI — nur zarralari (canvas) + muhrlash chaqnashi ===== */
  (function () {
    var motionOK = !(window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches);
    var cv = document.getElementById('emberCanvas');
    var ctx = cv ? cv.getContext('2d') : null;
    var parts = [], raf = 0, W = 0, H = 0, DPR = 1;

    function resize() {
      if (!cv) return;
      DPR = Math.min(window.devicePixelRatio || 1, 2);
      W = window.innerWidth; H = window.innerHeight;
      cv.width = Math.round(W * DPR); cv.height = Math.round(H * DPR);
      if (ctx) ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }

    function mote() {
      var warm = Math.random() < 0.72;
      return {
        kind: 'mote',
        x: Math.random() * W,
        y: H * (0.3 + Math.random() * 0.8),
        r: 0.8 + Math.random() * 1.5,
        vx: (Math.random() - 0.5) * 0.08,
        vy: -(0.06 + Math.random() * 0.18),
        a: 0,
        aMax: 0.25 + Math.random() * 0.4,
        phase: Math.random() * Math.PI * 2,
        col: warm ? '244,132,95' : '124,108,240'
      };
    }

    function seed() {
      parts = [];
      var n = W < 420 ? 16 : 24;
      for (var i = 0; i < n; i++) parts.push(mote());
    }

    function burst() {
      var cx = W / 2, cy = H * 0.45;
      for (var i = 0; i < 54; i++) {
        var ang = Math.random() * Math.PI * 2;
        var sp = 1.2 + Math.random() * 4.2;
        var warm = Math.random() < 0.78;
        parts.push({
          kind: 'burst',
          x: cx, y: cy,
          r: 1 + Math.random() * 2.2,
          vx: Math.cos(ang) * sp,
          vy: Math.sin(ang) * sp - 1.1,
          a: 0.9,
          decay: 0.012 + Math.random() * 0.016,
          col: warm ? '247,155,127' : '124,108,240'
        });
      }
    }

    function tick() {
      raf = 0;
      if (!ctx) return;
      ctx.clearRect(0, 0, W, H);
      for (var i = parts.length - 1; i >= 0; i--) {
        var p = parts[i];
        p.x += p.vx; p.y += p.vy;
        if (p.kind === 'mote') {
          p.phase += 0.015;
          p.a = p.aMax * (0.55 + 0.45 * Math.sin(p.phase));
          if (p.y < -8) { parts[i] = mote(); parts[i].y = H + 6; continue; }
        } else {
          p.vx *= 0.985; p.vy = p.vy * 0.985 - 0.012;   // sekinlashadi, yuqoriga suzadi
          p.a -= p.decay;
          if (p.a <= 0) { parts.splice(i, 1); continue; }
        }
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(' + p.col + ',' + p.a.toFixed(3) + ')';
        ctx.fill();
      }
      if (!document.hidden && parts.length) raf = requestAnimationFrame(tick);
    }

    function start() { if (!raf && motionOK && ctx) raf = requestAnimationFrame(tick); }

    if (motionOK && ctx) {
      resize(); seed(); start();
      window.addEventListener('resize', function () { resize(); seed(); });
      document.addEventListener('visibilitychange', function () {
        if (document.hidden) { if (raf) cancelAnimationFrame(raf); raf = 0; }
        else start();
      });
    } else if (cv) {
      cv.style.display = 'none';
    }

    /* Muhrlash oni: chaqnash + halqa to'lqinlari + uchqun portlashi + haptika */
    var yb = document.getElementById('yesBtn');
    if (yb) yb.addEventListener('click', function () {
      if (navigator.vibrate) { try { navigator.vibrate([16, 40, 28]); } catch (e) {} }
      if (!motionOK) return;
      document.body.classList.add('sealed');
      ['', 'p2'].forEach(function (extra) {
        var r = document.createElement('div');
        r.className = 'pulse-ring' + (extra ? ' ' + extra : '');
        r.setAttribute('aria-hidden', 'true');
        document.body.appendChild(r);
        requestAnimationFrame(function () { r.classList.add('go'); });
        setTimeout(function () { if (r.parentNode) r.parentNode.removeChild(r); }, 1700);
      });
      burst(); start();
    });
  })();
</script>

<script src="back-btn.js?v=29.0.133"></script>
  <script src="motion-fx.js?v=29.0.118" defer></script>
</body>
</html>
