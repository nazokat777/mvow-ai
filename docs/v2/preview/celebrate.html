<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title data-i18n="celebrate.page_title">{brand} — Bayram</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png?v=2">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png?v=2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --void:#04060B; --text:#F5F2EC; --text-mid:#B8BBC2; --text-dim:#9CA0A8; }
  body { background: var(--void); font-family:'Inter',sans-serif; color: var(--text); min-height: 100vh; display:flex; justify-content:center; align-items:flex-start; padding: 24px; -webkit-font-smoothing: antialiased; }
  .phone { width: 380px; min-height: 800px; background: var(--void); border-radius: 40px; overflow: hidden; position: relative; box-shadow: 0 0 0 8px #1a1d24, 0 30px 80px rgba(0,0,0,.7); display:flex; flex-direction:column; }
  .container { flex:1; padding: 80px 32px 120px; display:flex; flex-direction:column; gap: 48px; }

  .stamp { text-align:center; font-size: 14px; letter-spacing: 4px; color: var(--text-dim); text-transform: uppercase; }

  .hero { text-align:center; }
  .hero .big {
    font-family:'Inter',sans-serif;
    font-weight: 600;
    font-size: clamp(64px, 20vw, 88px);
    background: linear-gradient(120deg, var(--accent-bright), var(--accent), var(--accent-deep));
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
    letter-spacing: 2px;
    line-height: 1;
    margin-bottom: 12px;
  }
  .hero .sub { font-family:'Inter',sans-serif; font-style:normal; font-size: 20px; color: var(--text-mid); }
  .hero { position: relative; } /* anchor for milestoneMark overlay so injected DOM is contained, not pushed into page flow */
  .hero .big { position: relative; z-index: 1; } /* keep the +70% numeral above any mark overlay */
  @media (prefers-reduced-motion: reduce) { .hero [data-milestone-mark] { animation: none !important; opacity: 1 !important; } }

  .chains {
    display:flex; flex-direction: column; gap: 0;
  }
  .chain {
    display:grid;
    grid-template-columns: 1fr auto;
    align-items: baseline;
    padding: 16px 0;
    border-bottom: 1px solid rgba(255,255,255,.04);
  }
  .chain .name { font-size: 18px; color: var(--text); }
  .chain .days { font-size: 17px; color: var(--accent); letter-spacing: 1px; }
  .chain .days .em { font-family:'Inter',sans-serif; font-size: 26px; font-weight: 500; }

  .bottom-bar { padding: 24px 32px env(safe-area-inset-bottom, 24px); background: linear-gradient(180deg, transparent, var(--void) 30%); }
  .cta { display:block; width:100%; padding:16px; background: linear-gradient(180deg, var(--accent), var(--accent-soft)); color: #fff; font-size:17px; font-weight:600; letter-spacing:2px; text-transform: uppercase; border:none; border-radius:6px; text-align:center; text-decoration:none; }
  @media (max-width: 480px) { body { padding: 0; } .phone { width: 100vw; min-height: 100vh; border-radius: 0; box-shadow: none; } }
</style>
<link rel="stylesheet" href="theme.css">
<link rel="stylesheet" href="motion.css">
<script src="motion.js" defer></script>
</head>
<body>

<div class="phone">
  <div class="container">

    <div class="stamp" id="celStamp">7 kun · tugadi</div>

    <div class="hero">
      <div class="big">+70%</div>
      <div class="sub" data-i18n="celebrate.sub">oldingi sizdan kuchliroqsiz</div>
    </div>

    <div class="chains" id="chains"></div>

  </div>

  <div class="bottom-bar">
    <a class="cta" href="home.html" data-i18n="celebrate.cta">Keyingi hafta</a>
  </div>
</div>

<script src="i18n.js?v=28.4.0"></script>
<script src="lang-switcher.js?v=28.4.0" defer></script>
<script src="focus-indicator.js?v=28.4.0" defer></script>
<script src="data.js?v=28.4.0" defer></script>
<script src="nav-overlay.js?v=28.4.0" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    if (!window.MVOW_DATA) return;
    const list = document.getElementById('chains');
    const daysUnit = (window.I18N ? I18N.t('celebrate.days_unit', 'kun') : 'kun');
    const hoursUnit = (window.I18N ? I18N.t('celebrate.hours_unit', 'soat') : 'soat');
    const _hist = (MVOW_DATA.getHistory ? MVOW_DATA.getHistory() : []);
    const _esc = s => String(s || '').replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
    const _daysAgo = iso => { if (!iso) return 999; const d = new Date(iso + 'T00:00:00'); const t = new Date(); t.setHours(0, 0, 0, 0); return Math.round((t - d) / 86400000); };
    // Hero %: shu hafta vs o'tgan hafta (haqiqiy tarix)
    let _thisWk = 0, _lastWk = 0; const _wkDays = {};
    _hist.forEach(h => { const a = _daysAgo(h.dateIso), m = h.actualMins || 0; if (a >= 0 && a < 7) { _thisWk += m; _wkDays[h.dateIso] = 1; } else if (a >= 7 && a < 14) { _lastWk += m; } });
    const _pct = _lastWk > 0 ? Math.round((_thisWk - _lastWk) / _lastWk * 100) : (_thisWk > 0 ? 100 : 0);
    const _big = document.querySelector('.hero .big'); if (_big) _big.textContent = (_pct >= 0 ? '+' : '') + _pct + '%';
    const _stamp = document.getElementById('celStamp');
    if (_stamp) _stamp.textContent = Object.keys(_wkDays).length + ' ' + daysUnit + ' · ' + Math.round(_thisWk / 60) + ' ' + hoursUnit;
    // Breakdown: haqiqiy tarixdan, maqsad bo'yicha
    const _byName = {};
    _hist.forEach(h => { const n = h.name || ''; if (!n) return; if (!_byName[n]) _byName[n] = { d: {}, m: 0 }; _byName[n].d[h.dateIso] = 1; _byName[n].m += (h.actualMins || 0); });
    const _rows = Object.keys(_byName).map(n => ({ name: n, days: Object.keys(_byName[n].d).length, hours: Math.round(_byName[n].m / 60) })).sort((a, b) => b.days - a.days);
    if (_rows.length) {
      list.innerHTML = _rows.map(c => `
      <div class="chain">
        <span class="name">${_esc(c.name)}</span>
        <span class="days"><span class="em">${c.days}</span> ${daysUnit} · <span class="em">${c.hours}</span> ${hoursUnit}</span>
      </div>`).join('');
    } else {
      list.innerHTML = `<div style="text-align:center;color:var(--text-dim);padding:22px 8px;font-size:15px;line-height:1.5;">${(window.I18N ? I18N.t('celebrate.empty', "Hali natija yo'q — birinchi fokus sessiyangizni boshlang!") : "Hali natija yo'q — boshlang!")}</div>`;
    }

    // --- Motion: milestoneMark on the hero number, gated by streak ---
    try {
      if (window.MVOW_MOTION && typeof MVOW_MOTION.milestoneMark === 'function') {
        const _streak = parseInt(localStorage.getItem('mvow.streak') || '0', 10) || 0;
        const hero = document.querySelector('.hero .big');
        if (hero && _streak >= 7) {
          hero.setAttribute('data-milestone-mark', '');
          MVOW_MOTION.milestoneMark(hero, { streak: _streak });
        }
      }
    } catch (e) { /* motion is non-critical; never block celebrate render */ }
  });
</script>

<script src="back-btn.js?v=28.4.0"></script>
</body>
</html>
