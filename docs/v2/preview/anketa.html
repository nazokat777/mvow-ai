<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title data-i18n="anketa.page_title">{brand} — Tanishuv</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FOCUS AI">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png?v=2">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png?v=2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --void:#04060B; --void-soft:#0C0F16;
    --text:#F5F2EC; --text-mid:#B8BBC2; --text-dim:#9CA0A8;
    
    --card:#11151E;
  }
  html, body {
    background: var(--void);
    color: var(--text);
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* Top progress bar */
  .top {
    position: sticky;
    top: 0;
    z-index: 5;
    background: var(--void);
    padding: 26px 28px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .progress {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,.06);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width .35s cubic-bezier(.16,.84,.32,1);
    border-radius: 2px;
  }
  .counter {
    font-size: 16px;
    color: var(--text-mid);
    letter-spacing: 1px;
    font-feature-settings: "tnum";
    min-width: 32px;
    text-align: right;
  }

  /* Container */
  .wrap {
    max-width: 600px;
    margin: 0 auto;
    padding: 8px 28px 140px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  #step { margin: auto 0; width: 100%; }

  .section-lbl {
    font-size: 16px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 16px;
    margin-top: 16px;
  }

  .question {
    font-family: 'Inter', sans-serif;
    font-style: normal;
    font-weight: 600;
    font-size: clamp(44px, 13vw, 62px);
    line-height: 1.1;
    margin-bottom: 32px;
    background: linear-gradient(120deg, var(--accent-bright), var(--accent), var(--accent-deep));
    background-size: 220% auto;
    animation: dwShimmer 7s ease-in-out infinite;
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
  }

  /* Text input */
  .text-input {
    width: 100%;
    background: var(--card);
    border: 2px solid var(--accent);
    border-radius: 16px;
    color: var(--text);
    padding: 20px 22px;
    font-family: 'Inter', sans-serif;
    font-size: 22px;
    outline: none;
    transition: border-color .15s, box-shadow .2s;
    box-shadow: 0 10px 34px var(--accent-soft);
  }
  .text-input:focus { box-shadow: 0 10px 40px var(--accent-medium); }
  .text-input::placeholder { color: var(--text-dim); }

  /* Choice cards */
  .choices {
    display: flex; flex-direction: column;
    gap: 12px;
  }
  /* Har kartaga o'z rangi (rasmga mos: teal/amber/to'q sariq/pushti/binafsha) */
  .choices .choice { --c: 244,132,95; }
  .choices .choice:nth-child(2) { --c: 107,191,122; }
  .choices .choice:nth-child(3) { --c: 232,130,180; }
  .choices .choice:nth-child(4) { --c: 110,181,255; }
  .choices .choice:nth-child(5) { --c: 244,132,95; }
  .choices .choice:nth-child(6) { --c: 107,191,122; }
  .choice {
    display: flex;
    align-items: stretch;
    border-radius: 999px;          /* KAPSULA shakl */
    overflow: hidden;
    min-height: 84px;
    cursor: pointer;
    position: relative;
    box-shadow: 0 12px 26px rgba(0,0,0,.45);
    transition: transform .4s cubic-bezier(.2,.9,.25,1.25), box-shadow .35s ease;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  /* CHAP — OQ zona + ikonka (rasmdagidek) */
  .ch-cap {
    width: 76px; flex-shrink: 0;
    background: linear-gradient(180deg, #ffffff, #eceef0);
    display: flex; align-items: center; justify-content: center;
  }
  .ch-ico {
    width: 40px; height: 40px; border-radius: 50%;
    background: #fff;
    box-shadow: 0 2px 7px rgba(0,0,0,.18);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; line-height: 1;
  }
  /* O'NG — rangli tana + KATTA oq raqam */
  .ch-body {
    flex: 1; min-width: 0;
    display: flex; align-items: center; gap: 16px;
    padding: 10px 24px 10px 18px;
    background: linear-gradient(180deg, rgba(var(--c),1), rgba(var(--c),.80));
    color: #fff;
  }
  .ch-num { display: none; }
  .ch-label { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .ch-head { font-size: 20px; font-weight: 700; line-height: 1.2; color: #fff; }
  .ch-desc { font-size: 16px; font-weight: 500; line-height: 1.3; color: rgba(255,255,255,.82); }
  .choice:hover { transform: translateY(-3px) scale(1.015); }
  .choice:active { transform: scale(0.98); }
  .choice.on {
    box-shadow: 0 18px 44px rgba(var(--c),.55);
    transform: translateY(-5px) scale(1.04);
  }
  .choice.on::after {
    content: ''; position: absolute; inset: 0; border-radius: 999px;
    box-shadow: inset 0 0 0 3px rgba(255,255,255,.65);
    pointer-events: none;
  }
  .choice.on .ch-num { transform: scale(1.08); }

  .footer-note {
    margin-top: 28px;
    text-align: center;
    font-size: 16px;
    color: var(--text-dim);
    line-height: 1.6;
    padding: 0 12px;
  }

  /* Bottom nav */
  .bottom {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 20px 28px env(safe-area-inset-bottom, 24px);
    background: linear-gradient(180deg, transparent, var(--void) 40%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    z-index: 10;
  }
  .back-link {
    background: transparent;
    border: none;
    color: var(--text-mid);
    font-family: 'Inter', sans-serif;
    font-size: 18px;
    cursor: pointer;
    padding: 14px 8px;
    min-height: 44px;
  }
  .back-link.hidden { visibility: hidden; pointer-events: none; }
  .next-btn {
    background: linear-gradient(135deg, #F4845F, #C2410C);
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 14px 32px;
    font-family: 'Inter', sans-serif;
    font-size: 19px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .15s, transform .12s;
    min-height: 48px;
    min-width: 120px;
  }
  .next-btn:active { transform: scale(0.96); }
  .next-btn.disabled { opacity: 0.35; pointer-events: none; }

  /* Animations between steps */
  .step {
    animation: stepIn .35s cubic-bezier(.16,.84,.32,1);
  }
  @keyframes stepIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Done page */
  .done {
    display: none;
    text-align: center;
    padding: 80px 28px 40px;
  }
  .done.show { display: block; }
  .done .check {
    width: 72px; height: 72px;
    margin: 0 auto 24px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    position: relative;
    animation: stepIn .5s cubic-bezier(0.16,0.84,0.32,1);
  }
  .done .check svg { width: 36px; height: 36px; stroke: var(--accent); }
  /* Belgi o'zini chizadi (premium micro-moment) */
  .done .check-path { stroke-dasharray: 30; stroke-dashoffset: 30; }
  .done.show .check-path { animation: doneDraw .45s cubic-bezier(0.16,0.84,0.32,1) .35s forwards; }
  @keyframes doneDraw { to { stroke-dashoffset: 0; } }
  /* Bir martalik tasdiq pulse halqasi */
  .done.show .check::after {
    content: ''; position: absolute; inset: -2px; border-radius: 50%;
    border: 2px solid var(--accent);
    animation: doneRing .95s cubic-bezier(0.16,0.84,0.32,1) .3s both;
  }
  @keyframes doneRing { from { transform: scale(1); opacity: .55; } to { transform: scale(1.7); opacity: 0; } }
  /* Shaxsiy ostki matn — yumshoq paydo bo'ladi */
  .done .sub { opacity: 0; transform: translateY(8px); }
  .done.show .sub { animation: doneSubIn .5s cubic-bezier(0.16,0.84,0.32,1) .85s both; }
  @keyframes doneSubIn { to { opacity: 1; transform: none; } }
  .done .sub .em { color: var(--accent-bright, var(--accent)); font-weight: 700; }
  @media (prefers-reduced-motion: reduce) {
    .done.show .check::after, .done.show .check-path, .done.show .sub { animation: none !important; }
    .done .check-path { stroke-dashoffset: 0; }
    .done .sub { opacity: 1; transform: none; }
  }
  .done .title {
    font-family: 'Inter', sans-serif;
    font-style: normal;
    font-weight: 600;
    font-size: clamp(38px, 11vw, 52px);
    margin-bottom: 12px;
    background: linear-gradient(120deg, var(--accent-bright), var(--accent), var(--accent-deep));
    background-size: 220% auto;
    animation: dwShimmer 7s ease-in-out infinite;
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
  }
  .done .sub {
    font-size: 18px;
    color: var(--text-mid);
    margin-bottom: 36px;
    line-height: 1.6;
  }
</style>
<link rel="stylesheet" href="theme.css">
</head>
<body>

<div class="top">
  <div class="progress"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
  <div class="counter" id="counter">1 / 8</div>
</div>

<div class="wrap">
  <div id="step"></div>

  <div class="done" id="doneScreen">
    <div class="check">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline class="check-path" points="5 12 10 17 19 8"/>
      </svg>
    </div>
    <div class="title" data-i18n="anketa.done_title">Tayyor</div>
    <div class="sub" id="doneSub"></div>
  </div>
</div>

<div class="bottom" id="bottomNav">
  <button class="back-link" id="backBtn"><span aria-hidden="true">← </span><span data-i18n="common.back">Orqaga</span></button>
  <button class="next-btn disabled" id="nextBtn" data-i18n="common.next">Keyingi</button>
</div>

<script src="i18n.js?v=28.4.0"></script>
<script src="lang-switcher.js?v=28.4.0" defer></script>
<script src="focus-indicator.js?v=28.4.0" defer></script>
<script>
  // ── i18n helper ──
  const T = (k, def) => (window.I18N ? window.I18N.t(k, def) : def);

  // Variant ikonkalari (rasmdagidek — oq doiraga)
  const OPT_ICONS = {
    '<18':'🎒','18-24':'🔥','25-34':'🚀','35-44':'🏔️','45+':'🦉',
    'm':'👨','f':'👩','x':'🙂',
    'study':'📚','mental':'🧠','phys':'💪','lead':'👑','other':'✨',
    'dawn':'🌅','morning':'☀️','noon':'🌤️','evening':'🌆','night':'🌙',
    'phone':'📱','noise':'🔊','tired':'😴','thought':'💭','mixed':'🌀',
    'student':'🎓','parent':'👶','worker':'💼','freelancer':'🕊️','searching':'🧭'
  };

  // ── 8 ta savol (titles/labels/notes T(...) orqali tarjima qilinadi) ──
  const QUESTIONS = [
    {
      id: 'name',
      type: 'text',
      titleKey: 'anketa.q_name_title',
      titleDef: 'Ismingiz nima?',
      placeholderKey: 'anketa.q_name_ph',
      placeholderDef: 'Ism',
      maxlen: 24,
      validate: v => v.trim().length >= 2,
    },
    {
      id: 'age',
      type: 'choice',
      titleKey: 'anketa.q_age_title',
      titleDef: 'Yoshingiz nechada?',
      options: [
        { v: '<18',   labelKey: 'anketa.age_under18', labelDef: '18 dan kichik' },
        { v: '18-24', labelKey: 'anketa.age_18_24',   labelDef: '18–24' },
        { v: '25-34', labelKey: 'anketa.age_25_34',   labelDef: '25–34' },
        { v: '35-44', labelKey: 'anketa.age_35_44',   labelDef: '35–44' },
        { v: '45+',   labelKey: 'anketa.age_45plus',  labelDef: '45+' }
      ],
      // izoh olib tashlandi
    },
    {
      id: 'gender',
      type: 'choice',
      titleKey: 'anketa.q_gender_title',
      titleDef: 'Jinsingiz?',
      options: [
        { v: 'm', labelKey: 'anketa.gender_m', labelDef: 'Erkak' },
        { v: 'f', labelKey: 'anketa.gender_f', labelDef: 'Ayol' },
        { v: 'x', labelKey: 'anketa.gender_x', labelDef: 'Aytmayman' }
      ]
    },
    {
      id: 'job',
      type: 'choice',
      titleKey: 'anketa.q_job_title',
      titleDef: "Asosan nima bilan shug'ullanasiz?",
      options: [
        { v: 'study',  labelKey: 'anketa.job_study',  labelDef: "O'qiyman", descDef: 'dars va kitob' },
        { v: 'mental', labelKey: 'anketa.job_mental', labelDef: 'Aqliy mehnat', descDef: 'miya bilan' },
        { v: 'phys',   labelKey: 'anketa.job_phys',   labelDef: 'Jismoniy mehnat', descDef: 'tana bilan' },
        { v: 'lead',   labelKey: 'anketa.job_lead',   labelDef: 'Rahbarlik', descDef: 'jamoa boshqaruvi' },
        { v: 'other',  labelKey: 'anketa.job_other',  labelDef: 'Boshqa', descDef: "boshqa yo'nalish" }
      ]
    },
    {
      id: 'focus_time',
      type: 'choice',
      titleKey: 'anketa.q_focus_title',
      titleDef: "Qachon eng yaxshi fokusda bo'lasiz?",
      options: [
        { v: 'dawn',    labelKey: 'anketa.focus_dawn',    labelDef: 'Erta tong (5–8)' },
        { v: 'morning', labelKey: 'anketa.focus_morning', labelDef: 'Ertalab (8–12)' },
        { v: 'noon',    labelKey: 'anketa.focus_noon',    labelDef: 'Tushlikdan keyin (13–17)' },
        { v: 'evening', labelKey: 'anketa.focus_evening', labelDef: 'Kechqurun (17–21)' },
        { v: 'night',   labelKey: 'anketa.focus_night',   labelDef: 'Tunda (21+)' }
      ]
    },
    {
      id: 'distract',
      type: 'choice',
      titleKey: 'anketa.q_distract_title',
      titleDef: "Diqqatingiz qaerda chalg'iydi?",
      options: [
        { v: 'phone',   labelKey: 'anketa.distract_phone',   labelDef: 'Telefon · ilovalar' },
        { v: 'noise',   labelKey: 'anketa.distract_noise',   labelDef: 'Atrofdagi shovqin' },
        { v: 'tired',   labelKey: 'anketa.distract_tired',   labelDef: 'Charchoq' },
        { v: 'thought', labelKey: 'anketa.distract_thought', labelDef: 'Boshqa fikrlar' },
        { v: 'mixed',   labelKey: 'anketa.distract_mixed',   labelDef: 'Hammasi' }
      ]
    },
    {
      id: 'situation',
      type: 'choice',
      titleKey: 'anketa.q_situation_title',
      titleDef: 'Holatingiz qanday?',
      noteKey: 'anketa.q_situation_note',
      noteDef: 'Vaqt va energiyangizga moslashtirish uchun',
      options: [
        { v: 'student',     labelKey: 'anketa.sit_student',    labelDef: "Talaba — darslar ko'p" },
        { v: 'parent',      labelKey: 'anketa.sit_parent',     labelDef: 'Ota-ona — bola bilan band' },
        { v: 'worker',      labelKey: 'anketa.sit_worker',     labelDef: 'Ishlayman — 8 soatlik ish' },
        { v: 'freelancer',  labelKey: 'anketa.sit_freelancer', labelDef: "Erkin grafik — o'zim belgilayman" },
        { v: 'searching',   labelKey: 'anketa.sit_searching',  labelDef: "Yo'lda — yangi yo'nalish izlayman" }
      ]
    },
    {
      id: 'energy_peak',
      type: 'choice',
      titleKey: 'anketa.q_energy_title',
      titleDef: 'Energiyangiz qachon eng yuqori?',
      noteKey: 'anketa.q_energy_note',
      noteDef: "Murakkab vazifalar shu vaqtga qo'yiladi",
      options: [
        { v: 'dawn',    labelKey: 'anketa.energy_dawn',    labelDef: 'Erta tong (4–8)' },
        { v: 'morning', labelKey: 'anketa.energy_morning', labelDef: 'Ertalab (8–12)' },
        { v: 'noon',    labelKey: 'anketa.energy_noon',    labelDef: 'Tushdan keyin (12–17)' },
        { v: 'evening', labelKey: 'anketa.energy_evening', labelDef: 'Kechqurun (17–22)' },
        { v: 'night',   labelKey: 'anketa.energy_night',   labelDef: 'Tunda (22+)' }
      ]
    }
  ];

  // ── State ──
  const PROFILE_KEY = 'mvow.profile';
  const SAVED_KEY = 'mvow.anketa';
  let answers = {};
  try { answers = JSON.parse(localStorage.getItem(SAVED_KEY) || '{}'); } catch {}
  // Eski (olib tashlangan) savollardan saqlangan javoblarni tozalash
  const VALID_IDS = QUESTIONS.map(q => q.id);
  Object.keys(answers).forEach(k => {
    if (!VALID_IDS.includes(k)) delete answers[k];
  });
  localStorage.setItem(SAVED_KEY, JSON.stringify(answers));
  let stepIdx = 0;

  const $ = id => document.getElementById(id);
  const stepEl = $('step');
  const progFill = $('progFill');
  const counter = $('counter');
  const backBtn = $('backBtn');
  const nextBtn = $('nextBtn');
  const doneScreen = $('doneScreen');
  const bottomNav = $('bottomNav');

  function escapeHtml(s) {
    return String(s).replace(/[<>"&]/g, c => ({'<':'&lt;','>':'&gt;','"':'&quot;','&':'&amp;'}[c]));
  }

  function render() {
    const q = QUESTIONS[stepIdx];
    const total = QUESTIONS.length;
    progFill.style.width = ((stepIdx) / total * 100) + '%';
    counter.textContent = `${stepIdx + 1} / ${total}`;
    backBtn.classList.toggle('hidden', stepIdx === 0);

    const qTitle = T(q.titleKey, q.titleDef);
    const sectionLbl = T('anketa.section_lbl', 'Tanishuv');

    let html = '<div class="step">';
    html += `<h1 class="question">${escapeHtml(qTitle)}</h1>`;

    if (q.type === 'text') {
      const cur = answers[q.id] || '';
      const ph = T(q.placeholderKey, q.placeholderDef || '');
      html += `<input class="text-input" id="qInput" type="text" maxlength="${q.maxlen || 100}" placeholder="${escapeHtml(ph)}" value="${escapeHtml(cur)}" autocomplete="off">`;
    } else if (q.type === 'choice') {
      html += '<div class="choices">';
      let oi = 0;
      for (const opt of q.options) {
        const on = answers[q.id] === opt.v;
        const fullLabel = T(opt.labelKey, opt.labelDef);
        // Sarlavha + tavsif: descDef bo'lsa o'sha; bo'lmasa label ichidan ( — / (...) / · ) ajratamiz
        let head = fullLabel, sub = opt.descDef || '';
        if (!sub) {
          const dash = fullLabel.split(' — ');
          const paren = fullLabel.match(/^(.*?)\s*\(([^)]+)\)\s*$/);
          const dot = fullLabel.split(' · ');
          if (dash.length === 2) { head = dash[0]; sub = dash[1]; }
          else if (paren) { head = paren[1].trim(); sub = paren[2].trim(); }
          else if (dot.length === 2) { head = dot[0]; sub = dot[1]; }
        }
        const num = String(oi + 1).padStart(2, '0');
        const ic = OPT_ICONS[opt.v] || '✦';
        html += `<div class="choice ${on ? 'on' : ''}" data-v="${escapeHtml(opt.v)}" role="radio" tabindex="0" aria-checked="${on}">
          <span class="ch-cap"><i class="ch-ico">${ic}</i></span>
          <span class="ch-body">
            <span class="ch-num">${num}</span>
            <span class="ch-label"><b class="ch-head">${escapeHtml(head)}</b>${sub ? `<small class="ch-desc">${escapeHtml(sub)}</small>` : ''}</span>
          </span>
        </div>`;
        oi++;
      }
      html += '</div>';
    }

    if (q.noteKey || q.noteDef) {
      const noteTxt = T(q.noteKey, q.noteDef || '');
      if (noteTxt) html += `<div class="footer-note">${escapeHtml(noteTxt)}</div>`;
    }

    html += '</div>';
    stepEl.innerHTML = html;

    // Wire up inputs
    if (q.type === 'text') {
      const inp = $('qInput');
      inp.addEventListener('input', updateNext);
      setTimeout(() => inp.focus(), 100);
    } else {
      stepEl.querySelectorAll('.choice').forEach(c => {
        c.addEventListener('click', () => {
          stepEl.querySelectorAll('.choice').forEach(x => {
            x.classList.remove('on');
            x.setAttribute('aria-checked', 'false');
          });
          c.classList.add('on');
          c.setAttribute('aria-checked', 'true');
          answers[q.id] = c.dataset.v;
          localStorage.setItem(SAVED_KEY, JSON.stringify(answers));
          updateNext();
          // Avtomatik o'tish (single-choice qulayligi)
          setTimeout(() => { if (canGoNext()) goNext(); }, 250);
        });
        c.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); c.click(); }
        });
      });
    }
    updateNext();
  }

  function canGoNext() {
    const q = QUESTIONS[stepIdx];
    if (q.optional) return true;
    if (q.type === 'text') {
      const v = ($('qInput') ? $('qInput').value : (answers[q.id] || ''));
      return q.validate ? q.validate(v) : v.trim().length > 0;
    }
    if (q.type === 'choice') {
      return !!answers[q.id];
    }
    return true;
  }
  function updateNext() {
    nextBtn.classList.toggle('disabled', !canGoNext());
  }

  function goNext() {
    const q = QUESTIONS[stepIdx];
    if (q.type === 'text') {
      answers[q.id] = ($('qInput') ? $('qInput').value.trim() : '');
      localStorage.setItem(SAVED_KEY, JSON.stringify(answers));
    }
    stepIdx++;
    if (stepIdx >= QUESTIONS.length) {
      finish();
    } else {
      render();
    }
  }
  function goBack() {
    if (stepIdx > 0) {
      stepIdx--;
      render();
    }
  }
  nextBtn.addEventListener('click', () => { if (canGoNext()) goNext(); });
  backBtn.addEventListener('click', goBack);
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && canGoNext()) goNext();
    if (e.key === 'Escape') goBack();
  });

  function finish() {
    // Profilga ko'chir
    const profile = {
      name:   answers.name || '',
      age:    answers.age || '',
      gender: answers.gender || '',
      job:    answers.job || '',
      focusTime: answers.focus_time || '',
      distract:  answers.distract || '',
      sessionMins: '45',
      aim: '',
      situation: answers.situation || '',
      energyPeak: answers.energy_peak || ''
    };
    localStorage.setItem(PROFILE_KEY, JSON.stringify(profile));
    if (profile.name) localStorage.setItem('mvow.userName', profile.name);
    // Sozlamalar prefslariga sessiya
    try {
      const prefs = JSON.parse(localStorage.getItem('mvow.prefs') || '{}');
      prefs.sessionMins = profile.sessionMins;
      localStorage.setItem('mvow.prefs', JSON.stringify(prefs));
    } catch {}

    progFill.style.width = '100%';
    counter.textContent = `${QUESTIONS.length} / ${QUESTIONS.length}`;
    stepEl.style.display = 'none';
    bottomNav.style.display = 'none';
    doneScreen.classList.add('show');
    // Shaxsiy ostki matn — ism bo'lsa qo'shamiz (kreativ + iliq)
    var _sub = document.getElementById('doneSub');
    if (_sub) {
      var _nm = (profile.name || '').trim();
      var _base = (window.I18N ? I18N.t('anketa.done_sub', 'Profilingiz tayyor — endi maqsadingizni belgilaymiz.') : 'Profilingiz tayyor — endi maqsadingizni belgilaymiz.');
      _sub.innerHTML = (_nm ? '<span class="em">' + escapeHtml(_nm) + '</span> — ' : '') + escapeHtml(_base);
    }

    setTimeout(() => {
      window.location.href = 'vada.html';
    }, 2600);
  }

  // I18N tayyor bo'lmasa bir oz kutamiz (defer fallback himoyasi)
  function _bootWhenI18N(attempt) {
    if (window.I18N || attempt > 30) { render(); return; }
    setTimeout(() => _bootWhenI18N((attempt || 0) + 1), 30);
  }
  _bootWhenI18N(0);
</script>
