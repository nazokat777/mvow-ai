<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{brand} ‚Äî Fokus rejimi</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png?v=2">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png?v=2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --void:#04060B; --void-soft:#0C0F16; --card:#11151E; --text:#F5F2EC; --text-mid:#B8BBC2; --text-dim:#9CA0A8; --alert:#FF4757; }
  body { background: var(--void); font-family:'Inter',sans-serif; color: var(--text); min-height: 100vh; display:flex; justify-content:center; align-items:flex-start; padding: 24px; -webkit-font-smoothing: antialiased; }
  .phone {
    width: 380px; min-height: 800px; background: var(--void); border-radius: 40px;
    overflow: hidden; position: relative;
    box-shadow: 0 0 0 8px #1a1d24, 0 30px 80px rgba(0,0,0,.7);
    display: flex; flex-direction: column;
  }
  .container { flex:1; display:flex; flex-direction: column; align-items:center; justify-content:center; padding: 60px 32px 100px; gap: 22px; }

  .task { text-align: center; }
  .task .name { font-family:'Inter',sans-serif; font-size: 28px; font-weight: 500; }
  .task .time { font-size: 15px; letter-spacing: 3px; color: var(--text-mid); text-transform: uppercase; margin-top: 8px; }

  /* Choice modal (Taymer bilan / Taymersiz) */
  .choice-overlay {
    position: fixed; inset: 0;
    background: var(--overlay-strong);
    backdrop-filter: blur(10px);
    z-index: 9999;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .choice-card {
    width: 100%; max-width: 340px;
    background: var(--card);
    border: 1px solid rgba(244, 132, 95,.2);
    border-radius: 16px;
    padding: 26px 22px;
    text-align: center;
    animation: chIn .4s cubic-bezier(.16,.84,.32,1);
  }
  @keyframes chIn { from { opacity: 0; transform: translateY(20px) scale(.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .choice-card .ctitle {
    font-family: 'Inter', sans-serif;
    font-style: normal; font-size: 28px;
    line-height: 1.3; color: var(--text);
    margin-bottom: 6px;
  }
  .choice-card .ctask {
    font-size: 17px; color: var(--accent);
    margin-bottom: 18px;
    font-weight: 500;
  }
  .choice-card .csub {
    font-size: 16px; color: var(--text-dim);
    line-height: 1.5;
    margin-bottom: 22px;
  }
  .choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .choice-btn {
    padding: 16px 14px;
    border: 1px solid var(--border-default, rgba(255,255,255,.12));
    border-radius: 16px;
    font-family: 'Inter', sans-serif;
    font-size: 16px; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer; min-height: 52px;
    background: var(--void-soft);
    color: var(--text);
    transition: transform .15s, box-shadow .2s, border-color .2s;
  }
  .choice-btn:active { transform: scale(.98); }
  .choice-btn.primary { background: linear-gradient(135deg, var(--accent-bright), var(--accent-deep)); color: #fff; border: none; box-shadow: 0 8px 22px rgba(244, 132, 95,.32); }
  .choice-btn.secondary { background: var(--void-soft); color: var(--text-mid); border: 1px solid rgba(255,255,255,.12); }

  /* Timer-on ring */
  .ring-wrap { position: relative; width: 240px; height: 240px; }
  .ring-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring-track { fill: none; stroke: rgba(255,255,255,.10); stroke-width: 4; }
  .ring-prog { fill: none; stroke: var(--accent); stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 1s linear; filter: drop-shadow(0 0 5px rgba(244,132,95,.5)); }
  /* Ring ichida ‚Äî toza shisha (frosted) disk: raqamlar rasm ustida ham o'qilsin, "dog'" rang yo'q */
  .ring-glow { position: absolute; inset: 8px; border-radius: 50%; background: radial-gradient(circle, rgba(6,8,13,.40) 58%, rgba(6,8,13,0) 80%); -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px); pointer-events: none; z-index: 0; }
  .ring-svg { position: relative; z-index: 1; }
  .ring-center { z-index: 1; }
  /* Chiqish tugmasi (taymer ishlab turaveradi) */
  .hl-exit { position: fixed; top: max(14px, env(safe-area-inset-top, 14px)); left: 14px; z-index: 60; display: none; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.16); color: var(--text-mid); border-radius: 999px; padding: 8px 16px; font: 600 14px 'Inter', sans-serif; cursor: pointer; }
  .hl-exit.show { display: block; }
  .hl-exit:active { transform: scale(.96); }
  .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items:center; justify-content:center; gap: 6px; }
  .digits { font-size: 56px; font-weight: 500; color: var(--accent); letter-spacing: 1px; font-feature-settings: "tnum"; }
  .sub { font-size: 14px; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase; }
  /* O'tgan + qolgan vaqt (TZ 3.5) */
  .timer-meta { font-size: 13px; letter-spacing: 1px; color: var(--text-dim); text-align: center; min-height: 16px; }
  /* Pauza/Davom (TZ 3.5, 4.2) */
  .pause-btn { margin-top: 2px; padding: 11px 32px; background: var(--void-soft); color: var(--text); border: 1px solid rgba(255,255,255,.14); border-radius: 999px; font: 600 15px 'Inter', sans-serif; letter-spacing: 1px; cursor: pointer; }
  .pause-btn:active { transform: scale(.97); }

  /* Taymersiz katta tugma */
  .no-timer-area { display: none; text-align: center; gap: 18px; }
  .no-timer-area.show { display: flex; flex-direction: column; align-items: center; }
  .no-timer-elapsed {
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 72px;
    color: var(--accent);
    line-height: 1;
    font-feature-settings: "tnum";
  }
  .no-timer-lbl {
    font-size: 14px;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .done-btn {
    margin-top: 8px;
    padding: 16px 36px;
    background: linear-gradient(180deg, var(--accent), var(--accent-soft));
    color: var(--void);
    border: none; border-radius: 999px;
    font-family: 'Inter', sans-serif;
    font-size: 17px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; min-height: 52px;
  }

  /* "Bajardingizmi?" so'roq modali */
  .ask-overlay {
    position: fixed; inset: 0;
    background: var(--overlay-strong);
    backdrop-filter: blur(10px);
    z-index: 9998;
    display: none;
    align-items: center; justify-content: center;
    padding: 24px;
  }
  .ask-overlay.show { display: flex; }

  /* Timer hidden when no-timer chosen */
  .timer-area { display: flex; flex-direction: column; align-items: center; gap: 22px; }
  .timer-area.hidden { display: none; }

  .bottom-bar { padding: 18px 32px env(safe-area-inset-bottom, 18px); }
  .cta { display:block; width:100%; padding:14px; background: transparent; color: var(--text-mid); font-size:16px; letter-spacing:2px; text-transform: uppercase; border:1px solid rgba(255,255,255,.1); border-radius:6px; text-align:center; text-decoration:none; }

  @media (max-width: 480px) { body { padding: 0; } .phone { width: 100vw; min-height: 100vh; border-radius: 0; box-shadow: none; } }
</style>
<link rel="stylesheet" href="theme.css">

<script src="motion.js" defer></script>
</head>

        <button id="bgOff" type="button" style="background:transparent;border:1px solid var(--text-dim);color:var(--text-mid);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif;"><span id="bgOffLbl" data-i18n="hardlock.bg_off">Fonsiz</span></button>

    <!-- Telefon yuztuban = chuqur fokus (faqat yuztuban bo'lganda chiqadi) -->
    <div id="focusBadge" style="display:none;text-align:center;margin:16px auto 0;font-size:15px;font-weight:700;color:#6BBF7A;letter-spacing:.3px;">üìµ chuqur fokus</div>

  </div>

  <div class="bottom-bar">
    <a class="cta" href="home.html" data-i18n="hardlock.end">Davom etaman</a>
  </div>

<!-- 1) Boshlash tanlovi: Taymersiz / Oddiy taymer / Pomodoro -->

  <div class="choice-card">

    <div id="taskPicker" style="display:none;flex-wrap:wrap;gap:8px;margin-bottom:16px;justify-content:center;"></div>

    <div class="ctitle" data-i18n="hardlock.ask_title">Bajardingizmi?</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  // ‚îÄ‚îÄ Joriy ish va sozlamalar ‚îÄ‚îÄ
  // BUG FIX (v25.1): bu inline script defer-li, lekin avval defer'siz edi ‚Äî
  // shuning uchun MVOW_DATA hali yuklanmasdan turib ishga tushib, default
  // '25 daq' fallback'iga tushardi. Endi DOMContentLoaded ichida ‚Äî data.js
  // defer bilan yuklanib bo'lgan paytda ishlaydi.
  let current = null;
  let hadExplicitTask = false;
  // 1) Foydalanuvchi home'da "Boshlash" bosib tanlagan ANIQ vazifa (nomi/vaqti/davomiyligi bilan)
  try {
    var _sel = JSON.parse(localStorage.getItem('mvow.activeTask') || 'null');
    if (_sel && _sel.name) { current = _sel; hadExplicitTask = true; }
    localStorage.removeItem('mvow.activeTask'); // bir martalik ‚Äî o'qigach tozalaymiz
  } catch (e) {}
  // 2) Aks holda ‚Äî joriy vaqt bo'yicha rejadan taxmin
  if (!current && window.MVOW_DATA) {
    current = MVOW_DATA.currentTaskFromPlan();
  }
  if (!current && window.MVOW_DATA) {
    current = MVOW_DATA.currentSession() || (MVOW_DATA.sessions && MVOW_DATA.sessions[0]);
  }
  const DEFAULT_TASK_NAME = (window.I18N ? I18N.t('hardlock.default_task', 'Ish') : 'Ish');
  const DEFAULT_DUR = (window.I18N ? I18N.t('hardlock.dur_fallback', '25 daq') : '25 daq');
  // 3) Hali ham topilmasa ‚Äî birinchi maqsad nomini ishlatamiz (taymerda "Ish" emas, maqsad ko'rinsin)
  if (!current && window.MVOW_DATA && typeof MVOW_DATA.loadGoals === 'function') {
    try {
      var _g = MVOW_DATA.loadGoals();
      if (_g && _g.length && _g[0] && _g[0].text) {
        current = { name: _g[0].text, time: _g[0].time || '', dur: _g[0].dur || DEFAULT_DUR };
      }
    } catch (e) {}
  }
  if (!current) current = { name: DEFAULT_TASK_NAME, time: '', dur: DEFAULT_DUR };

  const POMO_WORK = 25, POMO_BREAK = 5;
  let taskMins = 25, pomoCycles = 1, pomoTotalMins = 25, WORK_MIN = 25;
  // Tanlangan vazifani UI + hisob-kitoblarga qo'llash (tanlovchi o'zgartirsa qayta chaqiriladi)
  function applyTask(t) {
    current = t;
    document.getElementById('tname').textContent = t.name;
    document.getElementById('cTaskName').textContent = t.name;
    document.getElementById('aTaskName').textContent = t.name;
    document.getElementById('aDur').textContent = t.dur || DEFAULT_DUR;
    taskMins = window.MVOW_DATA ? MVOW_DATA.parseDurMins(t.dur) : 25;
    document.getElementById('cTaskMeta').textContent = (t.time || '‚Äî') + ' ¬∑ ' + (t.dur || '‚Äî');
    document.getElementById('chTimerDur').textContent = (window.I18N ? I18N.tWith('hardlock.timer_full', { mins: taskMins }) : (taskMins + ' daqiqa to\'liq'));
    pomoCycles = Math.max(1, Math.round(taskMins / POMO_WORK));
    pomoTotalMins = pomoCycles * POMO_WORK + (pomoCycles - 1) * POMO_BREAK;
    document.getElementById('chPomoDur').textContent = (window.I18N ? I18N.tWith('hardlock.pomo_summary', { cycles: pomoCycles, total: pomoTotalMins }) : (pomoCycles + ' sikl ¬∑ ' + pomoTotalMins + ' daq jami'));
    WORK_MIN = taskMins;
  }
  applyTask(current);

  // Vazifa tanlovchisi ‚Äî menyudan ochilganda "qaysi maqsad?" deb so'raydi (home'dan aniq tanlanmagan bo'lsa)
  (function buildTaskPicker() {
    if (hadExplicitTask || !window.MVOW_DATA) return;
    var src = [];
    try {
      if (typeof MVOW_DATA.getTodayPlan === 'function') src = MVOW_DATA.getTodayPlan() || [];
      if ((!src || !src.length) && typeof MVOW_DATA.loadGoals === 'function') src = MVOW_DATA.loadGoals() || [];
    } catch (e) {}
    var list = (src || []).map(function (g) {
      return { name: g.text || g.name || g.title || g.goal || '', time: g.time || '', dur: g.dur || DEFAULT_DUR };
    }).filter(function (g) { return g.name; });
    var seen = {}, uniq = [];
    list.forEach(function (g) { if (!seen[g.name]) { seen[g.name] = 1; uniq.push(g); } });
    uniq.sort(function (a, b) { return (a.time || '99:99').localeCompare(b.time || '99:99'); });
    if (uniq.length < 1) return;   // maqsad yo'q ‚Äî so'ramaymiz, default qoladi
    var picker = document.getElementById('taskPicker'), lbl = document.getElementById('pickLabel');
    if (!picker) return;
    if (lbl) lbl.style.display = 'block';
    picker.style.display = 'flex';
    var base = 'padding:8px 14px;border-radius:999px;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.06);color:#fff;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;';
    function restyle() {
      Array.prototype.forEach.call(picker.children, function (c) {

  })();

  (function resumeActive() {
    let s; try { s = JSON.parse(localStorage.getItem('mvow.activeFocus') || 'null'); } catch (e) { s = null; }
    if (!s || !s.mode) return;
    if (Date.now() - (s.startedAt || 0) > 8 * 3600 * 1000) { clearActive(); return; }
    mode = s.mode; phaseStartedAt = s.phaseStartedAt; totalSec = s.totalSec;
    WORK_MIN = s.WORK_MIN; BREAK_MIN = s.BREAK_MIN; TOTAL_CYC = s.TOTAL_CYC;
    cycle = s.cycle; phase = s.phase; startedAt = s.startedAt;
    paused = s.paused || false;
    choiceOverlay.style.display = 'none';
    const _nav = document.getElementById('globalNavCaps'); if (_nav) _nav.style.display = 'none';
    const _lang = document.querySelector('.lang-switcher'); if (_lang) _lang.style.display = 'none';
    enableFaceDown();
    startFocusAudioIfPref();
    _getAC();
    ensureNotifPerm();
    if (mode === 'no-timer') {
      timerArea.classList.add('hidden'); noTimerArea.classList.add('show');
      tsub.textContent = (window.I18N ? I18N.t('hardlock.sub_no_timer', 'taymersiz') : 'taymersiz');
      paintElapsed(); interval = setInterval(paintElapsed, 1000);
    } else {
      timerArea.classList.remove('hidden'); noTimerArea.classList.remove('show');
      ring.style.stroke = (phase === 'break') ? '#F5C26B' : 'var(--accent)';
      if (paused) {
        if (typeof s.remaining === 'number') remaining = s.remaining;
        tsub.textContent = (window.I18N ? I18N.t('hardlock.sub_paused', 'pauza') : 'pauza');
        if (pauseBtn) pauseBtn.textContent = (window.I18N ? I18N.t('hardlock.resume', 'Davom') : 'Davom');
        paint();
      } else {
        tsub.textContent = (window.I18N ? I18N.t(phase === 'break' ? 'hardlock.sub_break' : 'hardlock.sub_locked', phase === 'break' ? 'dam oling' : 'fokusdasiz') : (phase === 'break' ? 'dam oling' : 'fokusdasiz')) + (mode === 'pomodoro' ? (' ¬∑ ' + cycle + '/' + TOTAL_CYC) : '');
        remaining = Math.max(0, totalSec - Math.floor((Date.now() - phaseStartedAt) / 1000));
        paint();
        startTick();
      }
    }
  })();

  // ============================================================
  // DEEP LOCK ‚Äî taymer paytida idle bo'lsa, ekran qulflanadi
  // ============================================================
  const deepLockOverlay = document.getElementById('deepLockOverlay');
  const dlTime = document.getElementById('dlTime');

  let idleTimer = null;
  let isDeepLocked = false;
  const IDLE_MS = 30000; // 30 sekund harakatsizlik ‚Üí keyin chuqur qulf (oldin 8s edi ‚Äî o'qish/o'ylashni bo'lardi)

  // Wake Lock ‚Äî telefon ekranini OS qulflashga yo'l qo'ymaslik
  let wakeLockSentinel = null;
  async function acquireWakeLock() {
    try {
      if ('wakeLock' in navigator) {
        wakeLockSentinel = await navigator.wakeLock.request('screen');
      }
    } catch (e) { /* user denied or unsupported */ }
  }
  async function releaseWakeLock() {
    try { if (wakeLockSentinel) await wakeLockSentinel.release(); } catch (e) {}
    wakeLockSentinel = null;
  }

  function showDeepLock() {
    if (isDeepLocked) return;
    // Faqat taymer rejimida ishlaydi (no-timer rejimida emas); dam fazasida qulflamaydi
    if (mode !== 'timer' && mode !== 'pomodoro') return;
    if (phase === 'break') return;
    isDeepLocked = true;
    deepLockOverlay.style.display = 'flex';
    // Sync current time
    if (dlTime) dlTime.textContent = digits.textContent;
    var _dlHint = document.getElementById('dlHint');
    if (_dlHint) _dlHint.textContent = (phase === 'break')
      ? (window.I18N ? I18N.t('hardlock.sub_break', 'dam oling') : 'dam oling')
      : (window.I18N ? I18N.t('hardlock.deep_lock_hint', 'Fokusdasiz, shunday davom eting.') : 'Fokusdasiz, shunday davom eting.');
    requestAnimationFrame(() => { deepLockOverlay.style.opacity = '1'; });
  }

  function hideDeepLock() {
    if (!isDeepLocked) return;
    isDeepLocked = false;
    deepLockOverlay.style.opacity = '0';
    setTimeout(() => { deepLockOverlay.style.display = 'none'; }, 800);
    resetIdleTimer();
  }

  function resetIdleTimer() {
    if (idleTimer) clearTimeout(idleTimer);
    if (mode !== 'timer' && mode !== 'pomodoro') return;
    idleTimer = setTimeout(showDeepLock, IDLE_MS);
  }

  // Update deep-lock time display sync with main timer
  const _origPaint = paint;
  paint = function () {
    _origPaint();
    if (isDeepLocked && dlTime) dlTime.textContent = digits.textContent;
  };

  // Activity events ‚Äî har tegishida idle timer reset.
  // Deep-lock paytida: istalgan bosish/tugma qulf ekranini yopadi (pointermove emas).
  ['pointerdown', 'pointermove', 'keydown'].forEach(ev => {
    document.addEventListener(ev, () => {
      if (isDeepLocked) {
        if (ev === 'pointerdown' || ev === 'keydown') hideDeepLock();
        return;
      }
      resetIdleTimer();
    }, { passive: true });
  });

  // Taymer rejimi tanlanganda boshlanish ‚Äî choice tugmalari to keyin override
  const _origChTimer = document.getElementById('chTimer').onclick;
  document.getElementById('chTimer').addEventListener('click', () => {
    acquireWakeLock();
    resetIdleTimer();
  });
  document.getElementById('chPomo').addEventListener('click', () => {
    acquireWakeLock();
    resetIdleTimer();
  });

  // Tab visibility ‚Äî boshqa tab'ga o'tsa wake lock yangilanadi
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && (mode === 'timer' || mode === 'pomodoro')) {
      acquireWakeLock();
    }
  });

  // Sahifa yopilganda wake lock'ni qaytarish
  window.addEventListener('pagehide', releaseWakeLock);
});  // end DOMContentLoaded
</script>
