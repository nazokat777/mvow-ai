<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{brand} — Fokus rejimi</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --void:#04060B; --text:#F5F2EC; --text-mid:#B8BBC2; --text-dim:#9CA0A8; --accent:#00E5D4; --accent-soft:#00B5A8; --alert:#FF4757; }
  body { background: var(--void); font-family:'Inter',sans-serif; color: var(--text); min-height: 100vh; display:flex; justify-content:center; align-items:flex-start; padding: 24px; -webkit-font-smoothing: antialiased; }
  .phone {
    width: 380px; min-height: 800px; background: var(--void); border-radius: 40px;
    overflow: hidden; position: relative;
    box-shadow: 0 0 0 8px #1a1d24, 0 30px 80px rgba(0,0,0,.7);
    display: flex; flex-direction: column;
    transition: background .3s;
  }
  .phone[data-alert="1"] { background: #1c0a0e; }
  .container { flex:1; display:flex; flex-direction: column; align-items:center; justify-content:center; padding: 60px 32px 100px; gap: 22px; }

  .task { text-align: center; }
  .task .name { font-family:'Cormorant Garamond',serif; font-size: 22px; font-weight: 500; }
  .task .time { font-size: 11px; letter-spacing: 3px; color: var(--text-mid); text-transform: uppercase; margin-top: 8px; }

  .ring-wrap { position: relative; width: 240px; height: 240px; }
  .ring-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring-track { fill: none; stroke: rgba(255,255,255,.06); stroke-width: 3; }
  .ring-prog {
    fill: none;
    stroke: var(--accent);
    stroke-width: 3;
    stroke-linecap: round;
    transition: stroke .3s, stroke-dashoffset 1s linear;
  }
  .phone[data-alert="1"] .ring-prog { stroke: var(--alert); }
  .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items:center; justify-content:center; gap: 6px; }
  .digits { font-size: 44px; font-weight: 300; color: var(--accent); letter-spacing: 1px; transition: color .3s; font-feature-settings: "tnum"; }
  .phone[data-alert="1"] .digits { color: var(--alert); }
  .sub { font-size: 9px; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase; }

  .blocked { font-size: 11px; color: var(--text-mid); letter-spacing: 1px; text-align: center; }
  .blocked .app { color: var(--text-dim); margin: 0 6px; cursor: pointer; text-decoration: line-through; }
  .blocked .app:active, .blocked .app:hover { color: var(--alert); }

  .alert {
    display: none;
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid var(--alert);
    border-radius: 10px;
    background: rgba(255,71,87,.08);
    text-align: center;
  }
  .phone[data-alert="1"] .alert { display: block; }
  .alert .msg { font-size: 13px; color: var(--text); margin-bottom: 12px; line-height: 1.4; }
  .alert .msg .em { color: var(--alert); font-weight: 600; }
  .alert .actions { display: flex; gap: 8px; }
  .alert button, .alert a {
    flex: 1; padding: 10px;
    border: none; border-radius: 6px;
    font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    display: flex; align-items: center; justify-content: center;
  }
  .alert .stay { background: var(--accent); color: var(--void); }
  .alert .ask  { background: transparent; color: var(--alert); border: 1px solid var(--alert); }

  .bottom-bar { padding: 18px 32px env(safe-area-inset-bottom, 18px); }
  .cta { display:block; width:100%; padding:14px; background: transparent; color: var(--text-mid); font-size:12px; letter-spacing:2px; text-transform: uppercase; border:1px solid rgba(255,255,255,.1); border-radius:6px; text-align:center; text-decoration:none; }

  @media (max-width: 480px) { body { padding: 0; } .phone { width: 100vw; min-height: 100vh; border-radius: 0; box-shadow: none; } }
</style>
</head>
<body>

<div class="phone" id="phone" data-alert="0">
  <div class="container">

    <div class="task">
      <div class="name" id="tname">Til o'rganish</div>
      <div class="time" id="tsub">fokusdasan</div>
      <div id="cycleDots" style="display:none;justify-content:center;gap:8px;margin-top:10px;"></div>
    </div>

    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 240 240">
        <circle class="ring-track" cx="120" cy="120" r="116"/>
        <circle id="ring" class="ring-prog" cx="120" cy="120" r="116"
                stroke-dasharray="729" stroke-dashoffset="0"/>
      </svg>
      <div class="ring-center">
        <div class="digits" id="digits">25:00</div>
        <div class="sub" id="sub">davom etyapsan</div>
      </div>
    </div>

    <div class="blocked">
      <span class="app" data-app="Instagram">Instagram</span>·
      <span class="app" data-app="TikTok">TikTok</span>·
      <span class="app" data-app="YouTube">YouTube</span>
    </div>

    <div class="alert" id="alertBox">
      <div class="msg"><span class="em" id="alertApp">Instagram</span> ochmoqchimisan?</div>
      <div class="actions">
        <button class="stay" id="stayBtn">Fokusda qol</button>
        <a class="ask" href="negotiation.html">Ruxsat so'ra</a>
      </div>
    </div>

  </div>

  <div class="bottom-bar">
    <a class="cta" href="home.html">Yaxshi, qaytaman</a>
  </div>
</div>

<script src="i18n.js" defer></script>
<script src="data.js" defer></script>
<script src="nav-overlay.js" defer></script>
<script>
  // ── Joriy sessiya va sozlamalar ──
  let current = null;
  if (window.MVOW_DATA) {
    current = MVOW_DATA.currentTaskFromPlan();
  }
  if (!current && window.MVOW_DATA) {
    current = MVOW_DATA.currentSession() || (MVOW_DATA.sessions && MVOW_DATA.sessions[0]);
  }
  if (!current) current = { name: 'Sessiya', dur: '25 daq' };
  document.getElementById('tname').textContent = current.name;

  let prefs = {};
  try { prefs = JSON.parse(localStorage.getItem('mvow.prefs') || '{}'); } catch {}
  const MODE = prefs.mode || 'simple';
  const taskMins = window.MVOW_DATA ? MVOW_DATA.parseDurMins(current.dur) : 25;
  const WORK_MIN  = (MODE === 'pomodoro') ? parseInt(prefs.sessionMins || 25, 10) : taskMins;
  const BREAK_MIN = parseInt(prefs.breakMins  || 5, 10);
  const TOTAL_CYC = parseInt(prefs.pomoCycles || 3, 10);

  const RING_CIRC = 729;
  const digits = document.getElementById('digits');
  const ring = document.getElementById('ring');
  const tsub = document.getElementById('tsub');
  const sub = document.getElementById('sub');
  const dotsEl = document.getElementById('cycleDots');

  // State
  const ST_KEY = 'mvow.timer';
  let phase   = 'work';   // 'work' yoki 'break'
  let cycle   = 1;        // 1..TOTAL_CYC
  let totalSec = WORK_MIN * 60;
  let remaining = totalSec;

  function fmt(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
  }

  function renderCycleDots() {
    if (MODE !== 'pomodoro') { dotsEl.style.display = 'none'; return; }
    dotsEl.style.display = 'flex';
    let html = '';
    for (let i = 1; i <= TOTAL_CYC; i++) {
      const active = (i === cycle);
      const done = (i < cycle);
      const bg = done ? '#00E5D4' : (active ? 'transparent' : 'rgba(255,255,255,.12)');
      const border = active ? '1.5px solid #00E5D4' : 'none';
      html += `<span style="width:9px;height:9px;border-radius:50%;background:${bg};border:${border};"></span>`;
    }
    dotsEl.innerHTML = html;
  }

  function applyPhaseStyle() {
    if (phase === 'work') {
      tsub.textContent = 'fokusdasan';
      sub.textContent  = 'davom etyapsan';
      ring.style.stroke = '#00E5D4';
    } else {
      tsub.textContent = 'dam ol';
      sub.textContent  = 'tinch tur';
      ring.style.stroke = '#F5C26B';
    }
  }

  function saveState() {
    localStorage.setItem(ST_KEY, JSON.stringify({
      endsAt: Date.now() + remaining * 1000,
      phase, cycle, mode: MODE
    }));
  }

  function loadState() {
    try {
      const s = JSON.parse(localStorage.getItem(ST_KEY) || 'null');
      if (s && s.endsAt && s.mode === MODE) {
        phase = s.phase || 'work';
        cycle = s.cycle || 1;
        totalSec = (phase === 'work' ? WORK_MIN : BREAK_MIN) * 60;
        const left = Math.max(0, Math.floor((s.endsAt - Date.now()) / 1000));
        if (left > 0 && left <= totalSec) {
          remaining = left;
          return;
        }
      }
    } catch {}
    // Default
    phase = 'work'; cycle = 1;
    totalSec = WORK_MIN * 60;
    remaining = totalSec;
  }

  function paint() {
    digits.textContent = fmt(remaining);
    const offset = RING_CIRC * (1 - remaining / totalSec);
    ring.style.strokeDashoffset = offset;
  }

  function nextPhase() {
    if (window.MVOW_DATA) MVOW_DATA.fxFinish();
    if (MODE !== 'pomodoro') {
      // Oddiy rejim — taymer tugadi
      localStorage.removeItem(ST_KEY);
      setTimeout(() => { location.href = 'session-reflection.html'; }, 1000);
      return;
    }
    // Pomodoro — keyingi fazaga o'tamiz
    if (phase === 'work') {
      // Ish tugadi
      if (cycle >= TOTAL_CYC) {
        // Hammasi tamom
        localStorage.removeItem(ST_KEY);
        setTimeout(() => { location.href = 'session-reflection.html'; }, 1200);
        return;
      }
      // Damga o'tamiz
      phase = 'break';
      totalSec = BREAK_MIN * 60;
      remaining = totalSec;
    } else {
      // Dam tugadi → keyingi ish sikli
      cycle++;
      phase = 'work';
      totalSec = WORK_MIN * 60;
      remaining = totalSec;
    }
    applyPhaseStyle();
    renderCycleDots();
    saveState();
    paint();
  }

  // Init
  loadState();
  applyPhaseStyle();
  renderCycleDots();
  if (remaining === totalSec) saveState();
  paint();

  const interval = setInterval(() => {
    remaining = Math.max(0, remaining - 1);
    paint();
    if (remaining === 0) {
      // Yangi fazaga o'tish
      nextPhase();
    }
  }, 1000);

  // ── Diqqat sinovi flow ──
  const phone = document.getElementById('phone');
  const alertApp = document.getElementById('alertApp');
  document.querySelectorAll('.app').forEach(a => a.addEventListener('click', () => {
    alertApp.textContent = a.dataset.app;
    phone.dataset.alert = '1';
  }));
  document.getElementById('stayBtn').addEventListener('click', () => phone.dataset.alert = '0');
</script>

</body>
</html>
