<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{brand} — Bosh sahifa</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="brend">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --void:#04060B; --void-soft:#0C0F16;
    --text:#F5F2EC; --text-mid:#B8BBC2; --text-dim:#9CA0A8;
    --accent:#00E5D4; --accent-soft:#00B5A8;
  }
  body { background: var(--void); font-family:'Inter',sans-serif; color: var(--text); min-height: 100vh; display:flex; justify-content:center; align-items:flex-start; padding: 24px; -webkit-font-smoothing: antialiased; }
  .phone { width: 380px; min-height: 800px; background: var(--void); border-radius: 40px; position: relative; box-shadow: 0 0 0 8px #1a1d24, 0 30px 80px rgba(0,0,0,.7); overflow: hidden; }
  .container { padding: 60px 28px 100px; display: flex; flex-direction: column; gap: 28px; }

  .stamp { text-align: center; font-size: 10px; letter-spacing: 4px; color: var(--text-dim); text-transform: uppercase; }

  .greet {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 28px;
    text-align: center;
    line-height: 1.3;
    color: var(--text);
  }
  .greet .em { color: var(--accent); font-style: normal; font-weight: 600; }

  .streak {
    text-align: center;
    padding: 16px 0;
    border-top: 1px solid rgba(255,255,255,.04);
    border-bottom: 1px solid rgba(255,255,255,.04);
  }
  .streak .n {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 48px;
    color: var(--accent);
    line-height: 1;
  }
  .streak .lbl { font-size: 10px; letter-spacing: 4px; color: var(--text-mid); text-transform: uppercase; margin-top: 4px; }

  .next {
    text-align: center;
  }
  .next .lbl { font-size: 10px; letter-spacing: 4px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; }
  .next .row {
    display: flex; align-items: baseline; justify-content: center; gap: 12px;
  }
  .next .time { font-size: 18px; color: var(--accent); font-weight: 500; font-feature-settings: "tnum"; }
  .next .name { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-style: italic; color: var(--text); }
  .next .none { font-size: 13px; color: var(--text-mid); font-style: italic; font-family: 'Cormorant Garamond', serif; }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    padding: 16px 0;
    border-bottom: 1px solid rgba(255,255,255,.04);
  }
  .stat { text-align: center; }
  .stat .v {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500; font-size: 24px;
    color: var(--text);
  }
  .stat .v .em { color: var(--accent); }
  .stat .l { font-size: 9px; letter-spacing: 2px; color: var(--text-mid); text-transform: uppercase; margin-top: 4px; }

  .bio {
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--text-mid);
    padding: 0 8px;
    display: none;
  }
  .bio.show { display: block; }

  .actions { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
  .cta { display: block; width: 100%; padding: 16px; background: linear-gradient(180deg, var(--accent), var(--accent-soft)); color: var(--void); font-size: 13px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; border: none; border-radius: 6px; text-align: center; text-decoration: none; }
  .ghost { display: block; width: 100%; padding: 12px; background: transparent; color: var(--text-mid); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; border: 1px solid rgba(255,255,255,.08); border-radius: 6px; text-align: center; text-decoration: none; }

  @media (max-width: 480px) {
    body { padding: 0; }
    .phone { width: 100vw; min-height: 100vh; border-radius: 0; box-shadow: none; }
  }
</style>
</head>
<body>

<div class="phone">
  <div class="container">

    <div class="stamp" id="dateStamp">10-JUN · CHORSHANBA</div>

    <h1 class="greet"><span id="greetWord">Assalomu alaykum</span>, <span class="em" id="userName">do'stim</span>.</h1>

    <div class="streak">
      <div class="n" id="streakN">0</div>
      <div class="lbl" data-i18n="home.streak_lbl">kun yo'l</div>
    </div>

    <div class="next">
      <div class="lbl" data-i18n="home.next">Keyingi</div>
      <div class="row" id="nextRow">
        <span class="none" data-i18n="home.no_plan">birinchi qadamingizni qo'ying</span>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="v"><span class="em" id="focusH">0</span> <span style="font-size:13px;color:var(--text-mid)">soat</span></div>
        <div class="l" data-i18n="home.focus_lbl">fokus</div>
      </div>
      <div class="stat">
        <div class="v"><span class="em" id="sessN">0</span> <span style="font-size:13px;color:var(--text-mid)">ish</span></div>
        <div class="l" data-i18n="home.sessions_lbl">bugun</div>
      </div>
    </div>

    <p class="bio" id="bioLine"></p>

    <div class="actions">
      <a class="cta" id="primaryCta" href="routine.html">Rejani tuzing</a>

      <!-- Tanlovlar — istalganini bos -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px;">
        <a class="ghost" href="today-plan.html" style="margin:0;">Bugungi reja</a>
        <a class="ghost" href="maqsadlar.html" style="margin:0;">Maqsadlar</a>
        <a class="ghost" href="calendar.html" style="margin:0;">Kalendar</a>
        <a class="ghost" href="kechqurun.html" style="margin:0;">Kun yakuni</a>
      </div>
    </div>

  </div>
</div>

<script src="i18n.js" defer></script>
<script src="data.js" defer></script>
<script src="nav-overlay.js" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    // Sana va vaqt
    const dayNames = ['YAKSHANBA','DUSHANBA','SESHANBA','CHORSHANBA','PAYSHANBA','JUMA','SHANBA'];
    const monNames = ['YAN','FEV','MAR','APR','MAY','JUN','IYU','AVG','SEN','OKT','NOY','DEK'];
    const d = new Date();
    const hh = String(d.getHours()).padStart(2,'0');
    const mm = String(d.getMinutes()).padStart(2,'0');
    document.getElementById('dateStamp').textContent =
      `${String(d.getDate()).padStart(2,'0')}-${monNames[d.getMonth()]} · ${dayNames[d.getDay()]} · ${hh}:${mm}`;

    // Salom — keyinroq plan'ga qarab to'g'irlanadi (pastda)

    // Foydalanuvchi
    const userName = (localStorage.getItem('mvow.userName') || '').trim();
    if (userName) document.getElementById('userName').textContent = userName;

    const bio = (localStorage.getItem('mvow.userBio') || '').trim();
    if (bio) {
      const bioEl = document.getElementById('bioLine');
      bioEl.textContent = '"' + bio + '"';
      bioEl.classList.add('show');
    }

    // Streak — saqlangan bo'lsa o'sha, yo'q bo'lsa 0 (soxta default yo'q)
    const streak = parseInt(localStorage.getItem('mvow.streak') || '0', 10);
    document.getElementById('streakN').textContent = streak;

    // Bugungi reja — faqat foydalanuvchi tuzgan reja (namuna ko'rsatilmaydi)
    let plan = [];
    if (window.MVOW_DATA) {
      plan = MVOW_DATA.getTodayPlan();
    }

    // Saralash
    function tKey(t) {
      const m = /^(\d{1,2}):?(\d{2})?$/.exec((t || '').trim());
      if (!m) return 99999;
      return (+m[1]) * 60 + (+(m[2] || 0));
    }
    plan.sort((a,b) => tKey(a.time) - tKey(b.time));

    // Joriy vaqt va aqlli salom (plan saralangach)
    const nowMin = d.getHours() * 60 + d.getMinutes();
    const hourNow = d.getHours();

    // ── AQLLI SALOM — foydalanuvchining haqiqiy jadvaliga qaraydi ──
    function tKeyFromStr(t) {
      const m = /^(\d{1,2}):?(\d{2})?$/.exec((t || '').trim());
      if (!m) return null;
      return (+m[1]) * 60 + (+(m[2] || 0));
    }
    function smartGreeting() {
      // Wake time — settings'dan yoki rejaning birinchi task'idan
      let wakeMin = null;
      try {
        const wakeStr = localStorage.getItem('mvow.wakeTime');
        if (wakeStr) {
          const m = wakeStr.match(/^(\d{1,2}):(\d{2})$/);
          if (m) wakeMin = (+m[1]) * 60 + (+m[2]);
        }
      } catch {}

      let firstMin = null, lastMin = null;
      if (plan.length) {
        const sorted = [...plan].sort((a,b) => (tKeyFromStr(a.time) ?? 0) - (tKeyFromStr(b.time) ?? 0));
        firstMin = tKeyFromStr(sorted[0].time);
        lastMin = tKeyFromStr(sorted[sorted.length-1].time);
        if (wakeMin == null && firstMin != null) wakeMin = Math.max(0, firstMin - 30);
      }
      // Default wake — sozlama bo'lmasa
      if (wakeMin == null) wakeMin = 360; // 06:00

      // Bedtime — taxminan 6 soat oldin wake
      const bedMin = ((wakeMin + 24 * 60 - 6 * 60) % (24 * 60));

      // Fazalar:
      // 1) bedtime'dan wake'gacha — tun
      // 2) wake'dan +4 soat — tong
      // 3) +4 dan +9 soatgacha — kunduz
      // 4) +9 dan bedtime'gacha — kech
      const noonMin = (wakeMin + 4 * 60) % (24 * 60);
      const eveningMin = (wakeMin + 9 * 60) % (24 * 60);

      function inRange(now, start, end) {
        if (start <= end) return now >= start && now < end;
        // O'rab qoluvchi (masalan 22:00 → 02:00)
        return now >= start || now < end;
      }

      if (inRange(nowMin, bedMin, wakeMin)) return 'Xayrli tun';
      if (inRange(nowMin, wakeMin, noonMin)) return 'Xayrli tong';
      if (inRange(nowMin, noonMin, eveningMin)) return 'Assalomu alaykum';
      return 'Xayrli kech';
    }
    document.getElementById('greetWord').textContent = smartGreeting();

    // KEYINGI — faqat BUGUNGI kelajakdagi task'lar
    const upcoming = plan.find(p => tKey(p.time) >= nowMin);
    const nextRow = document.getElementById('nextRow');
    if (upcoming) {
      nextRow.innerHTML = `<span class="time">${upcoming.time || '—'}</span><span class="name">${upcoming.name || 'ish'}</span>`;
    } else if (plan.length) {
      // Bugungilar tugadi
      nextRow.innerHTML = '<span class="none">bugungi rejalar tugadi</span>';
    } else {
      nextRow.innerHTML = '<span class="none">reja yo\'q</span>';
    }

    // Stats — bajarilgan va qolgan
    function durMins(s) {
      if (!s) return 0;
      const x = s.toLowerCase();
      let m = 0;
      const h = x.match(/(\d+(?:\.\d+)?)\s*s/);
      const min = x.match(/(\d+)\s*d/);
      if (h) m += Math.round(parseFloat(h[1]) * 60);
      if (min) m += parseInt(min[1], 10);
      if (!h && !min) {
        const n = parseInt(x, 10);
        if (!isNaN(n)) m = n;
      }
      return m;
    }
    const totalMin = plan.reduce((s,p) => s + durMins(p.dur), 0);
    const totalH = Math.round(totalMin / 60 * 10) / 10;
    document.getElementById('focusH').textContent = totalH || 0;
    document.getElementById('sessN').textContent = plan.length;

    // CTA — foydalanuvchining kun tartibiga moslashadi
    const cta = document.getElementById('primaryCta');
    const greet = smartGreeting();
    if (greet === 'Xayrli kech' || greet === 'Xayrli tun' || (!upcoming && plan.length)) {
      // Kech, tun yoki bugungilar tugadi → kun yakuni
      cta.textContent = 'Kun yakuni';
      cta.href = 'kechqurun.html';
    } else if (plan.length) {
      cta.textContent = 'Boshlayman';
      cta.href = 'day-flow.html';
    }

    // Streak risk indikatori — gapirmaydi, faqat ko'rsatadi
    const todayKey = 'mvow.done.' + new Date().toISOString().slice(0,10);
    const todayDone = parseInt(localStorage.getItem(todayKey) || '0', 10);
    const hour = hourNow;
    if (streak > 0 && todayDone === 0 && hour >= 18 && hour < 22) {
      const streakEl = document.getElementById('streakN');
      if (streakEl) {
        streakEl.style.color = '#FF8E97';
        const lbl = streakEl.parentNode.querySelector('.lbl');
        if (lbl) lbl.textContent = 'xatarda';
      }
    }
  });
</script>

</body>
</html>
