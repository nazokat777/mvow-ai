<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title data-i18n="gallery.title">{brand} — Gallereya</title>
<meta name="description" content="Intizom do'sti — sizning do'stingiz.">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png?v=2">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png?v=2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --void:#04060B; --void-soft:#0C0F16; --text:#F5F2EC; --text-mid:#B8BBC2; --text-dim:#9CA0A8; }
  body { background: var(--void); font-family:'Inter',sans-serif; color: var(--text); min-height: 100vh; padding: 40px 24px 40px; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 1100px; margin: 0 auto; }
  .h { text-align:center; margin-bottom: 48px; }
  .h .title { font-family:'Inter',sans-serif; font-size: 46px; font-weight: 500; }
  .h .sub { font-size: 15px; letter-spacing: 4px; color: var(--text-mid); text-transform: uppercase; margin-top: 8px; }
  .section { margin-bottom: 56px; }
  .section .lbl { font-size: 15px; letter-spacing: 4px; color: var(--text-dim); text-transform: uppercase; padding: 0 4px 16px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
  .card { background: var(--void-soft); border-radius: 12px; overflow: hidden; text-decoration: none; color: var(--text); transition: transform .15s, box-shadow .15s; display: flex; flex-direction: column; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(244, 132, 95,.12); }
  .thumb { height: 400px; background: #000; overflow: hidden; position: relative; }
  .thumb iframe { border: 0; width: 380px; height: 800px; transform: scale(0.5); transform-origin: top left; pointer-events: none; }
  .card .lbl-row { padding: 14px 14px 16px; display: flex; align-items: baseline; gap: 10px; }
  .card .num { font-size: 16px; color: var(--accent); }
  .card .name { font-size: 18px; font-weight: 500; }
  @media (max-width: 480px) {
    .grid { grid-template-columns: 1fr 1fr; gap: 12px; }
    .thumb { height: 260px; }
    .thumb iframe { transform: scale(0.32); }
    .card .name { font-size: 16px; }
  }
</style>
<link rel="stylesheet" href="theme.css">
</head>
<body>

<div class="wrap">

  <div class="h">
    <div class="title" data-brand="name">FOCUS AI</div>
    <div class="sub" data-i18n="gallery.sub">15 ekran · preview</div>
  </div>

  <div class="section">
    <div class="lbl" data-i18n="gallery.sec_intro">Tanishuv</div>
    <div class="grid">
      <a class="card" href="intro.html"><div class="thumb"><iframe src="intro.html" loading="lazy"></iframe></div><div class="lbl-row"><span class="num">1</span><span class="name" data-i18n="gallery.s_intro">Tanishuv</span></div></a>
      <a class="card" href="anketa.html"><div class="thumb"><iframe src="anketa.html" loading="lazy"></iframe></div><div class="lbl-row"><span class="num">2</span><span class="name" data-i18n="gallery.s_anketa">Anketa</span></div></a>
      <a class="card" href="vada.html"><div class="thumb"><iframe src="vada.html" loading="lazy"></iframe></div><div class="lbl-row"><span class="num">3</span><span class="name" data-i18n="gallery.s_vada">Va'da</span></div></a>
      <a class="card" href="maqsadlar.html"><div class="thumb"><iframe src="maqsadlar.html" loading="lazy"></iframe></div><div class="lbl-row"><span class="num">4</span><span class="name" data-i18n="gallery.s_maqsadlar">Maqsadlar</span></div></a>
    </div>
  </div>

  <div class="section">
    <div class="lbl" data-i18n="gallery.sec_settings">Sozlama</div>
    <div class="grid">
      <a class="card" href="settings.html"><div class="thumb"><iframe src="settings.html" loading="lazy"></iframe></div><div class="lbl-row"><span class="num">5</span><span class="name" data-i18n="gallery.s_settings">Sozlamalar</span></div></a>
    </div>
  </div>

  <div class="section">
    <div class="lbl" data-i18n="gallery.sec_day">Kun</div>
    <div class="grid">
      <a class="card" href="home.html"><div class="thumb"><iframe src="home.html" loading="lazy"></iframe></div><div class="lbl-row"><span class="num">6</span><span class="name" data-i18n="gallery.s_home">Bosh sahifa</span></div></a>
      <a class="card" href="alarm.html"><div class="thumb"><iframe src="alarm.html" loading="lazy"></iframe></div><div class="lbl-row"><span class="num">10</span><span class="name" data-i18n="gallery.s_alarm">Budilnik</span></div></a>
    </div>
  </div>

  <div class="section">
    <div class="lbl" data-i18n="gallery.sec_do">Bajarish</div>
    <div class="grid">
      <a class="card" href="hard-lock.html"><div class="thumb"><iframe src="hard-lock.html" loading="lazy"></iframe></div><div class="lbl-row"><span class="num">11</span><span class="name" data-i18n="gallery.s_focus">Fokus taymeri</span></div></a>
      <a class="card" href="session-reflection.html"><div class="thumb"><iframe src="session-reflection.html" loading="lazy"></iframe></div><div class="lbl-row"><span class="num">12</span><span class="name" data-i18n="gallery.s_done">Bajardim</span></div></a>
      <a class="card" href="kechqurun.html"><div class="thumb"><iframe src="kechqurun.html" loading="lazy"></iframe></div><div class="lbl-row"><span class="num">13</span><span class="name" data-i18n="gallery.s_evening">Kun yakuni</span></div></a>
    </div>
  </div>

  <div class="section">
    <div class="lbl" data-i18n="gallery.sec_result">Natija</div>
    <div class="grid">
      <a class="card" href="weekly-review.html"><div class="thumb"><iframe src="weekly-review.html" loading="lazy"></iframe></div><div class="lbl-row"><span class="num">14</span><span class="name" data-i18n="gallery.s_history">Tarix</span></div></a>
      <a class="card" href="celebrate.html"><div class="thumb"><iframe src="celebrate.html" loading="lazy"></iframe></div><div class="lbl-row"><span class="num">15</span><span class="name" data-i18n="gallery.s_celebrate">Bayram</span></div></a>
    </div>
  </div>

</div>

<script src="i18n.js?v=28.4.0"></script>
<script src="lang-switcher.js?v=28.4.0" defer></script>
<script src="focus-indicator.js?v=28.4.0" defer></script>
<script src="back-btn.js?v=28.4.0"></script>
</body>
</html>
