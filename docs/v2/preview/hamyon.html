<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>FOCUS AI — Hamyon</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png?v=2">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png?v=2">
<link rel="stylesheet" href="theme.css">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Inter', sans-serif; background: var(--void, #04060B); color: var(--text, #F5F2EC); }
  .phone { max-width: 480px; margin: 0 auto; min-height: 100vh; background: var(--void, #04060B); padding: 26px 18px 60px; }
  h1 { font-size: 30px; margin: 6px 0 2px; }
  .sub { color: var(--text-dim, #9CA0A8); font-size: 14px; margin-bottom: 18px; }

  .bal { background: linear-gradient(135deg, rgba(107,191,122,.14), rgba(110,181,255,.08)); border: 1px solid rgba(107,191,122,.28); border-radius: 18px; padding: 18px 18px 16px; margin-bottom: 16px; }
  .bal .k { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim, #9CA0A8); font-weight: 700; }
  .bal .v { font-family: 'Inter', sans-serif; font-size: 34px; font-weight: 800; margin-top: 2px; line-height: 1.1; }
  .bal .v .u { font-size: 16px; font-weight: 600; color: var(--text-dim, #9CA0A8); }
  .bal .split { display: flex; gap: 10px; margin-top: 14px; }
  .chip { flex: 1; background: rgba(255,255,255,.05); border: 1px solid var(--border-default, rgba(255,255,255,.10)); border-radius: 12px; padding: 10px 12px; }
  .chip .ck { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim, #9CA0A8); }
  .chip .cv { font-size: 16px; font-weight: 700; margin-top: 2px; }
  .free { margin-top: 12px; font-size: 13px; color: var(--text-dim, #9CA0A8); }
  .free b { color: var(--text, #F5F2EC); }
  .free.neg b { color: #FF7A7A; }

  .sec { margin-top: 20px; }
  .sec-hd { display: flex; align-items: center; justify-content: space-between; margin: 0 2px 8px; }
  .sec-hd .t { font-size: 14px; letter-spacing: 1px; text-transform: uppercase; font-weight: 800; }
  .sec-hd .t.g { color: #6BBF7A; } .sec-hd .t.a { color: #F5C26B; } .sec-hd .t.r { color: #FF7A7A; } .sec-hd .t.b { color: #6EB5FF; } .sec-hd .t.s { color: #9B8CFF; }
  .sec-hd .tot { font-size: 15px; font-weight: 700; color: var(--text, #F5F2EC); }
  .addb { border: none; border-radius: 999px; padding: 7px 14px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; color: #04060B; }
  .addb.g { background: #6BBF7A; } .addb.r { background: #FF7A7A; } .addb.b { background: #6EB5FF; } .addb.s { background: #9B8CFF; }
  .item { display: flex; align-items: center; gap: 10px; background: var(--card, #0C0F16); border: 1px solid var(--border-default, rgba(255,255,255,.10)); border-radius: 12px; padding: 12px 14px; margin-top: 8px; }
  .item .nm { flex: 1; min-width: 0; }
  .item .nm .n1 { font-size: 15px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .item .nm .n2 { font-size: 12px; color: var(--text-dim, #9CA0A8); margin-top: 2px; }
  .item .amt { font-size: 15px; font-weight: 800; flex-shrink: 0; }
  .item .amt.g { color: #6BBF7A; } .item .amt.a { color: #F5C26B; } .item .amt.r { color: #FF7A7A; } .item .amt.b { color: #6EB5FF; } .item .amt.s { color: #9B8CFF; }
  .item .amt.muted { color: var(--text-dim, #9CA0A8); font-weight: 700; }
  .item .x { background: none; border: none; color: var(--text-dim, #9CA0A8); font-size: 20px; cursor: pointer; flex-shrink: 0; line-height: 1; }
  .empty { color: var(--text-dim, #9CA0A8); font-size: 14px; padding: 8px 4px; }
  .tag { display: inline-block; font-size: 11px; font-weight: 700; padding: 1px 7px; border-radius: 6px; margin-left: 6px; vertical-align: middle; }
  .tag.card { background: rgba(110,181,255,.16); color: #6EB5FF; } .tag.cash { background: rgba(107,191,122,.16); color: #6BBF7A; }

  .ov { display: none; position: fixed; inset: 0; z-index: 9998; background: rgba(0,0,0,.6); align-items: flex-end; justify-content: center; padding: 0; }
  .ov.show { display: flex; }
  #histOv { align-items: stretch; }
  #histSheet { border-radius: 0; min-height: 100vh; max-width: 480px; margin: 0 auto; overflow-y: auto; }
  .sheet { width: 100%; max-width: 480px; background: var(--card, #11151E); border-radius: 20px 20px 0 0; padding: 22px 18px calc(22px + env(safe-area-inset-bottom, 0px)); border-top: 1px solid var(--border-default, rgba(255,255,255,.12)); }
  .sheet h2 { font-size: 20px; margin-bottom: 14px; }
  .lbl { font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim, #9CA0A8); font-weight: 700; margin: 12px 2px 6px; display: block; }
  .fld { width: 100%; padding: 13px; background: var(--void, #0C0F16); border: 1px solid var(--border-default, rgba(255,255,255,.12)); border-radius: 12px; color: var(--text, #F5F2EC); font-size: 16px; font-family: inherit; }
  .amtrow { display: flex; gap: 8px; }
  .amtrow .fld { flex: 1; }
  .seg { display: flex; gap: 6px; }
  .seg button { flex: 1; padding: 11px; border-radius: 10px; border: 1px solid var(--border-default, rgba(255,255,255,.14)); background: transparent; color: var(--text-mid, #B8BBC2); font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .seg button.on { background: var(--accent, #F4845F); border-color: var(--accent, #F4845F); color: #fff; }
  #rowType button { padding: 11px; border-radius: 10px; border: 1px solid var(--border-default, rgba(255,255,255,.14)); background: transparent; color: var(--text-mid, #B8BBC2); font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
  #rowType button.on { background: var(--accent, #F4845F); border-color: var(--accent, #F4845F); color: #fff; }
  .preview { font-size: 13px; color: var(--text-dim, #9CA0A8); margin-top: 6px; min-height: 16px; }
  #fPreview { color: var(--accent, #F4845F); font-weight: 800; font-size: 16px; }
  .row2 { display: flex; gap: 10px; margin-top: 18px; }
  .btn { flex: 1; padding: 14px; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; border: none; }
  .btn.cancel { background: transparent; border: 1px solid var(--border-default, rgba(255,255,255,.15)); color: var(--text-mid, #B8BBC2); }
  .btn.save { background: var(--accent, #F4845F); color: #fff; }
</style>
</head>
<body>
<div class="phone">
  <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;">
    <h1 data-i18n="wallet.title">Hamyon</h1>
    <button id="histBtn" type="button" style="flex-shrink:0;background:var(--card,#0C0F16);border:1px solid var(--border-default,rgba(255,255,255,.12));color:var(--text,#F5F2EC);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">🕘 <span data-i18n="wallet.history">Tarix</span></button>
  </div>
  <div class="sub" data-i18n="wallet.sub">Pul kirim-chiqim va rejalar</div>

  <div class="bal">
    <div class="k" data-i18n="wallet.balance">Qoldiq</div>
    <div class="v" id="balV">0 <span class="u" data-i18n="wallet.som">so'm</span></div>
    <div class="split">
      <div class="chip"><div class="ck" data-i18n="wallet.card">Plastik</div><div class="cv" id="cardV">0</div></div>
      <div class="chip"><div class="ck" data-i18n="wallet.cash">Naqd</div><div class="cv" id="cashV">0</div></div>
    </div>
    <div class="free" id="freeRow"></div>
    <div class="free" id="savedRow" style="display:none;"></div>
  </div>

  <div class="sec">
    <div class="sec-hd"><span class="t s" data-i18n="wallet.savings">Zaxira</span><span class="tot" id="totSaved">0</span></div>
    <div style="font-size:12.5px;color:var(--text-dim,#9CA0A8);margin:0 0 8px;line-height:1.5;" data-i18n="wallet.savings_note">Chetga olib qo'yilgan pul. Hamyonda turaveradi, lekin "erkin pul"dan chiqariladi va oy almashganda nolga tushmaydi.</div>
    <div id="listSaved"></div>
    <div style="margin-top:8px;text-align:right;"><button class="addb s" data-add="save" data-i18n="wallet.add_savings">+ Zaxira</button></div>
  </div>

  <div class="sec">
    <div class="sec-hd"><span class="t g" data-i18n="wallet.in_received">Kirgan pul</span><span class="tot" id="totIn">0</span></div>
    <div id="listIn"></div>
    <div style="margin-top:8px;text-align:right;"><button class="addb g" data-add="in" data-i18n="wallet.add_in">+ Kirim</button></div>
  </div>

  <div class="sec">
    <div class="sec-hd"><span class="t a" data-i18n="wallet.in_expected">Kutilayotgan pul</span><span class="tot" id="totExp">0</span></div>
    <div id="listExp"></div>
    <div style="margin-top:8px;text-align:right;"><button class="addb g" data-add="exp-in" style="background:#F5C26B;" data-i18n="wallet.add_expected">+ Kutilayotgan</button></div>
  </div>

  <div class="sec">
    <div class="sec-hd"><span class="t r" data-i18n="wallet.spent">Ishlatilgan</span><span class="tot" id="totSpent">0</span></div>
    <div class="free" id="daySpend" style="margin-top:0;margin-bottom:8px;"></div>
    <div id="listSpent"></div>
    <div style="margin-top:8px;text-align:right;"><button class="addb r" data-add="spend" data-i18n="wallet.add_exp">+ Rasxod</button></div>
  </div>

  <div class="sec">
    <div class="sec-hd"><span class="t b" data-i18n="wallet.planned">Rejalangan rasxodlar</span><span class="tot" id="totPlan">0</span></div>
    <div id="listPlan"></div>
    <div style="margin-top:8px;text-align:right;"><button class="addb b" data-add="plan" data-i18n="wallet.add_plan">+ Reja</button></div>
  </div>

  <div style="margin-top:30px;text-align:center;">
    <button id="clearAll" type="button" style="background:none;border:none;color:var(--text-dim,#9CA0A8);font-size:13px;text-decoration:underline;cursor:pointer;font-family:inherit;">🗑 <span data-i18n="wallet.clear_all">Hammasini tozalash</span></button>
  </div>
</div>

<div class="ov" id="ov">
  <div class="sheet">
    <h2 id="ovTitle">—</h2>
    <div id="rowType" style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px;">
      <button type="button" id="tIn" data-i18n="wallet.type_in">Kirim</button>
      <button type="button" id="tExpIn" data-i18n="wallet.type_expected">Kutilayotgan</button>
      <button type="button" id="tSpend" data-i18n="wallet.type_exp">Rasxod</button>
      <button type="button" id="tSave" data-i18n="wallet.type_savings">Zaxira</button>
      <button type="button" id="tPlan" style="grid-column:1 / -1;" data-i18n="wallet.type_plan">Reja</button>
    </div>
    <label class="lbl" data-i18n="wallet.amount">Summa</label>
    <div class="amtrow">
      <input id="fAmount" class="fld" type="number" inputmode="numeric" min="0" step="any" placeholder="0">
      <select id="fUnit" class="fld" style="flex:0 0 100px;">
        <option value="1" data-i18n="wallet.unit_som">so'm</option>
        <option value="1000" data-i18n="wallet.unit_ming">ming</option>
        <option value="1000000" data-i18n="wallet.unit_mln">mln</option>
      </select>
    </div>
    <div class="preview" id="fPreview"></div>

    <div id="rowName">
      <label class="lbl" id="fNameLbl">—</label>
      <input id="fName" class="fld" maxlength="60" placeholder="">
    </div>

    <div id="rowMethod">
      <label class="lbl" data-i18n="wallet.method">Turi</label>
      <div class="seg">
        <button type="button" id="mCard" data-i18n="wallet.card">Plastik</button>
        <button type="button" id="mCash" data-i18n="wallet.cash">Naqd</button>
      </div>
    </div>

    <div id="rowDate">
      <label class="lbl" id="fDateLbl" data-i18n="wallet.date_lbl">Sana</label>
      <input id="fDate" class="fld" type="date">
    </div>

    <div id="rowWeeks" style="display:none;">
      <label class="lbl" data-i18n="wallet.split_lbl">Necha muddatga bo'lib</label>
      <div class="amtrow">
        <input id="fWeeks" class="fld" type="number" inputmode="numeric" min="1" max="365" step="1" value="4">
        <div class="seg" style="flex:0 0 150px;">
          <button type="button" id="uWeek" class="on" data-i18n="wallet.unit_week">Hafta</button>
          <button type="button" id="uDay" data-i18n="wallet.unit_day">Kun</button>
        </div>
      </div>
      <div class="preview" id="fWeekPreview"></div>
    </div>

    <div id="rowApprox" style="display:none;margin-top:14px;">
      <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:15px;color:var(--text-mid,#B8BBC2);">
        <input type="checkbox" id="fApprox" style="width:18px;height:18px;accent-color:var(--accent);flex-shrink:0;">
        <span data-i18n="wallet.approx_lbl">≈ Balansdan taxminan ayirilsin (rangsiz)</span>
      </label>
    </div>

    <div class="row2">
      <button class="btn cancel" id="ovCancel" data-i18n="wallet.cancel">Bekor</button>
      <button class="btn save" id="ovSave" data-i18n="wallet.save">Saqlash</button>
    </div>
  </div>
</div>

<div class="ov" id="histOv">
  <div class="sheet" id="histSheet">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <h2 data-i18n="wallet.history">Tarix</h2>
      <button id="histClose" type="button" style="background:none;border:none;color:var(--text-mid,#B8BBC2);font-size:28px;cursor:pointer;line-height:1;">×</button>
    </div>
    <div id="histBody"></div>
  </div>
</div>
<div id="wToast" style="position:fixed;left:50%;bottom:30px;transform:translateX(-50%);background:var(--card,#11151E);color:var(--text,#F5F2EC);border:1px solid var(--accent,#F4845F);padding:12px 20px;border-radius:999px;font-size:14px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.4);opacity:0;transition:opacity .3s;pointer-events:none;z-index:10000;max-width:90%;text-align:center;"></div>

<script src="i18n.js?v=29.0.31"></script>
<script src="pin-lock.js?v=29.0.84"></script>
<script src="lang-switcher.js?v=29.0.31" defer></script>
<script src="data.js?v=29.0.31" defer></script>
<script src="nav-overlay.js?v=29.0.31" defer></script>
<script>
  (function () {
    function T(k, fb) { return (window.I18N && I18N.t) ? I18N.t(k, fb) : fb; }
    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]); }); }
    function fmt(n) {
      n = Math.round(Number(n) || 0);
      var neg = n < 0; n = Math.abs(n);
      var s = String(n).replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
      return (neg ? '−' : '') + s;
    }
    var SOM = function () { return T('wallet.som', "so'm"); };

    function load() {
      var d = null;
      try { d = JSON.parse(localStorage.getItem('mvow.wallet') || 'null'); } catch (e) {}
      if (!d || typeof d !== 'object') d = {};
      if (!Array.isArray(d.incomes)) d.incomes = [];
      if (!Array.isArray(d.expenses)) d.expenses = [];
      if (!Array.isArray(d.planned)) d.planned = [];
      if (!Array.isArray(d.savings)) d.savings = [];
      return d;
    }
    function save(d) { try { localStorage.setItem('mvow.wallet', JSON.stringify(d)); } catch (e) {} }

    // ── Oylik tarix: yangi oy boshlanganda o'tgan oy avtomatik arxivga ko'chadi ──
    function ymNow() { var d = new Date(); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0'); }
    function loadHistory() { try { var h = JSON.parse(localStorage.getItem('mvow.walletHistory') || '{}'); return (h && typeof h === 'object') ? h : {}; } catch (e) { return {}; } }
    function saveHistory(h) { try { localStorage.setItem('mvow.walletHistory', JSON.stringify(h)); } catch (e) {} }
    function rollover() {
      var cur = ymNow(), stored = null;
      try { stored = localStorage.getItem('mvow.walletMonth'); } catch (e) {}
      if (!stored) { try { localStorage.setItem('mvow.walletMonth', cur); } catch (e) {} return false; }
      if (stored === cur) return false;
      var d = load();
      if (d.incomes.length || d.expenses.length || d.planned.length) {
        var h = loadHistory(); h[stored] = { incomes: d.incomes, expenses: d.expenses, planned: d.planned }; saveHistory(h);
      }
      // ZAXIRA oy almashganda tozalanmaydi — u yig'ilib boradi (butun maqsadi shu).
      var keepSavings = d.savings || [];
      try {
        localStorage.removeItem('mvow.wallet');
        localStorage.setItem('mvow.walletMonth', cur);
        if (keepSavings.length) localStorage.setItem('mvow.wallet', JSON.stringify({ incomes: [], expenses: [], planned: [], savings: keepSavings }));
      } catch (e) {}
      return true;
    }
    function toast(msg) { var t = document.getElementById('wToast'); if (!t) return; t.textContent = msg; t.style.opacity = '1'; setTimeout(function () { t.style.opacity = '0'; }, 3200); }

    function num(x) { var n = Number(x); return isFinite(n) ? n : 0; }
    function todayIso() { try { if (window.MVOW_DATA && MVOW_DATA.today) return MVOW_DATA.today.iso; } catch (e) {} var d = new Date(); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }
    function planSplit(amount, unit, count) { count = Math.max(1, parseInt(count, 10) || 1); var totalDays = (unit === 'day') ? count : count * 7; return { perWeek: amount / (totalDays / 7), perDay: amount / totalDays, count: count }; }

    function compute(d) {
      var recIn = 0, expIn = 0, spent = 0, planned = 0, cardBal = 0, cashBal = 0;
      var ti = todayIso(), spentToday = 0, datedSpent = 0, days = {};
      d.incomes.forEach(function (i) {
        var a = num(i.amount);
        if (i.expected) { expIn += a; }
        else { recIn += a; if (i.method === 'cash') cashBal += a; else cardBal += a; }
      });
      d.expenses.forEach(function (e) {
        var a = num(e.amount); spent += a;
        if (e.method === 'cash') cashBal -= a; else cardBal -= a;
        if (e.date) { if (e.date === ti) spentToday += a; datedSpent += a; days[e.date] = 1; }
      });
      d.planned.forEach(function (p) { planned += num(p.amount); });
      // Zaxira — chetga olib qo'yilgan pul. Sarflanmagan (balansda qoladi), lekin ERKIN emas.
      var saved = 0;
      (d.savings || []).forEach(function (s) { saved += num(s.amount); });
      var nd = Object.keys(days).length;
      return { recIn: recIn, expIn: expIn, spent: spent, planned: planned, saved: saved, balance: recIn - spent, free: recIn - spent - planned - saved, cardBal: cardBal, cashBal: cashBal,
        spentToday: spentToday, avgDay: nd ? datedSpent / nd : 0, hasDaily: nd > 0 };
    }

    function itemRow(text, sub, amount, cls, delAttr, opts) {
      opts = opts || {};
      var amt = (opts.amtStr != null) ? opts.amtStr : fmt(amount);
      var nmAttr = opts.edit ? ' data-edit="' + opts.edit + '" style="cursor:pointer;"' : '';
      return '<div class="item"' + (opts.rowStyle ? ' style="' + opts.rowStyle + '"' : '') + '><div class="nm"' + nmAttr + '><div class="n1">' + esc(text || '—') + '</div>'
        + (sub ? '<div class="n2">' + sub + '</div>' : '')
        + '</div><div class="amt ' + cls + '">' + amt + '</div>'
        + '<button class="x" ' + delAttr + ' aria-label="o\'chirish">×</button></div>';
    }
    function methodTag(m) {
      return m === 'cash' ? '<span class="tag cash">' + T('wallet.cash', 'Naqd') + '</span>' : '<span class="tag card">' + T('wallet.card', 'Plastik') + '</span>';
    }
    function fmtDate(iso) { var m = String(iso || '').match(/^(\d{4})-(\d{2})-(\d{2})$/); return m ? (m[3] + '.' + m[2] + '.' + m[1]) : ''; }
    function subMeta(method, date) { var dt = fmtDate(date); return methodTag(method) + (dt ? ' · 🗓 ' + dt : ''); }

    function render() {
      var d = load(), c = compute(d);
      document.getElementById('balV').innerHTML = fmt(c.balance) + ' <span class="u">' + SOM() + '</span>';
      document.getElementById('cardV').textContent = fmt(c.cardBal);
      document.getElementById('cashV').textContent = fmt(c.cashBal);
      var freeRow = document.getElementById('freeRow');
      freeRow.className = 'free' + (c.free < 0 ? ' neg' : '');
      freeRow.innerHTML = T('wallet.free', 'Reja ayirilgach erkin') + ': <b>' + fmt(c.free) + ' ' + SOM() + '</b>';

      var savedRow = document.getElementById('savedRow');
      savedRow.style.display = c.saved > 0 ? '' : 'none';
      savedRow.innerHTML = '🔒 ' + T('wallet.saved_row', 'Zaxirada') + ': <b>' + fmt(c.saved) + ' ' + SOM() + '</b>';
      document.getElementById('totSaved').textContent = fmt(c.saved) + ' ' + SOM();
      document.getElementById('listSaved').innerHTML = d.savings.length
        ? d.savings.map(function (s) { return itemRow(s.cat, subMeta(s.method, s.date), s.amount, 's', 'data-del="sav:' + s.id + '"', { edit: 'sav:' + s.id }); }).join('')
        : '<div class="empty">' + T('wallet.empty_savings', "Hali zaxira yo'q") + '</div>';

      document.getElementById('totIn').textContent = fmt(c.recIn) + ' ' + SOM();
      document.getElementById('totExp').textContent = fmt(c.expIn) + ' ' + SOM();
      document.getElementById('totSpent').textContent = fmt(c.spent) + ' ' + SOM();
      document.getElementById('totPlan').textContent = fmt(c.planned) + ' ' + SOM();

      var daySpend = document.getElementById('daySpend');
      daySpend.innerHTML = c.hasDaily
        ? (T('wallet.today', 'Bugun') + ': <b>' + fmt(c.spentToday) + ' ' + SOM() + '</b> · ' + T('wallet.avg_day', 'kuniga o\'rtacha') + ': <b>' + fmt(c.avgDay) + ' ' + SOM() + '</b>')
        : '';

      var received = d.incomes.filter(function (i) { return !i.expected; });
      var expected = d.incomes.filter(function (i) { return i.expected; });
      document.getElementById('listIn').innerHTML = received.length
        ? received.map(function (i) { return itemRow(i.source, subMeta(i.method, i.date), i.amount, 'g', 'data-del="inc:' + i.id + '"', { edit: 'inc:' + i.id }); }).join('')
        : '<div class="empty">' + T('wallet.empty_in', "Hali kirim yo'q") + '</div>';
      document.getElementById('listExp').innerHTML = expected.length
        ? expected.map(function (i) { return itemRow(i.source, subMeta(i.method, i.date), i.amount, 'a', 'data-del="inc:' + i.id + '"', { edit: 'inc:' + i.id }); }).join('')
        : '<div class="empty">' + T('wallet.empty_expected', 'Hali yo\'q') + '</div>';
      document.getElementById('listSpent').innerHTML = d.expenses.length
        ? d.expenses.map(function (e) { return itemRow(e.cat, subMeta(e.method, e.date), -Math.abs(num(e.amount)), 'r', 'data-del="exp:' + e.id + '"', { edit: 'exp:' + e.id }); }).join('')
        : '<div class="empty">' + T('wallet.empty_exp', "Hali rasxod yo'q") + '</div>';
      document.getElementById('listPlan').innerHTML = d.planned.length
        ? d.planned.map(function (p) {
            var unit = p.unit || 'week';
            var count = (p.count != null) ? p.count : p.weeks;   // eski yozuvlar migratsiyasi
            var sp = planSplit(num(p.amount), unit, count);
            var unitLbl = (unit === 'day') ? T('wallet.days_short', 'kun') : T('wallet.weeks_short', 'hafta');
            var dprefix = p.date ? '🗓 ' + fmtDate(p.date) + ' · ' : '';
            var sub = dprefix + sp.count + ' ' + unitLbl + ' · ' + T('wallet.per_week', 'haftasiga') + ' ' + fmt(sp.perWeek) + ' · ' + T('wallet.per_day', 'kuniga') + ' ' + fmt(sp.perDay);
            var opts = { edit: 'plan:' + p.id };
            if (p.approx) { opts.amtStr = '≈ −' + fmt(num(p.amount)); opts.rowStyle = 'opacity:.7;'; }
            return itemRow(p.cat, sub, p.amount, p.approx ? 'muted' : 'b', 'data-del="plan:' + p.id + '"', opts);
          }).join('')
        : '<div class="empty">' + T('wallet.empty_plan', "Hali reja yo'q") + '</div>';

      document.querySelectorAll('[data-del]').forEach(function (b) {
        b.addEventListener('click', function (e) { e.stopPropagation(); del(b.getAttribute('data-del')); });
      });
      document.querySelectorAll('[data-edit]').forEach(function (el) {
        el.addEventListener('click', function () { var t = el.getAttribute('data-edit').split(':'); startEdit(t[0], t.slice(1).join(':')); });
      });
    }

    // Bo'lim kaliti -> massiv (inc | exp | sav | plan)
    function arrOf(d, kind) {
      return kind === 'inc' ? d.incomes : (kind === 'exp' ? d.expenses : (kind === 'sav' ? d.savings : d.planned));
    }

    function del(token) {
      var d = load(), p = token.split(':'), kind = p[0], id = p.slice(1).join(':');
      var arr0 = arrOf(d, kind);
      var item = null; for (var i = 0; i < arr0.length; i++) { if (String(arr0[i].id) === id) { item = arr0[i]; break; } }
      if (kind === 'inc') d.incomes = d.incomes.filter(function (x) { return String(x.id) !== id; });
      else if (kind === 'exp') d.expenses = d.expenses.filter(function (x) { return String(x.id) !== id; });
      else if (kind === 'sav') d.savings = d.savings.filter(function (x) { return String(x.id) !== id; });
      else if (kind === 'plan') d.planned = d.planned.filter(function (x) { return String(x.id) !== id; });
      save(d);
      if (window.MVOW_DATA && MVOW_DATA.fxTap) MVOW_DATA.fxTap();
      render();
      if (window.MvowUndo && item) MvowUndo.show(T('common.deleted', "O'chirildi"), function () {
        var dd = load(); arrOf(dd, kind).push(item); save(dd); render();
      });
    }

    // ── Qo'shish oynasi (sheet) ──
    var ov = document.getElementById('ov');
    var fAmount = document.getElementById('fAmount'), fUnit = document.getElementById('fUnit');
    var fName = document.getElementById('fName'), fNameLbl = document.getElementById('fNameLbl');
    var fWeeks = document.getElementById('fWeeks');
    var rowMethod = document.getElementById('rowMethod'), rowWeeks = document.getElementById('rowWeeks');
    var mCard = document.getElementById('mCard'), mCash = document.getElementById('mCash');
    var uWeek = document.getElementById('uWeek'), uDay = document.getElementById('uDay');
    var rowDate = document.getElementById('rowDate'), fDate = document.getElementById('fDate'), fDateLbl = document.getElementById('fDateLbl');
    var rowApprox = document.getElementById('rowApprox'), fApprox = document.getElementById('fApprox');
    var curType = null, curMethod = 'card', curPeriod = 'week', curEdit = null;
    function setPeriod(p) { curPeriod = p; if (uWeek) uWeek.classList.toggle('on', p === 'week'); if (uDay) uDay.classList.toggle('on', p === 'day'); updatePreview(); }

    function calcAmount() { return Math.round(num(fAmount.value) * num(fUnit.value)); } // butun so'm — float chang saqlanmasin
    function updatePreview() {
      var a = calcAmount();
      document.getElementById('fPreview').textContent = a > 0 ? ('= ' + fmt(a) + ' ' + SOM()) : '';
      if (rowWeeks.style.display !== 'none') {
        var sp = planSplit(a, curPeriod, fWeeks.value);
        document.getElementById('fWeekPreview').textContent = a > 0
          ? (T('wallet.per_week', 'haftasiga') + ': ' + fmt(sp.perWeek) + ' ' + SOM() + ' · ' + T('wallet.per_day', 'kuniga') + ': ' + fmt(sp.perDay) + ' ' + SOM())
          : '';
      }
    }
    function setMethod(m) { curMethod = m; mCard.classList.toggle('on', m === 'card'); mCash.classList.toggle('on', m === 'cash'); }

    // Tur (bo'lim) tanlash — barcha rejimda; tahrirlashda boshqa bo'limga ko'chirish mumkin
    function setType(type) {
      curType = type;
      [['tIn', 'in'], ['tExpIn', 'exp-in'], ['tSpend', 'spend'], ['tSave', 'save'], ['tPlan', 'plan']].forEach(function (p) {
        var b = document.getElementById(p[0]); if (b) b.classList.toggle('on', type === p[1]);
      });
      var tk = { 'in': 'wallet.add_in', 'exp-in': 'wallet.add_expected', 'spend': 'wallet.add_exp', 'save': 'wallet.add_savings', 'plan': 'wallet.add_plan' };
      document.getElementById('ovTitle').textContent = curEdit ? T('wallet.edit', 'Tahrirlash') : T(tk[type], '+');
      if (type === 'in' || type === 'exp-in') { fNameLbl.textContent = T('wallet.source_lbl', 'Manba'); fName.placeholder = T('wallet.source_ph', 'mas. oylik'); }
      else if (type === 'save') { fNameLbl.textContent = T('wallet.savings_lbl', 'Nima uchun yig\'yapsiz'); fName.placeholder = T('wallet.savings_ph', 'mas. safar uchun'); }
      else if (type === 'spend') { fNameLbl.textContent = T('wallet.cat_lbl', 'Nima uchun'); fName.placeholder = T('wallet.cat_ph', 'mas. maktab to\'lovi'); }
      else { fNameLbl.textContent = T('wallet.plan_lbl', 'Reja nomi'); fName.placeholder = T('wallet.plan_ph', 'mas. haftalik xarajat'); }
      rowMethod.style.display = (type === 'plan') ? 'none' : '';
      fDateLbl.textContent = (type === 'plan') ? T('wallet.date_start_lbl', 'Boshlanish sanasi')
        : ((type === 'exp-in') ? T('wallet.date_exp_lbl', 'Qachon kutilmoqda') : T('wallet.date_lbl', 'Sana'));
      rowWeeks.style.display = (type === 'plan') ? '' : 'none';
      if (rowApprox) rowApprox.style.display = (type === 'plan') ? '' : 'none';
      updatePreview();
    }
    function openSheet(type, entry) {
      if (!entry) curEdit = null;
      setMethod('card');
      fAmount.value = ''; fName.value = ''; fWeeks.value = '4'; fUnit.value = '1'; if (fApprox) fApprox.checked = false;
      document.getElementById('fPreview').textContent = ''; document.getElementById('fWeekPreview').textContent = '';
      rowDate.style.display = '';
      fDate.value = todayIso();
      setPeriod('week');
      setType(type);
      if (entry) {   // TAHRIRLASH — mavjud qiymatlar bilan to'ldirish
        fUnit.value = '1';
        fAmount.value = num(entry.amount) || '';
        fName.value = entry.source || entry.cat || '';
        if (entry.method) setMethod(entry.method);
        if (entry.date) fDate.value = entry.date;
        if (type === 'plan') {
          fWeeks.value = (entry.count != null) ? entry.count : (entry.weeks || 4);
          setPeriod(entry.unit === 'day' ? 'day' : 'week');
          if (fApprox) fApprox.checked = !!entry.approx;
        }
        updatePreview();
      }
      ov.classList.add('show');
      setTimeout(function () { fAmount.focus(); }, 80);
    }
    function closeSheet() { ov.classList.remove('show'); curType = null; curEdit = null; }

    function startEdit(kind, id) {
      var d = load(), arr = arrOf(d, kind), entry = null;
      for (var k = 0; k < arr.length; k++) { if (String(arr[k].id) === id) { entry = arr[k]; break; } }
      if (!entry) return;
      var type = kind === 'inc' ? (entry.expected ? 'exp-in' : 'in') : (kind === 'exp' ? 'spend' : (kind === 'sav' ? 'save' : 'plan'));
      curEdit = { kind: kind, id: id };
      openSheet(type, entry);
    }

    function saveSheet() {
      var a = calcAmount();
      if (!(a > 0)) { fAmount.focus(); return; }
      var name = fName.value.trim();
      var d = load(), ti = todayIso();
      var dt = /^\d{4}-\d{2}-\d{2}$/.test(fDate.value) ? fDate.value : ti;
      var cnt = Math.max(1, Math.min(365, parseInt(fWeeks.value, 10) || 1));
      var isApprox = !!(fApprox && fApprox.checked);
      if (curEdit) {   // MAVJUDNI YANGILASH (kerak bo'lsa boshqa bo'limga KO'CHIRISH)
        var newKind = curType === 'spend' ? 'exp' : (curType === 'plan' ? 'plan' : (curType === 'save' ? 'sav' : 'inc'));
        var obj;
        if (newKind === 'inc') obj = { id: curEdit.id, amount: a, source: name, method: curMethod, expected: (curType === 'exp-in'), date: dt };
        else if (newKind === 'exp') obj = { id: curEdit.id, amount: a, cat: name, method: curMethod, date: dt };
        else if (newKind === 'sav') obj = { id: curEdit.id, amount: a, cat: name, method: curMethod, date: dt };
        else obj = { id: curEdit.id, amount: a, cat: name, unit: curPeriod, count: cnt, date: dt, approx: isApprox };
        if (curEdit.kind === newKind) {   // o'sha bo'limda — o'rnida yangilash
          var arr2 = arrOf(d, newKind);
          for (var k = 0; k < arr2.length; k++) { if (String(arr2[k].id) === curEdit.id) { arr2[k] = obj; break; } }
        } else {                          // boshqa bo'limga — eskisidan olib, yangisiga qo'shish
          if (curEdit.kind === 'inc') d.incomes = d.incomes.filter(function (x) { return String(x.id) !== curEdit.id; });
          else if (curEdit.kind === 'exp') d.expenses = d.expenses.filter(function (x) { return String(x.id) !== curEdit.id; });
          else if (curEdit.kind === 'sav') d.savings = d.savings.filter(function (x) { return String(x.id) !== curEdit.id; });
          else d.planned = d.planned.filter(function (x) { return String(x.id) !== curEdit.id; });
          arrOf(d, newKind).push(obj);
        }
      } else {         // YANGI QO'SHISH
        var id = String(Date.now()) + Math.floor(Math.random() * 999);
        if (curType === 'in' || curType === 'exp-in') d.incomes.push({ id: id, amount: a, source: name, method: curMethod, expected: (curType === 'exp-in'), date: dt });
        else if (curType === 'spend') d.expenses.push({ id: id, amount: a, cat: name, method: curMethod, date: dt });
        else if (curType === 'save') d.savings.push({ id: id, amount: a, cat: name, method: curMethod, date: dt });
        else if (curType === 'plan') d.planned.push({ id: id, amount: a, cat: name, unit: curPeriod, count: cnt, date: dt, approx: isApprox });
      }
      save(d);
      if (window.MVOW_DATA && MVOW_DATA.fxSuccess) MVOW_DATA.fxSuccess();
      closeSheet(); render();
    }

    fAmount.addEventListener('input', updatePreview);
    fUnit.addEventListener('change', updatePreview);
    fWeeks.addEventListener('input', updatePreview);
    mCard.addEventListener('click', function () { setMethod('card'); });
    mCash.addEventListener('click', function () { setMethod('cash'); });
    if (uWeek) uWeek.addEventListener('click', function () { setPeriod('week'); });
    if (uDay) uDay.addEventListener('click', function () { setPeriod('day'); });
    var typeMap = { tIn: 'in', tExpIn: 'exp-in', tSpend: 'spend', tSave: 'save', tPlan: 'plan' };
    Object.keys(typeMap).forEach(function (idk) {
      var b = document.getElementById(idk);
      if (b) b.addEventListener('click', function () { setType(typeMap[idk]); });
    });
    document.getElementById('ovCancel').addEventListener('click', closeSheet);
    document.getElementById('ovSave').addEventListener('click', saveSheet);
    ov.addEventListener('click', function (e) { if (e.target === ov) closeSheet(); });
    document.querySelectorAll('[data-add]').forEach(function (b) {
      b.addEventListener('click', function () { openSheet(b.getAttribute('data-add')); });
    });
    var clearBtn = document.getElementById('clearAll');
    if (clearBtn) clearBtn.addEventListener('click', function () {
      var old = localStorage.getItem('mvow.wallet');
      if (window.MvowUndo) {
        try { localStorage.removeItem('mvow.wallet'); } catch (e) {} render();
        MvowUndo.show(T('common.deleted', "O'chirildi"), function () { try { if (old != null) localStorage.setItem('mvow.wallet', old); } catch (e) {} render(); });
      } else if (confirm(T('wallet.clear_confirm', "Barcha hamyon yozuvlari o'chirilsinmi?"))) {
        try { localStorage.removeItem('mvow.wallet'); } catch (e) {} render();
      }
    });

    // ── Tarix ko'rish (o'tgan oylar) ──
    var histOv = document.getElementById('histOv');
    function histRow(name, sub, amt, cls) {
      return '<div class="item"><div class="nm"><div class="n1">' + esc(name || '—') + '</div>' + (sub ? '<div class="n2">' + sub + '</div>' : '') + '</div><div class="amt ' + cls + '">' + amt + '</div></div>';
    }
    function histItemsHtml(data) {
      function grp(title, arr, html) { return (arr && arr.length) ? ('<div style="font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);font-weight:700;margin:12px 2px 6px;">' + title + '</div>' + html) : ''; }
      var rec = data.incomes.filter(function (i) { return !i.expected; });
      var exp = data.incomes.filter(function (i) { return i.expected; });
      return grp(T('wallet.in_received', 'Kirgan pul'), rec, rec.map(function (i) { return histRow(i.source, subMeta(i.method, i.date), fmt(i.amount), 'g'); }).join(''))
        + grp(T('wallet.in_expected', 'Kutilayotgan pul'), exp, exp.map(function (i) { return histRow(i.source, subMeta(i.method, i.date), fmt(i.amount), 'a'); }).join(''))
        + grp(T('wallet.spent', 'Ishlatilgan'), data.expenses, data.expenses.map(function (e) { return histRow(e.cat, subMeta(e.method, e.date), '−' + fmt(e.amount), 'r'); }).join(''))
        + grp(T('wallet.planned', 'Rejalangan rasxodlar'), data.planned, data.planned.map(function (p) { return histRow(p.cat, (p.date ? '🗓 ' + fmtDate(p.date) + ' · ' : '') + fmt(p.amount) + ' ' + SOM(), (p.approx ? '≈ ' : '') + fmt(p.amount), 'b'); }).join(''));
    }
    function openHistory() {
      var h = loadHistory(), months = Object.keys(h).sort().reverse();
      var body = document.getElementById('histBody');
      if (!months.length) body.innerHTML = '<div class="empty">' + T('wallet.hist_empty', "Hali tarix yo'q — har oy oxirida shu yerga saqlanadi") + '</div>';
      else {
        body.innerHTML = months.map(function (m) {
          var c = compute(h[m]);
          return '<div style="background:var(--card);border:1px solid var(--border-default);border-radius:16px;padding:14px 16px;margin-bottom:10px;">'
            + '<div data-hmon="' + m + '" style="display:flex;align-items:center;justify-content:space-between;cursor:pointer;">'
            + '<span style="font-weight:700;font-size:16px;">' + m + '</span>'
            + '<span style="color:var(--accent);font-weight:700;">' + fmt(c.balance) + ' ' + SOM() + '</span></div>'
            + '<div style="font-size:13px;color:var(--text-dim);margin-top:4px;">' + T('wallet.in_received', 'Kirgan') + ': ' + fmt(c.recIn) + ' · ' + T('wallet.spent', 'Ishlatilgan') + ': ' + fmt(c.spent) + '</div>'
            + '<div class="hm-detail" style="display:none;margin-top:8px;">' + histItemsHtml(h[m]) + '</div></div>';
        }).join('');
        body.querySelectorAll('[data-hmon]').forEach(function (hd) {
          hd.addEventListener('click', function () { var det = hd.parentNode.querySelector('.hm-detail'); if (det) det.style.display = (det.style.display === 'none') ? 'block' : 'none'; });
        });
      }
      histOv.classList.add('show');
    }
    document.getElementById('histBtn').addEventListener('click', openHistory);
    document.getElementById('histClose').addEventListener('click', function () { histOv.classList.remove('show'); });
    histOv.addEventListener('click', function (e) { if (e.target === histOv) histOv.classList.remove('show'); });

    var didRoll = rollover();   // yangi oy bo'lsa — o'tgan oyni arxivlab, toza boshlaydi
    try { document.title = T('wallet.page_title', 'FOCUS AI — Hamyon'); } catch (e) {}
    render();
    if (didRoll) toast(T('wallet.month_reset', "Yangi oy boshlandi — o'tgan oy Tarixga saqlandi"));
  })();
</script>
<script src="undo-toast.js?v=29.0.51"></script>
<script src="reveal.js?v=29.0.71" defer></script>
  <script src="motion-fx.js?v=29.0.118" defer></script>
<script src="back-btn.js?v=29.0.133"></script>
</body>
