<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FOCUS AI — Bir vaqtda fokus</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#f3f4f7">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png?v=3">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png?v=3">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" media="print" onload="this.media='all'"><noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap"></noscript>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--void); color: var(--text); min-height: 100vh; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 560px; margin: 0 auto; padding: 64px 18px 120px; }
  .title { font-family: 'Anton', sans-serif; font-size: 36px; text-transform: uppercase; text-align: center; }
  .sub { text-align: center; color: var(--text-dim); font-size: 14px; margin-bottom: 22px; }
  .sec-lbl { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin: 16px 4px 8px; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { background: var(--card); border: 1px solid var(--border-default, rgba(0,0,0,.1)); border-radius: 999px; padding: 9px 14px; font-size: 14px; font-weight: 600; color: var(--text); cursor: pointer; }
  .chip:active { transform: scale(.95); }
  .chip .m { color: rgb(244,132,95); font-weight: 700; }
  .add-row { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
  .add-row input { background: var(--card); border: 2px solid var(--border-default, rgba(0,0,0,.12)); border-radius: 12px; color: var(--text); padding: 12px 14px; font-family: 'Inter'; font-size: 15px; font-weight: 600; outline: none; }
  .add-row input:focus { border-color: rgb(244,132,95); }
  #mtName { flex: 1; min-width: 140px; }
  #mtMin { width: 78px; text-align: center; }
  .add-row button { background: linear-gradient(135deg, rgb(244,132,95), #d9663c); border: none; color: #fff; border-radius: 12px; padding: 0 18px; font-weight: 700; font-size: 15px; cursor: pointer; font-family: 'Inter'; }
  .presets { display: flex; gap: 6px; margin-top: 8px; }
  .preset { flex: 1; text-align: center; padding: 8px; border-radius: 10px; border: 1px dashed var(--border-default, rgba(0,0,0,.18)); color: var(--text-dim); font-size: 13px; font-weight: 600; cursor: pointer; }
  #cards { display: flex; flex-direction: column; gap: 12px; margin-top: 18px; }
  .tcard { border-radius: 20px; padding: 18px 18px 16px; color: #fff; position: relative; overflow: hidden; box-shadow: 0 10px 26px rgba(0,0,0,.18); }
  .tcard .x { position: absolute; top: 12px; right: 14px; color: rgba(255,255,255,.8); font-size: 20px; cursor: pointer; line-height: 1; background: none; border: none; }
  .tcard .nm { font-weight: 700; font-size: 17px; margin-bottom: 4px; padding-right: 24px; }
  .tcard .cd { font-family: 'Anton', sans-serif; font-size: 52px; line-height: 1; letter-spacing: 1px; }
  .tcard .st { font-size: 13px; font-weight: 700; opacity: .92; margin-top: 2px; height: 16px; }
  .tcard .track { height: 6px; background: rgba(255,255,255,.28); border-radius: 999px; margin: 12px 0 12px; overflow: hidden; }
  .tcard .bar { height: 100%; background: #fff; border-radius: 999px; width: 0%; transition: width .9s linear; }
  .tcard .btn { width: 100%; background: rgba(255,255,255,.92); color: #222; border: none; border-radius: 12px; padding: 12px; font-weight: 800; font-size: 15px; cursor: pointer; font-family: 'Inter'; }
  .tcard .btn:active { transform: scale(.98); }
  .tcard.ready { animation: pulse 1.1s infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 10px 26px rgba(0,0,0,.18); } 50% { box-shadow: 0 0 0 4px rgba(255,255,255,.5), 0 10px 26px rgba(0,0,0,.18); } }
  .empty { text-align: center; color: var(--text-dim); font-size: 14px; margin-top: 14px; line-height: 1.5; }
  .toast { position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%); background: var(--card); color: var(--text); border: 1px solid rgba(244,132,95,.4); padding: 12px 20px; border-radius: 999px; font-size: 14px; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,.3); opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; }
</style>
<link rel="stylesheet" href="theme.css">
  <script>(function(){try{var t=localStorage.getItem('mvow.theme');document.documentElement.setAttribute('data-theme',t==='dark'?'dark':'light');}catch(e){}})();</script>
</head>
<body>

<div class="wrap">
  <h1 class="title" data-i18n="multitimer.title">Bir vaqtda fokus</h1>
  <p class="sub" data-i18n="multitimer.sub">2-3 vazifani birga bajaring — har biriga alohida taymer</p>

  <div id="cards"></div>

  <div class="sec-lbl" id="todayLbl" data-i18n="multitimer.today" style="display:none;">Bugungi vazifalar</div>
  <div class="chips" id="todayChips"></div>

  <div class="sec-lbl" data-i18n="multitimer.add_lbl">Yangi taymer qo'shish</div>
  <div class="add-row">
    <input id="mtName" placeholder="Vazifa nomi" autocomplete="off" maxlength="40">
    <input id="mtMin" type="number" min="1" max="180" placeholder="daq" value="25">
    <button id="mtAdd" data-i18n="multitimer.add_btn">Qo'shish</button>
  </div>
  <div class="presets">
    <div class="preset" data-min="15">15 <span data-i18n="multitimer.daq">daq</span></div>
    <div class="preset" data-min="25">25 <span data-i18n="multitimer.daq">daq</span></div>
    <div class="preset" data-min="50">50 <span data-i18n="multitimer.daq">daq</span></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="i18n.js?v=28.73.0"></script>
<script src="lang-switcher.js?v=28.73.0" defer></script>
<script src="data.js?v=28.73.0" defer></script>
<script src="nav-overlay.js?v=28.73.0" defer></script>
<script>
  (function () {
    var KEY = 'mvow.multitimer';
    var COLORS = [[244,132,95],[107,191,122],[232,130,180],[110,181,255]];
    function $(id){ return document.getElementById(id); }
    function T(k, fb){ return (window.I18N && I18N.t) ? I18N.t(k, fb) : fb; }
    function load(){ try { return JSON.parse(localStorage.getItem(KEY) || '[]'); } catch(e){ return []; } }
    function save(a){ try { localStorage.setItem(KEY, JSON.stringify(a)); } catch(e){} }
    function remaining(t){ return Math.max(0, t.durSec - Math.floor((Date.now() - t.startedAt) / 1000)); }
    function fmt(s){ var m = Math.floor(s/60), ss = s%60; return m + ':' + String(ss).padStart(2,'0'); }
    function toast(msg){ var t=$('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){ t.classList.remove('show'); }, 1900); }
    function esc(s){ return String(s).replace(/[<>&"]/g, function(c){ return ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'})[c]; }); }

    function askInsist(onYes){
      var ov = document.createElement('div');
      ov.style.cssText = 'position:fixed;inset:0;z-index:100002;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:24px;';
      var card = document.createElement('div');
      card.style.cssText = 'background:var(--card,#16161a);color:var(--text,#fff);border-radius:18px;max-width:340px;width:100%;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.5);font-family:Inter,sans-serif;';
      card.innerHTML = '<div style="font-size:30px;text-align:center;margin-bottom:6px;">⚠️</div>'
        + '<div style="font-weight:800;font-size:17px;text-align:center;margin-bottom:8px;">' + esc(T('multitimer.gate_title', "Bir vaqtda 2 ish?")) + '</div>'
        + '<div style="font-size:14px;color:var(--text-dim,#999);text-align:center;line-height:1.5;margin-bottom:18px;">' + esc(T('multitimer.gate_msg', "FOCUS AI bitta ishga to'liq fokusni tavsiya qiladi. Tizim bir vaqtda 2 ishni to'sadi — faqat o'zingiz shart qo'ysangiz qo'shiladi.")) + '</div>';
      var row = document.createElement('div'); row.style.cssText = 'display:flex;gap:10px;';
      var no = document.createElement('button'); no.type = 'button'; no.textContent = T('multitimer.cancel', 'Bekor');
      no.style.cssText = 'flex:1;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,rgb(244,132,95),#d9663c);color:#fff;font-weight:800;cursor:pointer;font-family:Inter,sans-serif;';
      var yes = document.createElement('button'); yes.type = 'button'; yes.textContent = T('multitimer.insist', "Shart qo'yaman");
      yes.style.cssText = 'flex:1;padding:12px;border-radius:12px;border:1px solid rgba(125,125,125,.4);background:transparent;color:var(--text,#fff);font-weight:700;cursor:pointer;font-family:Inter,sans-serif;';
      no.onclick = function(){ if (ov.parentNode) document.body.removeChild(ov); };
      yes.onclick = function(){ if (ov.parentNode) document.body.removeChild(ov); onYes(); };
      row.appendChild(no); row.appendChild(yes); card.appendChild(row); ov.appendChild(card); document.body.appendChild(ov);
    }
    function _doAdd(name, mins){
      var a = load();
      a.push({ id: 't' + Date.now() + Math.floor(Math.random()*9999), name: name, durSec: mins*60, startedAt: Date.now() });
      save(a); render(); toast(T('multitimer.started', 'Taymer boshlandi'));
    }
    function addTimer(name, mins){
      name = (name || '').trim() || T('multitimer.name_ph', 'Vazifa');
      mins = Math.max(1, Math.min(180, Math.round(+mins || 25)));
      var active = load().filter(function(x){ return remaining(x) > 0; });
      if (active.length >= 1) { askInsist(function(){ _doAdd(name, mins); }); return; }
      _doAdd(name, mins);
    }
    function finish(id){
      var a = load(), t = a.find(function(x){ return x.id===id; });
      if (t && window.MVOW_DATA && MVOW_DATA.addHistory) {
        var elapsedMin = (Date.now() - t.startedAt) / 60000;
        var actual = Math.max(1, Math.round(Math.min(elapsedMin, t.durSec/60)));
        try { MVOW_DATA.addHistory({ name: t.name, dateIso: MVOW_DATA.today.iso, actualMins: actual, withTimer: true, startedAt: t.startedAt, completedAt: Date.now() }); } catch(e){}
        if (window.MvowCelebrate) MvowCelebrate.celebrate();   // tanga/tabrik
      }
      save(load().filter(function(x){ return x.id!==id; })); render(); toast(T('multitimer.finished', 'Tugadi! 🎉'));
    }
    function cancelT(id){ save(load().filter(function(x){ return x.id!==id; })); render(); }

    function render(){
      var a = load(), el = $('cards');
      var doneLbl = T('multitimer.done', 'Bajardim'), finLbl = T('multitimer.finished', 'Tugadi! 🎉');
      el.innerHTML = a.map(function(t, i){
        var c = COLORS[i % COLORS.length], bg = 'rgb('+c[0]+','+c[1]+','+c[2]+')';
        var r = remaining(t), pct = Math.min(100, Math.round((t.durSec - r)/t.durSec*100));
        return '<div class="tcard'+(r===0?' ready':'')+'" id="card-'+t.id+'" style="background:'+bg+';">'
          + '<button class="x" data-x="'+t.id+'">×</button>'
          + '<div class="nm">'+esc(t.name)+'</div>'
          + '<div class="cd" id="cd-'+t.id+'">'+fmt(r)+'</div>'
          + '<div class="st" id="st-'+t.id+'">'+(r===0?esc(finLbl):'')+'</div>'
          + '<div class="track"><div class="bar" id="bar-'+t.id+'" style="width:'+pct+'%;"></div></div>'
          + '<button class="btn" data-done="'+t.id+'">'+esc(doneLbl)+'</button>'
          + '</div>';
      }).join('');
      if (!a.length) el.innerHTML = '<div class="empty">'+esc(T('multitimer.empty', "Hali taymer yo'q. Pastdan bugungi vazifani tanlang yoki yangi qo'shing."))+'</div>';
      el.querySelectorAll('[data-done]').forEach(function(b){ b.onclick = function(){ finish(b.getAttribute('data-done')); }; });
      el.querySelectorAll('[data-x]').forEach(function(b){ b.onclick = function(){ cancelT(b.getAttribute('data-x')); }; });
    }

    function tick(){
      var finLbl = T('multitimer.finished', 'Tugadi! 🎉');
      load().forEach(function(t){
        var r = remaining(t);
        var cd = $('cd-'+t.id), bar = $('bar-'+t.id), st = $('st-'+t.id), card = $('card-'+t.id);
        if (cd) cd.textContent = fmt(r);
        if (bar) bar.style.width = Math.min(100, Math.round((t.durSec - r)/t.durSec*100)) + '%';
        if (r === 0 && card && !card.classList.contains('ready')) { card.classList.add('ready'); if (st) st.textContent = finLbl; }
      });
    }

    function renderToday(){
      if (!window.MVOW_DATA || !MVOW_DATA.getTodayPlan) return;
      var tasks = [];
      try { tasks = MVOW_DATA.getTodayPlan() || []; } catch(e){}
      if (!tasks.length) return;
      var chips = $('todayChips'), daq = T('multitimer.daq', 'daq');
      chips.innerHTML = tasks.slice(0, 8).map(function(t){
        var nm = t.name || t.text || t.title || t.goal || T('multitimer.name_ph','Vazifa');
        var mins = t.dur ? MVOW_DATA.parseDurMins(t.dur) : 25;
        return '<div class="chip" data-nm="'+esc(nm)+'" data-min="'+mins+'">'+esc(nm)+' <span class="m">'+mins+daq+'</span></div>';
      }).join('');
      $('todayLbl').style.display = chips.innerHTML ? 'block' : 'none';
      chips.querySelectorAll('.chip').forEach(function(ch){
        ch.onclick = function(){ addTimer(ch.getAttribute('data-nm'), +ch.getAttribute('data-min')); };
      });
    }

    function init(){
      try { document.title = T('multitimer.page_title', 'FOCUS AI — Bir vaqtda fokus'); } catch(e){}
      $('mtName').placeholder = T('multitimer.name_ph', 'Vazifa nomi');
      $('mtMin').placeholder = T('multitimer.daq', 'daq');
      render(); renderToday();
      $('mtAdd').onclick = function(){ addTimer($('mtName').value, $('mtMin').value); $('mtName').value=''; };
      $('mtName').addEventListener('keydown', function(e){ if (e.key==='Enter') $('mtAdd').click(); });
      document.querySelectorAll('.preset').forEach(function(p){ p.onclick = function(){ $('mtMin').value = p.getAttribute('data-min'); $('mtName').focus(); }; });
      setInterval(tick, 1000);
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
  })();
</script>
<script src="back-btn.js?v=29.0.133"></script>
</body>
</html>
