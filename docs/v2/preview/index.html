<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Daywarden</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daywarden">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png?v=2">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png?v=2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --void:#04060B; --text:#F5F2EC; --text-mid:#B8BBC2; --text-dim:#9CA0A8; }
  html, body {
    background: var(--void); color: var(--text);
    min-height: 100vh; overflow: hidden;
    -webkit-font-smoothing: antialiased;
    font-family: 'Inter', sans-serif;
  }
  .stage {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 18px; padding: 40px 32px 140px;
    z-index: 2;
  }
  .halo {
    position: absolute;
    width: 340px; height: 340px;
    background: radial-gradient(circle, rgba(244, 132, 95,.12), transparent 60%);
    border-radius: 50%;
    opacity: 0;
    animation: halo-in 1.2s ease .2s forwards, halo-pulse 5s ease-in-out 2s infinite;
    pointer-events: none;
    top: 30%; transform: translateY(-50%);
  }
  @keyframes halo-in { to { opacity: 1; } }
  @keyframes halo-pulse {
    0%,100% { transform: translateY(-50%) scale(1); opacity: .8; }
    50%     { transform: translateY(-50%) scale(1.08); opacity: 1; }
  }
  .logo {
    width: 92px; height: 92px;
    background: url('assets/company-logo.png') center/contain no-repeat;
    filter: drop-shadow(0 0 18px rgba(124,108,255,.45));
    opacity: 0; transform: scale(0.7);
    animation: logo-in 1.0s cubic-bezier(.16,.84,.32,1) .1s forwards;
    z-index: 2;
  }
  @keyframes logo-in { to { opacity: 1; transform: scale(1); } }
  .name {
    font-family: 'Inter', sans-serif;
    font-weight: 600; font-size: 46px;
    letter-spacing: 6px; color: var(--text);
    opacity: 0;
    animation: fade-up 0.7s ease .8s forwards; z-index: 2;
  }
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .tagline {
    font-family: 'Inter', sans-serif;
    font-style: normal; font-size: 18px;
    color: var(--text-mid);
    opacity: 0;
    animation: fade-up 0.7s ease 1.1s forwards;
    z-index: 2; text-align: center; margin-top: -4px;
  }
  .lang-block {
    margin-top: 40px; width: 100%; max-width: 320px;
    opacity: 0;
    animation: fade-up 0.7s ease 1.5s forwards; z-index: 2;
  }
  .lang-lbl {
    font-size: 14px; letter-spacing: 4px;
    color: var(--text-dim); text-transform: uppercase;
    text-align: center; margin-bottom: 14px;
  }
  .lang-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .lang-btn {
    padding: 14px 12px;
    background: transparent;
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 8px; color: var(--text-mid);
    font-family: 'Inter', sans-serif;
    font-size: 17px; font-weight: 500; letter-spacing: 1px;
    cursor: pointer; transition: all .15s;
    text-align: center; min-height: 48px;
  }
  .lang-btn:hover, .lang-btn:active {
    border-color: rgba(244, 132, 95,.4);
    color: var(--text); background: rgba(244, 132, 95,.04);
  }
  .lang-btn.on {
    border-color: var(--accent); color: var(--accent);
    background: rgba(244, 132, 95,.08);
  }
  .cta-row {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 18px 32px env(safe-area-inset-bottom, 24px);
    background: linear-gradient(180deg, transparent, var(--void) 30%);
    opacity: 0;
    animation: fade-up 0.7s ease 1.8s forwards; z-index: 5;
  }
  .cta {
    display: block; width: 100%; max-width: 360px; margin: 0 auto;
    padding: 16px;
    background: linear-gradient(180deg, var(--accent), var(--accent-soft));
    color: var(--void); font-size: 17px; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase;
    border: none; border-radius: 6px;
    text-align: center; text-decoration: none;
    cursor: pointer; min-height: 52px;
  }

  /* ===== Desktop (web) ko'rinishi — telefon ramkasi ichida ilova ===== */
  .dt-shell { display: none; }
  body.dt-mode { overflow: hidden; }
  body.dt-mode .stage, body.dt-mode .cta-row { display: none !important; }
  body.dt-mode .dt-shell {
    display: flex; align-items: center; justify-content: center; gap: 72px;
    position: fixed; inset: 0; z-index: 100; padding: 40px;
    background:
      radial-gradient(55% 55% at 28% 32%, rgba(244, 132, 95,.12), transparent 60%),
      radial-gradient(50% 50% at 82% 78%, rgba(124,108,255,.10), transparent 60%),
      var(--void);
  }
  .dt-side { max-width: 360px; }
  .dt-side .dt-logo {
    width: 76px; height: 76px; display: block; margin-bottom: 22px;
    background: url('assets/company-logo.png') center/contain no-repeat;
    filter: drop-shadow(0 0 18px rgba(124,108,255,.4));
  }
  .dt-side .dt-name {
    font-family: 'Inter', sans-serif; font-weight: 600;
    font-size: 72px; letter-spacing: 4px; color: var(--text); line-height: 1;
  }
  .dt-side .dt-tag {
    font-family: 'Inter', sans-serif; font-style: normal;
    font-size: 25px; color: var(--text-mid); margin-top: 10px;
  }
  .dt-side .dt-note {
    margin-top: 30px; padding: 16px 18px; border-radius: 14px;
    border: 1px solid rgba(244, 132, 95,.28); background: rgba(244, 132, 95,.05);
    color: var(--text-mid); font-size: 18px; line-height: 1.6;
  }
  .dt-side .dt-note b { color: var(--accent); }
  .dt-phone {
    flex-shrink: 0; width: 392px; height: min(92vh, 844px);
    background: #000; border: 11px solid #14161c; border-radius: 48px;
    box-shadow: 0 40px 110px rgba(0,0,0,.65), 0 0 0 1px rgba(255,255,255,.05);
    overflow: hidden; position: relative;
  }
  .dt-phone iframe {
    width: 100%; height: 100%; border: none; display: block;
    border-radius: 37px; background: var(--void);
  }
  @media (max-width: 1040px) {
    body.dt-mode .dt-shell { gap: 40px; }
    .dt-side { max-width: 260px; }
    .dt-side .dt-name { font-size: 54px; }
  }
</style>
<link rel="stylesheet" href="theme.css">
</head>
<body>

<div class="stage">
  <div class="halo"></div>
  <div class="logo"></div>
  <div class="name">Daywarden</div>
  <div class="tagline" id="tagline" style="display:none">sizning intizom do'stingiz</div>

  <div class="lang-block">
    <div class="lang-lbl">til · язык · language</div>
    <div class="lang-row">
      <button class="lang-btn" data-lang="uz">O'ZBEK</button>
      <button class="lang-btn" data-lang="ru">РУССКИЙ</button>
      <button class="lang-btn" data-lang="en">ENGLISH</button>
    </div>
  </div>
</div>

<div class="cta-row">
  <a class="cta" id="goBtn" href="royhat.html">Boshlaymiz</a>
</div>

<!-- Desktop (web) ko'rinishi: telefon ramkasi ichida ilova ishlaydi -->
<div class="dt-shell" id="dtShell">
  <div class="dt-side">
    <div class="dt-logo"></div>
    <div class="dt-name">Daywarden</div>
    <div class="dt-tag" style="display:none">sizning intizom do'stingiz</div>
    <div class="dt-note">📱 Eng qulay tajriba — telefonда.<br>Brauzerда oching va o'rnating:<br><b>daywarden.vercel.app</b></div>
  </div>
  <div class="dt-phone">
    <iframe id="dtFrame" title="Daywarden" allow="autoplay"></iframe>
  </div>
</div>

<script src="i18n.js?v=28.4.0"></script>
<script src="lang-switcher.js?v=28.4.0" defer></script>
<script>
  // Web ham, telefon ham — BIR XIL ilova (galereya yo'q).
  // Qaytuvchi foydalanuvchi -> to'g'ridan-to'g'ri uy; yangi -> shu kirish sahifasi
  const hasUser = !!localStorage.getItem('mvow.userName') || !!localStorage.getItem('mvow.email');
  const isDesktop = window.matchMedia('(min-width: 900px)').matches
                 && !/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  if (isDesktop) {
    // Web: telefon ramkasi ichida ilovani ko'rsatamiz (galereya emas, haqiqiy ilova)
    document.body.classList.add('dt-mode');
    var dtf = document.getElementById('dtFrame');
    if (dtf && !dtf.getAttribute('src')) dtf.setAttribute('src', 'app.html');
  } else if (hasUser) {
    var _g = []; try { _g = JSON.parse(localStorage.getItem('mvow.goals') || '[]'); } catch (e) {}
    location.replace((Array.isArray(_g) && _g.length) ? 'home.html' : 'maqsadlar.html');
  }

  const TAGLINES = {
    uz: "sizning intizom do'stingiz",
    ru: "ваш друг по дисциплине",
    en: "your discipline companion"
  };
  const CTA_TEXT = { uz: 'Davom', ru: 'Продолжить', en: 'Continue' };
  const tagEl = document.getElementById('tagline');
  const goBtn = document.getElementById('goBtn');

  function applyLang(lang) {
    document.querySelectorAll('.lang-btn').forEach(b =>
      b.classList.toggle('on', b.dataset.lang === lang)
    );
    if (TAGLINES[lang]) tagEl.textContent = TAGLINES[lang];
    if (CTA_TEXT[lang]) goBtn.textContent = CTA_TEXT[lang];
    document.documentElement.lang = lang;
  }

  function pickLang(lang) {
    const prev = localStorage.getItem('mvow.lang');
    localStorage.setItem('mvow.lang', lang);
    if (window.I18N && typeof I18N.set === 'function') I18N.set(lang);
    applyLang(lang);
    if (prev !== lang) {
      setTimeout(() => location.reload(), 80);
    }
  }

  const stored = localStorage.getItem('mvow.lang');
  const initLang = ['uz','ru','en'].includes(stored)
    ? stored
    : (['uz','ru','en'].includes((navigator.language || 'uz').slice(0,2))
        ? (navigator.language || 'uz').slice(0,2)
        : 'uz');
  applyLang(initLang);

  document.querySelectorAll('.lang-btn').forEach(b =>
    b.addEventListener('click', () => pickLang(b.dataset.lang))
  );

  goBtn.addEventListener('click', () => {
    localStorage.setItem('mvow.introSeen', '1');
  });
</script>

<script src="back-btn.js?v=28.4.0"></script>
</body>
</html>
