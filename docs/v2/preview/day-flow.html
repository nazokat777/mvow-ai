<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{brand} — Bugungi yo'l</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --void:#04060B;
    --text:#F5F2EC; --text-mid:#B8BBC2; --text-dim:#9CA0A8;
    --accent:#00E5D4; --accent-soft:#00B5A8;
  }
  body { background: var(--void); font-family:'Inter',sans-serif; color: var(--text); min-height: 100vh; display:flex; justify-content:center; align-items:flex-start; padding: 24px; -webkit-font-smoothing: antialiased; }
  .phone { width: 380px; min-height: 800px; background: var(--void); border-radius: 40px; overflow: hidden; position: relative; box-shadow: 0 0 0 8px #1a1d24, 0 30px 80px rgba(0,0,0,.7); display:flex; flex-direction: column; }
  .container { flex:1; display:flex; flex-direction: column; align-items:center; justify-content:center; padding: 80px 32px 120px; gap: 32px; }

  .task { text-align: center; }
  .task .name { font-family:'Cormorant Garamond',serif; font-weight:500; font-size: 26px; color: var(--text); letter-spacing: 0.5px; }
  .task .time { font-size: 11px; letter-spacing: 3px; color: var(--text-mid); text-transform: uppercase; margin-top: 8px; }

  .ring-wrap { position: relative; width: 240px; height: 240px; }
  .ring-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring-track { fill: none; stroke: rgba(255,255,255,.06); stroke-width: 3; }
  .ring-prog { fill: none; stroke: var(--accent); stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
  .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; }
  .ring-center .digits { font-size: 44px; font-weight: 300; color: var(--accent); letter-spacing: 1px; font-feature-settings: "tnum"; }
  .ring-center .sub { font-size: 9px; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase; }

  .bottom-bar { padding: 20px 32px env(safe-area-inset-bottom, 20px); background: linear-gradient(180deg, transparent, var(--void) 30%); display: flex; flex-direction: column; gap: 10px; }
  .cta { display:block; width:100%; padding:16px; background: linear-gradient(180deg, var(--accent), var(--accent-soft)); color: var(--void); font-size:13px; font-weight:600; letter-spacing:2px; text-transform: uppercase; border:none; border-radius:6px; text-align:center; text-decoration:none; cursor: pointer; }
  .ghost { display:block; width:100%; padding:12px; background: transparent; color: var(--text-mid); font-size:11px; letter-spacing:2px; text-transform: uppercase; border:1px solid rgba(255,255,255,.08); border-radius:6px; text-align:center; text-decoration:none; cursor: pointer; }

  @media (max-width: 480px) { body { padding: 0; } .phone { width: 100vw; min-height: 100vh; border-radius: 0; box-shadow: none; } }
</style>
</head>
<body>

<div class="phone">
  <div class="container">

    <div class="task">
      <div class="name" id="taskName">Til o'rganish</div>
      <div class="time" id="taskTime">06:20 — 07:20</div>
    </div>

    <div class="ring-wrap">
      <svg class="ring-svg" viewBox="0 0 240 240">
        <circle class="ring-track" cx="120" cy="120" r="116"/>
        <circle id="ring" class="ring-prog" cx="120" cy="120" r="116"
                stroke-dasharray="729" stroke-dashoffset="0"/>
      </svg>
      <div class="ring-center">
        <div class="digits" id="digits">25:00</div>
        <div class="sub" id="sub">tayyor</div>
      </div>
    </div>

  </div>

  <div class="bottom-bar">
    <a class="cta" id="startBtn" href="hard-lock.html">Boshlayman</a>
    <a class="ghost" href="today-plan.html">Rejaga qaytish</a>
  </div>
</div>

<script src="data.js" defer></script>
<script src="nav-overlay.js" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    let mins = 25;
    if (window.MVOW_DATA) {
      const cur = MVOW_DATA.currentSession() || MVOW_DATA.sessions[0];
      if (cur) {
        document.getElementById('taskName').textContent = cur.name;
        mins = cur.mins || 25;
        const start = cur.time;
        if (start && start.includes(':')) {
          const sm = (+start.split(':')[0]) * 60 + (+start.split(':')[1]);
          const em = sm + mins;
          const end = String(Math.floor(em/60)).padStart(2,'0') + ':' + String(em%60).padStart(2,'0');
          document.getElementById('taskTime').textContent = `${start} — ${end}`;
        }
        document.getElementById('digits').textContent = String(mins).padStart(2,'0') + ':00';
      }
    }

    // Boshlash bosilganda taymerni jonli qil (hard-lock'da davom etadi)
    document.getElementById('startBtn').addEventListener('click', () => {
      localStorage.setItem('mvow.timer', JSON.stringify({ endsAt: Date.now() + mins * 60 * 1000 }));
    });
  });
</script>

</body>
</html>
