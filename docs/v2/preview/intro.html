<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Daywarden — Tanishuv</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --void: #04060B;
  --gold: #D4AF37;
  --gold-bright: #F5D76E;
  --text: #F5F2EC;
  --text-dim: rgba(245, 242, 236, 0.55);
}
html, body {
  background: var(--void);
  color: var(--text);
  height: 100%;
  overflow: hidden;
  font-family: 'Inter', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
body {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

#cinematic {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
  background: var(--void);
  z-index: 1;
}

/* Subtle vignette over video */
.vignette {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(0, 0, 0, 0.35) 100%);
  pointer-events: none;
  z-index: 2;
}

.skip-btn, .back-btn {
  position: fixed;
  top: max(20px, env(safe-area-inset-top, 20px));
  padding: 12px 18px;
  background: rgba(245, 215, 110, 0.10);
  color: var(--gold-bright);
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  border: 1.5px solid rgba(245, 215, 110, 0.35);
  border-radius: 999px;
  z-index: 50;
  cursor: pointer;
  min-height: 44px;
  -webkit-backdrop-filter: blur(14px);
  backdrop-filter: blur(14px);
  transition: all 220ms ease;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  box-shadow: 0 4px 14px rgba(0, 0, 0, 0.4);
}
.skip-btn { right: 20px; }
.back-btn { left: 20px; }
.skip-btn:hover, .skip-btn:focus-visible,
.back-btn:hover, .back-btn:focus-visible {
  background: rgba(245, 215, 110, 0.20);
  border-color: rgba(245, 215, 110, 0.6);
  outline: none;
}
.skip-btn:focus-visible, .back-btn:focus-visible {
  box-shadow: 0 0 0 2px rgba(245, 215, 110, 0.5);
}

.loading {
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  z-index: 30;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 18px;
  color: var(--gold-bright);
  letter-spacing: 0.08em;
  pointer-events: none;
  opacity: 1;
  transition: opacity 400ms;
}
.loading.hide { opacity: 0; pointer-events: none; }
.loading-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  background: var(--gold);
  border-radius: 50%;
  margin: 0 3px;
  animation: dotPulse 1.4s ease-in-out infinite;
}
.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse {
  0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1.2); }
}

.fallback {
  position: fixed;
  inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--void);
  color: var(--text);
  text-align: center;
  padding: 32px;
  z-index: 40;
}
.fallback.show { display: flex; }
.fallback h2 {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 500;
  font-size: 32px;
  color: var(--gold-bright);
  margin-bottom: 16px;
  letter-spacing: 0.02em;
}
.fallback p {
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  font-size: 15px;
  color: var(--text-dim);
  margin-bottom: 32px;
  max-width: 360px;
  line-height: 1.5;
}
.fallback .continue-btn {
  padding: 16px 36px;
  background: linear-gradient(180deg, var(--gold-bright), var(--gold));
  color: var(--void);
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  border: none;
  border-radius: 999px;
  cursor: pointer;
  min-height: 48px;
  min-width: 220px;
}

.veil {
  position: fixed;
  inset: 0;
  background: var(--void);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 500ms cubic-bezier(.4, 0, .2, 1);
}
.veil.show { opacity: 1; }

@media (max-width: 480px) {
  .loading { font-size: 16px; }
  .fallback h2 { font-size: 26px; }
  .fallback p { font-size: 14px; }
}
</style>
<link rel="stylesheet" href="theme.css">
</head>
<body>

<video id="cinematic"
       autoplay
       muted
       playsinline
       preload="auto"
       disablepictureinpicture
       disableRemotePlayback
       poster="assets/intro-poster.jpg">
  <source src="assets/intro-cinematic.webm" type="video/webm">
  <source src="assets/intro-cinematic.mp4" type="video/mp4">
</video>

<div class="vignette"></div>

<div class="loading" id="loading">
  <span data-i18n="intro.loading">Yuklanmoqda</span>
  <span class="loading-dot"></span>
  <span class="loading-dot"></span>
  <span class="loading-dot"></span>
</div>

<div class="fallback" id="fallback">
  <h2 data-i18n="intro.fallback_title">Vaqt — sizning eng qimmat boyligingiz</h2>
  <p data-i18n="intro.fallback_body">Daywarden — sizning intizom do'stingiz. Maqsadlaringizni kunlik harakatga aylantiramiz.</p>
  <button class="continue-btn" id="continueBtn" type="button" data-i18n="intro.fallback_cta">Boshlaymiz ›</button>
</div>

<button class="back-btn" id="backBtn" type="button" data-i18n="intro.back">‹ Orqaga</button>
<button class="skip-btn" id="skipBtn" type="button" data-i18n="intro.skip">O'tkazib yuborish ›</button>
<div class="veil" id="veil"></div>

<script src="i18n.js?v=28.2.1"></script>
<script src="lang-switcher.js?v=28.2.1" defer></script>
<script>
(function() {
  'use strict';

  // ===== EARLY GUARDS =====
  var INTRO_SEEN = 'mvow.motion.introSeen';
  function go(u) { try { location.replace(u); } catch(e) { location.href = u; } }
  function setSeen() { try { localStorage.setItem(INTRO_SEEN, '1'); } catch(e) {} }
  function clearSeen() { try { localStorage.removeItem(INTRO_SEEN); } catch(e) {} }

  try { if (localStorage.getItem(INTRO_SEEN)) { go('anketa.html'); return; } } catch(e) {}

  var pref = matchMedia('(prefers-reduced-motion: reduce)').matches;
  var intensity = '';
  try { intensity = localStorage.getItem('mvow.motion.intensity') || ''; } catch(e) {}
  if (pref || intensity === 'minimal') { setSeen(); go('anketa.html'); return; }

  // ===== ELEMENTS =====
  var video = document.getElementById('cinematic');
  var loading = document.getElementById('loading');
  var fallback = document.getElementById('fallback');
  var veil = document.getElementById('veil');

  // ===== NAVIGATION =====
  var navigated = false;
  function navigate(target, save) {
    if (navigated) return;
    navigated = true;
    veil.classList.add('show');
    if (save !== false) setSeen();
    try { video.pause(); } catch(e) {}
    setTimeout(function() { go(target); }, 480);
  }

  // ===== BUTTONS =====
  document.getElementById('skipBtn').addEventListener('click', function() {
    navigate('anketa.html', true);
  });

  document.getElementById('backBtn').addEventListener('click', function() {
    clearSeen();
    navigate('gallery.html', false);
  });

  document.getElementById('continueBtn').addEventListener('click', function() {
    navigate('anketa.html', true);
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' || e.key === 'Enter') navigate('anketa.html', true);
  });

  // ===== VIDEO EVENTS =====
  var loadTimeout = null;

  video.addEventListener('loadeddata', function() {
    loading.classList.add('hide');
    if (loadTimeout) clearTimeout(loadTimeout);
  });

  video.addEventListener('canplay', function() {
    loading.classList.add('hide');
  });

  video.addEventListener('ended', function() {
    navigate('anketa.html', true);
  });

  video.addEventListener('error', function() {
    console.warn('[intro] Video load failed, showing fallback');
    loading.classList.add('hide');
    fallback.classList.add('show');
  });

  // Autoplay safety — some browsers require user gesture
  video.play().catch(function(err) {
    console.warn('[intro] Autoplay blocked:', err);
    // Show poster + add tap-to-play overlay handled by fallback below
    // Try again on first user interaction
    var resumePlay = function() {
      video.play().catch(function() {});
      document.removeEventListener('pointerdown', resumePlay);
    };
    document.addEventListener('pointerdown', resumePlay, { once: true });
  });

  // Hard timeout: if video doesn't load in 8s, show fallback
  loadTimeout = setTimeout(function() {
    if (video.readyState < 2) {
      console.warn('[intro] Video load timeout, showing fallback');
      loading.classList.add('hide');
      fallback.classList.add('show');
    }
  }, 8000);

  // Visibility — pause video when tab hidden
  document.addEventListener('visibilitychange', function() {
    if (document.hidden) {
      try { video.pause(); } catch(e) {}
    } else if (!navigated) {
      video.play().catch(function() {});
    }
  });

})();
</script>
</body>
</html>
