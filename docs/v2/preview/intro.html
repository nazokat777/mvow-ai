<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{brand} — Tanishuv</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --void:#04060B; --void-soft:#0C0F16;
    --text:#F5F2EC; --text-mid:#B8BBC2; --text-dim:#9CA0A8;
    --accent:#00E5D4; --accent-soft:#00B5A8;
    --card:#11151E;
  }
  html, body {
    background: var(--void); color: var(--text);
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .wrap {
    max-width: 480px;
    margin: 0 auto;
    padding: 60px 28px 140px;
  }

  .logo {
    width: 64px; height: 64px;
    margin: 0 auto 16px;
    background: url('assets/mnsm-logo.png') center/contain no-repeat;
    filter: hue-rotate(160deg) saturate(1.4) drop-shadow(0 0 14px rgba(0,229,212,.35));
  }
  .brandname {
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 22px;
    letter-spacing: 4px;
    color: var(--text);
    margin-bottom: 4px;
  }
  .tagline {
    text-align: center;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  .features { display: flex; flex-direction: column; gap: 14px; margin-bottom: 36px; }
  .feat {
    display: grid;
    grid-template-columns: 36px 1fr;
    gap: 14px;
    align-items: center;
    padding: 14px 16px;
    background: var(--card);
    border: 1px solid rgba(255,255,255,.05);
    border-radius: 12px;
  }
  .feat .ic {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: rgba(0,229,212,.08);
    border: 1px solid rgba(0,229,212,.25);
    display: flex; align-items: center; justify-content: center;
    color: var(--accent);
    font-size: 16px;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
  }
  .feat .txt {
    font-size: 14px;
    color: var(--text);
    line-height: 1.4;
  }

  .bottom {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 18px 28px env(safe-area-inset-bottom, 22px);
    background: linear-gradient(180deg, transparent, var(--void) 40%);
  }
  .cta {
    display: block;
    width: 100%;
    max-width: 440px;
    margin: 0 auto;
    padding: 16px;
    background: linear-gradient(180deg, var(--accent), var(--accent-soft));
    color: var(--void);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: none;
    border-radius: 999px;
    text-align: center;
    text-decoration: none;
    cursor: pointer;
    min-height: 52px;
  }
</style>
</head>
<body>

<div class="wrap">

  <div class="logo"></div>
  <div class="brandname" data-brand="name">brend</div>
  <div class="tagline" data-i18n="intro.tagline">Intizom · fokus · natija</div>

  <div class="features">
    <div class="feat"><div class="ic">1</div><div class="txt" data-i18n="intro.feat1">Reja tuzasan — kun tartibiga aylanadi</div></div>
    <div class="feat"><div class="ic">2</div><div class="txt" data-i18n="intro.feat2">Taymer ishlaydi — chalg'ituvchi ilovalar bo'shaydi</div></div>
    <div class="feat"><div class="ic">3</div><div class="txt" data-i18n="intro.feat3">Streak ko'tariladi — kunlar ortidan kunlar</div></div>
  </div>

</div>

<div class="bottom">
  <a class="cta" id="startBtn" href="anketa.html" data-i18n="intro.cta">Boshlaymiz</a>
</div>

<script src="i18n.js" defer></script>
<script src="data.js" defer></script>
<script src="nav-overlay.js" defer></script>
<script>
  document.getElementById('startBtn').addEventListener('click', () => {
    localStorage.setItem('mvow.introSeen', '1');
  });
</script>

</body>
</html>
