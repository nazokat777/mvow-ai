<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>brend</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500;1,600&family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --void: #04060B;
  --void-soft: #0A0D14;
  --accent: #00E5D4;
  --accent-soft: #00B5A8;
  --gold: #D4AF37;
  --text: #F5F2EC;
  --text-mid: #B8BBC2;
  --text-dim: rgba(245, 242, 236, 0.45);
}
html, body {
  background: var(--void);
  color: var(--text);
  height: 100%;
  overflow: hidden;
  font-family: 'Inter', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
body {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Subtle ambient gradient — premium minimal */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 100% 80% at 50% 100%, rgba(0, 229, 212, 0.05), transparent 60%),
    radial-gradient(ellipse 60% 50% at 50% 0%, rgba(212, 175, 55, 0.04), transparent 65%);
  pointer-events: none;
  z-index: 1;
}

/* Vignette */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.55) 100%);
  pointer-events: none;
  z-index: 2;
}

#particles {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

.stage {
  position: relative;
  z-index: 5;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 40px 32px;
  max-width: 480px;
  width: 100%;
}

/* Logo mark — clean accent ring */
.mark {
  width: 88px;
  height: 88px;
  border-radius: 50%;
  border: 1.5px solid rgba(0, 229, 212, 0.35);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 32px;
  position: relative;
  opacity: 0;
  transform: translateY(8px) scale(0.95);
  animation: rise 1100ms cubic-bezier(.22,.61,.36,1) 200ms forwards;
}
.mark::before {
  content: '';
  position: absolute;
  inset: -6px;
  border-radius: 50%;
  border: 1px solid rgba(0, 229, 212, 0.12);
  animation: ringPulse 4s ease-in-out infinite;
}
.mark img {
  width: 56px;
  height: auto;
  filter:
    drop-shadow(0 0 14px rgba(0, 229, 212, 0.45))
    drop-shadow(0 0 28px rgba(0, 229, 212, 0.18));
}

@keyframes ringPulse {
  0%, 100% { transform: scale(1); opacity: 0.4; }
  50% { transform: scale(1.06); opacity: 0.7; }
}

/* Wordmark */
.brand {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 500;
  font-size: 64px;
  letter-spacing: 0.005em;
  color: var(--text);
  line-height: 1;
  opacity: 0;
  transform: translateY(10px);
  animation: rise 1100ms cubic-bezier(.22,.61,.36,1) 500ms forwards;
}

.brand .accent-dot {
  color: var(--accent);
}

.tagline {
  margin-top: 16px;
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  font-size: 13px;
  letter-spacing: 0.32em;
  color: var(--text-dim);
  text-transform: uppercase;
  opacity: 0;
  transform: translateY(10px);
  animation: rise 1100ms cubic-bezier(.22,.61,.36,1) 800ms forwards;
}

/* Hairline divider */
.divider {
  width: 32px;
  height: 1px;
  margin: 40px 0 36px;
  background: linear-gradient(90deg, transparent, rgba(0, 229, 212, 0.4), transparent);
  opacity: 0;
  animation: rise 900ms cubic-bezier(.22,.61,.36,1) 1100ms forwards;
}

/* Quote — single elegant line */
.quote {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 19px;
  line-height: 1.5;
  color: var(--text-mid);
  max-width: 320px;
  opacity: 0;
  transform: translateY(10px);
  animation: rise 1100ms cubic-bezier(.22,.61,.36,1) 1300ms forwards;
}
.quote .em {
  color: var(--accent);
  font-style: italic;
}

/* CTA */
.cta {
  margin-top: 48px;
  display: inline-block;
  padding: 16px 36px;
  background: linear-gradient(180deg, var(--accent), var(--accent-soft));
  color: var(--void);
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  border: none;
  border-radius: 999px;
  text-decoration: none;
  cursor: pointer;
  min-height: 48px;
  min-width: 200px;
  opacity: 0;
  transform: translateY(10px);
  animation: rise 1100ms cubic-bezier(.22,.61,.36,1) 1700ms forwards;
  transition: transform 220ms cubic-bezier(.22,.61,.36,1), box-shadow 220ms;
  box-shadow: 0 0 0 rgba(0, 229, 212, 0);
}
.cta:hover, .cta:focus-visible {
  transform: translateY(-2px);
  box-shadow: 0 12px 28px rgba(0, 229, 212, 0.25);
  outline: none;
}
.cta:active { transform: translateY(0); }

.skip-link {
  position: fixed;
  bottom: max(28px, env(safe-area-inset-bottom, 28px));
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.28em;
  color: var(--text-dim);
  text-transform: uppercase;
  text-decoration: none;
  cursor: pointer;
  background: transparent;
  border: none;
  z-index: 10;
  opacity: 0;
  animation: rise 900ms cubic-bezier(.22,.61,.36,1) 2200ms forwards;
  padding: 10px 16px;
  min-height: 36px;
  min-width: 44px;
  transition: color 200ms;
}
.skip-link:hover, .skip-link:focus-visible {
  color: var(--text);
  outline: none;
}

@keyframes rise {
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.veil {
  position: fixed;
  inset: 0;
  background: var(--void);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 500ms cubic-bezier(.4,0,.2,1);
}
.veil.show { opacity: 1; }

@media (prefers-reduced-motion: reduce) {
  .mark, .brand, .tagline, .divider, .quote, .cta, .skip-link {
    animation-duration: 200ms !important;
  }
  .mark::before { animation: none; }
}

@media (max-width: 480px) {
  .brand { font-size: 52px; }
  .tagline { font-size: 11px; letter-spacing: 0.28em; }
  .quote { font-size: 17px; max-width: 280px; }
  .mark { width: 76px; height: 76px; margin-bottom: 26px; }
  .mark img { width: 48px; }
  .divider { margin: 32px 0 28px; }
  .cta { margin-top: 36px; padding: 15px 32px; font-size: 11px; }
}
@media (max-width: 360px) {
  .brand { font-size: 44px; }
  .quote { font-size: 15px; }
}
</style>
</head>
<body>

<canvas id="particles" aria-hidden="true"></canvas>

<div class="stage">
  <div class="mark">
    <img src="assets/mnsm-logo.png" alt="brend">
  </div>

  <h1 class="brand">brend<span class="accent-dot">.</span></h1>

  <div class="tagline" data-i18n="brand.tagline">sizning intizom do'stingiz</div>

  <div class="divider" aria-hidden="true"></div>

  <p class="quote" data-i18n="intro.welcome_quote">
    Har bir <span class="em">maqsad</span> — kichik kunlik harakatdan boshlanadi.
  </p>

  <button class="cta" id="goBtn" type="button" data-i18n="intro.cta_start">Boshlaymiz</button>
</div>

<button class="skip-link" id="skipLink" type="button" data-i18n="intro.skip_to_app">Keyingi safar</button>

<div class="veil" id="veil"></div>

<script src="i18n.js"></script>
<script>
(function(){
  'use strict';

  // ===== EARLY GUARDS =====
  var INTRO_SEEN = 'mvow.motion.introSeen';
  function go(u){ try { location.replace(u); } catch(e){ location.href=u; } }
  function setSeen(){ try { localStorage.setItem(INTRO_SEEN, '1'); } catch(e){} }

  try { if (localStorage.getItem(INTRO_SEEN)) { go('anketa.html'); return; } } catch(e){}

  // ===== VEIL TRANSITION =====
  var veil = document.getElementById('veil');
  function navigate(target) {
    veil.classList.add('show');
    setSeen();
    setTimeout(function(){ go(target); }, 480);
  }

  document.getElementById('goBtn').addEventListener('click', function(){
    navigate('anketa.html');
  });
  document.getElementById('skipLink').addEventListener('click', function(){
    navigate('anketa.html');
  });
  document.addEventListener('keydown', function(e){
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); navigate('anketa.html'); }
  });

  // ===== AMBIENT PARTICLES (subtle, premium) =====
  var pref = matchMedia('(prefers-reduced-motion: reduce)').matches;
  var intensity = '';
  try { intensity = localStorage.getItem('mvow.motion.intensity') || ''; } catch(e){}

  if (pref || intensity === 'minimal') return; // no particles for reduced motion

  var canvas = document.getElementById('particles');
  var ctx = canvas.getContext('2d');
  var dpr = Math.min(2, window.devicePixelRatio || 1);
  var W = 0, H = 0;

  function resize(){
    W = innerWidth; H = innerHeight;
    canvas.width = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  var rT; addEventListener('resize', function(){ clearTimeout(rT); rT = setTimeout(resize, 150); });

  // Cached glow sprite
  var sprite = (function(){
    var c = document.createElement('canvas');
    c.width = 24; c.height = 24;
    var x = c.getContext('2d');
    var g = x.createRadialGradient(12, 12, 0, 12, 12, 12);
    g.addColorStop(0, 'rgba(0, 229, 212, 0.9)');
    g.addColorStop(0.35, 'rgba(0, 229, 212, 0.35)');
    g.addColorStop(1, 'rgba(0, 229, 212, 0)');
    x.fillStyle = g;
    x.fillRect(0, 0, 24, 24);
    return c;
  })();

  var COUNT = innerWidth < 480 ? 50 : 90;
  var particles = [];

  function makeP(initial){
    return {
      x: Math.random() * W,
      y: initial ? Math.random() * H : H + 20,
      vy: -(0.15 + Math.random() * 0.35),
      vx: (Math.random() - 0.5) * 0.08,
      size: 0.7 + Math.random() * 1.8,
      alpha: 0.08 + Math.random() * 0.32,
      seed: Math.random() * 100
    };
  }
  for (var i = 0; i < COUNT; i++) particles.push(makeP(true));

  // Touch creates tiny burst
  var bursts = [];
  document.addEventListener('pointerdown', function(e){
    if (e.target.closest('.cta, .skip-link, button, a')) return;
    bursts.push({ x: e.clientX, y: e.clientY, life: 1 });
  }, { passive: true });

  var lastT = performance.now();
  var stopped = false;

  function tick(now){
    if (stopped) return;
    var dt = Math.min(50, now - lastT);
    lastT = now;
    var time = now / 1000;

    // Trail fade
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = 'rgba(4, 6, 11, 0.20)';
    ctx.fillRect(0, 0, W, H);

    // Particles drift up
    ctx.globalCompositeOperation = 'lighter';
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];

      // Burst attraction
      for (var b = 0; b < bursts.length; b++) {
        var bt = bursts[b];
        var dx = bt.x - p.x;
        var dy = bt.y - p.y;
        var d2 = dx*dx + dy*dy;
        if (d2 < 10000 && d2 > 1) {
          var d = Math.sqrt(d2);
          var f = (1 - d/100) * 0.6 * bt.life;
          p.vx += (dx/d) * f;
          p.vy += (dy/d) * f;
        }
      }

      // Drift
      p.vx += Math.sin(time * 0.3 + p.seed) * 0.0015;
      p.vx *= 0.99;
      p.vy *= 0.995;

      // Move
      p.x += p.vx;
      p.y += p.vy;

      // Respawn at bottom when off-screen top
      if (p.y < -20) {
        p.y = H + 20;
        p.x = Math.random() * W;
        p.vy = -(0.15 + Math.random() * 0.35);
        p.vx = (Math.random() - 0.5) * 0.08;
      }
      if (p.x < -20) p.x = W + 20;
      if (p.x > W + 20) p.x = -20;

      var r = p.size * 3.5;
      ctx.globalAlpha = p.alpha;
      ctx.drawImage(sprite, p.x - r, p.y - r, r * 2, r * 2);
    }
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';

    // Decay bursts
    for (var bi = bursts.length - 1; bi >= 0; bi--) {
      bursts[bi].life -= dt / 800;
      if (bursts[bi].life <= 0) bursts.splice(bi, 1);
    }

    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  document.addEventListener('visibilitychange', function(){
    if (document.hidden) { stopped = true; }
    else if (!stopped) { /* keep running */ }
    else { stopped = false; lastT = performance.now(); requestAnimationFrame(tick); }
  });
})();
</script>
</body>
</html>
