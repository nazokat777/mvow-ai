<head>

<link rel="apple-touch-icon" href="assets/mnsm-logo.png">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --void: #04060B;
  --gold: #D4AF37;
  --gold-bright: #F5D76E;
  --text: #F5F2EC;
  --text-dim: rgba(245, 242, 236, 0.55);
}
html, body {
  background: var(--void);
  color: var(--text);
  height: 100%;
  overflow: hidden;
  font-family: 'Inter', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
body { position: fixed; inset: 0; }

#scene {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  z-index: 0;
  display: block;
}

/* Vignette overlay */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.75) 100%);
  pointer-events: none;
  z-index: 3;
}

/* Text overlay */
.text-overlay {
  position: fixed;
  left: 50%;
  bottom: 16%;
  transform: translateX(-50%);
  text-align: center;
  z-index: 5;
  max-width: 480px;
  width: calc(100% - 48px);
  padding: 0 16px;
  pointer-events: none;
}
.line {
  display: block;
  opacity: 0;
  transform: translateY(14px);
  transition: opacity 1100ms cubic-bezier(.22,.61,.36,1), transform 1100ms cubic-bezier(.22,.61,.36,1);
}
.line.show { opacity: 1; transform: translateY(0); }
.line.primary {
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  font-size: 18px;
  letter-spacing: 0.04em;
  color: var(--text);
  line-height: 1.4;
}
.line.emphasis {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 500;
  font-size: 38px;
  letter-spacing: 0.01em;
  color: var(--gold-bright);
  line-height: 1.15;
  margin-top: 12px;
  text-shadow: 0 0 26px rgba(245, 215, 110, 0.5), 0 0 50px rgba(212, 175, 55, 0.3);
}

/* Solo (scene 4) */
.solo-text {
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  z-index: 5;
  text-align: center;
  max-width: 520px;
  width: calc(100% - 48px);
  padding: 0 16px;
  pointer-events: none;
}
.solo-line {
  display: block;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 500;
  font-size: 44px;
  letter-spacing: 0.01em;
  color: var(--gold-bright);
  line-height: 1.2;
  opacity: 0;
  transform: translateY(16px) scale(0.97);
  transition: opacity 1200ms cubic-bezier(.22,.61,.36,1), transform 1200ms cubic-bezier(.22,.61,.36,1);
  text-shadow: 0 0 30px rgba(245, 215, 110, 0.55), 0 0 60px rgba(212, 175, 55, 0.35);
}
.solo-line.show { opacity: 1; transform: translateY(0) scale(1); }
.solo-line.exit { opacity: 0; transform: translateY(-12px) scale(0.97); }

/* Word ladder (scene 5) */
.word-list {
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  z-index: 5;
  text-align: center;
  pointer-events: none;
}
.word {
  display: block;
  font-family: 'Inter', sans-serif;
  font-weight: 400;
  font-size: 23px;
  letter-spacing: 0.45em;
  color: var(--gold-bright);
  text-transform: uppercase;
  padding: 14px 0;
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 850ms cubic-bezier(.22,.61,.36,1), transform 850ms cubic-bezier(.22,.61,.36,1);
  text-shadow: 0 0 22px rgba(245, 215, 110, 0.45);
}
.word.show { opacity: 1; transform: translateY(0); }
.word-dot {
  display: block;
  width: 4px;
  height: 4px;
  margin: 8px auto;
  background: var(--gold);
  border-radius: 50%;
  opacity: 0;
  transition: opacity 700ms;
  box-shadow: 0 0 10px rgba(212, 175, 55, 0.7);
}
.word-dot.show { opacity: 0.75; }
.word-sub {
  display: block;
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  font-size: 15px;
  letter-spacing: 0.05em;
  color: var(--text-dim);
  margin-top: 36px;
  opacity: 0;
  transition: opacity 900ms;
}
.word-sub.show { opacity: 1; }
.word-sub .em {
  color: var(--gold-bright);
  font-style: italic;
  font-family: 'Cormorant Garamond', serif;
  font-size: 19px;
}

/* Logo */
.logo-final {
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%) scale(0.85);
  z-index: 5;
  opacity: 0;
  transition: opacity 1000ms cubic-bezier(.22,.61,.36,1), transform 1300ms cubic-bezier(.22,.61,.36,1);
  text-align: center;
  pointer-events: none;
}
.logo-final.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
.logo-final img {
  width: 108px;
  height: auto;
  display: block;
  margin: 0 auto;
  filter:
    drop-shadow(0 0 30px rgba(245, 215, 110, 0.7))
    drop-shadow(0 0 60px rgba(212, 175, 55, 0.4))
    brightness(1.15);
}
.logo-name {
  display: block;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 500;
  font-size: 34px;
  color: var(--gold-bright);
  margin-top: 20px;
  letter-spacing: 0.02em;
  text-shadow: 0 0 18px rgba(245, 215, 110, 0.5);
}
.logo-tagline {
  display: block;
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 12px;
  letter-spacing: 0.3em;
  text-transform: uppercase;
}

.skip-btn {
  position: fixed;
  top: max(20px, env(safe-area-inset-top, 20px));
  right: 20px;
  padding: 11px 17px;
  background: rgba(240, 233, 214, 0.04);
  color: var(--text-dim);
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.24em;
  text-transform: uppercase;
  border: 1px solid rgba(240, 233, 214, 0.10);
  border-radius: 999px;
  z-index: 20;
  cursor: pointer;
  min-height: 42px;
  -webkit-backdrop-filter: blur(14px);
  backdrop-filter: blur(14px);
  transition: all 220ms ease;
}
.skip-btn:hover, .skip-btn:focus-visible {
  background: rgba(245, 215, 110, 0.08);
  color: var(--gold-bright);
  border-color: rgba(245, 215, 110, 0.4);
  outline: none;
}
.skip-btn:focus-visible { box-shadow: 0 0 0 2px rgba(245, 215, 110, 0.5); }

.veil {
  position: fixed;
  inset: 0;
  background: var(--void);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 500ms cubic-bezier(.4,0,.2,1);
}
.veil.show { opacity: 1; }

/* Loading state */
.loading {
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  z-index: 30;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 16px;
  color: var(--text-dim);
  letter-spacing: 0.08em;
  opacity: 0;
  animation: fadeInLoading 600ms ease 200ms forwards;
}
@keyframes fadeInLoading { to { opacity: 1; } }
.loading.hide { opacity: 0; transition: opacity 400ms; }

#fallback {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: var(--void);
  color: var(--gold);
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 18px;
  text-align: center;
  padding: 24px;
  z-index: 50;
  cursor: pointer;
}

@media (prefers-reduced-motion: reduce) {
  .line, .solo-line, .word, .word-dot, .word-sub, .logo-final {
    transition-duration: 250ms !important;
    transform: none !important;
  }
}
@media (max-width: 480px) {
  .line.primary { font-size: 16px; }
  .line.emphasis { font-size: 30px; }
  .solo-line { font-size: 34px; }
  .word { font-size: 20px; letter-spacing: 0.38em; padding: 12px 0; }
  .word-sub { font-size: 14px; margin-top: 28px; }
  .logo-final img { width: 90px; }
  .logo-name { font-size: 26px; }
  .text-overlay { bottom: 14%; }
}
@media (max-width: 360px) {
  .line.emphasis { font-size: 26px; }
  .solo-line { font-size: 28px; }
  .word { font-size: 18px; letter-spacing: 0.34em; }
}
</style>
</head>
<body>

<canvas id="scene"></canvas>
<div id="fallback">3D ko'rinish quvvatlanmaydi. Davom etish uchun bosing.</div>
<div class="loading" id="loading">Yuklanmoqda…</div>

<div class="text-overlay" id="textOverlay">
  <span class="line primary" id="line1"></span>
  <span class="line emphasis" id="line2"></span>
</div>

<div class="solo-text" id="soloText" aria-live="polite">
  <span class="solo-line" id="soloLine"></span>
</div>

<div class="word-list" id="wordList">
  <span class="word" id="w1">Maqsad</span>
  <span class="word-dot" id="d1"></span>
  <span class="word" id="w2">Reja</span>
  <span class="word-dot" id="d2"></span>
  <span class="word" id="w3">Harakat</span>
  <span class="word-dot" id="d3"></span>
  <span class="word" id="w4">Natija</span>
  <span class="word-sub" id="ws"></span>
</div>

<div class="logo-final" id="logoFinal">
  <img src="assets/mnsm-logo.png" alt="brend">
  <span class="logo-name">brend</span>
  <span class="logo-tagline" data-i18n="brand.tagline">sizning intizom do'stingiz</span>
</div>

<button class="skip-btn" id="skipBtn" type="button" data-i18n="intro.skip">O'tkazib yuborish ›</button>
<div class="veil" id="veil"></div>

<script src="i18n.js"></script>

<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
} }
</script>

<script type="module">
'use strict';

// ===== EARLY GUARDS =====
const INTRO_SEEN = 'mvow.motion.introSeen';
function go(u){ try { location.replace(u); } catch(e){ location.href=u; } }
function setSeen(){ try { localStorage.setItem(INTRO_SEEN, '1'); } catch(e){} }

try { if (localStorage.getItem(INTRO_SEEN)) { go('anketa.html'); throw new Error('seen'); } } catch(e) { if (e.message === 'seen') throw e; }

const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
let intensity = '';
try { intensity = localStorage.getItem('mvow.motion.intensity') || ''; } catch(e){}
if (reduced || intensity === 'minimal') { setSeen(); go('anketa.html'); throw new Error('skip'); }

// ===== i18n helper =====
function T(key, fallback) {
  if (window.I18N && I18N.t) {
    const v = I18N.t(key, fallback);
    if (v && v !== key) return v;
  }
  return fallback;
}

// ===== WebGL2 check =====
const canvas = document.getElementById('scene');
function webglAvailable() {
  try { return !!document.createElement('canvas').getContext('webgl2'); }
  catch { return false; }
}

const veil = document.getElementById('veil');
const loadingEl = document.getElementById('loading');
let skipDone = false;
function skipCinematic() {
  if (skipDone) return;
  skipDone = true;
  veil.classList.add('show');
  setSeen();
  setTimeout(() => go('anketa.html'), 500);
}

if (!webglAvailable()) {
  document.getElementById('fallback').style.display = 'flex';
  document.getElementById('fallback').addEventListener('click', skipCinematic);
  setTimeout(skipCinematic, 3000);
  throw new Error('No WebGL2');
}

// ===== Three.js =====
const THREE = await import('three');
const { EffectComposer } = await import('three/addons/postprocessing/EffectComposer.js');
const { RenderPass } = await import('three/addons/postprocessing/RenderPass.js');
const { UnrealBloomPass } = await import('three/addons/postprocessing/UnrealBloomPass.js');
const { OutputPass } = await import('three/addons/postprocessing/OutputPass.js');
const { RoomEnvironment } = await import('three/addons/environments/RoomEnvironment.js');

// ===== Renderer =====
const renderer = new THREE.WebGLRenderer({
  canvas,
  antialias: true,
  powerPreference: 'high-performance',
  alpha: false,
  stencil: false
});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

// ===== Scene =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x04060B);
scene.fog = new THREE.Fog(0x04060B, 8, 22);

const camera = new THREE.PerspectiveCamera(38, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 0.3, 5.2);

// ===== HDRI ENVIRONMENT (procedural via RoomEnvironment) =====
// This is what makes PBR materials look real — they need an environment to reflect.
const pmrem = new THREE.PMREMGenerator(renderer);
pmrem.compileEquirectangularShader();
const env = pmrem.fromScene(new RoomEnvironment(renderer), 0.04).texture;
scene.environment = env;
// (we keep scene.background BLACK — only the materials see the environment for reflections)

// ===== KEY DRAMATIC LIGHT =====
// A single spotlight from above-front gives cinematic mood, plus PBR fills shadows via envMap
const spotKey = new THREE.SpotLight(0xfff4d6, 28, 12, Math.PI / 5, 0.6, 1.5);
spotKey.position.set(0.8, 4, 3);
spotKey.target.position.set(0, 0, 0);
spotKey.castShadow = true;
spotKey.shadow.mapSize.set(1024, 1024);
spotKey.shadow.bias = -0.0005;
scene.add(spotKey);
scene.add(spotKey.target);

// Warm rim from back-left
const rim = new THREE.PointLight(0xffae5b, 18, 8, 1.4);
rim.position.set(-2.5, 1.2, -2.2);
scene.add(rim);

// Cool fill from below-front (gives glass a subtle edge)
const fill = new THREE.PointLight(0x4a6f99, 5, 8, 1.5);
fill.position.set(0, -1.5, 2);
scene.add(fill);

// ===== GROUND PLANE (catches shadow, hidden visually via fog) =====
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(40, 40),
  new THREE.ShadowMaterial({ opacity: 0.4 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -1.6;
ground.receiveShadow = true;
scene.add(ground);

// ===== HOURGLASS — LatheGeometry with REAL PBR materials =====
function hourglassProfile() {
  const pts = [];
  const H = 1.35;
  const W = 0.65;
  const NECK = 0.05;
  pts.push(new THREE.Vector2(0.01, -H));
  pts.push(new THREE.Vector2(W * 0.95, -H + 0.02));
  pts.push(new THREE.Vector2(W * 1.0, -H * 0.9));
  pts.push(new THREE.Vector2(W * 0.96, -H * 0.75));
  pts.push(new THREE.Vector2(W * 0.7, -H * 0.5));
  pts.push(new THREE.Vector2(W * 0.32, -H * 0.22));
  pts.push(new THREE.Vector2(NECK * 1.5, -H * 0.07));
  pts.push(new THREE.Vector2(NECK, 0));
  pts.push(new THREE.Vector2(NECK * 1.5, H * 0.07));
  pts.push(new THREE.Vector2(W * 0.32, H * 0.22));
  pts.push(new THREE.Vector2(W * 0.7, H * 0.5));
  pts.push(new THREE.Vector2(W * 0.96, H * 0.75));
  pts.push(new THREE.Vector2(W * 1.0, H * 0.9));
  pts.push(new THREE.Vector2(W * 0.95, H - 0.02));
  pts.push(new THREE.Vector2(0.01, H));
  return pts;
}

const glassGeom = new THREE.LatheGeometry(hourglassProfile(), 64);
glassGeom.computeVertexNormals();

// REAL GLASS — MeshPhysicalMaterial with transmission for refraction
const glassMat = new THREE.MeshPhysicalMaterial({
  color: 0xffffff,
  metalness: 0,
  roughness: 0.05,
  transmission: 1.0,        // glass refracts light through it
  thickness: 0.5,           // physical thickness for refraction
  ior: 1.5,                 // index of refraction (real glass)
  attenuationColor: new THREE.Color(0xfff4d6),  // warm tint inside
  attenuationDistance: 1.4,
  envMapIntensity: 1.6,
  clearcoat: 1.0,
  clearcoatRoughness: 0.02,
  side: THREE.DoubleSide,
  transparent: true,
});
const glassMesh = new THREE.Mesh(glassGeom, glassMat);
glassMesh.castShadow = true;
glassMesh.receiveShadow = false;

// ===== WOOD CAPS (with real PBR wood look) =====
const capGeom = new THREE.CylinderGeometry(0.74, 0.74, 0.13, 48, 1);
const woodMat = new THREE.MeshStandardMaterial({
  color: 0x4a3220,
  roughness: 0.7,
  metalness: 0.08,
  envMapIntensity: 0.5,
});
const topCap = new THREE.Mesh(capGeom, woodMat);
topCap.position.y = 1.35 + 0.065;
topCap.castShadow = true;
const botCap = new THREE.Mesh(capGeom, woodMat);
botCap.position.y = -1.35 - 0.065;
botCap.castShadow = true;
botCap.receiveShadow = true;

// ===== GOLD ACCENT RINGS (real metal — reflects environment) =====
const ringGeom = new THREE.TorusGeometry(0.74, 0.018, 12, 64);
const goldMat = new THREE.MeshStandardMaterial({
  color: 0xd4af37,
  roughness: 0.28,
  metalness: 0.95,
  envMapIntensity: 1.6,
});
const topRing = new THREE.Mesh(ringGeom, goldMat);
topRing.position.y = 1.42;
topRing.rotation.x = Math.PI / 2;
topRing.castShadow = true;

const botRing = new THREE.Mesh(ringGeom, goldMat);
botRing.position.y = -1.42;
botRing.rotation.x = Math.PI / 2;
botRing.castShadow = true;

// Four wooden posts connecting the caps (corner pillars)
function makePost(x, z) {
  const postGeom = new THREE.CylinderGeometry(0.025, 0.025, 2.7, 8);
  const m = new THREE.Mesh(postGeom, woodMat);
  m.position.set(x, 0, z);
  m.castShadow = true;
  return m;
}
const postOffset = 0.55;
const post1 = makePost(postOffset, postOffset);
const post2 = makePost(-postOffset, postOffset);
const post3 = makePost(postOffset, -postOffset);
const post4 = makePost(-postOffset, -postOffset);

const hourglass = new THREE.Group();
hourglass.add(glassMesh, topCap, botCap, topRing, botRing, post1, post2, post3, post4);
scene.add(hourglass);

// ===== SAND PARTICLES (the glow source — selective bloom target) =====
const SAND_COUNT = innerWidth < 480 ? 700 : 1100;
const sandGeom = new THREE.BufferGeometry();
const sandPos = new Float32Array(SAND_COUNT * 3);
const sandData = [];

function widthAtY(y) {
  const absY = Math.abs(y);
  const t = absY / 1.35;
  if (t < 0.07) return 0.04;
  if (t < 0.22) return THREE.MathUtils.lerp(0.04, 0.28, (t - 0.07) / 0.15);
  if (t < 0.5) return THREE.MathUtils.lerp(0.28, 0.62, (t - 0.22) / 0.28);
  if (t < 0.75) return THREE.MathUtils.lerp(0.62, 0.85, (t - 0.5) / 0.25);
  return 0.85;
}

for (let i = 0; i < SAND_COUNT; i++) {
  const yIsTop = Math.random() < 0.88;
  const y = yIsTop ? (0.1 + Math.random() * 1.18) : (-0.1 - Math.random() * 0.35);
  const r = Math.random() * widthAtY(y) * 0.82;
  const theta = Math.random() * Math.PI * 2;
  sandPos[i * 3] = Math.cos(theta) * r;
  sandPos[i * 3 + 1] = y;
  sandPos[i * 3 + 2] = Math.sin(theta) * r;
  sandData.push({
    vy: -(0.4 + Math.random() * 0.35),
    seed: Math.random() * 100,
    swirl: (Math.random() - 0.5) * 0.5,
  });
}
sandGeom.setAttribute('position', new THREE.BufferAttribute(sandPos, 3));

const sandMat = new THREE.PointsMaterial({
  color: 0xffd87a,
  size: 0.042,
  transparent: true,
  opacity: 1.0,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  sizeAttenuation: true,
});
const sandPoints = new THREE.Points(sandGeom, sandMat);
hourglass.add(sandPoints);

// ===== AMBIENT DUST =====
const DUST_COUNT = innerWidth < 480 ? 180 : 320;
const dustGeom = new THREE.BufferGeometry();
const dustPos = new Float32Array(DUST_COUNT * 3);
const dustData = [];
for (let i = 0; i < DUST_COUNT; i++) {
  dustPos[i * 3] = (Math.random() - 0.5) * 14;
  dustPos[i * 3 + 1] = (Math.random() - 0.5) * 10;
  dustPos[i * 3 + 2] = (Math.random() - 0.5) * 8 - 0.5;
  dustData.push({
    vy: -(0.04 + Math.random() * 0.08),
    seed: Math.random() * 100,
  });
}
dustGeom.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
const dustMat = new THREE.PointsMaterial({
  color: 0xffc580,
  size: 0.032,
  transparent: true,
  opacity: 0.42,
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  sizeAttenuation: true,
});
const dust = new THREE.Points(dustGeom, dustMat);
scene.add(dust);

// ===== POSTPROCESSING (selective bloom on sand only) =====
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.6, 0.4, 0.78);
composer.addPass(bloom);
composer.addPass(new OutputPass());

// ===== INTERACTION =====
const target = { mx: 0, my: 0 };
const smooth = { mx: 0, my: 0 };

addEventListener('pointermove', (e) => {
  target.mx = (e.clientX / innerWidth) * 2 - 1;
  target.my = (e.clientY / innerHeight) * 2 - 1;
}, { passive: true });

const touchAttractors = [];
canvas.addEventListener('pointerdown', (e) => {
  const ndcX = (e.clientX / innerWidth) * 2 - 1;
  const ndcY = -(e.clientY / innerHeight) * 2 + 1;
  const vec = new THREE.Vector3(ndcX, ndcY, 0.5);
  vec.unproject(camera);
  const dir = vec.sub(camera.position).normalize();
  const dist = -camera.position.z / dir.z;
  const pos = camera.position.clone().add(dir.multiplyScalar(dist));
  touchAttractors.push({ pos, life: 1.0 });
}, { passive: true });

document.getElementById('skipBtn').addEventListener('click', skipCinematic);
addEventListener('keydown', (e) => {
  if (e.key === 'Escape' || e.key === 'Enter') skipCinematic();
});

// ===== ANIMATION =====
const clock = new THREE.Clock();
let running = true;
let rafId;

const hgState = {
  rotZ: 0, targetRotZ: 0, rotZVel: 0,
  scale: 0.01, targetScale: 1.0, scaleVel: 0,
  sandFillTop: 1.0, targetSandFill: 1.0, sandVel: 0,
  visibility: 0, targetVis: 1, visVel: 0,
};

function springStep(cur, target, vel, dt, k, d) {
  const force = (target - cur) * k;
  const damp = vel * d;
  const newVel = vel + (force - damp) * dt;
  return { val: cur + newVel * dt, vel: newVel };
}

// Hide loading once 3D is ready
setTimeout(() => loadingEl.classList.add('hide'), 600);

function frame() {
  if (!running) return;
  rafId = requestAnimationFrame(frame);

  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  smooth.mx = THREE.MathUtils.damp(smooth.mx, target.mx, 5, dt);
  smooth.my = THREE.MathUtils.damp(smooth.my, target.my, 5, dt);

  const rs = springStep(hgState.rotZ, hgState.targetRotZ, hgState.rotZVel, dt, 30, 11);
  hgState.rotZ = rs.val; hgState.rotZVel = rs.vel;

  const ss = springStep(hgState.scale, hgState.targetScale, hgState.scaleVel, dt, 45, 13);
  hgState.scale = ss.val; hgState.scaleVel = ss.vel;

  const vs = springStep(hgState.visibility, hgState.targetVis, hgState.visVel, dt, 50, 14);
  hgState.visibility = vs.val; hgState.visVel = vs.vel;

  const sfs = springStep(hgState.sandFillTop, hgState.targetSandFill, hgState.sandVel, dt, 7, 7);
  hgState.sandFillTop = sfs.val; hgState.sandVel = sfs.vel;

  // Hourglass transforms — gentle sway, no full rotation
  hourglass.rotation.z = hgState.rotZ;
  hourglass.rotation.y = Math.sin(t * 0.28) * 0.08 + smooth.mx * 0.10;
  hourglass.rotation.x = -smooth.my * 0.05 + Math.sin(t * 0.55) * 0.01;
  hourglass.scale.setScalar(hgState.scale * hgState.visibility);

  // Sand particle update
  const sandArr = sandGeom.attributes.position.array;
  for (let i = 0; i < SAND_COUNT; i++) {
    const d = sandData[i];
    let x = sandArr[i * 3];
    let y = sandArr[i * 3 + 1];
    let z = sandArr[i * 3 + 2];

    y += d.vy * dt;

    if (Math.abs(y) < 0.4) {
      const a = d.swirl * dt * 4;
      const cos = Math.cos(a), sin = Math.sin(a);
      const nx = x * cos - z * sin;
      const nz = x * sin + z * cos;
      x = nx; z = nz;
    }

    const maxR = widthAtY(y) * 0.82;
    const r2 = x * x + z * z;
    if (r2 > maxR * maxR) {
      const rr = Math.sqrt(r2);
      x = (x / rr) * maxR;
      z = (z / rr) * maxR;
    }

    if (y < -1.25) {
      if (Math.random() < hgState.sandFillTop * 0.8) {
        y = 0.2 + Math.random() * 1.15;
        const rr2 = Math.random() * widthAtY(y) * 0.82;
        const tt = Math.random() * Math.PI * 2;
        x = Math.cos(tt) * rr2;
        z = Math.sin(tt) * rr2;
        d.vy = -(0.4 + Math.random() * 0.35);
      } else {
        y = -1.25 + Math.random() * 0.08;
      }
    }

    sandArr[i * 3] = x;
    sandArr[i * 3 + 1] = y;
    sandArr[i * 3 + 2] = z;
  }
  sandGeom.attributes.position.needsUpdate = true;

  // Dust
  const dustArr = dustGeom.attributes.position.array;
  for (let i = 0; i < DUST_COUNT; i++) {
    const d = dustData[i];
    let x = dustArr[i * 3];
    let y = dustArr[i * 3 + 1];
    let z = dustArr[i * 3 + 2];
    y += d.vy * dt;
    x += Math.sin(t * 0.3 + d.seed) * 0.002;

    for (const att of touchAttractors) {
      const dx = att.pos.x - x;
      const dy = att.pos.y - y;
      const dz = att.pos.z - z;
      const d2 = dx * dx + dy * dy + dz * dz;
      if (d2 < 4) {
        const inv = att.life * 0.2 / (d2 + 0.5);
        x += dx * inv; y += dy * inv; z += dz * inv;
      }
    }

    if (y < -6) {
      y = 6;
      x = (Math.random() - 0.5) * 14;
      z = (Math.random() - 0.5) * 8 - 0.5;
    }
    dustArr[i * 3] = x;
    dustArr[i * 3 + 1] = y;
    dustArr[i * 3 + 2] = z;
  }
  dustGeom.attributes.position.needsUpdate = true;

  for (let i = touchAttractors.length - 1; i >= 0; i--) {
    touchAttractors[i].life -= dt * 0.8;
    if (touchAttractors[i].life <= 0) touchAttractors.splice(i, 1);
  }

  // Camera breath
  camera.position.y = 0.3 + Math.sin(t * 0.4) * 0.04;
  camera.lookAt(0, 0, 0);

  composer.render();
}

clock.start();
frame();

// Lifecycle
canvas.addEventListener('webglcontextlost', (e) => { e.preventDefault(); running = false; cancelAnimationFrame(rafId); });
canvas.addEventListener('webglcontextrestored', () => { running = true; clock.getDelta(); frame(); });
document.addEventListener('visibilitychange', () => {
  if (document.hidden) { running = false; cancelAnimationFrame(rafId); }
  else if (!skipDone) { running = true; clock.getDelta(); frame(); }
});

let resizeT;
addEventListener('resize', () => {
  clearTimeout(resizeT);
  resizeT = setTimeout(() => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    composer.setSize(innerWidth, innerHeight);
  }, 120);
});

// ===== TEXT HELPERS =====

    if (l2) setTimeout(() => line2El.classList.add('show'), 260);
  }, 60);
}
function hideLines() {
  line1El.classList.remove('show');
  line2El.classList.remove('show');
}
function showSolo(text) {
  soloLineEl.textContent = text;
  soloLineEl.classList.remove('exit');
  setTimeout(() => soloLineEl.classList.add('show'), 60);
}
function hideSolo() {
  soloLineEl.classList.remove('show');
  soloLineEl.classList.add('exit');
}

// Skip override
const origSkip = skipCinematic;
function skipNow() {
  timers.forEach(clearTimeout);
  running = false;
  cancelAnimationFrame(rafId);
  origSkip();
}
document.getElementById('skipBtn').onclick = skipNow;
addEventListener('keydown', (e) => {
  if (e.key === 'Escape' || e.key === 'Enter') skipNow();
});
