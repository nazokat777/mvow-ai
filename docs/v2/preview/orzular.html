<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>FOCUS AI — Orzular daftari</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png?v=2">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png?v=2">
<link rel="stylesheet" href="theme.css">
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Inter', sans-serif; background: var(--void, #04060B); color: var(--text, #F5F2EC); }
  .phone { max-width: 480px; margin: 0 auto; min-height: 100vh; background: var(--void, #04060B); padding: 26px 22px 48px; }
  h1 { font-size: 30px; margin: 6px 0 4px; }
  .sub { color: var(--text-dim, #9CA0A8); font-size: 15px; line-height: 1.5; margin-bottom: 18px; }
  .year { margin-top: 22px; }
  .year-hd { display: flex; align-items: baseline; gap: 10px; margin: 0 2px 10px; }
  .year-hd .yr { font-size: 26px; font-weight: 800; color: var(--accent, #F4845F); font-family: 'Inter', sans-serif; letter-spacing: 1px; }
  .year-hd .cnt { font-size: 13px; color: var(--text-dim, #9CA0A8); }
  .addrow { display: flex; gap: 8px; margin-bottom: 4px; }
  .fld { flex: 1; padding: 13px; background: var(--card, #0C0F16); border: 1px solid var(--border-default, rgba(255,255,255,.12)); border-radius: 12px; color: var(--text, #F5F2EC); font-size: 16px; font-family: inherit; }
  .addbtn { flex-shrink: 0; width: 50px; border: none; border-radius: 12px; background: var(--accent, #F4845F); color: #fff; font-size: 24px; font-weight: 700; cursor: pointer; }
  .dream { display: flex; align-items: flex-start; gap: 12px; background: var(--card, #0C0F16); border: 1px solid var(--border-default, rgba(255,255,255,.12)); border-radius: 14px; padding: 13px 14px; margin-top: 9px; }
  .dream .ck { flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--accent, #F4845F); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #fff; padding: 0; margin-top: 1px; }
  .dream.done .ck { background: var(--accent, #F4845F); }
  .dream .tx { flex: 1; font-size: 16px; line-height: 1.4; word-break: break-word; }
  .dream.done .tx { text-decoration: line-through; color: var(--text-dim, #9CA0A8); }
  .dream .x { flex-shrink: 0; color: var(--text-dim, #9CA0A8); font-size: 22px; cursor: pointer; background: none; border: none; line-height: 1; }
  .empty { color: var(--text-dim, #9CA0A8); padding: 10px 4px; font-size: 15px; }
  .remind { width: 100%; margin-top: 28px; padding: 15px; border-radius: 14px; border: 1px solid var(--accent, #F4845F); background: transparent; color: var(--accent, #F4845F); font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; }
  .remind.on { background: var(--accent, #F4845F); color: #fff; }
</style>
</head>
<body>
<div class="phone">
  <h1 data-i18n="orzular.title">Orzular daftari</h1>
  <div class="sub" data-i18n="orzular.sub">Yil oxirigacha erishmoqchi bo'lgan orzularingiz. Ilova vaqti-vaqti bilan eslatib turadi.</div>

  <div id="years"></div>

  <button id="remindBtn" class="remind" type="button">🔔 <span id="remindLbl" data-i18n="orzular.remind_off">Har kuni eslatib tur</span></button>
</div>

<script src="i18n.js?v=29.0.28"></script>
<script src="pin-lock.js?v=29.0.84"></script>
<script src="lang-switcher.js?v=29.0.28" defer></script>
<script src="data.js?v=29.0.28" defer></script>
<script src="social.js?v=29.0.28" defer></script>
<script src="supabase-config.js?v=29.0.28"></script>
<script src="push.js?v=29.0.28" defer></script>
<script src="nav-overlay.js?v=29.0.28" defer></script>
<script>
  (function () {
    var YEARS = [2026, 2027];
    var REMIND_ID = 'dream-reminder';
    var REMIND_TIME = '09:00';
    function T(k, fb) { return (window.I18N && I18N.t) ? I18N.t(k, fb) : fb; }
    function esc(s) { return String(s || '').replace(/[&<>"]/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]); }); }
    function load() { try { var d = JSON.parse(localStorage.getItem('mvow.dreams') || '[]'); return Array.isArray(d) ? d : []; } catch (e) { return []; } }
    function save(d) { try { localStorage.setItem('mvow.dreams', JSON.stringify(d)); } catch (e) {} }
    function fmtD(iso) { var m = String(iso || '').match(/^(\d{4})-(\d{2})-(\d{2})$/); return m ? (m[3] + '.' + m[2] + '.' + m[1]) : ''; }
    function daysLeft(iso) { var m = String(iso || '').match(/^(\d{4})-(\d{2})-(\d{2})$/); if (!m) return null; var t = new Date(+m[1], +m[2] - 1, +m[3]); t.setHours(0, 0, 0, 0); var n = new Date(); n.setHours(0, 0, 0, 0); return Math.round((t - n) / 86400000); }
    function targetHtml(iso) {
      var f = fmtD(iso); if (!f) return '';
      var dl = daysLeft(iso), tail = '';
      if (dl != null) { if (dl > 0) tail = ' · ' + dl + ' ' + T('orzular.days_left', 'kun qoldi'); else if (dl === 0) tail = ' · ' + T('orzular.today', 'bugun'); else tail = ' · ' + T('orzular.overdue', "muddat o'tdi"); }
      return '<div style="font-size:12px;color:var(--text-dim,#9CA0A8);margin-top:3px;">🎯 ' + f + ' ' + T('orzular.until', 'gacha') + tail + '</div>';
    }

    var root = document.getElementById('years');
    function render() {
      var all = load();
      root.innerHTML = YEARS.map(function (yr) {
        var items = all.filter(function (d) { return d.year === yr; });
        var done = items.filter(function (d) { return d.done; }).length;
        var rows = items.length ? items.map(function (d) {
          return '<div class="dream ' + (d.done ? 'done' : '') + '">'
            + '<button class="ck" data-ck="' + d.id + '" aria-label="belgilash">' + (d.done ? '✓' : '') + '</button>'
            + '<div class="tx">' + esc(d.text) + (d.target ? targetHtml(d.target) : '') + '</div>'
            + '<button class="x" data-del="' + d.id + '" aria-label="o\'chirish">×</button></div>';
        }).join('') : '<div class="empty">' + T('orzular.empty', "Hali orzu yo'q. Birinchisini yozing.") + '</div>';
        return '<div class="year">'
          + '<div class="year-hd"><span class="yr">' + yr + '</span>'
          + (items.length ? '<span class="cnt">' + done + '/' + items.length + '</span>' : '') + '</div>'
          + '<div class="addrow"><input class="fld" data-add="' + yr + '" maxlength="140" placeholder="' + T('orzular.add_ph', 'Yangi orzu...') + '">'
          + '<button class="addbtn" data-addbtn="' + yr + '" aria-label="qo\'shish">+</button></div>'
          + '<div style="margin:6px 0 2px;display:flex;align-items:center;gap:8px;"><input class="fld" data-adddate="' + yr + '" type="date" style="flex:0 0 150px;padding:9px 10px;font-size:14px;"><span style="font-size:12px;color:var(--text-dim,#9CA0A8);">🎯 ' + T('orzular.target_hint', 'muddat — ixtiyoriy') + '</span></div>'
          + rows + '</div>';
      }).join('');
      wire();
    }
    function addDream(yr, text, target) {
      text = (text || '').trim(); if (!text) return;
      var obj = { id: Date.now() + '' + Math.floor(Math.random() * 999), year: yr, text: text, done: false };
      if (/^\d{4}-\d{2}-\d{2}$/.test(target || '')) obj.target = target;
      var d = load(); d.push(obj);
      save(d);
      if (window.MVOW_DATA && MVOW_DATA.fxSuccess) MVOW_DATA.fxSuccess();
      render();
    }
    function wire() {
      root.querySelectorAll('[data-addbtn]').forEach(function (b) {
        b.addEventListener('click', function () {
          var yr = +b.getAttribute('data-addbtn');
          var inp = root.querySelector('[data-add="' + yr + '"]'), dinp = root.querySelector('[data-adddate="' + yr + '"]');
          addDream(yr, inp && inp.value, dinp && dinp.value); if (inp) inp.value = ''; if (dinp) dinp.value = '';
        });
      });
      root.querySelectorAll('[data-add]').forEach(function (inp) {
        inp.addEventListener('keydown', function (e) { if (e.key === 'Enter') { var yr = +inp.getAttribute('data-add'), dinp = root.querySelector('[data-adddate="' + yr + '"]'); addDream(yr, inp.value, dinp && dinp.value); inp.value = ''; if (dinp) dinp.value = ''; } });
      });
      root.querySelectorAll('[data-ck]').forEach(function (b) {
        b.addEventListener('click', function () {
          var id = b.getAttribute('data-ck'), d = load();
          d.forEach(function (x) { if (String(x.id) === String(id)) x.done = !x.done; });
          save(d);
          if (window.MVOW_DATA && MVOW_DATA.fxTap) MVOW_DATA.fxTap();
          render();
        });
      });
      root.querySelectorAll('[data-del]').forEach(function (b) {
        b.addEventListener('click', function () {
          var id = b.getAttribute('data-del'), all = load();
          var item = all.filter(function (x) { return String(x.id) === String(id); })[0];
          save(all.filter(function (x) { return String(x.id) !== String(id); }));
          render();
          if (window.MvowUndo && item) MvowUndo.show(T('common.deleted', "O'chirildi"), function () { var a = load(); a.push(item); save(a); render(); });
        });
      });
    }

    // ── Vaqti-vaqti bilan eslatib tur (Web Push — ilova yopiq bo'lsa ham) ──
    function reminders() { try { var r = JSON.parse(localStorage.getItem('mvow.reminders') || '[]'); return Array.isArray(r) ? r : []; } catch (e) { return []; } }
    function saveReminders(r) { try { localStorage.setItem('mvow.reminders', JSON.stringify(r)); } catch (e) {} if (window.PushReminders && PushReminders.isEnabled()) PushReminders.sync(); }
    function remindOn() { return reminders().some(function (x) { return x.id === REMIND_ID; }); }
    var remindBtn = document.getElementById('remindBtn'), remindLbl = document.getElementById('remindLbl');
    function syncRemindBtn() {
      var on = remindOn();
      remindBtn.classList.toggle('on', on);
      remindLbl.textContent = on ? T('orzular.remind_on', 'Eslatib turiladi ✓') : T('orzular.remind_off', 'Har kuni eslatib tur');
    }
    remindBtn.addEventListener('click', function () {
      var r = reminders();
      if (remindOn()) {
        saveReminders(r.filter(function (x) { return x.id !== REMIND_ID; }));
        syncRemindBtn();
      } else {
        var yr = YEARS[0];
        r.push({ id: REMIND_ID, time: REMIND_TIME, text: '📖 ' + yr + ' ' + T('orzular.remind_card', 'orzularingizni o\'qing') });
        saveReminders(r);
        syncRemindBtn();
        if (window.PushReminders) PushReminders.enable().then(function (res) {
          if (!(res && res.ok)) alert(T('orzular.push_denied', "Eslatma saqlandi. Telefon bildirishnomasi uchun ruxsat bering."));
        });
      }
    });

    render();
    syncRemindBtn();
  })();
</script>
<script src="undo-toast.js?v=29.0.51"></script>
<script src="reveal.js?v=29.0.71" defer></script>
<script src="back-btn.js?v=29.0.28"></script>
</body>
</html>
