<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Daywarden</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png?v=2">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png?v=2">
<style>
  html,body{margin:0;height:100%;background:#04060B;color:#F5F2EC;
    font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
    display:flex;align-items:center;justify-content:center;text-align:center}
  .logo{width:72px;height:72px;border-radius:18px;margin:0 auto 18px;display:block;opacity:.95}
  .t{font-size:25px;font-weight:600;letter-spacing:.5px}
  .s{font-size:13px;letter-spacing:3px;text-transform:uppercase;color:#9CA0A8;margin-top:8px}
  .d{margin-top:22px;font-size:15px;color:#6b7280}
</style>
</head>
<body>
  <div>
    <img class="logo" src="assets/company-logo.png" alt="Just AI It">
    <div class="t">Daywarden</div>
    <div class="s">sizning intizom do'stingiz</div>
    <div class="d">Yuklanmoqda…</div>
  </div>
  <script>
    // Aqlli kirish: maqsad bor -> home (reja o'zi tuziladi); ro'yxatdan o'tган, maqsad yo'q -> maqsad yozish; yangi -> intro
    (function () {
      function go(u){ try { location.replace(u); } catch(e){ location.href = u; } }
      try {
        var goals = [];
        try { goals = JSON.parse(localStorage.getItem('mvow.goals') || '[]'); } catch (e) {}
        var hasGoals = Array.isArray(goals) && goals.length > 0;
        var hasName = !!localStorage.getItem('mvow.userName') || !!localStorage.getItem('mvow.email');
        if (hasGoals) go('home.html');           // maqsad bor -> kunlik reja avtomatik
        else if (hasName) go('maqsadlar.html');  // ro'yxatdan o'tган, maqsad yo'q -> AVVAL maqsad yozsin
        else go('intro.html');                   // butunlay yangi foydalanuvchi
      } catch (e) {
        go('intro.html');
      }
    })();
  </script>
</body>
</html>
