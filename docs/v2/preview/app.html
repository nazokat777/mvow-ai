<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FOCUS AI</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png?v=2">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png?v=2">
<link rel="preload" as="image" href="assets/mnsm-maskable-512.png">
<style>
  /* UZLUKSIZ SPLASH:
     Telefonda (TWA) Android o'z splash ekranida shu logoni shu fonda ko'rsatadi.
     Bu sahifa AYNAN o'shani (animatsiyasiz, markazda) chizadi — Android splash
     so'nganda ekran O'ZGARMAYDI (bo'sh/qora oraliq yo'q).
     Keyin home/intro chizilguncha shu logo ekranda turadi -> "yopilib-ochildi" yo'qoladi.
     MUHIM: hech qanday animatsiya YO'Q — aks holda logo "qaytadan ochilgandek" tuyuladi. */
  * { margin: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #04060B; overflow: hidden; }
  body { display: flex; align-items: center; justify-content: center; }
  .logo {
    width: 120px; height: 120px; display: block;
    /* animatsiya yo'q — Android splash bilan uzluksiz */
  }
</style>
</head>
<body>
  <img class="logo" src="assets/mnsm-maskable-512.png" alt="FOCUS AI">
  <noscript><a href="intro.html" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#F4845F;font-family:system-ui,sans-serif;">FOCUS AI — davom etish</a></noscript>
  <script>
    (function () {
      function target() {
        try {
          var goals = JSON.parse(localStorage.getItem('mvow.goals') || '[]');
          if (Array.isArray(goals) && goals.length) return 'home.html';
          if (localStorage.getItem('mvow.userName') || localStorage.getItem('mvow.email')) return 'maqsadlar.html';
        } catch (e) {}
        return 'intro.html';
      }
      var url = target();
      function go() { try { location.replace(url); } catch (e) { location.href = url; } }
      // Logo CHIZILGACH yo'naltiramiz. Shunda brauzer yangi sahifa chizilguncha
      // shu logoni ekranda ushlab turadi -> bo'sh oraliq (yopilish) ko'rinmaydi.
      if (typeof requestAnimationFrame === 'function') {
        requestAnimationFrame(function () { requestAnimationFrame(go); });
      } else {
        setTimeout(go, 32);
      }
    })();
  </script>
</body>
</html>
