<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FOCUS AI</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png?v=2">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png?v=2">
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #04060B; overflow: hidden; }
  body {
    display: flex; align-items: center; justify-content: center;
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    color: #F5F2EC;
    transition: opacity .26s ease;
  }
  body.leave { opacity: 0; }

  .splash { text-align: center; position: relative; }

  /* Logo + "fokusga kelayotgan" konvergent halqa */
  .logo-wrap { position: relative; width: 78px; height: 78px; margin: 0 auto 22px; }
  .ring {
    position: absolute; left: 50%; top: 50%; width: 78px; height: 78px; margin: -39px 0 0 -39px;
    border-radius: 50%; border: 2px solid rgba(244,132,95,.55); pointer-events: none;
    animation: focusRing 950ms cubic-bezier(0.16,0.84,0.32,1) both;
  }
  .ring.r2 { animation-delay: 120ms; }
  @keyframes focusRing {
    0%   { transform: scale(2.6); opacity: 0; }
    50%  { opacity: 1; }
    100% { transform: scale(1);   opacity: 0; }
  }
  .logo {
    width: 78px; height: 78px; border-radius: 20px; display: block;
    box-shadow: 0 12px 44px rgba(244,132,95,.28);
    animation: logoIn 720ms cubic-bezier(0.16,0.84,0.32,1) both;
  }
  @keyframes logoIn {
    0%   { transform: scale(.68); opacity: 0; filter: blur(7px); }
    100% { transform: none;       opacity: 1; filter: blur(0); }
  }

  /* "FOCUS AI" — xiralikdan aniqlikka keladi (brendga mos "fokus" metaforasi) */
  .word {
    font-size: 30px; font-weight: 800; letter-spacing: 2px;
    background: linear-gradient(120deg, #F79B7F, #F4845F, #C2410C);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; color: transparent;
    animation: wordFocus 760ms cubic-bezier(0.16,0.84,0.32,1) 140ms both;
  }
  @keyframes wordFocus {
    0%   { opacity: 0; filter: blur(12px); letter-spacing: 12px; }
    100% { opacity: 1; filter: blur(0);    letter-spacing: 2px; }
  }
  .sub {
    font-size: 12px; letter-spacing: 4px; text-transform: uppercase; color: #7a828f; margin-top: 11px;
    animation: subIn 620ms ease 480ms both;
  }
  @keyframes subIn { from { opacity: 0; transform: translateY(4px); } to { opacity: .85; transform: none; } }

  /* Nozik yuklanish chizig'i */
  .bar {
    position: absolute; left: 50%; bottom: -52px; width: 92px; height: 2px; margin-left: -46px;
    background: rgba(255,255,255,.07); border-radius: 2px; overflow: hidden;
    animation: subIn 500ms ease 500ms both;
  }
  .bar i { position: absolute; top: 0; bottom: 0; width: 42%; border-radius: 2px; background: #F4845F; animation: barMove 950ms ease-in-out infinite; }
  @keyframes barMove { 0% { left: -42%; } 100% { left: 100%; } }

  @media (prefers-reduced-motion: reduce) {
    .ring, .logo, .word, .sub, .bar, .bar i { animation: none !important; }
    .logo { opacity: 1; } .word { opacity: 1; filter: none; letter-spacing: 2px; } .sub { opacity: .85; } .ring { display: none; }
  }
</style>
</head>
<body>
  <div class="splash">
    <div class="logo-wrap">
      <span class="ring"></span>
      <span class="ring r2"></span>
      <img class="logo" src="assets/mnsm-logo.png?v=2" alt="FOCUS AI">
    </div>
    <div class="word">FOCUS AI</div>
    <div class="sub">Just AI It</div>
    <div class="bar"><i></i></div>
  </div>
  <script>
    // Aqlli kirish: maqsad bor -> home; ro'yxatdan o'tган, maqsad yo'q -> maqsadlar; yangi -> intro.
    (function () {
      function target() {
        try {
          var goals = JSON.parse(localStorage.getItem('mvow.goals') || '[]');
          if (Array.isArray(goals) && goals.length) return 'home.html';
          if (localStorage.getItem('mvow.userName') || localStorage.getItem('mvow.email')) return 'maqsadlar.html';
        } catch (e) {}
        return 'intro.html';
      }
      var url = target();
      function go() { try { location.replace(url); } catch (e) { location.href = url; } }
      var reduce = false; try { reduce = matchMedia('(prefers-reduced-motion: reduce)').matches; } catch (e) {}
      if (reduce) { setTimeout(go, 120); return; }
      // Animatsiyani ko'rsatib, keyin yumshoq fade bilan o'tamiz (hard cut/flash yo'q)
      setTimeout(function () {
        document.body.classList.add('leave');
        setTimeout(go, 250);
      }, 850);
    })();
  </script>
</body>
</html>
