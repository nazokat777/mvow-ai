<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8">
<script>
  // Temani DARHOL qo'llaymiz — home bilan AYNAN bir xil fon.
  // Aks holda: to'q app.html -> yorug' home = "o'chib-ochilgandek" sakrash chiqardi.
  (function () {
    try {
      var dark = (localStorage.getItem('mvow.theme') === 'dark');
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      window.__bg = dark ? '#04060B' : '#f3f4f7';
    } catch (e) { window.__bg = '#f3f4f7'; }
  })();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FOCUS AI</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" id="tc" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png?v=2">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png?v=2">
<link rel="preload" as="image" href="assets/mnsm-maskable-512.png">
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  /* Fon home bilan bir xil (tema bo'yicha) — uzluksiz o'tish, sakrash yo'q */
  html[data-theme="dark"], html[data-theme="dark"] body { background: #04060B; }
  html[data-theme="light"], html[data-theme="light"] body { background: #f3f4f7; }
  body { display: flex; align-items: center; justify-content: center; }
  .logo { width: 120px; height: 120px; display: block; border-radius: 26px; }
</style>
</head>
<body>
  <img class="logo" src="assets/mnsm-maskable-512.png" alt="FOCUS AI">
  <noscript><a href="intro.html" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;color:#F4845F;font-family:system-ui,sans-serif;">FOCUS AI — davom etish</a></noscript>
  <script>
    // theme-color meta ni tema foniga moslaymiz (status bar ham bir xil)
    try { var _m = document.getElementById('tc'); if (_m && window.__bg) _m.setAttribute('content', window.__bg); } catch (e) {}
    (function () {
      function target() {
        try {
          var goals = JSON.parse(localStorage.getItem('mvow.goals') || '[]');
          if (Array.isArray(goals) && goals.length) return 'home.html';
          if (localStorage.getItem('mvow.userName') || localStorage.getItem('mvow.email')) return 'maqsadlar.html';
        } catch (e) {}
        return 'intro.html';
      }
      var url = target();
      function go() { try { location.replace(url); } catch (e) { location.href = url; } }
      // Logo chizilgach yo'naltiramiz (brauzer yangi sahifa chizilguncha shu fonni ushlab turadi).
      if (typeof requestAnimationFrame === 'function') { requestAnimationFrame(function () { requestAnimationFrame(go); }); }
      else { setTimeout(go, 32); }
    })();
  </script>
</body>
</html>
