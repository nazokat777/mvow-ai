<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FOCUS AI</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png?v=2">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png?v=2">
<script>
  // ⚠️ MUHIM: yo'naltirish <head>DA, DARHOL — app.html hech qachon chizilmaydi.
  // Sabab: telefonda (TWA) Android'ning O'Z splash ekrani allaqachon logoni ko'rsatadi.
  // Agar bu yerda yana splash ko'rsatsak, logo IKKI marta chiqib "yopilib-ochilgandek"
  // (2 marta) tuyulardi. Endi: Android splash -> to'g'ridan kontent. Bitta ochilish.
  (function () {
    try {
      var goals = JSON.parse(localStorage.getItem('mvow.goals') || '[]');
      if (Array.isArray(goals) && goals.length) { location.replace('home.html'); return; }
      if (localStorage.getItem('mvow.userName') || localStorage.getItem('mvow.email')) { location.replace('maqsadlar.html'); return; }
      location.replace('intro.html');
    } catch (e) {
      try { location.replace('intro.html'); } catch (e2) { location.href = 'intro.html'; }
    }
  })();
</script>
<style>
  /* JS o'chiq/sekin bo'lsa ko'rinadigan zaxira — Android splash bilan bir xil to'q fon (flash yo'q) */
  html, body { margin: 0; height: 100%; background: #04060B; }
  .fb { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; color: #6b7280; font-size: 15px; }
  .fb a { color: #F4845F; }
</style>
</head>

</body>
