<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{brand} — Kalendar</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --void:#04060B; --void-soft:#0C0F16;
    --text:#F5F2EC; --text-mid:#B8BBC2; --text-dim:#9CA0A8;
    --accent:#00E5D4; --accent-soft:#00B5A8;
    --alert:#FF4757;
  }
  body { background: var(--void); font-family:'Inter',sans-serif; color: var(--text); min-height: 100vh; display:flex; justify-content:center; align-items:flex-start; padding: 24px; -webkit-font-smoothing: antialiased; }
  .phone { width: 380px; min-height: 800px; background: var(--void); border-radius: 40px; overflow: hidden; position: relative; box-shadow: 0 0 0 8px #1a1d24, 0 30px 80px rgba(0,0,0,.7); }
  .container { padding: 60px 24px 40px; }

  .h { text-align: center; margin-bottom: 24px; }
  .h .month { font-family:'Cormorant Garamond',serif; font-size: 24px; font-weight: 500; }

  /* Day chips */
  .week-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 28px;
  }
  .day {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 10px 2px;
    border-radius: 10px;
    cursor: pointer;
    transition: all .15s;
    border: 1px solid transparent;
  }
  .day .d { font-size: 9px; letter-spacing: 1px; color: var(--text-dim); text-transform: uppercase; }
  .day .n { font-size: 14px; color: var(--text); }
  .day .dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent);
    margin-top: 2px;
    opacity: 0;
    transition: opacity .15s;
  }
  .day.has .dot { opacity: 1; }
  .day.today { border-color: var(--accent); background: rgba(0,229,212,.06); }
  .day.selected {
    background: var(--accent);
  }
  .day.selected .d, .day.selected .n { color: var(--void); font-weight: 600; }
  .day.selected .dot { background: var(--void); opacity: 1; }

  /* Selected day label */
  .day-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    color: var(--text-mid);
    text-align: center;
    margin-bottom: 16px;
    font-style: italic;
  }
  .day-label .em { color: var(--accent); font-style: normal; }

  /* Tasks per day */
  .tasks { display: flex; flex-direction: column; }
  .task {
    display: grid;
    grid-template-columns: 56px 1fr auto;
    gap: 12px;
    align-items: baseline;
    padding: 14px 0;
    border-bottom: 1px solid rgba(255,255,255,.04);
    transition: opacity .25s, transform .25s;
  }
  .task.deleting { opacity: 0; transform: translateX(60px); }
  .task .time {
    font-size: 13px; font-weight: 500;
    color: var(--accent);
    cursor: pointer;
  }
  .task .name {
    font-size: 14px; color: var(--text);
    cursor: pointer; line-height: 1.3;
  }
  .task .dur {
    font-size: 11px; color: var(--text-dim);
    cursor: pointer;
  }
  .task .x {
    color: var(--text-dim);
    font-size: 18px; line-height: 1;
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: color .15s;
    border-radius: 50%;
  }
  .task .x:active, .task .x:hover { color: var(--alert); background: rgba(255,71,87,.06); }

  .task.edit { grid-template-columns: 1fr; gap: 8px; padding: 12px 0; }
  .task.edit .row {
    display: grid;
    grid-template-columns: 60px 1fr 60px;
    gap: 8px;
  }
  .task.edit input {
    background: var(--void-soft);
    border: 1px solid rgba(255,255,255,.06);
    border-radius: 4px;
    padding: 9px 8px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    outline: none;
    min-width: 0;
    transition: border-color .15s;
  }
  .task.edit input:focus { border-color: var(--accent); }
  .task.edit input.name {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
  }
  .task.edit .actions { display: flex; gap: 8px; justify-content: flex-end; padding-top: 4px; }
  .task.edit .actions button {
    padding: 7px 12px;
    border: none; border-radius: 4px;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
  }
  .task.edit .actions .save { background: var(--accent); color: var(--void); font-weight: 600; }
  .task.edit .actions .cancel { background: transparent; color: var(--text-mid); border: 1px solid rgba(255,255,255,.1); }

  /* Empty state */
  .empty {
    text-align: center;
    color: var(--text-dim);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
    padding: 24px 0;
  }

  .add-btn {
    display: block;
    width: 100%;
    margin-top: 12px;
    padding: 12px;
    background: transparent;
    border: 1px dashed rgba(255,255,255,.1);
    border-radius: 8px;
    color: var(--text-mid);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all .15s;
  }
  .add-btn:hover, .add-btn:active {
    color: var(--accent); border-color: var(--accent);
    background: rgba(0,229,212,.04);
  }

  @media (max-width: 480px) { body { padding: 0; } .phone { width: 100vw; min-height: 100vh; border-radius: 0; box-shadow: none; } }
</style>
</head>
<body>

<div class="phone">
  <div class="container">

    <div class="h" style="display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:16px;">
      <button id="prevW" type="button" aria-label="Oldingi" style="background:transparent;border:none;color:var(--text-mid);font-size:22px;width:44px;height:44px;cursor:pointer;border-radius:50%;">‹</button>
      <div class="month" id="monthLbl">Iyun 2026</div>
      <button id="nextW" type="button" aria-label="Keyingi" style="background:transparent;border:none;color:var(--text-mid);font-size:22px;width:44px;height:44px;cursor:pointer;border-radius:50%;">›</button>
    </div>

    <!-- Maqsad banner — rejalar'dan joriy oyga -->
    <a href="rejalar.html" id="goalBanner" style="display:none;background:rgba(0,229,212,.06);border:1px solid rgba(0,229,212,.25);border-radius:10px;padding:12px 14px;margin-bottom:16px;text-decoration:none;color:var(--accent);font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;line-height:1.4;text-align:center;"></a>

    <!-- View tabs: Hafta / Oy -->
    <div id="viewTabs" style="display:flex;gap:4px;padding:4px;background:rgba(255,255,255,.04);border-radius:8px;margin-bottom:20px;">
      <button class="vt" data-view="week" type="button" style="flex:1;padding:10px;background:transparent;color:var(--text-mid);border:none;border-radius:6px;font-family:Inter;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;">Hafta</button>
      <button class="vt on" data-view="month" type="button" style="flex:1;padding:10px;background:var(--accent);color:var(--void);border:none;border-radius:6px;font-family:Inter;font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:600;cursor:pointer;">Oy</button>
    </div>

    <div class="week-row" id="weekRow"></div>

    <!-- Month grid (hidden by default) -->
    <div id="monthGrid" style="display:none;"></div>

    <div class="day-label" id="dayLabel">Du · 4-may</div>

    <div class="tasks" id="tasks"></div>

    <button class="add-btn" id="addBtn" type="button">+ ish qo'sh</button>

  </div>
</div>

<script src="i18n.js" defer></script>
<script src="data.js" defer></script>
<script src="nav-overlay.js" defer></script>

<script>
  // Joriy haftaning Dushanbasidan boshlanadigan 7 kun
  const monShort = ['yan','fev','mar','apr','may','iyn','iyl','avg','sen','okt','noy','dek'];
  const monFull  = ['Yanvar','Fevral','Mart','Aprel','May','Iyun','Iyul','Avgust','Sentyabr','Oktyabr','Noyabr','Dekabr'];
  let weekOffset = 0; // 0 = bu hafta, -1 = oldingi, +1 = keyingi
  let DAYS = [];
  let TODAY_IDX = -1;
  function buildWeek() {
    const now = new Date();
    const dow = now.getDay();
    const monday = new Date(now);
    monday.setDate(now.getDate() - ((dow + 6) % 7) + weekOffset * 7);
    const labels = ['DU','SE','CH','PA','JU','SH','YA'];
    const full   = ['Dushanba','Seshanba','Chorshanba','Payshanba','Juma','Shanba','Yakshanba'];
    DAYS = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(monday);
      d.setDate(monday.getDate() + i);
      DAYS.push({
        key: 'd' + d.toISOString().slice(0,10),
        d: labels[i],
        n: d.getDate(),
        full: full[i],
        mon: d.getMonth()
      });
    }
    TODAY_IDX = (weekOffset === 0) ? (dow + 6) % 7 : -1;
    // Sarlavha
    const midDay = DAYS[3];
    document.getElementById('monthLbl').textContent = monFull[midDay.mon] + ' ' + new Date(_now.getFullYear(), midDay.mon, midDay.n).getFullYear();
  }
  const _now = new Date();
  buildWeek();

  const STORAGE_KEY = 'mvow.weekPlan';

  function loadAll() {
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
      if (saved && typeof saved === 'object') return saved;
    } catch {}
    // Default: bugungi kunga data.js dagi sessions
    const init = {};
    DAYS.forEach(d => init[d.key] = []);
    if (window.MVOW_DATA && MVOW_DATA.sessions && TODAY_IDX >= 0) {
      init[DAYS[TODAY_IDX].key] = MVOW_DATA.sessions.map(s => ({ time: s.time, name: s.name, dur: s.dur }));
    }
    return init;
  }
  function saveAll() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(weekData));
  }

  let weekData = loadAll();
  let selectedKey = TODAY_IDX >= 0 ? DAYS[TODAY_IDX].key : DAYS[0].key;

  // ── View state (oylik default) ──
  let viewMode = 'month'; // 'week' yoki 'month'
  let monthOffset = 0;

  // Prev/Next tugmalari — view'ga qarab ishlaydi
  document.getElementById('prevW').addEventListener('click', () => {
    if (viewMode === 'week') {
      weekOffset--; buildWeek(); selectedKey = DAYS[0].key;
      renderWeek(); renderDay();
    } else {
      monthOffset--; renderMonth();
    }
  });
  document.getElementById('nextW').addEventListener('click', () => {
    if (viewMode === 'week') {
      weekOffset++; buildWeek(); selectedKey = DAYS[0].key;
      renderWeek(); renderDay();
    } else {
      monthOffset++; renderMonth();
    }
  });

  // View tabs
  document.querySelectorAll('#viewTabs .vt').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('#viewTabs .vt').forEach(x => {
        x.classList.remove('on');
        x.style.background = 'transparent';
        x.style.color = 'var(--text-mid)';
        x.style.fontWeight = '';
      });
      t.classList.add('on');
      t.style.background = 'var(--accent)';
      t.style.color = 'var(--void)';
      t.style.fontWeight = '600';
      viewMode = t.dataset.view;
      switchView();
    });
  });

  function switchView() {
    const weekRowEl = document.getElementById('weekRow');
    const monthGridEl = document.getElementById('monthGrid');
    const dayLabelEl = document.getElementById('dayLabel');
    const tasksEl2 = document.getElementById('tasks');
    const addBtnEl = document.getElementById('addBtn');
    if (viewMode === 'week') {
      weekRowEl.style.display = '';
      monthGridEl.style.display = 'none';
      dayLabelEl.style.display = '';
      tasksEl2.style.display = '';
      addBtnEl.style.display = '';
      renderWeek(); renderDay();
    } else {
      weekRowEl.style.display = 'none';
      monthGridEl.style.display = '';
      dayLabelEl.style.display = 'none';
      tasksEl2.style.display = 'none';
      addBtnEl.style.display = 'none';
      renderMonth();
    }
  }

  // ── Oy grid ──
  function renderMonth() {
    const now = new Date();
    now.setMonth(now.getMonth() + monthOffset);
    const year = now.getFullYear();
    const mo = now.getMonth();
    const monthEl = document.getElementById('monthLbl');
    monthEl.textContent = monFull[mo] + ' ' + year;

    const first = new Date(year, mo, 1);
    const startDow = (first.getDay() + 6) % 7; // Du=0
    const daysInMonth = new Date(year, mo + 1, 0).getDate();
    const todayIso = new Date().toISOString().slice(0, 10);

    const grid = document.getElementById('monthGrid');
    let html = '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;margin-bottom:6px;">';
    const wlabels = ['Du','Se','Ch','Pa','Ju','Sh','Ya'];
    for (const w of wlabels) {
      html += `<div style="font-size:9px;letter-spacing:1px;color:var(--text-dim);text-transform:uppercase;padding:6px 0;">${w}</div>`;
    }
    html += '</div>';

    html += '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;">';
    // bo'sh kataklar
    for (let i = 0; i < startDow; i++) {
      html += '<div style="aspect-ratio:1;"></div>';
    }
    for (let day = 1; day <= daysInMonth; day++) {
      const d = new Date(year, mo, day);
      const iso = d.toISOString().slice(0,10);
      const key = 'd' + iso;
      const hasPlan = (weekData[key] && weekData[key].length) ? true : false;
      const isToday = iso === todayIso;
      const inFuture = iso > todayIso;
      const color = isToday ? 'var(--void)' : (inFuture ? 'var(--text-mid)' : 'var(--text)');
      const bg = isToday ? 'var(--accent)' : 'transparent';
      const border = hasPlan && !isToday ? '1px solid rgba(0,229,212,.5)' : '1px solid rgba(255,255,255,.06)';
      html += `<div class="mcell" data-iso="${iso}" data-key="${key}" style="aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:13px;background:${bg};color:${color};border:${border};border-radius:8px;cursor:pointer;font-weight:${isToday ? '600' : '400'};">${day}${hasPlan ? '<span style="width:4px;height:4px;border-radius:50%;background:' + (isToday ? 'var(--void)' : 'var(--accent)') + ';"></span>' : ''}</div>`;
    }
    html += '</div>';

    grid.innerHTML = html;
    // Klik — kun tafsiloti
    grid.querySelectorAll('.mcell').forEach(c => {
      c.addEventListener('click', () => {
        // Haftalik view'ga o'tib o'sha kunni tanlash
        const iso = c.dataset.iso;
        const d = new Date(iso);
        const today = new Date();
        const diffWeeks = Math.round((d - today) / (7 * 86400000));
        weekOffset = diffWeeks;
        buildWeek();
        selectedKey = c.dataset.key;
        // View'ni hafta'ga qaytarib o'sha kunni ko'rsatish
        document.querySelector('#viewTabs .vt[data-view="week"]').click();
        renderDay();
      });
    });
  }

  // ── Render week chips ──
  const weekRow = document.getElementById('weekRow');
  function renderWeek() {
    weekRow.innerHTML = '';
    DAYS.forEach((d, i) => {
      const el = document.createElement('div');
      el.className = 'day';
      if (i === TODAY_IDX) el.classList.add('today');
      if (d.key === selectedKey) el.classList.add('selected');
      if ((weekData[d.key] || []).length) el.classList.add('has');
      el.innerHTML = `<span class="d">${d.d}</span><span class="n">${d.n}</span><span class="dot"></span>`;
      el.addEventListener('click', () => {
        selectedKey = d.key;
        renderWeek();
        renderDay();
      });
      weekRow.appendChild(el);
    });
  }

  // ── Render selected day's tasks ──
  const dayLabel = document.getElementById('dayLabel');
  const tasksEl = document.getElementById('tasks');

  function timeKey(t) {
    const m = /^(\d{1,2}):?(\d{2})?$/.exec((t || '').trim());
    if (!m) return 99999;
    return (+m[1]) * 60 + (+(m[2] || 0));
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
  }

  function renderDay() {
    const day = DAYS.find(d => d.key === selectedKey) || DAYS[0];
    selectedKey = day.key;
    if (!weekData[selectedKey]) weekData[selectedKey] = [];
    dayLabel.innerHTML = `${day.full} · <span class="em">${day.n}-${monShort[day.mon]}</span>`;

    const list = weekData[selectedKey] || [];
    list.sort((a, b) => timeKey(a.time) - timeKey(b.time));
    tasksEl.innerHTML = '';

    if (!list.length) {
      tasksEl.innerHTML = '<p class="empty">Bu kuni hech narsa rejalashtirilmagan.</p>';
      return;
    }

    list.forEach((t, idx) => {
      const row = document.createElement('div');
      row.className = 'task';
      row.dataset.idx = idx;
      row.innerHTML = `
        <span class="time">${escapeHtml(t.time || '—')}</span>
        <span class="name">${escapeHtml(t.name || 'ish')}</span>
        <span class="dur">${escapeHtml(t.dur || '')}</span>
        <span class="x" role="button" tabindex="0" aria-label="Ishni o'chirish" title="O'chir">×</span>
      `;
      row.querySelectorAll('.time, .name, .dur').forEach(el =>
        el.addEventListener('click', () => enterEdit(row, idx))
      );
      row.querySelector('.x').addEventListener('click', (e) => {
        e.stopPropagation();
        deleteTask(row, idx);
      });
      tasksEl.appendChild(row);
    });
  }

  function deleteTask(row, idx) {
    row.classList.add('deleting');
    setTimeout(() => {
      weekData[selectedKey].splice(idx, 1);
      saveAll();
      renderWeek();
      renderDay();
    }, 220);
  }

  function enterEdit(row, idx) {
    if (row.classList.contains('edit')) return;
    const t = weekData[selectedKey][idx];
    row.classList.add('edit');
    row.innerHTML = `
      <div class="row">
        <input class="time" type="text" placeholder="07:00" value="${escapeHtml(t.time || '')}" maxlength="5">
        <input class="name" type="text" placeholder="ish nomi" value="${escapeHtml(t.name || '')}" maxlength="48">
        <input class="dur" type="text" placeholder="45 daq" value="${escapeHtml(t.dur || '')}" maxlength="20">
      </div>
      <div class="actions">
        <button class="cancel" type="button">Bekor</button>
        <button class="save" type="button">Saqla</button>
      </div>
    `;
    const [timeIn, nameIn, durIn] = row.querySelectorAll('input');
    setTimeout(() => timeIn.focus(), 50);

    row.querySelector('.save').addEventListener('click', () => {
      weekData[selectedKey][idx] = {
        time: timeIn.value.trim(),
        name: nameIn.value.trim() || 'ish',
        dur: durIn.value.trim()
      };
      saveAll();
      renderWeek();
      renderDay();
    });
    row.querySelector('.cancel').addEventListener('click', renderDay);
    row.querySelectorAll('input').forEach(inp => {
      inp.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); row.querySelector('.save').click(); }
        if (e.key === 'Escape') { e.preventDefault(); renderDay(); }
      });
    });
  }

  document.getElementById('addBtn').addEventListener('click', () => {
    if (!weekData[selectedKey]) weekData[selectedKey] = [];
    weekData[selectedKey].push({ time: '', name: '', dur: '' });
    const newIdx = weekData[selectedKey].length - 1;
    renderWeek();
    renderDay();
    const rows = tasksEl.querySelectorAll('.task');
    const lastRow = rows[rows.length - 1];
    if (lastRow) enterEdit(lastRow, parseInt(lastRow.dataset.idx, 10));
  });

  // Maqsad banner — rejalar.html'dan
  function showGoalBanner() {
    const banner = document.getElementById('goalBanner');
    if (!banner) return;
    const monthGoal = (localStorage.getItem('mvow.monthGoal') || '').trim();
    if (monthGoal) {
      const firstLine = monthGoal.split('\n')[0].slice(0, 80);
      banner.textContent = '“' + firstLine + '”';
      banner.style.display = 'block';
    } else {
      banner.textContent = '+ Bu oy uchun maqsad qo\'sh';
      banner.style.color = 'var(--text-mid)';
      banner.style.fontStyle = 'normal';
      banner.style.display = 'block';
    }
  }

  // Default: oylik view
  function initView() {
    if (viewMode === 'month') switchView();
    else { renderWeek(); renderDay(); }
    showGoalBanner();
  }
  document.addEventListener('DOMContentLoaded', initView);
  if (document.readyState !== 'loading') initView();
</script>

</body>
</html>
