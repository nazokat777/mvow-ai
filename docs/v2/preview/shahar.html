<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>FOCUS AI — Shahringiz</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png?v=2">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png?v=2">

<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: 'Inter', sans-serif; background: var(--void, #04060B); color: var(--text, #F5F2EC); }
  .phone { max-width: 480px; margin: 0 auto; min-height: 100vh; background: var(--void, #04060B); padding: 26px 18px 60px; }
  h1 { font-size: 30px; margin: 6px 0 2px; }
  .sub { color: var(--text-dim, #9CA0A8); font-size: 14px; line-height: 1.5; margin-bottom: 16px; }
  .bal { display: flex; gap: 10px; margin-bottom: 16px; }
  .bal .b { flex: 1; background: var(--card, #0C0F16); border: 1px solid var(--border-default, rgba(255,255,255,.12)); border-radius: 14px; padding: 12px; text-align: center; }
  .bal .b .v { font-size: 24px; font-weight: 800; }
  .bal .b.coin .v { color: #F5C26B; } .bal .b.dm .v { color: #6EB5FF; }
  .bal .b .k { font-size: 12px; color: var(--text-dim, #9CA0A8); margin-top: 2px; }
  /* Tirik kechki shahar manzarasi */
  .city { position: relative; overflow: hidden; border: 1px solid var(--border-default, rgba(255,255,255,.12)); border-radius: 18px; padding: 16px 12px 16px; min-height: 210px; display: flex; flex-wrap: wrap; align-content: flex-end; justify-content: center; gap: 2px 4px;
    background: linear-gradient(180deg, #070a2a 0%, #1a1550 38%, #3a2260 58%, #4a2a4e 70%, #14311d 100%); box-shadow: inset 0 -40px 60px rgba(0,0,0,.35); }
  .city .sky, .city .moon, .city .ground, .city .fly { position: absolute; z-index: 0; pointer-events: none; }
  .city .sky { inset: 0 0 42% 0;
    background-image:
      radial-gradient(1.6px 1.6px at 12% 22%, #fff, transparent), radial-gradient(1.4px 1.4px at 28% 40%, #fff, transparent),
      radial-gradient(1.7px 1.7px at 44% 16%, #fff, transparent), radial-gradient(1.3px 1.3px at 60% 34%, #cfe0ff, transparent),
      radial-gradient(1.6px 1.6px at 74% 20%, #fff, transparent), radial-gradient(1.4px 1.4px at 86% 42%, #fff, transparent),
      radial-gradient(1.2px 1.2px at 36% 60%, #fff, transparent), radial-gradient(1.5px 1.5px at 92% 62%, #cfe0ff, transparent),
      radial-gradient(1.3px 1.3px at 6% 54%, #fff, transparent);
    animation: skyTwinkle 4.5s ease-in-out infinite; }
  .city .moon { top: 16px; right: 22px; width: 34px; height: 34px; border-radius: 50%;
    background: radial-gradient(circle at 34% 34%, #ffffff, #e6ecff 55%, #b9c6ff);
    box-shadow: 0 0 22px rgba(200,215,255,.6), 0 0 54px rgba(150,175,255,.4); animation: moonGlow 6s ease-in-out infinite; }
  .city .ground { left: 0; right: 0; bottom: 0; height: 34%; background: linear-gradient(180deg, transparent, rgba(8,24,12,.55) 70%); }
  .city .fly { width: 4px; height: 4px; border-radius: 50%; background: #ffe08a; box-shadow: 0 0 8px 2px rgba(255,224,138,.7); opacity: .0; }
  .tile { position: relative; z-index: 1; font-size: 34px; line-height: 1; transform-origin: bottom center; filter: drop-shadow(0 3px 5px rgba(0,0,0,.4)); animation: citySway 3.8s ease-in-out infinite; }
  .tile.mfx-drop { animation: cityDrop .62s cubic-bezier(.22,1.5,.36,1); }
  @keyframes skyTwinkle { 0%,100% { opacity: .55; } 50% { opacity: 1; } }
  @keyframes moonGlow { 0%,100% { box-shadow: 0 0 22px rgba(200,215,255,.55), 0 0 54px rgba(150,175,255,.35); } 50% { box-shadow: 0 0 30px rgba(210,225,255,.75), 0 0 70px rgba(160,185,255,.5); } }
  @keyframes citySway { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-2px) rotate(-1.3deg); } }
  @keyframes cityDrop { 0% { transform: translateY(-46px) scale(.7); opacity: 0; } 60% { transform: translateY(4px) scale(1.08); opacity: 1; } 100% { transform: translateY(0) scale(1); } }
  @keyframes flyDrift { 0% { transform: translate(0,0); opacity: 0; } 15% { opacity: .9; } 85% { opacity: .9; } 100% { transform: translate(var(--fx,30px), var(--fy,-40px)); opacity: 0; } }
  /* WOW (minimal): yagona uchar yulduz, shahar nuridan ufq shu'lasi, qurilish halqasi */
  .city .shoot { position: absolute; z-index: 0; top: 12%; left: -10%; width: 72px; height: 1.5px; border-radius: 999px; pointer-events: none; opacity: 0;
    background: linear-gradient(90deg, transparent, rgba(230,240,255,.95)); transform: rotate(14deg); }
  .city .halo { position: absolute; z-index: 0; left: 6%; right: 6%; bottom: 27%; height: 30px; pointer-events: none;
    background: radial-gradient(52% 100% at 50% 100%, rgba(255,196,128,.32), rgba(255,196,128,.08) 60%, transparent 75%); opacity: var(--halo, 0); }
  .city .ring { position: absolute; z-index: 1; width: 56px; height: 56px; border: 1.5px solid rgba(255,224,138,.85); border-radius: 50%; pointer-events: none; opacity: 0; }
  @media (prefers-reduced-motion: no-preference) {
    .city .shoot.go { animation: shootStar 1.1s ease-in forwards; }
    .city .halo { animation: haloBreath 7s ease-in-out infinite; }
    .city .ring { animation: ringOut .85s cubic-bezier(.22,1,.36,1) forwards; }
  }
  @keyframes shootStar { 0% { transform: translate(0,0) rotate(14deg); opacity: 0; } 12% { opacity: .9; } 100% { transform: translate(430px,110px) rotate(14deg); opacity: 0; } }
  @keyframes haloBreath { 0%,100% { opacity: calc(var(--halo, 0) * .65); } 50% { opacity: var(--halo, 0); } }
  @keyframes ringOut { 0% { transform: scale(.25); opacity: .9; } 100% { transform: scale(1.5); opacity: 0; } }
  /* SIGNATURE: "Intizom yulduzlari" — har qurilgan bino osmonda o'z yulduzini yoqadi.
     Shahar = yer, yulduzlar = xotira. Reduced-motion'da yulduzlar STATIK ko'rinadi (bezak emas, holat). */
  .city .cstars { position: absolute; inset: 0 0 40% 0; z-index: 0; pointer-events: none; }
  .city .cstar { position: absolute; width: 5px; height: 5px; margin: -2.5px; border-radius: 50%; opacity: .85;
    background: radial-gradient(circle, #fff6d8 0%, #ffd98a 45%, rgba(255,217,138,0) 72%); }
  .city .cseed { position: absolute; z-index: 2; width: 6px; height: 6px; margin: -3px; border-radius: 50%; pointer-events: none; opacity: 0;
    background: #ffe9b0; box-shadow: 0 0 10px 3px rgba(255,224,138,.75); }
  .city .aurora { position: absolute; z-index: 0; left: -30%; top: -12%; width: 160%; height: 58%; pointer-events: none; opacity: 0;
    background: linear-gradient(105deg, transparent 12%, rgba(108,92,231,.30) 38%, rgba(110,181,255,.24) 58%, transparent 86%);
    transform: rotate(-7deg) translateX(-34%); }
  @media (prefers-reduced-motion: no-preference) {
    .city .cstar { animation: cstarTw 5.2s ease-in-out infinite; }
    .city .cstar.born { animation: cstarBorn 1s cubic-bezier(.16,.84,.32,1) backwards, cstarTw 5.2s ease-in-out 1s infinite; }
    .city .aurora.go { animation: auroraSweep 3s ease-in-out forwards; }
    .city .halo.flare { animation: haloFlare 1.6s ease-out; }
    .tile.tbounce { animation: tileBounce .55s cubic-bezier(.34,1.56,.64,1); }
  }
  @keyframes cstarTw { 0%,100% { opacity: .5; transform: scale(.9); } 50% { opacity: 1; transform: scale(1.15); } }
  @keyframes cstarBorn { 0% { transform: scale(3.4); opacity: 0; } 45% { transform: scale(1.7); opacity: 1; } 100% { transform: scale(1); opacity: .85; } }
  @keyframes auroraSweep { 0% { opacity: 0; transform: rotate(-7deg) translateX(-34%); } 30% { opacity: 1; } 70% { opacity: .85; } 100% { opacity: 0; transform: rotate(-7deg) translateX(30%); } }
  @keyframes haloFlare { 0% { opacity: 1; } 100% { opacity: var(--halo, 0); } }
  @keyframes tileBounce { 0% { transform: translateY(0) scale(1); } 35% { transform: translateY(-7px) scale(1.12); } 70% { transform: translateY(1px) scale(.97); } 100% { transform: translateY(0) scale(1); } }
  @media (prefers-reduced-motion: reduce) { .city .sky, .city .moon, .tile, .city .fly { animation: none !important; } .city .halo { opacity: var(--halo, 0); } }
  .city.empty-city { align-items: center; justify-content: center; align-content: center; }
  .city .hint { position: relative; z-index: 1; color: rgba(255,255,255,.7); font-size: 14px; text-align: center; }
  .meta { display: flex; align-items: center; justify-content: space-between; margin: 10px 2px 0; }
  .meta .cnt { font-size: 13px; color: var(--text-dim, #9CA0A8); }
  .meta .clr { background: none; border: none; color: var(--text-dim, #9CA0A8); font-size: 13px; text-decoration: underline; cursor: pointer; font-family: inherit; }
  .sec-hd { font-size: 14px; letter-spacing: 1px; text-transform: uppercase; font-weight: 800; color: var(--text-mid, #B8BBC2); margin: 22px 2px 8px; }
  .item { display: flex; align-items: center; gap: 12px; background: var(--card, #0C0F16); border: 1px solid var(--border-default, rgba(255,255,255,.12)); border-radius: 14px; padding: 11px 14px; margin-top: 8px; }
  .item .em { font-size: 28px; line-height: 1; flex-shrink: 0; }
  .item .nm { flex: 1; min-width: 0; }
  .item .nm .n1 { font-size: 15px; font-weight: 600; }
  .item .nm .n2 { font-size: 13px; margin-top: 1px; }
  .item.coin .nm .n2 { color: #F5C26B; } .item.dm .nm .n2 { color: #6EB5FF; }
  .qbtn { border: none; border-radius: 999px; padding: 9px 16px; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; flex-shrink: 0; }
  .qbtn.ok { background: #6BBF7A; color: #04060B; }
  .qbtn.no { background: transparent; border: 1px solid var(--border-default, rgba(255,255,255,.14)); color: var(--text-dim, #9CA0A8); cursor: default; }
</style>
</head>
<body>
<div class="phone">
  <h1 data-i18n="shahar.title">Shahringiz</h1>
  <div class="sub" data-i18n="shahar.sub">Har tanga bilan bino quring — intizomingiz shaharni o'stiradi. 🏙️</div>

  <div class="bal">
    <div class="b coin"><div class="v">🪙 <span id="coinBal">0</span></div><div class="k" data-i18n="shahar.coins">Tanga</div></div>
    <div class="b dm"><div class="v">💎 <span id="dmBal">0</span></div><div class="k" data-i18n="shahar.diamonds">Olmos</div></div>
  </div>

  <div class="city" id="city"></div>
  <div class="meta"><span class="cnt" id="cityCnt"></span><button class="clr" id="clrBtn" data-i18n="shahar.clear">Buzib tashlash</button></div>

  <div class="sec-hd" data-i18n="shahar.shop">Do'kon</div>
  <div id="shop"></div>
</div>

<script src="i18n.js?v=29.0.48"></script>
<script src="pin-lock.js?v=29.0.84"></script>
<script src="lang-switcher.js?v=29.0.48" defer></script>
<script src="data.js?v=29.0.48" defer></script>
<script src="nav-overlay.js?v=29.0.48" defer></script>
<script>
  (function () {
    function T(k, fb) { return (window.I18N && I18N.t) ? I18N.t(k, fb) : fb; }
    function num(x) { var n = parseInt(x, 10); return isFinite(n) ? n : 0; }
    function get(k) { return num(localStorage.getItem(k)); }
    function setN(k, v) { try { localStorage.setItem(k, String(v)); } catch (e) {} }

    var CATALOG = [
      { id: 'tree', e: '🌳', nk: 'shahar.i_tree', nf: 'Daraxt', price: 10, cur: 'coin' },
      { id: 'road', e: '🛣️', nk: 'shahar.i_road', nf: "Yo'l", price: 15, cur: 'coin' },
      { id: 'house', e: '🏠', nk: 'shahar.i_house', nf: 'Uy', price: 20, cur: 'coin' },
      { id: 'car', e: '🚗', nk: 'shahar.i_car', nf: 'Mashina', price: 25, cur: 'coin' },
      { id: 'shop', e: '🏪', nk: 'shahar.i_shop', nf: "Do'kon", price: 35, cur: 'coin' },
      { id: 'bldg', e: '🏢', nk: 'shahar.i_bldg', nf: 'Bino', price: 50, cur: 'coin' },
      { id: 'bridge', e: '🌉', nk: 'shahar.i_bridge', nf: "Ko'prik", price: 65, cur: 'coin' },
      { id: 'factory', e: '🏭', nk: 'shahar.i_factory', nf: 'Zavod', price: 80, cur: 'coin' },
      { id: 'stadium', e: '🏟️', nk: 'shahar.i_stadium', nf: 'Stadion', price: 100, cur: 'coin' },
      { id: 'tower', e: '🗼', nk: 'shahar.i_tower', nf: 'Minora', price: 3, cur: 'diamond' },
      { id: 'castle', e: '🏰', nk: 'shahar.i_castle', nf: "Qal'a", price: 5, cur: 'diamond' },
      { id: 'rocket', e: '🚀', nk: 'shahar.i_rocket', nf: 'Raketa', price: 8, cur: 'diamond' }
    ];
    function icon(cur) { return cur === 'diamond' ? '💎' : '🪙'; }
    function balOf(cur) { return cur === 'diamond' ? get('mvow.diamonds') : get('mvow.coins'); }

    function loadCity() { try { var c = JSON.parse(localStorage.getItem('mvow.city') || '[]'); return Array.isArray(c) ? c : []; } catch (e) { return []; } }
    function saveCity(c) { try { localStorage.setItem('mvow.city', JSON.stringify(c)); } catch (e) {} }

    function render() {
      document.getElementById('coinBal').textContent = get('mvow.coins');
      document.getElementById('dmBal').textContent = get('mvow.diamonds');

      var city = loadCity(), cityEl = document.getElementById('city');
      // Sahna qatlamlari: yulduzli osmon + oy + yer + o'tuvchi olovchoqlar (fireflies)
      var flies = '';
      for (var f = 0; f < 3; f++) {
        flies += '<div class="fly" style="left:' + (15 + f * 28) + '%;bottom:' + (32 + f * 7) + '%;--fx:' + (18 + f * 10) + 'px;--fy:-' + (30 + f * 8) + 'px;animation:flyDrift ' + (5 + f) + 's ease-in-out ' + (f * 1.3) + 's infinite;"></div>';
      }
      // Ufq shu'lasi — shahringiz qancha o'ssa, tuni shuncha iliq yonadi (mehnatning nuri)
      var halo = city.length ? Math.min(.2 + city.length * .05, .75) : 0;
      var scene = '<div class="sky"></div><div class="moon"></div><div class="halo" style="--halo:' + halo.toFixed(2) + '"></div><div class="ground"></div><div class="shoot"></div>' + flies;
      if (!city.length) {
        cityEl.className = 'city empty-city';
        cityEl.innerHTML = scene + '<div class="hint">' + T('shahar.empty', "Bo'sh maydon. Do'kondan birinchi binongizni quring 👇") + '</div>';
      } else {
        cityEl.className = 'city';
        // Har bino manfiy animation-delay bilan — tebranish fazasi turlicha (robot emas)
        cityEl.innerHTML = scene + city.map(function (e, i) {
          return '<span class="tile" style="animation-delay:-' + (i % 8 * 0.5).toFixed(2) + 's">' + e + '</span>';
        }).join('');
      }
      document.getElementById('cityCnt').textContent = city.length + ' ' + T('shahar.count', 'inshoot');
      document.getElementById('clrBtn').style.display = city.length ? '' : 'none';

      document.getElementById('shop').innerHTML = CATALOG.map(function (it) {
        var bal = balOf(it.cur), ok = bal >= it.price;
        return '<div class="item ' + (it.cur === 'diamond' ? 'dm' : 'coin') + '">'
          + '<span class="em">' + it.e + '</span>'
          + '<div class="nm"><div class="n1">' + T(it.nk, it.nf) + '</div><div class="n2">' + it.price + ' ' + icon(it.cur) + '</div></div>'
          + (ok ? '<button class="qbtn ok" data-buy="' + it.id + '">' + T('shahar.build', 'Qur') + '</button>'
                : '<button class="qbtn no" disabled>' + (it.price - bal) + ' ' + icon(it.cur) + '</button>')
          + '</div>';
      }).join('');
      document.querySelectorAll('[data-buy]').forEach(function (b) { b.addEventListener('click', function () { buy(b.getAttribute('data-buy')); }); });
    }

    function buy(id) {
      var it = null; for (var i = 0; i < CATALOG.length; i++) { if (CATALOG[i].id === id) { it = CATALOG[i]; break; } }
      if (!it) return;
      var key = it.cur === 'diamond' ? 'mvow.diamonds' : 'mvow.coins';
      if (get(key) < it.price) return;
      setN(key, get(key) - it.price);
      var c = loadCity(); c.push(it.e); saveCity(c);
      if (window.MVOW_DATA && MVOW_DATA.fxSuccess) MVOW_DATA.fxSuccess();
      render();
      // Yangi bino sakrab tushadi (drop-in) + nozik titrash
      try {
        var tiles = document.querySelectorAll('#city .tile');
        var last = tiles[tiles.length - 1];
        if (last) { last.classList.add('mfx-drop'); setTimeout(function () { last.classList.remove('mfx-drop'); }, 640); buildRing(last); }
        if (navigator.vibrate) navigator.vibrate(12);
      } catch (e) {}
      if (window.MvowUndo) MvowUndo.show(T('shahar.built', 'Qurildi'), function () {
        setN(key, get(key) + it.price); var cc = loadCity(); cc.pop(); saveCity(cc); render();
      });
    }

    document.getElementById('clrBtn').addEventListener('click', function () {
      var old = loadCity(); if (!old.length) return;
      if (window.MvowUndo) {
        saveCity([]); render();
        MvowUndo.show(T('shahar.demolished', 'Shahar buzildi'), function () { saveCity(old); render(); });
      } else if (confirm(T('shahar.clear_confirm', 'Shahar butunlay buzilsinmi? (tangalar qaytmaydi)'))) { saveCity([]); render(); }
    });

    // ── Sokin "tirik osmon" (minimal WOW) ──
    var MOTION_OK = false;
    try { MOTION_OK = matchMedia('(prefers-reduced-motion: no-preference)').matches; } catch (e) {}

    // Yangi bino atrofida bir martalik yumshoq nur halqasi — "shu yer endi sizniki"
    function buildRing(last) {
      if (!MOTION_OK || !last) return;
      try {
        var cityEl = document.getElementById('city');
        var cr = cityEl.getBoundingClientRect(), tr = last.getBoundingClientRect();
        var ring = document.createElement('div');
        ring.className = 'ring';
        ring.style.left = (tr.left - cr.left + tr.width / 2 - 28) + 'px';
        ring.style.top = (tr.top - cr.top + tr.height / 2 - 28) + 'px';
        cityEl.appendChild(ring);
        setTimeout(function () { if (ring.parentNode) ring.parentNode.removeChild(ring); }, 900);
      } catch (e) {}
    }

    // Ahyon-ahyonda YAGONA uchar yulduz — kamyob, shuning uchun qadrli (tilak oni)
    if (MOTION_OK) {
      (function scheduleShoot() {
        setTimeout(function () {
          if (document.visibilityState === 'visible') {
            var s = document.querySelector('#city .shoot');
            if (s) {
              s.style.top = (6 + Math.random() * 22) + '%';
              s.classList.remove('go'); void s.offsetWidth; s.classList.add('go');
            }
          }
          scheduleShoot();
        }, 9000 + Math.random() * 13000);
      })();
    }

    try { document.title = T('shahar.page_title', 'FOCUS AI — Shahringiz'); } catch (e) {}
    render();
  })();
</script>
<script>
  // ── SIGNATURE QATLAM: "Intizom yulduzlari" + shafaq (aurora) + parallaks chuqurlik ──
  // Asosiy mantiqqa TEGMAYDI: faqat MutationObserver + qo'shimcha elementlar bilan ustiga qatlam.
  (function () {
    var MOTION = false;
    try { MOTION = matchMedia('(prefers-reduced-motion: no-preference)').matches; } catch (e) {}
    var cityEl = document.getElementById('city');
    if (!cityEl || !window.MutationObserver) return;
    var MAXSTAR = 40, MILES = [3, 7, 12, 20, 30];
    function cityLen() { try { var c = JSON.parse(localStorage.getItem('mvow.city') || '[]'); return Array.isArray(c) ? c.length : 0; } catch (e) { return 0; } }
    // Deterministik "tasodifiy" joy — yulduz har renderda O'SHA joyida qoladi (xotira barqaror)
    function h(i, s) { var x = Math.sin((i + 1) * s) * 43758.5453; return x - Math.floor(x); }
    function posOf(i) { return { l: 4 + h(i, 12.9898) * 90, t: 6 + h(i, 78.233) * 78 }; }
    var prevCount = cityLen(), holdOne = false;

    function layer() {
      var st = cityEl.querySelector('.cstars');
      if (!st) { st = document.createElement('div'); st.className = 'cstars'; cityEl.appendChild(st); }
      return st;
    }
    function mkStar(i, born) {
      var s = document.createElement('div'); s.className = 'cstar' + (born ? ' born' : '');
      var p = posOf(i);
      s.style.left = p.l + '%'; s.style.top = p.t + '%';
      if (!born) s.style.animationDelay = (-(h(i, 45.164) * 5)).toFixed(2) + 's'; // fazalar har xil
      return s;
    }
    function sync(bornLast, force) {
      var st = layer(), want = Math.min(cityLen(), MAXSTAR);
      if (holdOne && !force) want = Math.max(0, want - 1); // urug' uchayotganda oxirgi yulduz kutadi
      while (st.children.length > want) st.removeChild(st.lastChild);
      while (st.children.length < want) st.appendChild(mkStar(st.children.length, !!bornLast && st.children.length === want - 1 && MOTION));
    }
    // Yangi bino → binodan osmonga NUR URUG'I ko'tariladi va yulduz bo'lib yonadi
    function starBirth() {
      var st = layer(), idx = st.children.length;
      if (idx >= MAXSTAR) { sync(false); return; }
      var tiles = cityEl.querySelectorAll('.tile'), last = tiles[tiles.length - 1];
      if (!last) { sync(true); return; }
      try {
        var cr = cityEl.getBoundingClientRect(), tr = last.getBoundingClientRect(), p = posOf(idx);
        var sx = tr.left - cr.left + tr.width / 2, sy = tr.top - cr.top + tr.height / 2;
        var tx = cr.width * p.l / 100, ty = cr.height * 0.6 * p.t / 100; // .cstars = tepa 60%
        var seed = document.createElement('div');
        seed.className = 'cseed';
        seed.style.left = sx + 'px'; seed.style.top = sy + 'px';
        cityEl.appendChild(seed);
        holdOne = true;
        requestAnimationFrame(function () {
          seed.style.transition = 'transform 1s cubic-bezier(.3,.6,.25,1), opacity .25s ease';
          seed.style.opacity = '1';
          seed.style.transform = 'translate(' + (tx - sx).toFixed(1) + 'px,' + (ty - sy).toFixed(1) + 'px)';
        });
        setTimeout(function () {
          try { if (seed.parentNode) seed.parentNode.removeChild(seed); } catch (e) {}
          holdOne = false; sync(true, true);
        }, 1000);
        var halo = cityEl.querySelector('.halo'); // shahar nuri bir zum gurillab yonadi
        if (halo) { halo.classList.add('flare'); setTimeout(function () { halo.classList.remove('flare'); }, 1650); }
      } catch (e) { holdOne = false; sync(false, true); }
    }
    // Bosqich (3/7/12/20/30 inshoot) — bir martalik SHAFAQ (aurora) osmonni kesib o'tadi
    function maybeAurora(n) {
      var seen = 0; try { seen = parseInt(localStorage.getItem('mvow.cityMilestone'), 10) || 0; } catch (e) {}
      var hit = 0;
      for (var i = 0; i < MILES.length; i++) if (n >= MILES[i] && MILES[i] > seen) hit = MILES[i];
      if (!hit) return;
      try { localStorage.setItem('mvow.cityMilestone', String(hit)); } catch (e) {}
      if (!MOTION) return;
      var a = document.createElement('div'); a.className = 'aurora go';
      cityEl.appendChild(a);
      try { if (navigator.vibrate) navigator.vibrate([10, 60, 18]); } catch (e) {}
      setTimeout(function () { try { if (a.parentNode) a.parentNode.removeChild(a); } catch (e) {} }, 3100);
    }
    function ours(n) {
      return n && n.classList && (n.classList.contains('cstars') || n.classList.contains('cseed')
        || n.classList.contains('aurora') || n.classList.contains('ring'));
    }
    new MutationObserver(function (recs) {
      var relevant = false;
      for (var i = 0; i < recs.length && !relevant; i++) {
        var r = recs[i], j;
        for (j = 0; j < r.addedNodes.length; j++) if (!ours(r.addedNodes[j])) { relevant = true; break; }
        for (j = 0; j < r.removedNodes.length; j++) if (!ours(r.removedNodes[j])) { relevant = true; break; }
      }
      if (!relevant) return;
      var n = cityLen();
      if (n > prevCount && MOTION && document.visibilityState === 'visible') { prevCount = n; starBirth(); }
      else { prevCount = n; sync(false); }
      maybeAurora(n);
    }).observe(cityEl, { childList: true });
    sync(false);

    // Binoga tegish — "g'ururli sakrash" (siz qurgan narsa javob beradi)
    cityEl.addEventListener('pointerdown', function (e) {
      if (!MOTION) return;
      var t = e.target && e.target.closest ? e.target.closest('.tile') : null;
      if (!t) return;
      var od = t.style.animationDelay;
      t.classList.remove('tbounce'); void t.offsetWidth;
      t.style.animationDelay = '0s'; t.classList.add('tbounce');
      setTimeout(function () { t.classList.remove('tbounce'); t.style.animationDelay = od; }, 600);
      try { if (navigator.vibrate) navigator.vibrate(6); } catch (x) {}
    }, { passive: true });

    // Parallaks chuqurlik: barmoq/gyro — osmon, oy, yulduzlar har xil tezlikda suriladi (faqat transform)
    if (MOTION) {
      var px = 0, py = 0, gx = 0, gy = 0, raf = null;
      var LAYERS = [['.sky', 3], ['.cstars', 5], ['.moon', 8], ['.halo', -2]];
      function apply() {
        raf = null;
        px += (gx - px) * .12; py += (gy - py) * .12;
        for (var i = 0; i < LAYERS.length; i++) {
          var el = cityEl.querySelector(LAYERS[i][0]);
          if (el) el.style.transform = 'translate3d(' + (px * LAYERS[i][1]).toFixed(1) + 'px,' + (py * LAYERS[i][1] * .6).toFixed(1) + 'px,0)';
        }
        if (Math.abs(gx - px) > .004 || Math.abs(gy - py) > .004) raf = requestAnimationFrame(apply);
      }
      function nudge(x, y) {
        gx = Math.max(-1, Math.min(1, x)); gy = Math.max(-1, Math.min(1, y));
        if (raf || document.visibilityState !== 'visible') return;
        if (Math.abs(gx - px) < .01 && Math.abs(gy - py) < .01) return;
        raf = requestAnimationFrame(apply);
      }
      cityEl.addEventListener('pointermove', function (e) {
        var r = cityEl.getBoundingClientRect(); if (!r.width) return;
        nudge((e.clientX - r.left) / r.width * 2 - 1, (e.clientY - r.top) / r.height * 2 - 1);
      }, { passive: true });
      cityEl.addEventListener('pointerleave', function () { nudge(0, 0); }, { passive: true });
      window.addEventListener('deviceorientation', function (e) {
        if (e.gamma == null) return;
        nudge(e.gamma / 30, ((e.beta || 45) - 45) / 30);
      }, { passive: true });
      document.addEventListener('visibilitychange', function () {
        if (document.hidden && raf) { cancelAnimationFrame(raf); raf = null; }
      });
    }
  })();
</script>
