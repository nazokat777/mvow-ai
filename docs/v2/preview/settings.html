<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{brand} — Sozlamalar</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png?v=2">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png?v=2">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --void:#04060B; --text:#F5F2EC; --text-mid:#B8BBC2; --text-dim:#9CA0A8; }
  body { background: var(--void); font-family:'Inter',sans-serif; color: var(--text); min-height: 100vh; display:flex; justify-content:center; align-items:flex-start; padding: 24px; -webkit-font-smoothing: antialiased; }
  .phone { width: 380px; min-height: 800px; background: var(--void); border-radius: 40px; overflow: hidden; position: relative; box-shadow: 0 0 0 8px #1a1d24, 0 30px 80px rgba(0,0,0,.7); }
  .container { padding: 80px 32px 100px; }

  .me { text-align:center; margin-bottom: 48px; }
  .me .name { font-family:'Anton',serif; font-size: 36px; font-weight: 500; }
  .me .sub { font-size: 15px; letter-spacing: 3px; color: var(--text-mid); text-transform: uppercase; margin-top: 6px; }
  .me .sub .em { color: var(--accent); }

  .row {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 16px;
    padding: 16px 0;
    border-bottom: 1px solid rgba(255,255,255,.04);
  }
  .row .lbl { font-size: 18px; color: var(--text); }
  .row .val { font-size: 17px; color: var(--accent); cursor: pointer; }
  .row select {
    background: transparent;
    border: none;
    color: var(--accent);
    font-size: 17px;
    text-align: right;
    cursor: pointer;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
    padding-right: 14px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12' fill='%2300E5D4'><polygon points='2,4 10,4 6,9'/></svg>");
    background-repeat: no-repeat;
    background-position: right center;
    background-size: 10px;
  }
  .row input[type="time"] {
    background: transparent;
    border: none;
    color: var(--accent);
    font-size: 17px;
    text-align: right;
    outline: none;
    font-family: 'Inter', sans-serif;
  }

  .toggle {
    width: 44px; height: 26px;
    background: rgba(255,255,255,.08);
    border-radius: 13px;
    cursor: pointer;
    position: relative;
    transition: background .2s;
  }
  .toggle::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--text);
    transition: transform .2s;
  }
  .toggle.on { background: var(--accent); }
  .toggle.on::after { transform: translateX(18px); background: var(--void); }

  .section-lbl {
    font-size: 14px;
    letter-spacing: 4px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-top: 32px;
    margin-bottom: 8px;
    padding: 0 4px;
  }

  .danger {
    display: block;
    width: 100%;
    margin-top: 40px;
    padding: 14px;
    background: transparent;
    color: #B8334A;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: 1px solid rgba(184,51,74,.3);
    border-radius: 6px;
    cursor: pointer;
    transition: all .15s;
  }
  .danger:hover, .danger:active {
    background: rgba(184,51,74,.08);
    border-color: #B8334A;
  }
  .danger.confirm {
    background: #B8334A;
    color: var(--void);
    border-color: #B8334A;
    font-weight: 600;
  }

  .footer { margin-top: 32px; text-align: center; font-size: 15px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; }
  .footer .em { color: var(--text-mid); }

  @media (max-width: 480px) { body { padding: 0; } .phone { width: 100vw; min-height: 100vh; border-radius: 0; box-shadow: none; } }

  /* Celebration intensity + replay intro pills */
  .intensity-pill { flex:1; padding:10px 8px; background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.08); color:var(--text-mid); border-radius:8px; font-size:15px; letter-spacing:1px; text-transform:uppercase; cursor:pointer; font-family:'Inter',sans-serif; }
  .intensity-pill.active { background:rgba(108, 92, 231,.12); border-color:var(--accent); color:var(--accent); }
</style>
<link rel="stylesheet" href="theme.css">
</head>
<body>

<div class="phone">
  <div class="container">

    <div class="me">
      <div class="name" id="userName">—</div>
      <div class="sub"><span class="em" id="streakN">0</span> <span data-i18n="settings.sub">kun yo'l</span></div>
    </div>

    <div class="section-lbl" data-i18n="settings.sec_appearance">Ko'rinish</div>

    <div class="row">
      <div class="lbl" data-i18n="settings.light_mode">Yorug' rejim</div>
      <div class="toggle" id="themeToggle" role="switch" tabindex="0" aria-label="Yorug' rejim" aria-checked="false"></div>
    </div>

    <div class="section-lbl" data-i18n="settings.sec_permissions">Ruxsatlar</div>

    <div class="row">
      <div class="lbl" data-i18n="settings.perm_screen_time">Ekran vaqti</div>
      <div class="toggle" data-perm="screenTime" role="switch" tabindex="0" data-i18n-aria="settings.perm_screen_time_aria" aria-label="Ekran vaqti ruxsati" aria-checked="false"></div>
    </div>

    <div class="row">
      <div class="lbl" data-i18n="settings.perm_notification">Bildirishnomalar</div>
      <div class="toggle" data-perm="notification" role="switch" tabindex="0" data-i18n-aria="settings.perm_notification_aria" aria-label="Bildirishnoma ruxsati" aria-checked="false"></div>
    </div>

    <div class="section-lbl" data-i18n="settings.sec_wake">Uyg'onish</div>

    <div class="row">
      <div class="lbl" data-i18n="settings.wake_time">Uyg'onish vaqti</div>
      <input type="time" data-pref="wakeTime" value="06:00">
    </div>

    <div class="section-lbl" data-i18n="settings.sec_notif">Bildirishnomalar</div>

    <div class="row">
      <div class="lbl" data-i18n="settings.auto_next">Auto-davom</div>
      <div class="toggle" data-toggle="autoNext" role="switch" tabindex="0" data-i18n-aria="settings.auto_next" aria-label="Auto-davom" aria-checked="false"></div>
    </div>

    <div class="row">
      <div class="lbl" data-i18n="settings.voice_remind">Ovozli eslatma</div>
      <div class="toggle" data-toggle="voiceRemind" role="switch" tabindex="0" data-i18n-aria="settings.voice_remind" aria-label="Ovozli eslatma" aria-checked="false"></div>
    </div>

    <div class="row">
      <div class="lbl" data-i18n="settings.negotiation">Diqqat sinovi</div>
      <div class="toggle" data-toggle="negotiation" role="switch" tabindex="0" data-i18n-aria="settings.negotiation" aria-label="Diqqat sinovi" aria-checked="false"></div>
    </div>

    <button id="testNotifBtn" type="button" data-i18n="settings.test_notif_btn" style="margin-top:16px;width:100%;padding:14px;background:transparent;border:1px solid rgba(108, 92, 231,.25);border-radius:8px;color:var(--accent);font-family:'Inter',sans-serif;font-size:16px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;min-height:48px;">Bildirishnoma sinovi</button>
    <div id="testNotifStatus" style="text-align:center;font-size:15px;color:var(--text-mid);margin-top:8px;letter-spacing:1px;"></div>

    <div class="section" style="margin-top:24px;">
      <button class="intensity-pill" type="button" id="replayIntro" data-i18n="settings.replay_intro" style="width:100%;">Tanishuv ko'rinishini qayta ko'rsatish</button>
    </div>

    <div class="row" style="margin-top:24px;">
      <a href="about.html" data-i18n="settings.about_link" style="font-size:18px;color:var(--text);text-decoration:none;">Bu ilov haqida</a>
      <span style="color:var(--text-dim);">›</span>
    </div>

    <button class="danger" id="resetBtn" type="button" data-i18n="settings.reset">Hammasini tozalash</button>

    <div class="footer">v <span class="em" data-brand="name">Daywarden</span> 9.2</div>

  </div>
</div>

<div class="page-cta-bar" style="position:fixed;bottom:0;left:0;right:0;padding:16px 24px env(safe-area-inset-bottom, 20px);background:linear-gradient(180deg,transparent,#04060B 40%);z-index:50;">
  <a href="home.html" data-i18n="common.continue" style="display:block;max-width:380px;margin:0 auto;padding:16px;background:linear-gradient(180deg,var(--accent),var(--accent-deep));color:#fff;font-family:'Inter',sans-serif;font-size:17px;font-weight:600;letter-spacing:2px;text-transform:uppercase;border-radius:999px;text-align:center;text-decoration:none;min-height:52px;">Davom</a>
</div>

<script src="i18n.js?v=28.4.0"></script>
<script>
  /* Ko'rinish (yorug'/qorong'u) tugmasi */
  (function(){
    var btn = document.getElementById('themeToggle');
    if (!btn) return;
    function cur(){ return document.documentElement.getAttribute('data-theme') === 'light' ? 'light' : 'dark'; }
    function apply(t){
      document.documentElement.setAttribute('data-theme', t);
      try { localStorage.setItem('mvow.theme', t); } catch(e){}
      btn.classList.toggle('on', t === 'light');
      btn.setAttribute('aria-checked', t === 'light' ? 'true' : 'false');
      var meta = document.querySelector('meta[name="theme-color"]');
      if (meta) meta.setAttribute('content', t === 'light' ? '#f3f4f7' : '#04060B');
    }
    apply(cur());
    function toggle(){ apply(cur() === 'light' ? 'dark' : 'light'); }
    btn.addEventListener('click', toggle);
    btn.addEventListener('keydown', function(e){ if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); } });
  })();
</script>
<script src="lang-switcher.js?v=28.4.0" defer></script>
<script src="data.js?v=28.4.0" defer></script>
<script src="nav-overlay.js?v=28.4.0" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    // Ism
    const userName = (localStorage.getItem('mvow.userName') || '').trim();
    document.getElementById('userName').textContent = userName || '—';
    // Streak
    const streak = parseInt(localStorage.getItem('mvow.streak') || '0', 10);
    document.getElementById('streakN').textContent = streak;

    // Tanlovlar — saqlash/yuklash
    const PREFS_KEY = 'mvow.prefs';
    const prefs = (() => {
      try { return JSON.parse(localStorage.getItem(PREFS_KEY) || '{}'); }
      catch { return {}; }
    })();
    const defaults = {
      tone: 'mid', meddle: 'quiet',
      mode: 'simple', sessionMins: '45', pomoCycles: '3', breakMins: '5',
      wakeTime: '06:00',
      autoNext: true, voiceRemind: true, negotiation: true
    };
    const merged = Object.assign({}, defaults, prefs);

    function save() {
      localStorage.setItem(PREFS_KEY, JSON.stringify(merged));
      // wakeTime alohida ham
      localStorage.setItem('mvow.wakeTime', merged.wakeTime);
    }

    // Select/input pref'lari
    document.querySelectorAll('[data-pref]').forEach(el => {
      const key = el.dataset.pref;
      if (merged[key] != null) el.value = merged[key];
      el.addEventListener('change', () => {
        merged[key] = el.value;
        save();
      });
    });

    // Bildirishnoma sinovi
    const testBtn = document.getElementById('testNotifBtn');
    const testStatus = document.getElementById('testNotifStatus');
    if (testBtn) {
      testBtn.addEventListener('click', async () => {
        if (!window.MVOW_DATA) return;
        testStatus.textContent = '...';
        const res = await MVOW_DATA.testNotification();
        if (res === 'sent') {
          testStatus.textContent = (window.I18N ? I18N.t('settings.test_notif_sent', 'Yuborildi ✓') : 'Yuborildi ✓');
        } else if (res === 'denied') {
          testStatus.textContent = (window.I18N ? I18N.t('settings.test_notif_denied', 'Ruxsat rad qilindi. Brauzer sozlamasidan ruxsat bering.') : 'Ruxsat rad qilindi. Brauzer sozlamasidan ruxsat bering.');
        } else if (res === 'unsupported') {
          testStatus.textContent = (window.I18N ? I18N.t('settings.test_notif_unsupported', 'Bu brauzerda qo\'llab-quvvatlanmaydi.') : 'Bu brauzerda qo\'llab-quvvatlanmaydi.');
        } else {
          const statusLbl = (window.I18N ? I18N.t('settings.test_notif_status', 'Holat:') : 'Holat:');
          testStatus.textContent = statusLbl + ' ' + res;
        }
      });
    }

    // Reset button — confirm then clear
    const resetBtn = document.getElementById('resetBtn');
    let confirmTimer = null;
    resetBtn.addEventListener('click', () => {
      if (resetBtn.classList.contains('confirm')) {
        // Hammasini tozalash
        const keys = Object.keys(localStorage).filter(k => k.startsWith('mvow.'));
        keys.forEach(k => localStorage.removeItem(k));
        resetBtn.textContent = (window.I18N ? I18N.t('settings.reset_done', 'Tozalandi · qaytamiz') : 'Tozalandi · qaytamiz');
        setTimeout(() => { location.replace('welcome.html'); }, 800);
      } else {
        resetBtn.classList.add('confirm');
        resetBtn.textContent = (window.I18N ? I18N.t('settings.reset_confirm', 'Aniqmisiz? Bosing') : 'Aniqmisiz? Bosing');
        confirmTimer = setTimeout(() => {
          resetBtn.classList.remove('confirm');
          resetBtn.textContent = (window.I18N ? I18N.t('settings.reset', 'Hammasini tozalash') : 'Hammasini tozalash');
        }, 3000);
      }
    });

    // Toggle'lar (sozlama)
    document.querySelectorAll('[data-toggle]').forEach(el => {
      const key = el.dataset.toggle;
      if (merged[key]) { el.classList.add('on'); el.setAttribute('aria-checked','true'); }
      const flip = () => {
        const on = !el.classList.contains('on');
        el.classList.toggle('on', on);
        el.setAttribute('aria-checked', on ? 'true' : 'false');
        merged[key] = on;
        save();
      };
      el.addEventListener('click', flip);
      el.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); flip(); }
      });
    });

    // Ruxsat toggle'lari (data-perm) — haqiqiy brauzer ruxsatini so'rash
    const PERM_KEY = 'mvow.perm';
    let permSaved = {};
    try { permSaved = JSON.parse(localStorage.getItem(PERM_KEY) || '{}'); } catch {}
    document.querySelectorAll('[data-perm]').forEach(t => {
      const key = t.dataset.perm;
      if (permSaved[key]) { t.classList.add('on'); t.setAttribute('aria-checked','true'); }
      const flip = async () => {
        if (window.MVOW_DATA && MVOW_DATA.fxTap) MVOW_DATA.fxTap();
        if (key === 'notification' && !t.classList.contains('on')) {
          if ('Notification' in window) {
            try {
              const res = await Notification.requestPermission();
              if (res !== 'granted') return;
            } catch {}
          }
        }
        const on = !t.classList.contains('on');
        t.classList.toggle('on', on);
        t.setAttribute('aria-checked', on ? 'true' : 'false');
        permSaved[key] = on;
        localStorage.setItem(PERM_KEY, JSON.stringify(permSaved));
      };
      t.addEventListener('click', flip);
      t.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); flip(); }
      });
    });

    // ── Replay opening cinematic ──
    document.getElementById('replayIntro')?.addEventListener('click', () => {
      localStorage.removeItem('mvow.motion.introSeen');
      window.location.href = 'intro.html';
    });
  });
</script>

<script src="back-btn.js?v=28.4.0"></script>
</body>
</html>
