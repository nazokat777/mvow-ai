<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{brand} — Va'da</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --void:#04060B; --text:#F5F2EC; --text-mid:#8A8D94; --text-dim:#4A4D54; --accent:#00E5D4; --accent-soft:#00B5A8; }
  body { background: var(--void); font-family:'Inter',sans-serif; color: var(--text); min-height: 100vh; display:flex; justify-content:center; align-items:flex-start; padding: 24px; -webkit-font-smoothing: antialiased; }
  .phone { width: 380px; min-height: 800px; background: var(--void); border-radius: 40px; overflow: hidden; position: relative; box-shadow: 0 0 0 8px #1a1d24, 0 30px 80px rgba(0,0,0,.7); display:flex; flex-direction: column; }
  .container { flex:1; display:flex; flex-direction: column; align-items:center; justify-content:center; padding: 80px 40px 120px; gap: 36px; }

  .label {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  /* Va'da matni — eng katta narsa, serif italic */
  .vow {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 26px;
    color: var(--text);
    line-height: 1.5;
    text-align: center;
  }
  .vow .em { color: var(--accent); font-style: normal; font-weight: 600; }

  .hint {
    font-size: 12px;
    color: var(--text-mid);
    text-align: center;
    letter-spacing: 1px;
  }

  .mic {
    width: 110px; height: 110px;
    border-radius: 50%;
    background: linear-gradient(180deg, var(--accent), var(--accent-soft));
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    transition: transform .2s;
    box-shadow: 0 0 36px rgba(0,229,212,.3);
  }
  .mic:active { transform: scale(.95); }
  .mic svg { width: 36px; height: 36px; }
  .mic.recording { animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 36px rgba(0,229,212,.3); }
    50%     { box-shadow: 0 0 60px rgba(0,229,212,.6); }
  }

  .status {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    min-height: 16px;
  }

  .bottom-bar { padding: 24px 32px env(safe-area-inset-bottom, 24px); background: linear-gradient(180deg, transparent, var(--void) 30%); }
  .cta { display:block; width:100%; padding:16px; background: linear-gradient(180deg, var(--accent), var(--accent-soft)); color: var(--void); font-size:13px; font-weight:600; letter-spacing:2px; text-transform: uppercase; border:none; border-radius:6px; text-align:center; text-decoration:none; }
  .cta.disabled { opacity:.3; pointer-events:none; }

  @media (max-width: 480px) { body { padding: 0; } .phone { width: 100vw; min-height: 100vh; border-radius: 0; box-shadow: none; } }
</style>
</head>
<body>

<div class="phone">
  <div class="container">

    <div class="label">Sening so'zing</div>

    <!-- Aniq va'da matni — foydalanuvchi nima va'da berishini ko'rib turadi -->
    <p class="vow">
      Men <span class="em" id="userName">Aziz</span>,<br>
      <span class="em">intizomli</span> bo'laman.<br>
      Rejaga sodiq qolaman,<br>
      chalg'imayman.
    </p>

    <p class="hint">↓ shu so'zlarni ovozda takrorla</p>

    <div class="mic" id="micBtn" role="button" aria-label="Yozish">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z M19 11a7 7 0 0 1-14 0 M12 18v3"
              stroke="#04060B" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>

    <p class="status" id="status">Bos · ushlab tur · ayt</p>
  </div>

  <div class="bottom-bar">
    <a class="cta disabled" id="cta" href="goal.html">Davom</a>
  </div>
</div>

<script src="data.js" defer></script>
<script src="nav-overlay.js" defer></script>
<script>
  // Foydalanuvchi ismi
  const userName = (localStorage.getItem('mvow.userName') || 'Aziz').trim();
  document.getElementById('userName').textContent = userName;

  let recording = false;
  const mic = document.getElementById('micBtn');
  const status = document.getElementById('status');
  const cta = document.getElementById('cta');
  mic.addEventListener('click', () => {
    recording = !recording;
    mic.classList.toggle('recording', recording);
    status.textContent = recording ? 'Tinglayapman...' : 'Yozildi · va\'da berildi';
    if (!recording) cta.classList.remove('disabled');
  });
</script>

</body>
</html>
