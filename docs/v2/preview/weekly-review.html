<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{brand} — Tarix</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --void:#04060B; --void-soft:#0C0F16; --card:#11151E; --text:#F5F2EC; --text-mid:#B8BBC2; --text-dim:#9CA0A8; --accent:#00E5D4; --accent-soft:#00B5A8; --warm:#F5C26B; }
  body { background: var(--void); font-family:'Inter',sans-serif; color: var(--text); min-height: 100vh; display:flex; justify-content:center; align-items:flex-start; padding: 24px; -webkit-font-smoothing: antialiased; }
  .phone { width: 380px; min-height: 800px; background: var(--void); border-radius: 40px; overflow: hidden; position: relative; box-shadow: 0 0 0 8px #1a1d24, 0 30px 80px rgba(0,0,0,.7); }
  .container { padding: 60px 28px 80px; }

  .title { font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: 32px; text-align: center; margin-bottom: 4px; }
  .subtitle { text-align: center; font-size: 11px; letter-spacing: 3px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 22px; }

  .tabs { display:flex; gap: 4px; padding: 4px; background: var(--void-soft); border-radius: 8px; margin-bottom: 18px; }
  .tab { flex:1; padding: 10px; text-align:center; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-mid); cursor: pointer; border-radius: 6px; transition: all .15s; }
  .tab.on { background: var(--accent); color: var(--void); font-weight: 600; }

  /* Hero — jonli diagramma + raqam */
  .hero {
    background: var(--card);
    border-radius: 14px;
    padding: 18px 16px 14px;
    margin-bottom: 22px;
  }
  .hero-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 14px;
  }
  .hero-num {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 38px;
    color: var(--accent);
    line-height: 1;
  }
  .hero-num-lbl {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-left: 6px;
  }
  .hero-meta {
    font-size: 11px;
    color: var(--text-mid);
    letter-spacing: 1px;
    text-align: right;
    line-height: 1.5;
  }
  .hero-meta .em { color: var(--accent); font-weight: 500; }

  /* Chart — bars */
  .chart {
    display: grid;
    grid-template-columns: repeat(var(--cols, 7), 1fr);
    gap: 4px;
    align-items: end;
    height: 60px;
    margin-bottom: 6px;
  }
  .chart-bar-wrap {
    display: flex; flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    height: 100%;
    position: relative;
  }
  .chart-bar {
    width: 100%;
    background: linear-gradient(180deg, var(--accent), var(--accent-soft));
    border-radius: 3px 3px 0 0;
    transition: height .6s cubic-bezier(.16,.84,.32,1);
    min-height: 2px;
  }
  .chart-bar.dim { opacity: .25; }
  .chart-bar.today { background: linear-gradient(180deg, var(--warm), #D9A555); }
  .chart-bar-val {
    position: absolute;
    top: -14px;
    font-size: 9px;
    color: var(--accent);
    font-weight: 500;
    opacity: 0;
    transition: opacity .3s;
  }
  .chart-bar-wrap:hover .chart-bar-val { opacity: 1; }
  .chart-labels {
    display: grid;
    grid-template-columns: repeat(var(--cols, 7), 1fr);
    gap: 4px;
    margin-top: 4px;
  }
  .chart-labels span {
    text-align: center;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .chart-labels span.today { color: var(--accent); font-weight: 600; }

  /* Task group */
  .group { margin-bottom: 22px; }
  .group-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 0 4px 10px;
    border-bottom: 1px solid rgba(0,229,212,.18);
    margin-bottom: 10px;
  }
  .group-name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 18px;
    color: var(--text);
  }
  .group-stats {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.5px;
  }
  .group-stats .x { color: var(--text-dim); margin: 0 6px; }

  .h-entry {
    display: grid;
    grid-template-columns: 70px 1fr auto;
    gap: 10px;
    align-items: center;
    padding: 8px 4px;
  }
  .h-entry .date { font-size: 12px; color: var(--text-mid); letter-spacing: 0.3px; }
  .h-entry .note { font-size: 13px; color: var(--text); font-style: italic; font-family: 'Cormorant Garamond', serif; line-height: 1.3; }
  .h-entry .note.empty { color: var(--text-dim); font-family: 'Inter', sans-serif; font-style: normal; font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }
  .h-entry .dur { font-size: 12px; color: var(--accent); font-weight: 500; text-align: right; }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 40px 24px;
    background: var(--card);
    border-radius: 12px;
    margin-top: 12px;
  }
  .empty .lbl {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 17px;
    color: var(--text-mid);
    margin-bottom: 6px;
  }
  .empty .hint {
    font-size: 12px;
    color: var(--text-dim);
    line-height: 1.5;
  }

  @media (max-width: 480px) { body { padding: 0; } .phone { width: 100vw; min-height: 100vh; border-radius: 0; box-shadow: none; } }
</style>
</head>
<body>

<div class="phone">
  <div class="container">

    <h1 class="title">Tarix</h1>
    <div class="subtitle">Bajarilgan ishlar</div>

    <div class="tabs">
      <div class="tab" data-range="day">Bugun</div>
      <div class="tab on" data-range="week">Hafta</div>
      <div class="tab" data-range="month">Oy</div>
    </div>

    <!-- Hero: jonli diagramma + raqam -->
    <div class="hero">
      <div class="hero-top">
        <div>
          <span class="hero-num" id="heroNum">0</span>
          <span class="hero-num-lbl">soat fokus</span>
        </div>
        <div class="hero-meta">
          <span class="em" id="heroCount">0</span> ish<br>
          streak · <span class="em" id="heroStreak">0</span>
        </div>
      </div>
      <div class="chart" id="chart"></div>
      <div class="chart-labels" id="chartLabels"></div>
    </div>

    <!-- Per-task grouped list -->
    <div id="historyList"></div>

  </div>
</div>

<script src="i18n.js" defer></script>
<script src="data.js" defer></script>
<script src="nav-overlay.js" defer></script>
<script>
  const MONTHS = ['yan','fev','mar','apr','may','iyun','iyul','avg','sen','okt','noy','dek'];

  function escapeHtml(s) {
    return String(s).replace(/[<>"&]/g, c => ({'<':'&lt;','>':'&gt;','"':'&quot;','&':'&amp;'}[c]));
  }
  function fmtDur(mins) {
    if (!mins || mins <= 0) return '—';
    const h = Math.floor(mins / 60);
    const m = mins % 60;
    if (h && m) return h + ' soat ' + m + ' daq';
    if (h) return h + ' soat';
    return m + ' daq';
  }
  function fmtShortDate(iso) {
    const d = new Date(iso);
    return d.getDate() + '-' + MONTHS[d.getMonth()];
  }

  function inRange(iso, range) {
    const d = new Date(iso);
    const now = new Date();
    if (range === 'day') {
      return iso === now.toISOString().slice(0,10);
    }
    if (range === 'week') {
      const dayOfWeek = now.getDay();
      const monday = new Date(now); monday.setHours(0,0,0,0);
      monday.setDate(now.getDate() - ((dayOfWeek + 6) % 7));
      return d >= monday;
    }
    if (range === 'month') {
      return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
    }
    return true;
  }

  // Jonli diagramma — vaqt o'qiga qarab bars
  function buildChart(range, history) {
    const now = new Date();
    const todayIso = now.toISOString().slice(0, 10);
    const chartEl = document.getElementById('chart');
    const labelsEl = document.getElementById('chartLabels');
    chartEl.innerHTML = '';
    labelsEl.innerHTML = '';

    let buckets = [];
    if (range === 'day') {
      // Bugungi top 7 vazifa
      const today = history.filter(h => h.dateIso === todayIso);
      const groups = {};
      today.forEach(h => { const k = h.name || 'Ish'; groups[k] = (groups[k] || 0) + (h.actualMins || 0); });
      buckets = Object.entries(groups)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 7)
        .map(([name, mins]) => ({ label: name.slice(0, 4), val: Math.round(mins / 60 * 10) / 10, today: false, raw: mins }));
      if (!buckets.length) buckets = Array(7).fill(0).map(() => ({ label: '·', val: 0, today: false, raw: 0 }));
    } else if (range === 'week') {
      const dayOfWeek = now.getDay();
      const monday = new Date(now); monday.setHours(0,0,0,0);
      monday.setDate(now.getDate() - ((dayOfWeek + 6) % 7));
      const labels = ['Du','Se','Ch','Pa','Ju','Sh','Ya'];
      for (let i = 0; i < 7; i++) {
        const d = new Date(monday); d.setDate(monday.getDate() + i);
        const iso = d.toISOString().slice(0, 10);
        const sum = history.filter(h => h.dateIso === iso).reduce((s, h) => s + (h.actualMins || 0), 0);
        buckets.push({ label: labels[i], val: Math.round(sum / 60 * 10) / 10, today: iso === todayIso, raw: sum });
      }
    } else {
      // Month: last ~30 days
      const days = now.getDate();
      for (let i = days - 1; i >= 0; i--) {
        const d = new Date(now.getFullYear(), now.getMonth(), now.getDate() - i);
        const iso = d.toISOString().slice(0, 10);
        const sum = history.filter(h => h.dateIso === iso).reduce((s, h) => s + (h.actualMins || 0), 0);
        const label = (d.getDate() % 5 === 0 || i === days - 1) ? String(d.getDate()) : '';
        buckets.push({ label, val: Math.round(sum / 60 * 10) / 10, today: iso === todayIso, raw: sum });
      }
    }

    const max = Math.max(...buckets.map(b => b.val), 0.5);
    chartEl.style.setProperty('--cols', buckets.length);
    labelsEl.style.setProperty('--cols', buckets.length);

    buckets.forEach(b => {
      const wrap = document.createElement('div');
      wrap.className = 'chart-bar-wrap';
      const bar = document.createElement('div');
      bar.className = 'chart-bar' + (b.val < max * 0.3 ? ' dim' : '') + (b.today ? ' today' : '');
      bar.style.height = '0%';
      wrap.appendChild(bar);
      if (b.val > 0) {
        const valEl = document.createElement('div');
        valEl.className = 'chart-bar-val';
        valEl.textContent = b.val + 's';
        wrap.appendChild(valEl);
      }
      chartEl.appendChild(wrap);
      // Anim
      requestAnimationFrame(() => {
        bar.style.height = Math.max(3, (b.val / max) * 100) + '%';
      });
      const lbl = document.createElement('span');
      lbl.textContent = b.label;
      if (b.today) lbl.className = 'today';
      labelsEl.appendChild(lbl);
    });
  }

  function render(range) {
    const allHistory = window.MVOW_DATA ? MVOW_DATA.getHistory() : [];
    const history = allHistory.filter(h => inRange(h.dateIso, range));
    history.sort((a,b) => (b.completedAt || 0) - (a.completedAt || 0));

    // Hero raqamlar
    const totalMins = history.reduce((s,h) => s + (h.actualMins || 0), 0);
    document.getElementById('heroNum').textContent = Math.round(totalMins / 60 * 10) / 10 || 0;
    document.getElementById('heroCount').textContent = history.length;
    document.getElementById('heroStreak').textContent = parseInt(localStorage.getItem('mvow.streak') || '0', 10);

    // Diagramma
    buildChart(range, allHistory);

    // Vazifa bo'yicha guruhlash
    const list = document.getElementById('historyList');
    if (!history.length) {
      list.innerHTML = `
        <div class="empty">
          <div class="lbl">Hozircha bo'sh.</div>
          <div class="hint">Ish bajarilganda bu yerda ko'rinadi —<br>sana, davomiylik va qisqa izoh bilan.</div>
        </div>
      `;
      return;
    }

    const groups = {};
    for (const h of history) {
      const k = h.name || 'Ish';
      if (!groups[k]) groups[k] = [];
      groups[k].push(h);
    }
    // Eng so'nggi tugatilganga ko'ra tartiblash
    const sortedNames = Object.keys(groups).sort((a, b) => {
      const aMax = Math.max(...groups[a].map(h => h.completedAt || 0));
      const bMax = Math.max(...groups[b].map(h => h.completedAt || 0));
      return bMax - aMax;
    });

    list.innerHTML = sortedNames.map(name => {
      const items = groups[name];
      const totalMins = items.reduce((s, h) => s + (h.actualMins || 0), 0);
      const entriesHtml = items.map(h => `
        <div class="h-entry">
          <div class="date">${fmtShortDate(h.dateIso)}</div>
          <div class="note ${h.note ? '' : 'empty'}">${h.note ? escapeHtml(h.note) : '—'}</div>
          <div class="dur">${fmtDur(h.actualMins)}</div>
        </div>
      `).join('');
      return `
        <div class="group">
          <div class="group-head">
            <div class="group-name">${escapeHtml(name)}</div>
            <div class="group-stats">${fmtDur(totalMins)}<span class="x">·</span>${items.length} marta</div>
          </div>
          ${entriesHtml}
        </div>
      `;
    }).join('');
  }

  document.addEventListener('DOMContentLoaded', () => {
    let cur = 'week';
    render(cur);
    document.querySelectorAll('.tab').forEach(t => {
      t.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
        t.classList.add('on');
        cur = t.dataset.range;
        render(cur);
      });
    });
  });
</script>

</body>
</html>
