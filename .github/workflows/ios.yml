name: Build iOS

# Mac KERAK EMAS — GitHub'ning macOS serverida yig'iladi.
# 1-bosqich: ilova bulutда KOMPILE bo'lishini tasdiqlash (imzosiz, simulator).
# Keyingi bosqichlarda: budilnik/bildirishnoma kodi + o'rnatiladigan IPA.

on:
  push:
    branches: [ main ]
    paths:
      - 'ios/**'
      - '.github/workflows/ios.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (latest stable — XcodeGen format 77 o'qiy oladi)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project (project.yml -> MVoW.xcodeproj)
        working-directory: ios
        run: xcodegen generate

      - name: List schemes (diagnostika)
        working-directory: ios
        run: xcodebuild -list -project MVoW.xcodeproj || true

      - name: Build (device, imzosiz — AltStore uchun)
        working-directory: ios
        run: |
          set -o pipefail
          echo "BUILD_MARKER sha=${GITHUB_SHA} run=${GITHUB_RUN_ID} $(date -u)" | tee "$GITHUB_WORKSPACE/ios-build-log.txt"
          xcodebuild build \
            -project MVoW.xcodeproj \
            -scheme MVoW \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            2>&1 | tee -a "$GITHUB_WORKSPACE/ios-build-log.txt"

      - name: Package unsigned IPA (Payload/MVoW.app -> .ipa)
        if: success()
        working-directory: ios
        run: |
          set -o pipefail
          APP=$(find build/Build/Products -maxdepth 2 -name 'MVoW.app' -type d | head -1)
          echo "Topilgan .app: $APP" | tee -a "$GITHUB_WORKSPACE/ios-build-log.txt"
          rm -rf Payload && mkdir Payload
          cp -R "$APP" Payload/
          zip -qry "$GITHUB_WORKSPACE/MVoW-unsigned.ipa" Payload
          ls -la "$GITHUB_WORKSPACE/MVoW-unsigned.ipa" | tee -a "$GITHUB_WORKSPACE/ios-build-log.txt"

      - name: Publish IPA + log (har doim)
        if: always()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-ipa
          name: FOCUS AI iOS — imzosiz IPA (AltStore uchun)
          body: |
            iPhone'ga o'rnatish (Mac KERAK EMAS):
            1) Windows kompyuterga AltServer: https://altstore.io
            2) iPhone'ni USB bilan ulang -> AltServer -> "Install AltStore"
            3) MVoW-unsigned.ipa'ni yuklab oling -> iPhone'da AltStore -> "+" -> tanlang
            (Bepul Apple ID bilan imzolanadi; har 7 kunda yangilash kerak.)
          files: |
            MVoW-unsigned.ipa
            ios-build-log.txt
