name: keystore-gen (bir martalik — Play imzo kaliti)

# Google Play uchun DOIMIY imzo kalitini bir marta yaratadi.
# Ishlatish:
#   1) GitHub -> Actions -> "keystore-gen" -> "Run workflow" (parol kiriting, yoki bo'sh -> avtomatik).
#   2) Tugagach: Actions -> shu run -> "Artifacts" -> "focusai-keystore" ni yuklab oling (XAVFSIZ saqlang!).
#   3) Log'dagi qiymatlarni GitHub Secrets'ga qo'ying (Settings -> Secrets and variables -> Actions):
#         ANDROID_KEYSTORE_B64       = keystore.b64 faylining ichidagi matn (yoki log'dagi base64)
#         ANDROID_KEYSTORE_PASSWORD  = siz kiritgan parol (yoki log'da ko'rsatilgan)
#   4) Log'dagi SHA-256 (UPLOAD) ni eslab qoling — assetlinks uchun kerak bo'lishi mumkin.
# DIQQAT: keystore fayl va parolni YO'QOTMANG. Yo'qolsa Play'da ilovani yangilab bo'lmaydi.

on:
  workflow_dispatch:
    inputs:
      password:
        description: "Keystore paroli (bo'sh qoldirsangiz avtomatik yaratiladi)"
        required: false
        default: ''

permissions:
  contents: read

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate keystore
        run: |
          PASS="${{ github.event.inputs.password }}"
          if [ -z "$PASS" ]; then PASS="focusai-$(date +%s)-$RANDOM"; fi
          keytool -genkeypair -v \
            -keystore android.keystore -alias focusai \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$PASS" -keypass "$PASS" \
            -dname "CN=FOCUS AI, OU=Just AI It, O=Just AI It, L=Tashkent, C=UZ"
          base64 -w0 android.keystore > keystore.b64
          echo "=============================================================="
          echo " 1) ANDROID_KEYSTORE_PASSWORD (secret) = $PASS"
          echo " 2) ANDROID_KEYSTORE_B64 (secret) = keystore.b64 artifaktidagi matn"
          echo " 3) SHA-256 (UPLOAD kaliti, assetlinks uchun):"
          keytool -list -v -keystore android.keystore -alias focusai -storepass "$PASS" 2>/dev/null | grep -i "SHA256:" || true
          echo "=============================================================="
          echo "MUHIM: keystore faylini va parolni XAVFSIZ saqlang — yo'qolsa Play'da yangilash imkonsiz."

      - name: Upload keystore artifact
        uses: actions/upload-artifact@v4
        with:
          name: focusai-keystore
          path: |
            android.keystore
            keystore.b64
          if-no-files-found: error
          retention-days: 7
