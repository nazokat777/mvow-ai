name: keystore-gen (bir martalik — Play imzo kaliti)

# Google Play uchun DOIMIY imzo kalitini bir marta yaratadi.
#
# XAVFSIZLIK (repo OCHIQ bo'lgani uchun muhim):
#   - Parol SIZ yaratgan `ANDROID_KEYSTORE_PASSWORD` secret'idan olinadi va HECH QACHON log'ga chiqmaydi
#     (GitHub secret'larni avtomatik maskalaydi).
#   - Artifaktdagi keystore fayli shu parol bilan SHIFRLANGAN — parolsiz foydasiz.
#   - Log'da faqat SHA-256 chiqadi (u ochiq ma'lumot — assetlinks.json'ga baribir ochiq yoziladi).
#
# TARTIB:
#   1) Settings -> Secrets and variables -> Actions -> New repository secret:
#        ANDROID_KEYSTORE_PASSWORD = o'zingiz o'ylagan KUCHLI parol (kamida 12 belgi, saqlab qo'ying!)
#   2) Actions -> keystore-gen -> Run workflow.
#   3) Tugagach: Artifacts -> `focusai-keystore` -> `keystore.b64` ichidagi matnni nusxalab,
#      yangi secret qiling: ANDROID_KEYSTORE_B64
#   4) Log'dagi SHA-256 ni saqlang (assetlinks uchun kerak bo'lishi mumkin).
# DIQQAT: parolni YO'QOTMANG — yo'qolsa Play'da ilovani yangilab bo'lmaydi.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - name: Parol secret'i borligini tekshirish
        env:
          PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          if [ -z "$PASS" ]; then
            echo "::error::ANDROID_KEYSTORE_PASSWORD secret'i yo'q. Avval Settings -> Secrets and variables -> Actions -> New repository secret bilan qo'ying (kuchli parol), keyin qayta ishga tushiring."
            exit 1
          fi
          if [ ${#PASS} -lt 8 ]; then
            echo "::error::Parol juda qisqa (kamida 8, tavsiya 12+ belgi)."
            exit 1
          fi
          echo "Parol secret'i topildi (uzunligi tekshirildi, qiymat ko'rsatilmaydi)."

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate keystore (parol log'ga CHIQMAYDI)
        env:
          PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          keytool -genkeypair -v \
            -keystore android.keystore -alias focusai \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$PASS" -keypass "$PASS" \
            -dname "CN=FOCUS AI, OU=Just AI It, O=Just AI It, L=Tashkent, C=UZ" >/dev/null 2>&1
          base64 -w0 android.keystore > keystore.b64
          echo "=============================================================="
          echo " Keystore yaratildi (parol secret'dan olindi, log'da YO'Q)."
          echo " SHA-256 (UPLOAD kaliti — bu OCHIQ ma'lumot, assetlinks uchun):"
          keytool -list -v -keystore android.keystore -alias focusai -storepass "$PASS" 2>/dev/null | grep -i "SHA256:" || true
          echo "--------------------------------------------------------------"
          echo " KEYINGI QADAM: Artifacts -> focusai-keystore -> keystore.b64"
          echo " ichidagi matnni ANDROID_KEYSTORE_B64 secret'i qilib qo'ying."
          echo "=============================================================="

      - name: Upload keystore artifact (parol bilan shifrlangan)
        uses: actions/upload-artifact@v4
        with:
          name: focusai-keystore
          path: |
            android.keystore
            keystore.b64
          if-no-files-found: error
          retention-days: 3
