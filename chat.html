<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{brand} — Suhbat</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --void:#04060B; --void-soft:#0C0F16; --text:#F5F2EC; --text-mid:#8A8D94; --text-dim:#4A4D54; --accent:#00E5D4; --accent-soft:#00B5A8; }
  body { background: var(--void); font-family:'Inter',sans-serif; color: var(--text); min-height: 100vh; display:flex; justify-content:center; align-items:flex-start; padding: 24px; -webkit-font-smoothing: antialiased; }
  .phone { width: 380px; min-height: 800px; background: var(--void); border-radius: 40px; overflow: hidden; position: relative; box-shadow: 0 0 0 8px #1a1d24, 0 30px 80px rgba(0,0,0,.7); display:flex; flex-direction: column; }
  .header {
    padding: 60px 24px 16px;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,.04);
  }
  .header .name { font-family:'Cormorant Garamond',serif; font-size: 18px; font-weight:500; }
  .header .status { font-size: 10px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-top: 4px; }
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .msg { max-width: 80%; padding: 12px 14px; border-radius: 14px; font-size: 14px; line-height: 1.4; }
  .msg.user { align-self: flex-end; background: var(--accent); color: var(--void); border-bottom-right-radius: 4px; }
  .msg.bot  { align-self: flex-start; background: var(--void-soft); color: var(--text); border-bottom-left-radius: 4px; }
  .quick { display: flex; gap: 6px; padding: 12px 24px 0; overflow-x: auto; }
  .quick::-webkit-scrollbar { display: none; }
  .qchip {
    flex-shrink: 0;
    padding: 8px 14px;
    border: 1px solid rgba(0,229,212,.3);
    border-radius: 16px;
    font-size: 11px;
    color: var(--accent);
    cursor: pointer;
    background: transparent;
    white-space: nowrap;
  }
  .input-row {
    display: flex;
    gap: 8px;
    padding: 12px 24px env(safe-area-inset-bottom, 12px);
    background: var(--void);
  }
  .input-row input {
    flex: 1;
    background: var(--void-soft);
    border: none;
    border-radius: 20px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;
  }
  .input-row input::placeholder { color: var(--text-dim); }
  .input-row button {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: var(--void);
    cursor: pointer;
    font-size: 18px;
  }
  @media (max-width: 480px) { body { padding: 0; } .phone { width: 100vw; min-height: 100vh; border-radius: 0; box-shadow: none; } }
</style>
</head>
<body>

<div class="phone">

  <div class="header">
    <div class="name">Murabbiy</div>
    <div class="status">doim shu yerda</div>
  </div>

  <div class="chat" id="chat">
    <div class="msg user">Charchadim.</div>
    <div class="msg bot">Tan oldim. Bir savol bersam?</div>
    <div class="msg user">Bering.</div>
    <div class="msg bot">Bugun qaysi paytda oxirgi marta o'zingni kuchli his qilding?</div>
  </div>

  <div class="quick">
    <div class="qchip">Charchoq</div>
    <div class="qchip">Yo'lim qayerda?</div>
    <div class="qchip">Niyatim</div>
  </div>

  <div class="input-row">
    <input id="msgInput" type="text" placeholder="Murabbiyga ayt...">
    <button id="sendBtn" aria-label="Yuborish">↑</button>
  </div>
</div>

<script src="data.js" defer></script>
<script src="nav-overlay.js" defer></script>
<script>
  const chat = document.getElementById('chat');
  const inp = document.getElementById('msgInput');
  const send = document.getElementById('sendBtn');
  function add(text, who) {
    const d = document.createElement('div');
    d.className = 'msg ' + who;
    d.textContent = text;
    chat.appendChild(d);
    chat.scrollTop = chat.scrollHeight;
  }
  function reply() {
    setTimeout(() => add('Eshitdim. Bir lahza o\'ylab ko\'ramiz.', 'bot'), 600);
  }
  send.addEventListener('click', () => {
    const v = inp.value.trim();
    if (!v) return;
    add(v, 'user');
    inp.value = '';
    reply();
  });
  inp.addEventListener('keydown', e => { if (e.key === 'Enter') send.click(); });
  document.querySelectorAll('.qchip').forEach(c => c.addEventListener('click', () => {
    add(c.textContent, 'user');
    reply();
  }));
</script>

</body>
</html>
