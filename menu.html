<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --void:#04060B; --text:#F5F2EC; --text-mid:#8A8D94; --text-dim:#4A4D54; --accent:#00E5D4; }
  body { background: var(--void); font-family:'Inter',sans-serif; color: var(--text); min-height: 100vh; padding: 60px 24px 60px; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 420px; margin: 0 auto; }
  .h { text-align:center; margin-bottom: 40px; }
  .h .title { font-family:'Cormorant Garamond',serif; font-size: 28px; font-weight: 500; }
  .h .sub { font-size: 11px; letter-spacing: 3px; color: var(--text-mid); text-transform: uppercase; margin-top: 6px; }
  .section { margin-bottom: 32px; }
  .section .lbl { font-size: 10px; letter-spacing: 4px; color: var(--text-dim); text-transform: uppercase; padding: 0 4px 12px; }
  .row {
    display: grid;
    grid-template-columns: 32px 1fr;
    gap: 16px;
    padding: 14px 4px;
    align-items: baseline;
    border-bottom: 1px solid rgba(255,255,255,.04);
    text-decoration: none;
    color: var(--text);
  }
  .row:active { color: var(--accent); }
  .row .num { font-size: 13px; color: var(--accent); }
  .row .name { font-size: 15px; }
</style>
</head>
