<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{brand} — Bayram</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --void:#04060B; --text:#F5F2EC; --text-mid:#8A8D94; --text-dim:#4A4D54; --accent:#00E5D4; --accent-soft:#00B5A8; }
  body { background: var(--void); font-family:'Inter',sans-serif; color: var(--text); min-height: 100vh; display:flex; justify-content:center; align-items:flex-start; padding: 24px; -webkit-font-smoothing: antialiased; }
  .phone { width: 380px; min-height: 800px; background: var(--void); border-radius: 40px; overflow: hidden; position: relative; box-shadow: 0 0 0 8px #1a1d24, 0 30px 80px rgba(0,0,0,.7); display:flex; flex-direction:column; }
  .container { flex:1; padding: 80px 32px 120px; display:flex; flex-direction:column; gap: 48px; }

  .stamp { text-align:center; font-size: 10px; letter-spacing: 4px; color: var(--text-dim); text-transform: uppercase; }

  .hero { text-align:center; }
  .hero .big {
    font-family:'Cormorant Garamond',serif;
    font-weight: 600;
    font-size: 60px;
    color: var(--accent);
    letter-spacing: 2px;
    line-height: 1;
    margin-bottom: 12px;
  }
  .hero .sub { font-family:'Cormorant Garamond',serif; font-style:italic; font-size: 16px; color: var(--text-mid); }

  .chains {
    display:flex; flex-direction: column; gap: 0;
  }
  .chain {
    display:grid;
    grid-template-columns: 1fr auto;
    align-items: baseline;
    padding: 16px 0;
    border-bottom: 1px solid rgba(255,255,255,.04);
  }
  .chain .name { font-size: 14px; color: var(--text); }
  .chain .days { font-size: 13px; color: var(--accent); letter-spacing: 1px; }
  .chain .days .em { font-family:'Cormorant Garamond',serif; font-size: 20px; font-weight: 500; }

  .bottom-bar { padding: 24px 32px env(safe-area-inset-bottom, 24px); background: linear-gradient(180deg, transparent, var(--void) 30%); }
  .cta { display:block; width:100%; padding:16px; background: linear-gradient(180deg, var(--accent), var(--accent-soft)); color: var(--void); font-size:13px; font-weight:600; letter-spacing:2px; text-transform: uppercase; border:none; border-radius:6px; text-align:center; text-decoration:none; }
  @media (max-width: 480px) { body { padding: 0; } .phone { width: 100vw; min-height: 100vh; border-radius: 0; box-shadow: none; } }
</style>
</head>
<body>

<div class="phone">
  <div class="container">

    <div class="stamp">7 kun · tugadi</div>

    <div class="hero">
      <div class="big">+70%</div>
      <div class="sub">oldingi sendan kuchliroq</div>
    </div>

    <div class="chains" id="chains"></div>

  </div>

  <div class="bottom-bar">
    <a class="cta" href="routine.html">Keyingi hafta</a>
  </div>
</div>

<script src="data.js" defer></script>
<script src="nav-overlay.js" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    if (!window.MVOW_DATA) return;
    const list = document.getElementById('chains');
    list.innerHTML = MVOW_DATA.chains.map(c => `
      <div class="chain">
        <span class="name">${c.name}</span>
        <span class="days"><span class="em">${c.days}</span> kun</span>
      </div>
    `).join('');
  });
</script>

</body>
</html>
