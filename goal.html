<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{brand} — Niyat</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --void:#04060B; --void-soft:#0C0F16; --text:#F5F2EC; --text-mid:#8A8D94; --text-dim:#4A4D54; --accent:#00E5D4; --accent-soft:#00B5A8; }
  body { background: var(--void); font-family:'Inter',sans-serif; color: var(--text); min-height: 100vh; display:flex; justify-content:center; align-items:flex-start; padding: 24px; -webkit-font-smoothing: antialiased; }
  .phone { width: 380px; min-height: 800px; background: var(--void); border-radius: 40px; overflow: hidden; position: relative; box-shadow: 0 0 0 8px #1a1d24, 0 30px 80px rgba(0,0,0,.7); display:flex; flex-direction: column; }
  .container { flex:1; padding: 100px 32px 120px; display:flex; flex-direction:column; gap: 40px; }
  .q { font-family:'Cormorant Garamond',serif; font-weight:500; font-size: 30px; color: var(--text); text-align:center; line-height: 1.3; }
  .q .em { color: var(--accent); }
  .field input {
    width:100%;
    background: var(--void-soft);
    border:none; border-bottom: 1px solid rgba(255,255,255,.1);
    color: var(--text);
    padding: 14px 0;
    font-family:'Cormorant Garamond', serif; font-style: italic; font-size: 16px;
    text-align: center;
    outline:none;
    transition: border-color .2s;
  }
  .field input:focus { border-bottom-color: var(--accent); }
  .field input::placeholder { color: var(--text-dim); font-style: italic; }
  .chips { display:flex; flex-direction:column; gap: 8px; margin-top: auto; }
  .chip { padding: 12px; background: transparent; border: 1px solid rgba(255,255,255,.08); border-radius: 6px; color: var(--text-mid); font-size: 13px; letter-spacing: 1px; text-align:center; cursor:pointer; transition: all .15s; }
  .chip.on { border-color: var(--accent); color: var(--accent); background: rgba(0,229,212,.04); }
  .bottom-bar { padding: 24px 32px env(safe-area-inset-bottom, 24px); background: linear-gradient(180deg, transparent, var(--void) 30%); }
  .cta { display:block; width:100%; padding:16px; background: linear-gradient(180deg, var(--accent), var(--accent-soft)); color: var(--void); font-size:13px; font-weight:600; letter-spacing:2px; text-transform: uppercase; border:none; border-radius:6px; text-align:center; text-decoration:none; }
  @media (max-width: 480px) { body { padding: 0; } .phone { width: 100vw; min-height: 100vh; border-radius: 0; box-shadow: none; } }
</style>
</head>
<body>

<div class="phone">
  <div class="container">
    <h1 class="q">3 oydan keyin sen <span class="em">kim</span>?</h1>

    <div class="field">
      <input id="goal" type="text" value="Intizomli odam" maxlength="80">
    </div>

    <div class="chips" id="chips">
      <div class="chip" data-v="ilm">Ilm</div>
      <div class="chip" data-v="sog">Sog'lik</div>
      <div class="chip" data-v="mun">Munosabat</div>
    </div>
  </div>

  <div class="bottom-bar">
    <a class="cta" href="permissions.html">Davom</a>
  </div>
</div>

<script src="data.js" defer></script>
<script src="nav-overlay.js" defer></script>
<script>
  document.querySelectorAll('.chip').forEach(c => c.addEventListener('click', () => c.classList.toggle('on')));
</script>

</body>
</html>
