<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{brand} — Natijalar</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --void:#04060B; --void-soft:#0C0F16; --text:#F5F2EC; --text-mid:#8A8D94; --text-dim:#4A4D54; --accent:#00E5D4; --accent-soft:#00B5A8; }
  body { background: var(--void); font-family:'Inter',sans-serif; color: var(--text); min-height: 100vh; display:flex; justify-content:center; align-items:flex-start; padding: 24px; -webkit-font-smoothing: antialiased; }
  .phone { width: 380px; min-height: 800px; background: var(--void); border-radius: 40px; overflow: hidden; position: relative; box-shadow: 0 0 0 8px #1a1d24, 0 30px 80px rgba(0,0,0,.7); }
  .container { padding: 60px 32px 40px; }

  .tabs { display:flex; gap: 4px; padding: 4px; background: var(--void-soft); border-radius: 8px; margin-bottom: 40px; }
  .tab { flex:1; padding: 10px; text-align:center; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-mid); cursor: pointer; border-radius: 6px; }
  .tab.on { background: var(--accent); color: var(--void); font-weight: 600; }

  /* Hero — bitta katta raqam */
  .hero { text-align: center; margin-bottom: 48px; }
  .hero .big {
    font-family:'Cormorant Garamond',serif;
    font-weight: 500;
    font-size: 96px;
    color: var(--accent);
    line-height: 1;
  }
  .hero .lbl { font-size: 11px; letter-spacing: 4px; color: var(--text-mid); text-transform: uppercase; margin-top: 4px; }

  /* Bar chart — 7 kun */
  .chart {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    align-items: end;
    height: 110px;
    margin-bottom: 12px;
  }
  .bar {
    background: var(--accent);
    border-radius: 4px 4px 0 0;
    transition: opacity .2s;
  }
  .bar.dim { opacity: .25; }
  .days {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    margin-bottom: 40px;
  }
  .days span { text-align:center; font-size: 9px; letter-spacing: 1px; color: var(--text-dim); text-transform: uppercase; }

  /* 3 ta minimal stat */
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    padding-top: 24px;
    border-top: 1px solid rgba(255,255,255,.04);
  }
  .stat { text-align: center; }
  .stat .v { font-family:'Cormorant Garamond',serif; font-size: 22px; font-weight: 500; color: var(--accent); }
  .stat .l { font-size: 9px; letter-spacing: 2px; color: var(--text-mid); text-transform: uppercase; margin-top: 4px; }

  @media (max-width: 480px) { body { padding: 0; } .phone { width: 100vw; min-height: 100vh; border-radius: 0; box-shadow: none; } }
</style>
</head>
<body>

<div class="phone">
  <div class="container">

    <div class="tabs">
      <div class="tab">Kun</div>
      <div class="tab on">Hafta</div>
      <div class="tab">Oy</div>
    </div>

    <div class="hero">
      <div class="big" data-mvow="week.focusHours">38</div>
      <div class="lbl">Soat fokus</div>
    </div>

    <div class="chart" id="chart"></div>
    <div class="days" id="days"></div>

    <div class="stats">
      <div class="stat">
        <div class="v" data-mvow="week.sessionCount">38</div>
        <div class="l">Sessiya</div>
      </div>
      <div class="stat">
        <div class="v" data-mvow="streak">12</div>
        <div class="l">Streak</div>
      </div>
      <div class="stat">
        <div class="v" data-mvow="week.change">+12%</div>
        <div class="l">O'zgarish</div>
      </div>
    </div>

  </div>
</div>

<script src="data.js" defer></script>
<script src="nav-overlay.js" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const data = window.MVOW_DATA ? MVOW_DATA.week.days : [5.5,7.2,6,5,8,4,2];
    const max = Math.max(...data);
    const chart = document.getElementById('chart');
    const days = document.getElementById('days');
    const labels = ['Du','Se','Ch','Pa','Ju','Sh','Ya'];
    data.forEach((v, i) => {
      const bar = document.createElement('div');
      bar.className = 'bar' + (v < max * .5 ? ' dim' : '');
      bar.style.height = ((v / max) * 100) + '%';
      chart.appendChild(bar);
      const lbl = document.createElement('span');
      lbl.textContent = labels[i];
      days.appendChild(lbl);
    });
  });
  document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('on'));
    t.classList.add('on');
  }));
</script>

</body>
</html>
