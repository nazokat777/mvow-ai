<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>{brand} — Bosh sahifa</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#04060B">
<link rel="apple-touch-icon" href="assets/mnsm-logo.png">
<link rel="icon" type="image/png" href="assets/mnsm-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --void:#04060B; --void-soft:#0C0F16;
    --text:#F5F2EC; --text-mid:#8A8D94; --text-dim:#4A4D54;
    --accent:#00E5D4; --accent-soft:#00B5A8;
  }
  body {
    background: var(--void);
    font-family: 'Inter', sans-serif;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }
  .phone {
    width: 380px;
    min-height: 800px;
    background: var(--void);
    border-radius: 40px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 0 8px #1a1d24, 0 30px 80px rgba(0,0,0,.7);
    display: flex;
    flex-direction: column;
  }
  .container { flex: 1; padding: 56px 32px 100px; }

  .stamp {
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 32px;
  }
  .greeting {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 30px;
    font-weight: 500;
    margin-bottom: 48px;
  }
  .greeting .em { color: var(--accent); font-style: normal; }

  /* Bitta katta raqam — streak */
  .hero {
    text-align: center;
    margin-bottom: 56px;
  }
  .hero .big {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 88px;
    color: var(--accent);
    line-height: 1;
  }
  .hero .label {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--text-mid);
    text-transform: uppercase;
    margin-top: 8px;
  }

  /* Keyingi ish — bitta qator */
  .next {
    text-align: center;
    margin-bottom: 48px;
  }
  .next .at {
    font-size: 12px;
    color: var(--text-mid);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .next .at .em { color: var(--accent); }
  .next .what {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
  }

  /* Pastdagi 2 ta statistika — minimal */
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
    padding-top: 24px;
    border-top: 1px solid rgba(255,255,255,.04);
  }
  .stat {
    text-align: center;
  }
  .stat .v {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 500;
    color: var(--accent);
  }
  .stat .l {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-mid);
    text-transform: uppercase;
    margin-top: 4px;
  }

  .bottom-bar {
    padding: 16px 32px env(safe-area-inset-bottom, 16px);
    background: linear-gradient(180deg, transparent, var(--void) 30%);
  }
  .cta {
    display: block;
    width: 100%;
    padding: 16px;
    background: linear-gradient(180deg, var(--accent), var(--accent-soft));
    color: var(--void);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: none;
    border-radius: 6px;
    text-align: center;
    text-decoration: none;
  }

  @media (max-width: 480px) {
    body { padding: 0; }
    .phone { width: 100vw; min-height: 100vh; border-radius: 0; box-shadow: none; }
  }
</style>
</head>
<body>

<div class="phone">
  <div class="container">

    <div class="stamp">
      <span data-mvow="today.date">10-MAY</span> · <span data-mvow="today.weekday">DUSHANBA</span>
    </div>

    <h1 class="greeting">Salom, <span class="em" id="userName">Aziz</span>.</h1>

    <div class="hero">
      <div class="big" data-mvow="streak">12</div>
      <div class="label">kun streak</div>
    </div>

    <div class="next">
      <div class="at"><span class="em" id="nextTime">06:20</span> · keyingi</div>
      <div class="what" id="nextName">Arab grammatikasi</div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="v" data-mvow="totals.focusLabel">7 soat 15 daq</div>
        <div class="l">Bugun fokus</div>
      </div>
      <div class="stat">
        <div class="v" data-mvow="totals.sessions">5</div>
        <div class="l">Sessiya</div>
      </div>
    </div>

  </div>

  <div class="bottom-bar">
    <a class="cta" href="today-plan.html">Bugungi reja</a>
  </div>
</div>

<script src="data.js" defer></script>
<script src="nav-overlay.js" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const userName = (localStorage.getItem('mvow.userName') || 'Aziz').trim();
    document.getElementById('userName').textContent = userName;

    if (window.MVOW_DATA) {
      const up = MVOW_DATA.sessions.find(s => s.status === 'upcoming') || MVOW_DATA.sessions[0];
      if (up) {
        document.getElementById('nextTime').textContent = up.time;
        document.getElementById('nextName').textContent = up.name;
      }
    }
  });
</script>

</body>
</html>
